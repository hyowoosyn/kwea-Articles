<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한국여성경제인협회 규정집 챗봇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #6C3483;
  --primary-light: #AF7AC5;
  --primary-dark: #4A235A;
  --bg: #F4F1F8;
  --card-bg: #FFFFFF;
  --text: #2C2C2C;
  --text-light: #666;
  --border: #E0D6EA;
  --accent: #E74C3C;
  --success: #27AE60;
  --shadow: 0 2px 12px rgba(108,52,131,0.08);
}
body {
  font-family: 'Segoe UI', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Header */
.header {
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  z-index: 10;
}
.header-icon {
  width: 44px; height: 44px;
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
}
.header-text h1 { font-size: 17px; font-weight: 700; }
.header-text p { font-size: 12px; opacity: 0.85; margin-top: 2px; }
.header-actions { margin-left: auto; display: flex; gap: 8px; }
.header-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.25);
  color: white;
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.header-btn:hover { background: rgba(255,255,255,0.3); }

/* Main Chat Area */
.chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 20px 24px;
  scroll-behavior: smooth;
}

.message {
  max-width: 85%;
  margin-bottom: 16px;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.message.bot { margin-right: auto; }
.message.user { margin-left: auto; }

.message-bubble {
  padding: 14px 18px;
  border-radius: 16px;
  line-height: 1.65;
  font-size: 14px;
  word-break: keep-all;
}
.message.bot .message-bubble {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
  box-shadow: var(--shadow);
}
.message.user .message-bubble {
  background: var(--primary);
  color: white;
  border-bottom-right-radius: 4px;
}

/* Result Cards */
.result-card {
  background: #FAFAFA;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px 16px;
  margin-top: 10px;
  transition: all 0.2s;
  cursor: pointer;
}
.result-card:hover {
  border-color: var(--primary-light);
  box-shadow: 0 2px 8px rgba(108,52,131,0.1);
}
.result-card-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.result-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 600;
}
.badge-법령 { background: #FDEDEC; color: #C0392B; }
.badge-규정 { background: #EBF5FB; color: #2E86C1; }
.badge-경영 { background: #E8F8F5; color: #1ABC9C; }
.badge-규칙 { background: #FEF9E7; color: #D4AC0D; }
.badge-지침 { background: #F4ECF7; color: #8E44AD; }
.badge-강령 { background: #FDEBD0; color: #E67E22; }

.result-reg-name {
  font-size: 12px;
  color: var(--text-light);
}
.result-article {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary-dark);
}
.result-content {
  font-size: 13px;
  color: var(--text);
  line-height: 1.6;
  max-height: 80px;
  overflow: hidden;
  position: relative;
}
.result-content.expanded { max-height: none; }
.result-toggle {
  color: var(--primary);
  font-size: 12px;
  cursor: pointer;
  margin-top: 6px;
  display: inline-block;
  font-weight: 600;
}
.result-toggle:hover { text-decoration: underline; }
mark {
  background: #FCF3CF;
  color: var(--text);
  padding: 0 2px;
  border-radius: 2px;
}

/* Suggested Questions */
.suggestions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}
.suggestion-chip {
  background: white;
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--primary);
}
.suggestion-chip:hover {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}

/* Category Browser */
.category-browser {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 12px;
}
.category-tile {
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
}
.category-tile:hover {
  border-color: var(--primary);
  transform: translateY(-1px);
  box-shadow: var(--shadow);
}
.category-tile .icon { font-size: 22px; margin-bottom: 4px; }
.category-tile .name { font-size: 12px; font-weight: 600; color: var(--text); }
.category-tile .count { font-size: 11px; color: var(--text-light); }

/* Input Area */
.input-area {
  padding: 12px 24px 20px;
  background: white;
  border-top: 1px solid var(--border);
  z-index: 10;
}
.input-wrapper {
  display: flex;
  gap: 10px;
  align-items: center;
  background: var(--bg);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 4px 6px 4px 18px;
  transition: border-color 0.2s;
}
.input-wrapper:focus-within {
  border-color: var(--primary-light);
}
.input-wrapper input {
  flex: 1;
  border: none;
  background: none;
  padding: 12px 0;
  font-size: 14px;
  color: var(--text);
  outline: none;
}
.input-wrapper input::placeholder { color: #999; }
.send-btn {
  width: 40px; height: 40px;
  background: var(--primary);
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}
.send-btn:hover { background: var(--primary-dark); }
.send-btn:disabled { background: #CCC; cursor: not-allowed; }
.input-hint {
  display: flex;
  justify-content: space-between;
  margin-top: 6px;
  font-size: 11px;
  color: #999;
  padding: 0 4px;
}

/* Scrollbar */
.chat-container::-webkit-scrollbar { width: 6px; }
.chat-container::-webkit-scrollbar-thumb { background: #D0C4D9; border-radius: 3px; }
.chat-container::-webkit-scrollbar-track { background: transparent; }

/* Responsive */
@media (max-width: 600px) {
  .header { padding: 12px 16px; }
  .chat-container { padding: 16px; }
  .input-area { padding: 10px 16px 16px; }
  .message { max-width: 92%; }
  .category-browser { grid-template-columns: repeat(2, 1fr); }
}

/* Loading */
.typing-indicator {
  display: flex; gap: 4px; padding: 4px 0;
}
.typing-indicator span {
  width: 6px; height: 6px;
  background: var(--primary-light);
  border-radius: 50%;
  animation: typing 1.2s infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 100% { opacity: 0.3; transform: scale(0.8); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* Detail Modal */
.modal-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.active { display: flex; }
.modal {
  background: white;
  border-radius: 16px;
  max-width: 700px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 28px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-close {
  float: right;
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: #999;
  padding: 0 4px;
}
.modal-close:hover { color: var(--text); }
.modal h2 { font-size: 18px; color: var(--primary-dark); margin-bottom: 6px; }
.modal h3 { font-size: 14px; color: var(--text-light); font-weight: 400; margin-bottom: 16px; }
.modal .full-content {
  font-size: 14px;
  line-height: 1.8;
  white-space: pre-wrap;
  word-break: keep-all;
}

/* Regulation list in sidebar */
.reg-list { margin-top: 10px; }
.reg-item {
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  margin-bottom: 6px;
  cursor: pointer;
  font-size: 13px;
  transition: all 0.15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.reg-item:hover {
  border-color: var(--primary-light);
  background: #F9F5FC;
}
.reg-item .count {
  font-size: 11px;
  background: var(--bg);
  padding: 2px 8px;
  border-radius: 10px;
  color: var(--text-light);
}

/* Stats */
.stats-bar {
  display: flex;
  gap: 12px;
  margin-top: 10px;
  font-size: 12px;
  color: var(--text-light);
}
.stat-item {
  display: flex;
  align-items: center;
  gap: 4px;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">&#128218;</div>
  <div class="header-text">
    <h1>한국여성경제인협회 규정집 챗봇</h1>
    <p>2026.03.11. 개정 규정집 기반 | 총 848개 조항</p>
  </div>
  <div class="header-actions">
    <button class="header-btn" onclick="showAllRegulations()">&#128196; 규정 목록</button>
    <button class="header-btn" onclick="resetChat()">&#128260; 새 대화</button>
  </div>
</div>

<div class="chat-container" id="chatContainer">
</div>

<div class="input-area">
  <div class="input-wrapper">
    <input type="text" id="userInput" placeholder="규정에 대해 궁금한 점을 입력하세요..." 
           autocomplete="off" autofocus>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#10148;</button>
  </div>
  <div class="input-hint">
    <span>예: &quot;연차휴가&quot;, &quot;회비 납부&quot;, &quot;출장 여비&quot;</span>
    <span>Enter로 전송</span>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <h2 id="modalTitle"></h2>
    <h3 id="modalSubtitle"></h3>
    <div class="full-content" id="modalContent"></div>
  </div>
</div>

<script>

const articles = [{"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제1조", "article_title": "목적", "content": "이 법은 여성기업의 활동과 여성의 창업을 적극적으로 지원하여 경제 영역에서 남녀의 실질적인 평등을 도모하고 여성의 경제활동과 여성경제인의 규 지위 향상을 도모함으로써 국민경제 발전에 이바지함을 목적으로 한다. [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제2조", "article_title": "정의", "content": "이 법에서 사용하는 용어의 뜻은 다음과 같다. <개정 2016. 1. 27.> 1. “여성기업”이란 여성이 소유하고 경영하는 기업으로서 대통령령으로 정하는 기준에 해당하는 기업을 말한다. 2. “여성경제인”이란 기업의 임원으로서 그 기업의 최고의사 결정에 참여하는 여성을 말한다. 규 3. “공공기관”이란 「중소기업제품 구매촉진 및 판로지원에 관한 법률」 제2조 제2호에 따른 공공기관을 말한다. [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제3조", "article_title": "국가 및 지방자치단체의 책임", "content": "국가 및 지방자치단체는 여성의 창업과 여성 기업의 기업활동을 촉진하기 위하여 자금ㆍ인력ㆍ정보ㆍ기술ㆍ판로 등의 분야 에서 종합적인 지원과 사업활동 기회가 균등하게 보장될 수 있도록 노력하여야 한다. [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제4조", "article_title": "차별적 관행의 시정", "content": "① 중소벤처기업부장관은 공공기관, 대통령령으로 정하는 중소기업 관련 기관 또는 단체(이하 “공공기관등”이라 한다)가 여성기업에 불합리한 차별적 관행이나 제도를 시행할 경우 그 시정을 요청할 수 있다. <개정 2017. 7. 26., 2019. 4. 23.> ② 제1항에 따라 시정을 요청받은 공공기관등은 요청을 받은 날부터 90일 이 내에 그 시정 요청사항의 이행계획을 중소벤처기업부장관에게 통보하여야 한다. 다만, 시정 요청사항을 이행할 수 없는 경우에는 그 사유를 중소벤처기업부장관 에게 통보하여야 한다. <개정 2019. 4. 23.> ③ 제2항에 따라 이행계획을 통보한 공공기관등은 이행계획에 따라 시정 요청 사항을 이행하고, 이행을 완료한 날부터 90일 이내에 그 이행결과를 중소벤처 기업부장관에게 통보하여야 한다. <신설 2019. 4. 23.> ④ 중소벤처기업부장관은 필요하다고 인정하면 제1항에 따른 시정 요청, 제2항에 따른 통보 내용 및 제3항에 따른 이행결과를 공표할 수 있다. <신설 2019. 4. 23.> [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제5조", "article_title": "여성기업활동 촉진에 관한 기본계획", "content": "① 중소벤처기업부장관은 대통령령 으로 정하는 바에 따라 여성기업의 활동을 촉진하기 위한 기본계획(이하 “기 본계획”이라 한다)을 5년마다 수립하여야 한다. <개정 2017. 7. 26., 2020. 2. 11.> ② 기본계획에는 다음 각 호의 사항이 포함되어야 한다. <개정 2020. 10. 20.> 1. 여성기업활동을 촉진하기 위한 기본목표 및 그 추진방향 2. 여성의 창업을 지원하기 위한 사항 3. 여성기업에 대한 자금, 정보, 기술, 인력, 판로 등의 지원에 관한 사항 4. 중소기업 지원사업 평가위원회 구성 시 여성위원 비율에 관한 사항 5. 제1호부터 제4호까지에서 규정한 사항 외에 여성기업 및 여성경제인의 활동을 촉진하기 위하여 필요한 사항 ③ 중소벤처기업부장관은 기본계획에 따라 연도별 여성기업활동 촉진에 관한 시행계획(이하 “시행계획”이라 한다)을 수립ㆍ시행하여야 한다. <신설 2020. 2. 11.> ④ 중소벤처기업부장관은 기본계획 및 시행계획을 수립하기 위하여 필요하다고 인정하는 경우에는 관계 행정기관 및 여성기업 지원과 관련된 기관 또는 단체에 대하여 필요한 자료나 의견 등의 제출을 요청할 수 있다. 이 경우 요청을 받은 관계 행정기관 및 여성기업 지원과 관련된 기관 또는 단체는 특별한 사정이 없으면 요청에 따라야 한다. <개정 2017. 7. 26., 2020. 2. 11.> ⑤ 그 밖에 기본계획 및 시행계획의 수립ㆍ시행에 필요한 사항은 대통령령으로 정한다. <신설 2020. 2. 11.> [전문개정 2009. 12. 30.] 제6조 삭제 <2023. 10. 31.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제7조", "article_title": "실태 조사 및 통계 작성", "content": "① 중소벤처기업부장관은 여성기업의 활동 현황 및 실태를 파악하기 위하여 매년 실태 조사를 하고 그 결과를 공표하여야 한다. <개정 2017. 7. 26., 2021. 4. 20.> ② 중소벤처기업부장관은 제1항에 따른 실태 조사 및 관계 자료를 참고하여 여성기업에 관한 통계를 작성ㆍ관리하여야 한다. <신설 2021. 4. 20.> 여성기업지원에 관한 법률 Ⅰ-1-5 ③ 제1항에 따른 실태 조사를 하기 위하여 필요한 경우에는 공공기관ㆍ여성기업 또는 여성단체에 대하여 자료의 제출이나 의견의 진술 등을 요구할 수 있으며, 그 요구를 받은 공공기관ㆍ여성기업 또는 여성단체는 이에 협조하여야 한다. ④ 중소벤처기업부장관은 제1항에 따른 실태 조사를 제13조에 따른 한국여성 경제인협회, 중소기업 관련 기관 또는 단체에 위탁할 수 있다. <개정 2017. 7. 26., 2021. 4. 20.> ⑤ 제1항에 따른 실태 조사 및 제2항에 따른 통계 작성ㆍ관리의 내용 및 절차 등에 관하여 필요한 사항은 대통령령으로 정한다. <신설 2021. 4. 20.> [전문개정 2009. 12. 30.] [제목개정 2021. 4. 20.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제8조", "article_title": "여성의 창업지원 특례", "content": "① 중소벤처기업부장관은 「중소기업창업 지원법」 제7조제1항에 따른 창업지원종합계획에 여성의 창업촉진을 위한 계획을 포함 시켜야 한다. <개정 2017. 7. 26., 2021. 12. 28.> ② 정부는 「중소기업창업 지원법」 제35조제1항에 따라 창업기업등과 창업 지원 관련 사업을 하는 자에 대한 지원을 하는 경우 여성창업자 및 여성창업 지원 실적이 우수한 창업지원 관련 사업자를 우대할 수 있다. <개정 2021. 12. 28.> ③ 중소벤처기업부장관은여성의창업을촉진하기위하여「중소기업창업지원법」 제53조제1항에 따른 창업보육센터사업자를 지정할 때에는 여성을 위한 창업 보육센터사업자를 우선 지정할 수 있다. <개정 2017. 7. 26., 2021. 12. 28.> [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제9조", "article_title": "공공기관의 우선 구매", "content": "① 공공기관의 장은 여성기업(「중소기업기본법」 제2조에 따른 중소기업자만 해당한다. 이하 이 조에서 같다)이 직접 생산하는 물품, 제공하는 용역 및 수행하는 공사(이하 이 조에서 “여성기업제품”이라 한다)의 구매를 촉진하여야 한다. <개정 2018. 6. 12.> ② 공공기관의 장이 「중소기업제품 구매촉진 및 판로지원에 관한 법률」 제5조 제1항에 따라 작성하는 구매계획에는 여성기업제품의 구매계획을 구분하여 포함시켜야 한다. ③ 제2항에 따른 여성기업제품의 구매계획에는 대통령령으로 정하는 비율 이상의 구매목표를 포함시켜야 하며, 공공기관의 장은 해당 구매계획을 이행하여야 한다. <개정 2013. 7. 30.> ④ 중소벤처기업부장관은 제3항에 따른 구매계획을 확인한 결과 개선이 필요 하다고 인정되는 사항에 대하여는 해당 공공기관의 장에게 그 개선을 권고할 수 있다. 이 경우 해당 공공기관의 장은 특별한 사정이 없으면 구매계획에 이를 반영하여야 한다. <개정 2017. 7. 26.> ⑤ 제2항부터 제4항까지의 규정에 따른 구매계획과 구매실적의 통보에 필요한 사항은 「중소기업제품 구매촉진 및 판로지원에 관한 법률」 제5조제4항을 준용 한다. <개정 2016. 1. 27.> [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제10조", "article_title": "자금지원 우대", "content": "①국가 및 지방자치단체는 기업에 대한 자금을 지원할 때 여성기업의 활동과 창업을 촉진하기 위하여 여성기업을 우대하여야 한다. <개정 2016. 1. 27.> ② 정부는 여성이 창업 및 기업활동에 필요한 자금을 원활하게 조달할 수 있도록 「신용보증기금법」에 따른 신용보증기금, 「기술보증기금법」에 따른 기술 보증기금 및 「지역신용보증재단법」 제9조에 따라 설립한 신용보증재단으로 하여금 여성기업을 대상으로 하는 보증제도를 수립ㆍ운용하도록 할 수 있다. <신설 2016. 1. 27., 2016. 3. 29.> [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제11조", "article_title": "경영능력 향상 지원", "content": "중소벤처기업부장관은 여성경제인 및 여성기업의 근로자에 대하여 경영능력과 기술수준을 향상시키기 위한 다음 각 호의 연수 및 지도사업 등을 실시할 수 있다. <개정 2017. 7. 26., 2020. 12. 8.> 1. 여성경제인의 기업가정신 교육과 관련된 사항 2. 여성경제인 간의 협력 및 조직화에 관한 사항 3. 여성기업의 기업환경 개선 및 경쟁력 강화에 관한 사항 4. 여성경제인의 스마트공장 구축 및 고도화 촉진과 관련된 사항 5. 여성경제인의 비대면 방식을 통한 제품의 생산ㆍ유통ㆍ판매 또는 서비스 제공 역량 강화에 관한 사항 6. 여성경제인 및 여성기업 근로자의 디지털 역량강화 교육과 관련된 사항 7. 그 밖에 여성경제인 및 여성기업 근로자의 경영능력과 기술수준 향상을 위 하여 필요한 사항 [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제12조", "article_title": "디자인 개발 지원", "content": "「산업디자인진흥법」제11조에따른한국디자인진흥원은 여성기업의 디자인 개발을 촉진하기 위하여 노력하여야 한다. [전문개정 2009. 12. 30.] 여성기업지원에 관한 법률 Ⅰ-1-7"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제12조의2", "article_title": "인식개선 등", "content": "중소벤처기업부장관은 여성기업에 대한 국민의 인식을 높이고 여성기업의 성장 촉진 및 경쟁력 강화를 위하여 다음 각 호의 사업을 추진할 수 있다. 령 1. 우수 여성경제인 및 여성기업 경쟁력 강화에 공적이 있는 자에 대한 포상 2. 국민경제 발전에 대한 여성기업의 역할과 기여에 관한 홍보 3. 그 밖에 여성기업에 대한 인식제고를 위하여 필요한 사업 [본조신설 2021. 10. 19.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제12조의3", "article_title": "여성기업 주간", "content": "① 여성경제인의 자긍심을 고양하고 여성기업에 대한 국민의 인식을 높이기 위하여 대통령령으로 정하는 바에 따라 1년 중 1주간을 여성기업 주간으로 한다. 정 ② 국가와 지방자치단체는 여성기업 주간의 취지에 적합한 기념행사를 개최 할 수 있다. ③ 여성기업 주간의 행사에 필요한 사항은 대통령령으로 정한다. [본조신설 2021. 10. 19.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제13조", "article_title": "한국여성경제인협회의 설립 등", "content": "① 여성경제인의공동이익의증진과건전한 규 발전을 도모하고 여성의 기업활동 촉진 업무를 효율적으로 수행하게 하기 위하여 한국여성경제인협회(이하 “협회”라 한다)를 설립한다. 칙 ② 협회는 법인으로 한다. ③ 협회를 설립하려면 그 대표자는 대통령령으로 정하는 바에 따라 정관과 그 밖에 필요한 서류를 중소벤처기업부장관에게 제출하여 그 설립허가를 받아야 한다. <개정 2017. 7. 26.> ④ 협회는 주된 사무소의 소재지에서 설립등기를 함으로써 성립한다. [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제14조", "article_title": "협회의 업무", "content": "협회는 다음 각 호의 업무를 수행한다. <개정 2017. 7. 26.> 1. 여성경제인에 대한 연수 및 전문여성경제인의 양성 2. 여성기업에 대한 정보제공 3. 여성의 창업에 대한 지원 및 촉진 활동 4. 공동구매 및 판매사업 지원 5. 여성기업의 해외시장개척 및 외국인투자유치 지원 강 6. 외국 여성경제인단체와의 협력 7. 중소벤처기업부장관이 여성기업의 활동과 여성의 창업을 촉진하기 위하여 위탁하는 사업 8. 제1호부터 제7호까지에서 규정한 업무 외에 여성의 기업활동을 촉진하기 위한 업무 [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제15조", "article_title": "여성기업종합지원센터의 설치 등", "content": "① 협회는 여성의 창업과 여성기업의 활동을 적극적으로 촉진하기 위하여 각종 정보 및 교육ㆍ훈련ㆍ연수ㆍ상담 등의 서비스를 제공할 수 있는 여성기업종합지원센터(이하 “지원센터”라 한다)를 설치할 수 있다. ② 국가 또는 지방자치단체는 지원센터의 설치와 운영에 필요한 자금 등을 지원 할 수 있다. <개정 2016. 1. 27.> ③ 지원센터의 설치와 운영에 필요한 사항은 대통령령으로 정한다. [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제16조", "article_title": "국유ㆍ공유재산의 무상 대부", "content": "국가 또는 지방자치단체는 협회의 사업을 위하여 필요한 경우에는 「국유재산법」 또는 「공유재산 및 물품 관리법」에도 불구하고 국유재산과 공유재산을 무상으로 협회에 대부할 수 있다. [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제17조", "article_title": "세제 지원", "content": "정부는 협회 및 그 주요 사업에 대하여 「조세특례제한법」 에서 정하는 바에 따라 세제상의 지원을 할 수 있다. [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제18조", "article_title": "유사명칭의 사용금지", "content": "이 법에 따른 협회가 아닌 자는 한국여성경제인협회 또는 이와 비슷한 명칭을 사용하지 못한다. [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제19조", "article_title": "「민법」의 준용", "content": "협회에 관하여 이 법에 규정된 것을 제외하고는 「민법」 중 사단법인에 관한 규정을 준용한다. [전문개정 2009. 12. 30.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제20조", "article_title": "지도ㆍ감독", "content": "① 중소벤처기업부장관은 협회의 사무에 관하여 지도ㆍ감독 할 수 있다. <개정 2017. 7. 26.> ② 중소벤처기업부장관은 제1항에 따른 지도ㆍ감독을 위하여 필요하다고 인정 하면 협회에 대하여 필요한 서류 등의 제출을 요구할 수 있다. <개정 2017. 7. 26.> [전문개정 2009. 12. 30.] 여성기업지원에 관한 법률 Ⅰ-1-9"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제20조의2", "article_title": "여성기업의 확인 등", "content": "① 이 법에 따른 지원을 받고자 하는 자는 중소 벤처기업부장관에게 기업이 여성기업에 해당하는지 여부를 확인하여 줄 것을 신청할 수 있다. <개정 2017. 7. 26.> 령 ② 중소벤처기업부장관은 제1항에 따라 신청을 받으면 해당 기업이 여성기업에 해당하는지 여부를 조사ㆍ검토하여, 여성기업에 해당하면 이를 확인(이하 “여성 기업의 확인”이라 한다)하여 주어야 한다. 이 경우 유효기간을 명시한 증명서류를 함께 발급할 수 있다. <개정 2017. 7. 26.> ③ 다음 각 호의 어느 하나에 해당하는 자는 1년의 기간 내에서 대통령령으로 정하는 기간 내에는 제1항에 따른 신청을 할 수 없다. 1. 제2항에 따른 조사ㆍ검토 결과 여성기업이 아닌 것으로 밝혀진 자 정 2. 제20조의3제1항제1호에 해당하여 여성기업의 확인이 취소된 자 ④ 그 밖에 여성기업의 확인 절차, 증명서류의 유효기간 및 발급 등 여성기업의 확인에 필요한 사항은 대통령령으로 정한다. [본조신설 2016. 1. 27.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제20조의3", "article_title": "여성기업의 확인 취소", "content": "① 중소벤처기업부장관은 여성기업의 확인을 받은 자가 다음 각 호의 어느 하나에 해당하면 여성기업의 확인을 취소할 수 있다. 다만, 제1호의 경우에는 여성기업의 확인을 취소하여야 한다. <개정 201 칙 7. 7. 26.> 1. 거짓이나 그 밖의 부정한 방법으로 여성기업의 확인을 받은 경우 2. 제2조제1호에 따른 여성기업의 기준에 맞지 아니하게 된 경우 3. 부도ㆍ폐업 등의 사유로 기업활동을 하지 아니하게 된 경우 ② 중소벤처기업부장관은 제1항에 따라 여성기업의 확인을 취소하려면 청문을 하여야 한다. <개정 2017. 7. 26.> [본조신설 2016. 1. 27.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제20조의4", "article_title": "보고와 검사", "content": "① 중소벤처기업부장관은 여성기업의 확인을 받은 자가 제20조의3제1항에 따른 여성기업의 확인 취소 사유에 해당하는지 여부를 점검 하기 위하여 필요하면 해당 기업에 대하여 관련 자료를 제출ㆍ보고하게 하거나 소속 공무원으로 하여금 사업장, 사무실 등에 출입하여 관련 사항을 검사하도록 할 수 있다. <개정 2017. 7. 26.> ② 제1항에 따라 검사를 하는 공무원은 그 권한을 표시하는 증표를 지니고 이를 관계인에게 내보여야 한다. 령 [본조신설 2016. 1. 27.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제20조의5", "article_title": "권한의 위임ㆍ위탁", "content": "① 이 법에 따른 중소벤처기업부장관의 권한은 대통령령으로 정하는 바에 따라 그 일부를 소속 기관의 장 또는 시ㆍ도지사에게 위임하거나 다른 행정기관의 장에게 위탁할 수 있다. <개정 2017. 7. 26.> ② 제20조의2부터 제20조의4까지의 규정에 따른 중소벤처기업부장관의 업무는 대통령령으로정하는바에따라그일부를협회에위탁할수있다. <개정2017. 7. 26.> ③ 제2항에 따라 중소벤처기업부장관으로부터 위탁받은 업무에 종사하는 협 회의 임원과 직원은 「형법」 제129조부터 제132조까지의 규정을 적용할 때에는 공무원으로 본다. <개정 2017. 7. 26.> [본조신설 2016. 1. 27.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제20조의6", "article_title": "벌칙", "content": "여성기업이 아닌 자로서 거짓이나 그 밖의 부정한 방법으로 이 법에 따른 지원을 받은 자는 3년 이하의 징역 또는 3천만원 이하의 벌금에 처한다. [본조신설 2016. 1. 27.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제20조의7", "article_title": "양벌규정", "content": "법인의 대표자나 법인 또는 개인의 대리인, 사용인, 그 밖의 종업원이 그 법인 또는 개인의 업무에 관하여 제20조의6의 위반행위를 하면 그 행위자를 벌하는 외에 그 법인 또는 개인에게도 해당 조문의 벌금형을 과 (科)한다. 다만, 법인 또는 개인이 그 위반행위를 방지하기 위하여 해당 업무에 관하여 상당한 주의와 감독을 게을리하지 아니한 경우에는 그러하지 아니하다. [본조신설 2016. 1. 27.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제21조", "article_title": "과태료", "content": "① 제20조의4제1항에 따른 자료를 제출하지 아니하거나 거짓된 자료를 제출한 자, 보고를 하지 아니하거나 거짓된 보고를 한 자 또는 검사를 거부ㆍ방해 또는 기피한 자에게는 300만원 이하의 과태료를 부과한다. <신설 2016. 1. 27.> ② 제18조를 위반하여 한국여성경제인협회 또는 이와 비슷한 명칭을 사용한 자 에게는 100만원 이하의 과태료를 부과한다. <개정 2016. 1. 27.> ③ 제1항 및 제2항에 따른 과태료는 중소벤처기업부장관이 부과ㆍ징수한다. <개정 2016. 1. 27., 2017. 7. 26.> [전문개정 2009. 12. 30.] 부칙 <제19825호, 2023. 10. 31.> (행정기관 소속 위원회 정비를 위한 여성기업지 원에 관한 법률 등 4개 법률의 일부개정에 관한 법률)"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제1조", "article_title": "시행일", "content": "이 법은 공포 후 6개월이 경과한 날부터 시행한다. 제2조 생략 여성기업지원에 관한 법률 시행령 Ⅰ-2-1 여성기업지원에 관한 법률 시행령 여성기업지원에 관한 법률 시행령 Ⅰ-2-3 여성기업지원에 관한 법률 시행령 [대통령령 제16394호 제 정 1999. 06. 11] [시행 2024. 5. 14.] [대통령령 제34512호, 2024. 5. 14., 일부개정]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제1조", "article_title": "목적", "content": "이 영은 「여성기업지원에 관한 법률」에서 위임된 사항과 그 시행에 관하여 필요한 사항을 규정함을 목적으로 한다. <개정 2007. 6. 11.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제2조", "article_title": "여성기업의 정의", "content": "①「여성기업지원에 관한 법률」(이하 “법”이라 한다) 제2조제1호에서 “대통령령으로 정하는 기준에 해당하는 기업”이란 여성이 실 질적으로 경영하는 기업으로서 다음 각 호의 어느 하나에 해당하는 기업을 말 한다. <개정 2007. 6. 11., 2013. 6. 28., 2016. 7. 28., 2019. 10. 22., 2022. 4. 19.> 1. 대표권이 있는 임원(이하 “회사대표”라 한다)으로 등기되어 있는 여성이 최 대출자자[자기의 명의로 소유하는 출자지분(주식회사인 경우에는 「상법」 제344조의3에 따른 의결권 없는 주식은 제외한다. 이하 같다)이 최대인 자를 말한다]인 「상법」상의 회사(회사 대표로 등기되어 있는 여성이 2명 이상인 경우로서 그 합한 출자지분이 최대인 회사를 포함한다) 2. 여성이 「소득세법」 제168조 또는 「부가가치세법」 제8조에 따라 사업자 등록을 한 개인사업자 3. 다음 각 목의 요건을 모두 갖춘 협동조합(「협동조합 기본법」에 따른 협동 조합 또는 「소비자생활협동조합법」에 따른 조합을 말한다. 이하 같다) 가. 총 조합원 수의 과반수가 여성일 것 나. 총 출자좌수의 과반수를 여성인 조합원이 출자하였을 것 다. 이사장이 여성인 조합원일 것 라. 이사장을 포함한 총 이사의 과반수가 여성인 조합원일 것 ② 삭제 <2016. 7. 28.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제2조의2", "article_title": "차별적 관행의 시정 요청 대상 기관 또는 단체의 범위", "content": "법 제4조제1항 에서 “대통령령으로 정하는 중소기업 관련 기관 또는 단체”란 법률에 따라 국 가나 지방자치단체로부터 출연ㆍ보조를 받아 중소기업 지원사업을 수행하는 기관 또는 단체로서 중소벤처기업부장관이 정하여 고시하는 기관 또는 단체를 말한다. 령 [본조신설 2019. 10. 22.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제3조", "article_title": "여성기업활동 촉진에 관한 기본계획 및 시행계획의 수립", "content": "① 중소벤처기 업부장관은 법 제5조제1항에 따른 여성기업활동 촉진에 관한 기본계획(이하 “기본계획”이라 한다)을 수립하기 위한 기본계획 작성지침을 마련하여 관계 행정기관의 장에게 통보해야 한다. ② 관계 행정기관의 장은 제1항에 따른 기본계획 작성지침에 따라 소관분야의 기본계획을 작성하여 중소벤처기업부장관에게 제출해야 한다. ③ 중소벤처기업부장관은 제2항에 따라 제출된 소관분야의 기본계획을 종합하여 기본계획을확정하고, 이를관계행정기관의장에게통보해야한다. <개정2024. 5. 14.> ④ 관계 행정기관의 장은 기본계획에 따른 소관분야의 연도별 시행계획을 작성 하여 중소벤처기업부장관에게 제출해야 한다. ⑤ 중소벤처기업부장관은 제4항에 따라 제출된 소관분야의 연도별 시행계획을 종합하여 매년 2월 말일까지 법 제5조제3항에 따른 연도별 여성기업활동 촉진에 관한 시행계획(이하 “시행계획”이라 한다)을 확정하고, 이를 관계 행정기관의 장에게 통보해야 한다. <개정 2024. 5. 14.> [전문개정 2020. 8. 11.] 제4조 삭제 <2024. 5. 14.> 제4조의2 삭제 <2024. 5. 14.> 제5조 삭제 <2024. 5. 14.> 제6조 삭제 <2024. 5. 14.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제6조의2", "article_title": "실태 조사 및 통계 작성ㆍ관리의 내용 및 절차 등", "content": "① 법 제7조제1항에 따른실태조사(이하 “실태조사”라한다)는 다음 각호의 사항을 포함하여 실시한다. 1. 자금, 인력 및 경영 현황에 관한 사항 2. 성장 장애요인에 관한 사항 3. 지원제도의 활용현황에 관한 사항 4. 그 밖에 중소벤처기업부장관이 여성기업의 활동 현황 및 실태를 파악하기 위하여 필요하다고 인정하는 사항 ② 실태조사는 현장조사 또는 서면조사 등의 방법으로 하며, 실태조사를 효율적 으로 실시하기 위하여 필요한 경우에는 정보통신망을 이용하거나 전자우편 등 전자적 방식을 이용할 수 있다. ③ 중소벤처기업부장관은 실태조사 결과를 중소벤처기업부의 인터넷 홈페이지를 통하여 공표해야 한다. 여성기업지원에 관한 법률 시행령 Ⅰ-2-5 ④ 중소벤처기업부장관은 법 제7조제2항에 따라 여성기업에 관한 통계를 작성하는 경우 다른 법령에 따라 조사하거나 작성한 통계, 그 밖의 자료를 활용할 수 있다. [본조신설 2021. 9. 29.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제7조", "article_title": "여성기업제품의 구매증대", "content": "① 법 제9조제3항 본문에서 “대통령령으로 정 하는 비율”이란 「중소기업제품 구매촉진 및 판로지원에 관한 법률」 제4조에 따른 물품 및 용역의 경우는 각 구매총액의 5퍼센트, 공사의 경우는 공사 구매 총액의 3퍼센트를 말한다. 다만, 공공기관의 특성상 본문에서 정한 비율 이상의 구매목표를 제시하기 어려운 공공기관의 장은 중소벤처기업부장관과 협의하여 구매목표비율을 따로 정할 수 있다. <개정 2017. 7. 26.> ② 중소벤처기업부장관이 법 제9조제4항에 따라 공공기관의 장에게 구매계획의 개선을 권고할 수 있는 경우는 다음 각 호의 경우로 한다. <개정 2017. 7. 26.> 1. 공공기관이 법 제9조제5항에 따라 중소벤처기업부장관에게 통보한 구매계획에 포함된 법 제9조제1항에 따른 여성기업제품(이하 “여성기업제품”이라 한다)의 구매목표비율이 제1항 본문에 따른 구매목표비율보다 낮은 경우 2. 공공기관이 제품구매에서 여성기업에 불리한 방법이나 절차 등을 적용하는 경우 [전문개정 2009. 11. 19.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제8조", "article_title": "지원절차 등의 고시", "content": "중소벤처기업부장관은 법 제9조 및 법 제10조에 따라 칙 여성기업제품을 우선구매하거나 여성기업에 대하여 자금을 지원함에 있어서 필요한 경우에는 우선구매 또는 지원대상이 되는 여성기업의 범위, 지원절차 등을 미리 정하여 고시할 수 있다. <개정 2009. 11. 19., 2017. 7. 26.> [제목개정 2009. 11. 19.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제8조의2", "article_title": "여성기업 주간의 행사 등", "content": "① 법 제12조의3제1항에 따라 매년 7월의 첫째 주를 여성기업 주간으로 한다. ② 국가와 지방자치단체는 여성기업 주간에 다음 각 호의 행사를 실시할 수 침 있다. 1. 여성기업 주간 기념행사 2. 법 제12조의2제1호에 따른 포상 3. 법 제12조의2제2호에 따른 여성기업의 역할과 기여에 관한 홍보 4. 그 밖에 여성기업의 기업활동을 촉진하고 경쟁력을 강화하기 위한 행사 [본조신설 2022. 4. 19.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제9조", "article_title": "협회설립의 절차", "content": "① 법 제13조의 규정에 의하여 한국여성경제인협회(이하 “협회”라 한다)를 설립하고자 하는 때에는 여성경제인 5인이상의 발기인이 여성 경제인 200인이상의 동의를 얻어 창립총회를 개최하여야 한다. ② 발기인의 대표자는 다음 각호의 서류를 갖추어 중소벤처기업부장관에게 설립허가를 신청하여야 한다. <개정 2017. 7. 26.> 1. 설립허가 신청서 2. 정관 3. 발기인 및 동의인의 명단 4. 사업계획서 및 수지예산서 5. 재산목록 및 부동산ㆍ예금ㆍ유가증권등 주된 재산에 관한 등기소ㆍ금융기관등의 증명서 6. 창립총회 회의록 ③ 중소벤처기업부장관은 협회의 설립을 허가한 때에는 이를 공고하여야 한다. <개정 2017. 7. 26.> ④ 협회가 성립되고 임원이 선임될 때까지의 필요한 사무는 발기인이 이를 행 한다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제10조", "article_title": "협회의 정관", "content": "협회의 정관에는 다음 각호의 사항을 기재하여야 한다. 1. 목적 2. 명칭 3. 주된 사무소의 소재지 4. 사업내용 5. 회원의 자격 6. 임원에 관한 사항 7. 총회 및 이사회의 구성 및 운영에 관한 사항 8. 자산 및 회계에 관한 사항 9. 정관의 변경에 관한 사항 10. 여성기업종합지원센터에 관한 사항"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제11조", "article_title": "사업계획의 제출", "content": "협회는 전년도의 사업실적과 결산서 및 당해연도의 사업 계획서와 예산서를 매년 2월 말일까지 중소벤처기업부장관에게 제출하여야 한다. <개정 2017. 7. 26.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제12조", "article_title": "지원센터의 설립 및 기능", "content": "① 법 제15조의 규정에 의한 여성기업종합지원 센터(이하 “지원센터”라 한다)는 민법에 의한 재단법인으로 이를 설립할 수 있다. 여성기업지원에 관한 법률 시행령 Ⅰ-2-7 ② 지원센터는 다음 각호의 사업을 한다. <개정 2017. 7. 26.> 1. 여성기업에 대한 정보 및 자료제공 2. 여성의 창업지원 3. 여성경제인에 대한 교육ㆍ훈련ㆍ연수 4. 여성기업의 경영활동 및 판로 지원 5. 여성기업 애로상담실의 운영 6. 여성기업의 육성을 위한 연구 및 조사 7. 여성기업의 육성을 위하여 중소벤처기업부장관이 필요하다고 인정하는 사업 8. 기타 여성기업의 육성을 위하여 중소벤처기업부장관, 지방자치단체의장 또는 협회의 회장이 위탁하는 사업"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제13조", "article_title": "지원센터의 운영", "content": "① 지원센터의 대표는 지원센터의 이사회가 선임하되, 정관이 정하는 바에 따라 중소벤처기업부장관의 승인을 받아야 한다. <개정 20 07. 6. 11., 2017. 7. 26.> ② 지원센터의 조직과 운영에 관하여 필요한 사항은 지원센터의 정관이나 운영에 관한 규정으로 정한다. ③ 중소벤처기업부장관은 법 제15조제2항의 규정에 의하여 지원센터에 자금을 지원하고자 하는 경우에는 예산에 이를 계상하여야 한다. <개정 2017. 7. 26.>"}, {"category": "규정", "regulation": "정관", "article_num": "제14조", "article_title": "위탁비용", "content": "중소벤처기업부장관은 법 제7조제4항ㆍ제14조제7호 및 이 영 제12조제2항제8호에 따라 협회(지원센터를 포함한다. 이하 같다) 또는 관련기관 ㆍ단체에 업무를 위탁하는 경우에는 해당 업무의 수행에 필요한 비용을 협회 또는 해당 기관ㆍ단체에 지원할 수 있다. <개정 2017. 7. 26., 2021. 9. 29.>"}, {"category": "규정", "regulation": "정관", "article_num": "제15조", "article_title": "여성기업 확인 등", "content": "① 법 제20조의2제1항에 따라 여성기업 확인을 신청 지 하려는 자는 별지 제1호서식의 여성기업 확인 신청서에 다음 각 호의 구분에 따른 서류를 첨부하여 「중소기업제품 구매촉진 및 판로지원에 관한 법률」 침 제25조에 따른 중소기업제품 공공구매 종합정보망(이하 “구매정보망”이라 한다)을 통하여 중소벤처기업부장관에게 제출하여야 한다. <개정 2017. 7. 26., 2019. 10. 22.> 1. 「상법」상의 회사인 경우 가. 주주명부 1부 나. 사원명부 1부 다. 정관 1부 2. 개인사업자인 경우: 동업계약서(공동사업자인 경우만 해당한다) 1부 령 3. 협동조합의 경우 가. 조합원명부 1부 나. 출자자명부 1부 다. 임원명부 1부 ② 제1항에 따른 신청을 받은 중소벤처기업부장관은 「전자정부법」 제36조 제1항에 따른 행정정보의 공동이용을 통하여 법인 등기사항증명서(법인인 경우만 해당한다) 및 사업자등록증을 확인하여야 한다. 다만, 신청인이 확인에 동의하지 아니하는경우에는사업자등록증사본을제출하도록하여야한다. <개정2017. 7. 26.> ③ 제1항에 따른 신청을 받은 중소벤처기업부장관은 여성기업에 해당하는지 여부를 확인하기 위하여 서면조사 및 현장조사를 실시할 수 있으며, 필요한 경우 자료의 제출을 요구할 수 있다. <개정 2017. 7. 26.> ④ 중소벤처기업부장관은 법 제20조의2제2항 전단에 따른 조사ㆍ검토 결과 여성기업이 아닌 것으로 확인한 경우에는 그 사유를 명시하여 신청자에게 알려야 한다. <개정 2017. 7. 26.> ⑤ 제1항부터 제4항까지에서 규정한 사항 외에 여성기업의 확인에 필요한 사항은 중소벤처기업부장관이 정하여 고시한다. <개정 2017. 7. 26.> [본조신설 2016. 7. 28.] [종전 제15조는 제20조로 이동 <2016. 7. 28.>]"}, {"category": "규정", "regulation": "정관", "article_num": "제16조", "article_title": "여성기업 확인서의 발급 등", "content": "① 법 제20조의2제2항에 따른 여성기업의 확인의 유효기간은 3년으로 한다. ② 중소벤처기업부장관은 법 제20조의2제2항에 따라 여성기업으로 확인한 경 우에는 신청인에게 별지 제2호서식의 여성기업 확인서를 발급하여야 한다. <개정 2017. 7. 26.> ③ 제2항에 따른 여성기업 확인서를 발급받은 자는 다음 각 호의 어느 하나에 해당하는 경우에는 구매정보망을 통하여 재발급받을 수 있다. 1. 여성기업 확인서가 헐어 못 쓰게 된 경우 2. 여성기업 확인서를 잃어버린 경우 ④ 제2항에 따른 여성기업 확인서를 발급받은 자는 여성기업 확인서의 내용 중 주소 및 지점현황이 변경된 경우 변경된 사실을 증명하는 서류를 첨부하여 중소 벤처기업부장관에게 여성기업 확인서 기재사항의 변경을 신청할 수 있다. <개정 2017. 7. 26.> [본조신설 2016. 7. 28.] 여성기업지원에 관한 법률 시행령 Ⅰ-2-9"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제17조", "article_title": "여성기업 확인신청 제한기간", "content": "법 제20조의2제3항 각 호 외의 부분에서 “대통령령으로 정하는 기간”이란 다음 각 호의 구분에 따른 기간을 말한다. 1. 법 제20조의2제3항제1호에 해당하는 경우 령 가. 여성기업에 해당하는지 여부를 조사ㆍ검토한 결과 여성기업이 아닌 것 으로 최초로 밝혀진 경우: 제15조제4항에 따른 통지를 받은 날부터 3개월 나. 여성기업에 해당하는지 여부를 조사ㆍ검토한 결과 여성기업이 아닌 것 으로 2회 이상 밝혀진 경우: 제15조제4항에 따른 통지를 받은 날부터 6개월 2. 법 제20조의2제3항제2호에 해당하는 경우: 법 제20조의3제1항 단서에 따라 확인이 취소된 날부터 1년 [본조신설 2016. 7. 28.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제18조", "article_title": "권한의 위임 및 위탁", "content": "① 중소벤처기업부장관은 법 제20조의5제1항에 따라 다음 각 호의 권한을 지방중소벤처기업청장에게 위임한다. <개정 2017. 7. 26.> 1. 법 제20조의2제2항에 따른 여성기업 확인 2. 법 제20조의3에 따른 여성기업 확인 취소 및 청문의 실시 3. 법 제20조의4에 따른 보고와 검사 4. 법 제21조에 따른 과태료 부과ㆍ징수 ② 중소벤처기업부장관은 법 제20조의5제2항에 따라 다음 각 호의 업무를 협회에 칙 위탁한다. <개정 2017. 7. 26.> 1. 제15조제1항에 따른 신청서의 접수 2. 제15조제3항에따른서면조사, 현장조사및여성기업확인에필요한자료의제출요구 [본조신설 2016. 7. 28.]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제19조", "article_title": "고유식별정보의 처리", "content": "중소벤처기업부장관(해당 권한이 위임ㆍ위탁된 경우는 해당 권한을 위임ㆍ위탁받은 자를 포함한다)은 다음 각 호의 사무를 수행하기 위하여 불가피한 경우 「개인정보 보호법 시행령」 제19조 각 호에 침 따른 주민등록번호, 여권번호 또는 외국인등록번호가 포함된 자료를 처리할 수 있다. <개정 2017. 7. 26., 2022. 12. 20.> 1. 법 제20조에 따른 협회 사무의 지도ㆍ감독에 관한 사무 2. 법 제20조의2에 따른 여성기업 확인에 관한 사무 3. 법 제20조의3에 따른 여성기업 확인 취소 및 청문에 관한 사무 4. 법 제21조에 따른 과태료 부과ㆍ징수에 관한 사무 [본조신설 2016. 7. 28.] 령"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제20조", "article_title": "규제의 재검토", "content": "중소벤처기업부장관은 제17조에 따른 여성기업 확인신청 제한기간에 대하여 2022년 1월 1일을 기준으로 3년마다(매 3년이 되는 해의 기준일과 같은 날 전까지를 말한다) 그 타당성을 검토하여 개선 등의 조치를 해야 한다. [전문개정 2023. 3. 7.] 부칙 <제34512호, 2024. 5. 14.> 이 영은 공포한 날부터 시행한다. Ⅱ. 규 정 정 관 Ⅱ-1-1 정 관 정 관 Ⅱ-1-3 한국여성경제인협회 정관 법 제정 1999. 6. 14. 개정 2001. 3. 2. 규 개정 2002. 3. 5. 개정 2006. 4. 11. 정 개정 2011. 4. 4. 개정 2014. 5. 27. 개정 2017. 3. 20. 개정 2018. 3. 22. 개정 2020. 4. 16. 개정 2021. 12. 7. 개정 2025. 4. 23. 개정 2026. 3. 5. 제1장 총칙"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제1조", "article_title": "명칭", "content": "본 협회는 여성기업지원에관한법률에 의하여 설립한 법인으로서 한국여성경제인협회(이하 “협회”라 한다.)라 한다. 영문으로는 Korean Women Entrepreneurs Association이라 한다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제2조", "article_title": "목적", "content": "협회는 1977년에 설립한 사단법인 한국여성경제인연합회의 설립 취지를 이어 받아 여성경제인의 지위향상과 권익보호를 도모하고 여성의 경제활동 참여와 창업을 촉진하여 경제영역에 있어서 실질적 기회균등을 실현하며, 여성기업의 활동을 지원하여 안정적인 경영여건을 조성하고 여성 경제인의 능력 향상에 이바지함으로써 여성기업과 여성경제인이 국가경제 발전에 공헌하는 데 그 목적이 있다. <개정 ’01. 3. 2.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제3조", "article_title": "소재지", "content": "① 협회의 주된 사무소는 서울특별시에 둔다. ② 필요한 경우 국내외에 지회 및 지부를 둘 수 있다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제4조", "article_title": "정치활동금지", "content": "① 협회는 정치에 관한 모든 행위를 할 수 없다. ② 협회의 임직원 및 회원은 협회를 정치적 목적으로 이용하거나, 협회를 이용 령 하여 정치활동을 해서는 아니된다. <개정 ’21. 12. 7.> Ⅱ-1-4 한국여성경제인협회 규정집 제2장 사업"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제5조", "article_title": "사업", "content": "① 협회는 제2조에서 규정하는 목적을 달성하고 여성기업지원에관한 법률에서 협회의 업무로 규정한 사업을 효율적으로 수행하기 위하여 다음 각 호의 사업을 수행한다. 1. 여성경제인의 지위향상과 권익보호 2. 여성기업 및 여성경제인의 활동 촉진 <개정 ’21. 12. 7.> 3. 여성기업 및 여성경제인을 위한 제도와 시책에 대한 대정부 건의 4. 여성기업에 대한 각종 정보제공 <개정 ’21. 12. 7.> 5. 여성기업 육성 및 지원을 위한 자료 및 통계의 조사・수집 <개정 ’21. 12. 7.> 6. 여성경제인․여성기업 근로자를 위한 연수 및 연수원의 설립과 운영 7. 여성의 창업을 지원하고 촉진하기 위한 여성창업지원센터, 여성창업 강좌 개설, 여성창업상담실, 여성창업보육센터 등의 설치・운영, 여성창업정보 제공 등 제반 사업 <개정 ’21. 12. 7.> 8. 여성기업종합지원센터의 설립과 운영 9. 여성기업 및 여성경제인 지원을 위한 연구 및 연구기관의 설립과 운영 <개정 ’21. 12. 7.> 10. 여성기업을 위한 공동구매・판매 및 판로 확대 지원 11. 여성기업의 외국인 투자 유치, 해외투자 지원 등 해외시장 개척을 위한 제반 사항 <개정 ’21. 12. 7.> 12. 여성기업 및 여성경제인을 위한 지원 재원의 조성 <개정 ’21. 12. 7.> 13. 여성경제인을 위한 공제기금 설치 및 신용금고 운영 14. 여성기업을 위한 애로상담, 경영컨설팅, 기술 및 디자인 개발 지원 15. 여성기업을 위한 박람회, 전시회 개최 및 참가 지원 16. 여성경제인을 위한 홍보, 출판물의 발간 및 보급 17. 외국 여성경제단체 및 국제경제기구와의 협력 및 교류 18. 남북 여성경제인 협력 및 교류 사업 19. 여성경제인의 날 및 여성기업주간 행사 개최 <개정 ’21. 12. 7.> 20. 여성기업 육성을 위하여 정부 및 지방자치단체가 위탁하는 업무 21. 기타 여성기업 및 여성경제인 육성과 지원을 위하여 주무관청의 장이 필요 하다고 인정하는 사업 <개정 ’21. 12. 7.> 22. 사회공공이익 향상에 부응하는 비영리사업 지원 등 <신설 ’21. 12. 7.> ② 협회는 제1항의 사업목적을 달성하기 위하여 필요한 경우 이사회의 의결을 거쳐 수익사업을 할 수 있다. <개정 ’01. 3. 2.> 정 관 Ⅱ-1-5 제3장 회원"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제6조", "article_title": "회원", "content": "① 협회의 회원은 정회원, 일반회원 및 특별회원으로 구분한다. <개정 령 ’21. 12. 7.> ② 정회원, 일반회원은 다음 각호에 해당하는 여성이 실질적으로 당해 기업을 규 경영하거나 경영활동에 참여하는 자로 한다. 다만, 동일기업인 경우 1인에 한한다. <개정 ’21. 12. 7.> 1. 회사의 대표권이 있는 임원으로 등기된 여성 2. 사업자등록을 한 개인사업체의 대표인 여성 3. 기업의 임원으로 등기된 여성 <개정 ’03. 6. 19., ’06. 4. 11, ’17. 3. 20.> 4.「다음 각 목의 요건을 모두 갖춘 협동조합 중 여성기업 확인을 받은 조합의 이 사장인 여성(「협동조합 기본법」에 따른 협동조합 또는 「소비자생활협동조합법」에 따른 조합을 말한다. 이하 같다) <신설 ’20. 4. 16., 개정 ’25. 4. 23.> 가. 총 조합원 수의 과반수가 여성일 것 나. 총 출자좌수의 과반수를 여성인 조합원이 출자하였을 것 다. 이사장이 여성인 조합원일 것 규 라. 이사장을 포함한 총 이사의 과반수가 여성인 조합원일 것 ③ 특별회원은 다음 각호의 자로 한다. 1. 여성경제단체, 경제단체, 여성단체 2. 여성 및 경제관련 연구기관 3. 해외교포 여성경제인 및 여성경제단체 4. 외국여성경제인 및 외국여성경제단체 <개정 ’14. 5. 27.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제7조", "article_title": "회원의 가입과 탈퇴", "content": "① 회원은 협회에 임의로 가입하고 탈퇴할 수 있다. ② 협회에 회원으로 가입하고자 하는 자는 협회에 입회신청서를 제출하여 정해진 침 입회절차에 따른다. <개정 ’20. 4. 16.> ③ 회원의 자격은 제2항에 의한 입회절차에 따라 지정한 기일내에 입회비 등 소정의 회비를 납부한 때에 부여된다. <신설 ’14. 5. 27., 개정 ’20. 4. 16.> ④ 회원이 협회를 탈퇴하고자 하는 경우 협회에 서면으로 그 의사를 표시하여야 한다. ⑤ 회원의 가입과 탈퇴에 관하여 필요한 사항은 규정으로 정한다. 제7조의 2(회비) 회비의 금액과 그 징수방법에 관한 사항은 규정으로 정한다. <신설 ’14. 5. 27.> Ⅱ-1-6 한국여성경제인협회 규정집 제7조의 3(경비 및 사용료와 수수료 등 분담) ① 본회는 사업운영을 위하여 필요한 경비 및 사용료와 수수료를 징수할 수 있다. <신설 ‘14. 5. 27.> ② 제1항의 경비 및 사용료와 수수료의 금액 및 징수방법에 관한 사항은 회장이 별도로 정한다. <신설 ’14. 5. 27.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제8조", "article_title": "회원의 권리", "content": "① 정회원 및 특별회원은 다음 각호의 권리를 가진다. <개정 ’21. 12. 7.> 1. 협회의 모든 권익을 균점하고 향유하는 권리 2. 정관 및 협회의 제규정에 의하여 선임되는 자의 선거권과 피선거권 3. 정관 및 제규정에 따라 각급 회의에 출석하여 발언하고 표결을 할 수 있는 권리 4. 협회의 발전과 회원들의 권익향상을 위한 정책 제안할 수 있는 권리 <개정 ’21. 12. 7.> ② 일반회원은 협회로부터 정보제공을 받을 권리만을 가진다. <신설 ’21. 12. 7.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제9조", "article_title": "회원의 의무", "content": "회원은 다음 각호의 의무를 진다. 1. 정관 및 제규정의 준수 2. 협회의 회원과 여성경제인으로서 품위유지 3. 회비의 납부 4. 각급 회의 출석 5. 협회가 요구하는 각종자료에 대한 제출과 협조 6. 여성경제인으로서 국가경제 활성화 및 사회공헌활동에 적극적인 참여 <신설 ’21. 12. 7.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제10조", "article_title": "자격상실", "content": "회원이 다음 각 호에 해당하는 경우 회원자격을 상실한다. 1. 협회의 탈퇴 2. 정회원, 일반회원이 제6조제2항에서 규정한 자격을 상실한 때 <개정 ’21. 12. 7.> 3. 특별회원이 당해 기관․단체가 해산되거나 이사회의 의결로 제명을 결의한 경우 4. 「신용정보의 이용 및 보호에 관한 법률」에 따른 종합신용정보집중기관에 신용질서를 어지럽히거나 또는 약정한 기일 내에 채무를 변제하지 아니한 자로 현재 등록되어 있는 자 <신설 ’17. 3. 20> 5. 협회의 위상과 명예를 심각하게 실추하거나 원만한 협회운영을 지속ㆍ반복적 으로 저해하는 경우 윤리위원회를 거쳐 이사회의 의결로 제명을 결의한 경우 <신설 ’21. 12. 7.> 정 관 Ⅱ-1-7 제4장 임원"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제11조", "article_title": "임원", "content": "협회에는 다음 각호의 임원을 둔다. 령 1. 회장 1인 2. 수석부회장 1인 <개정 ’01. 3. 2., ’21. 12. 7.> 규 3. 특별부회장 15인 이내 <개정 ’21. 12. 7., ’25. 4. 23.> 4. 부회장 각 지회회장이 당연직 부회장이 되며, 지회의 수에 따라 구성한다. <개정 ’21. 12. 7., ’25. 4. 23., ’26. 3. 5.> 5. 상근부회장 1인 <개정 ’21. 12. 7., ’25. 4. 23..> 6. 이사 각 지회의 회원수에 따른 본회 추천이사 기준에 따라 구성한다. <개정 ’01. 3. 2., ’21. 12. 7., ’25. 4. 23., ’26. 3. 5.> 7. 감사 2인 <개정 ’21. 12. 7., ’25. 4. 23..>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제12조", "article_title": "임기", "content": "① 임원의 임기는 3년으로 한다. <개정 ’02. 3. 5., ’03. 6. 19., ’17. 3. 20.> ② 회장을 제외한 임원은 연임 또는 중임할 수 있다. <개정 ’02. 3. 5., ’03. 6. 19., ’06. 4. 11., ’13. 12. 3., ’14. 5. 27., ’21. 12. 7. ’25. 4. 23.> 규 ③ 회장은 단임으로 하되, 전임 회장의 사임 등 기타 사유로 인하여 궐위가 생긴 경우에 그 잔여임기 중 새로 선출된 회장 또는 신설 지회회장의 경우에는 1회에 한하여 연임할 수 있다. <개정 ’21. 12. 7.> ④ 임원의 임기는 전임자의 임기만료일 익일부터 시작된다. <개정 ’02. 3. 5> ⑤ 임기가 종료되었으나 차기 임원이 선출되지 아니한 경우에는 차기 임원이 선출된 날에 그 임기가 종료된다. <개정 ’21. 12. 7.> ⑥ 협회 및 지회 회장의 사임 등 사유로 회장직의 궐위시에는 2개월내 신임 회장을 선출하여야 한다. <개정 ’21. 12. 7.> ⑦ 협회 및 지회 회장의 임기만료후 2개월내에 차기 협회 및 지회의 회장이 선출 침 되지 못한 경우에는 임기가 자동 종료되며, 차기 협회 및 지회의 회장이 선출될 때까지 협회 및 지회의 수석부회장이 협회와 해당 지회의 회장업무를 대행한다. <신설 ’21. 12. 7.> ⑧ 회장과 수석부회장이 동시에 궐위시에는 후임자 선정시까지 제11조의 임원 순으로 협회의 업무를 대행하며, 동일 직책일 시에는 연장자순으로 정한다. <신설 ’21. 12. 7.> ⑨ 임원의 결원이 발생한 때에는 그 사유가 발생한 날부터 2개월 이내에 후임임원을 선출하여야 한다. <신설 ’21. 12. 7.> Ⅱ-1-8 한국여성경제인협회 규정집 ⑩ 협회 및 지회 임원의 임기는 협회회장의 임기만료일과 동시에 종료된다. 보 궐로 선임된 임원 또는 신설 지회 임원의 임기도 이와 같다. 다만, 상근임원의 경우 적용받지 않는다. <신설 ’21. 12. 7., 개정 ’26. 3. 5.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제13조", "article_title": "임원의 자격", "content": "① 임원은 정회원 중에서 선출한다. 다만, 상근임원은 회원이 아닌 여성기업과 중소기업 관련 업무 경험이 있는 자 중에서 임명할 수 있다. <개정 ’14. 5. 27.> ② 다음 각호에 해당하는 자는 임원이 될 수 없으며, 각호에 해당하는 사유가 발생한 임원은 그 사유가 발생한 때부터 임원직을 상실한다. 1. 금치산자, 한정치산자와 파산선고를 받고 복권되지 아니한 자 2. 법률 또는 법원의 판결에 의하여 자격이 상실 또는 정지된 자 3. 금고 이상의 형을 선고받고 그 집행이 종료되거나 집행을 받지 아니하기로 확정된 후 2년을 경과하지 아니한 자 4. 협회의 위상과 명예를 심각하게 실추하거나 원만한 협회운영을 지속ㆍ반복적 으로 저해하여 이사회의 의결로 제명을 결의한 경우 <개정 ’21. 12. 7.> 5. 기타 임원의 자격기준으로 필요하다고 인정하여 규정으로 제한한 자 <신설 ’21. 12. 7.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제13조의2", "article_title": "사외이사", "content": "① 제13조제1항에도 불구하고, 협회의 이사 중 1인 이상은 협회의 상무에 종사하지 아니하는 이사로서 회원이 아닌 자 중에서 사외이사로 선출할 수 있다. <신설 ’21. 12. 7.> ② 사외이사가 다음 각호의 어느 하나에 해당하는 경우에는 그 직을 상실한다. <신설 ’21. 12. 7.> 1. 협회의 상무에 종사하는 임원 및 피용자 또는 최근 2년 이내에 협회의 상무에 종사한 임원 및 피용자 2. 정회원의 배우자 및 직계 존속ㆍ비속 3. 정회원이 경영에 참여하는 여성기업의 이사ㆍ감사ㆍ집행임원 및 피용자 4. 협회와 거래관계 등 중요한 이해관계에 있는 법인의 이사ㆍ감사ㆍ집행임원 및 피용자 5. 협회의 임원 및 피용자가 이사ㆍ집행임원으로 있는 다른 회사의 이사ㆍ감사 ㆍ집행임원 및 피용자 정 관 Ⅱ-1-9"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제14조", "article_title": "임원의 선출", "content": "① 협회회장은 현 수석부회장을 단수로 총회에 추천한다. <개정 ’17. 3. 20., ’23., ’25. 4. 23.> ② 협회 수석부회장은 협회회장 임기 2년차에 협회 이사회에서 선거관리규정 제11조의 피선거권을 갖추고 지회수 3분의 2 이상에 해당하는 지회로부터 각 지회별 회원 2인 이상의 추천 받은 자 중에서 선출하고, 임기 3년차 정기총회에서 승인한 후 각 지회 신임대의원이 선출되면 협회 임시총회를 개최하여 차기 협 회장으로 추대한다. <신설 ’25. 4. 23.> 정 ③ 정기총회에서 수석부회장 승인이 부결되거나 임시총회에서 차기 협회회장 추대가 부결될 경우 협회 이사회에서 재추천 여부 또는 선거개최를 논의하도록 한다. <신설 ’25. 4. 23.> ④ 부회장은 이사회에서 추천하여 총회의 승인을 받아 이사 중에서 선출한다. <개정 ’01. 3. 2., ’17. 3. 20.> ⑤ 상근임원은 회장이 이사회의 동의를 받아 주무관청장과의 협의를 거쳐 임면한다. ⑥ 이사는 총회에서 회원 중에서 선출한다. ⑦ 각 지회의 지회회장은 당연직 부회장이 된다. <개정 ’26. 3. 5.> ⑧ 감사는 총회에서 선출하며, 감사 중 1인은 회원이 아닌 자 중에서 선출할 수 있다. ⑨ 임원을 선임한 때에는 지체없이 임원취임예정자의 이력서와 임원취임승낙서, 임원선임을 결의한 총회 또는 이사회의 의사록 사본을 갖추어 주무관청에 보고 칙 하여야 한다. ⑩ 임원의 추천과 선거절차, 선거관리위원회의 구성 등 필요한 사항은 규정으로 정한다. [종전 본조 제2항 내지 제8항을 본조 제4항 내지 제10항으로 함 <2025.4.23..>]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제15조", "article_title": "임원의 보수", "content": "① 상근임원을 제외한 임원은 무보수 비상임 명예직으로 한다. 다만, 협회 회원이 아닌 임원에 대해서는 업무 수행에 따른 수당을 지급할 수 있다. <개정 ’21. 12. 7.> ② 상근임원의 보수는 규정이 정하는 바에 따라 지급한다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제16조", "article_title": "임원의 직무", "content": "① 회장은 협회를 대표하고 협회업무를 관장하며, 총회와 이사회의 의장이 된다. <개정 ’14. 5. 27.> ② 수석부회장과 부회장은 회장을 보좌하며, 회장이 궐위되거나 사고로 업무를 강 수행하지 못하게 되는 경우 수석부회장이 그 업무를 대행하고 수석부회장이 궐 위되거나 사고로 업무를 수행하지 못하게 되는 경우 이사회에서 정한 순서에 따라 그 업무를 대행한다. <개정 ’01. 3. 2.> Ⅱ-1-10 한국여성경제인협회 규정집 ③ 상근부회장은 회장을 보좌하며, 회무를 집행․처리한다. <개정 ’01. 3. 2., ’14. 5. 27.> ④ 삭제 <’21. 12. 7.> ⑤ 상근부회장은 협회 외 기업 또는 단체 등 기관의 상근직을 겸할 수 없다. 다만, 회장의 승인이 있는 경우 여성기업종합지원센터장을 겸할 수 있다. <개정 ’21. 12. 7., ’25. 4. 23.> ⑥ 이사는 이사회에 출석하여 이사회의 권한에 속하는 사항을 의결하며, 이사회 또는 회장으로부터 위임받은 사항을 처리한다. ⑦ 이사 중 대표권 있는 이사로 등기된 자가 아니고는 협회를 대표하지 못한다. ⑧ 회장은 협회업무의 효율적인 운영을 위하여 특정한 역할을 수행하는 임원을 지정할 수 있다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제17조", "article_title": "임원의 불신임", "content": "① 협회 회장은 다음 각호에 대해 해당하는 경우 해당 임원의 불신임을 발의할 수 있다. <개정 ’01. 3. 2., ’14. 5. 27., ’17. 3. 20., ’21. 12. 7.> 1. 고의 또는 중대한 과실로 협회에 손실을 끼칠 경우 2. 형법 제307조의 의거 공연히 사실이나 허위사실을 적시하여 사람의 명예를 훼손시킨 행위 3. 협회의 정상운영에 어려움을 초래하는 직무태만 4. 협회의 사업을 방해하거나 방해할 목적의 부정행위 5. 3개월 이상 협회 회비를 미납하는 행위 6. 정관 제17조의3에 따른 임원으로서의 충실의무를 이행하지 못한 경우 7. 기타 협회의 신뢰저하 및 불만을 조장하는 행위 등을 자행하는 경우 ② 불신임 안건에 대해서는 윤리위원회의 심사와 이사회의 과반수 찬성으로 의결을 거쳐 총회에서 출석대의원 과반수의 찬성으로 이를 의결한다. <개정 ’21. 12. 7.> ③ 불신임이 발의된 경우 회장은 당해 임원의 직무를 즉시 정지하고, 윤리위원회에 회부한다. <개정 ’21. 12. 7.> ④ 윤리위원회는 불신임 건에 대해 발의된 날로부터 3개월 이내에 그 결과를 이 사회에 보고하여야 한다. <개정 ’21. 12. 7.> ⑤ 임원의 불신임을 발의한 경우 당해 임원에게 이사회에서 소명의 기회를 부여 할 수 있다. <신설 ’21. 12. 7.> ⑥ 상근임원을 그 임기 중에 면직하고자 하는 경우에는 이사회의 의결을 거쳐야 하며 그 사유를 주무관청에 보고하여야 한다. <신설 ’21. 12. 7.> ⑦ 임원이 임무를 수행하는 과정에서 협회에 손실을 발생시킨 경우 천재지변이나 불가항력이 아닌 과실에 의한 때에는 그에 상응하는 배상을 하여야 한다.<신설 ’21. 12. 7.> 정 관 Ⅱ-1-11 제17조의 2(윤리위원회의 설치 및 직무) ① 회원 및 임원의 품위유지 및 윤리의 효율적 운영․관리를 위하여 윤리위원회를 둔다. ② 윤리위원회의 운영에 관한 필요한 사항은 규정으로 정한다. <신설 ’14. 5. 27.> 제17조의 3(임원의 충실의무) 임원은 법령, 정관, 규정 및 규칙과 총회․이사회의 의결사항을 준수하고 협회를 위하여 충실히 그 직무를 수행하여야 한다. <신설 ’14. 5. 27.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제18조", "article_title": "감사", "content": "① 감사는 다음 각호의 업무를 수행한다. 정 1. 협회의 재산과 업무에 대한 감사 2. 이사회의 운영에 대한 감사 3. 제1호 및 제2호의 감사결과 부정 또는 부당한 점이 있음을 발견한 때 이사회와 총회에 그 시정을 요구하고 주무관청에 대한 보고 4. 제3호의 시정요구 및 보고를 위하여 이사회와 총회의 소집 요구 <개정 ’01. 3. 2.> 5. 지회의 운영과 재산, 회계에 대한 감사 6. 협회의 재산상황과 업무에 관하여 이사회, 총회 또는 회장에게 의견 진술 ② 협회는 감사업무 수행에 따른 제반 지원을 위해 감사에 필요한 경비를 지급할 수 있으 며, 관련규정은 별도로 정한다. <신설 ’21. 12. 7.> 제5장 대의원"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제19조", "article_title": "대의원", "content": "① 대의원은 각 지회 총회에서 회원 중에서 선출한다. ② 대의원의 수는 100명 이상으로 한다. ③ 대의원의 임기는 3년으로 한다. ④ 대의원 선출비율과 방법 등 필요한 사항은 규정으로 정한다. 제6장 명예회장, 고문 및 자문위원"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제20조", "article_title": "명예회장", "content": "① 협회와 지회는 협회의 육성과 발전에 지대한 공로가 있는 직전 회장을 당연직으로 총회의 승인을 받아 명예회장으로 추대할 수 있다. 단, 제51조에 따라 회원자격정지 이상의 징계를 받은 자는 명예회장으로 추대할 수 없다. ② 협회는 사회적으로 명망이 높고 협회의 목적과 활동에 대한 깊은 이해를 가지고 협회 발전에 실질적인 기여를 할 수 있는 외부 인사를 총회의 승인을 받아 명예회장 강 으로 추대할 수 있다. ③ 명예회장의 임기는 회장의 임기와 같다. 다만, 제2항에 따라 외부 인사를 명예회장 으로 추대한 경우에는 이를 적용하지 아니한다. <전부개정 ’26. 3. 5.> Ⅱ-1-12 한국여성경제인협회 규정집"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제21조", "article_title": "고문과 원로회", "content": "① 회장은 협회에 공로가 있거나 여성기업육성에 관한 학식과 경험이 풍부한 인사를 이사회의 승인을 받아 고문으로 추대할 수 있다. ② 회장은 이사회의 동의를 얻어 원로회를 구성할 수 있으며, 그 절차와 요건 등 필요한 사항은 규정으로 정한다. <신설 ’01. 3. 2.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제22조", "article_title": "자문위원", "content": "① 회장은 필요한 경우 여성기업 육성, 경제, 여성문제 및 법률에 관한 학 식과 경험이 풍부한 전문가를 이사회의 승인을 받아 자문위원으로 위촉할 수 있다. ② 협회는 제1항의 규정에 의한 자문위원에게 자문에 필요한 경비를 지급할 수 있다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제23조", "article_title": "역할", "content": "명예회장․고문․자문위원은 회장의 자문에 응하며, 협회의 중요한 업무와 관련 자문을 요청하는 경우 각급회의에 출석하여 이에 대하여 협의나 자문에 응할 수 있다. <개정 ’21. 12. 7.> 제7장 총회"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제24조", "article_title": "총회", "content": "① 총회는 정기총회와 임시총회로 구분한다. ② 총회는 대의원으로서 구성한다. ③ 총회의 의장은 회장이 된다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제25조", "article_title": "개최시기", "content": "① 정기총회는 매 사업연도 개시후 2월 이내에 의장이 소집한다. <개정 ’14. 5. 27., ’26. 3. 5.> ② 임시총회는 다음 각호에 해당하는 경우 의장이 이를 소집한다. 1. 이사회에서 총회소집 결의가 있을 때 2. 대의원의 3분의 1 이상이 총회의 소집을 요구할 때 3. 회원의 5분의 1 이상이 총회의 소집을 요구할 때 4. 회장이 필요하다고 인정하는 경우 ③ 제2항제1호 내지 3호에 해당하는 경우 의장은 그 소집을 요구받은 날부터 2주 이내에 총회를 소집하여야 한다. ④ 제3항의 기일 내에 의장이 총회를 소집하지 아니하는 경우 수석부회장이 소 집하고 수석부회장이 소집하지 아니하는 경우 감사가 2주 이내에 소집하여야 한다. 이 경우, 감사가 의장의 직무를 수행한다. <개정 ’01. 3. 2., ’14. 5. 27.> 정 관 Ⅱ-1-13"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제26조", "article_title": "감사의 총회소집요구", "content": "감사는 본회의 재산상황 또는 업무의 집행에 관하 여 부정사실을 발견하여 이를 총회에 보고하지 아니하면 협회의 업무에 현저한 지장을 초래할 우려가 있다고 판단하는 때에는 이사회에 그 내용을 통지하여 이사회로 하여금 총회의 소집을 결의토록 요구할 수 있다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제27조", "article_title": "개최절차", "content": "총회의 소집은 특별한 사정이 없는 한 총회개최 7일 전까지 회의 개최 목적과 일시․장소를 각 대의원에게 서면으로 통지하거나, 제55조에 의한 정 공고를 하여야 한다. <개정 ’01. 3. 2.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제28조", "article_title": "의결사항", "content": "① 총회는 다음 사항을 의결한다. 1. 정관의 제정과 개정 <개정 ’14. 5. 27.> 2. 예산의 결정 및 결산의 승인 3. 전년도 사업실적 및 당해 연도 사업계획 승인 4. 임원의 선출(상근임원 제외) 5. 임원의 불신임(상근임원 제외) 6. 기본재산권의 취득 및 처분 7. 협회의 해산에 관한 사항 8. 경비의 부과와 징수방법 <신설 ’14. 5. 27.> 칙 9. 이사회의 의결로 부의하는 사항 10. 기타 정관에서 총회의 의결을 거치도록 한 사항 ② 제1항의 3호, 8호의 사항은 이사회에 위임시킬 수 있다. <신설 ’14. 5. 27.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제29조", "article_title": "의결과 운영", "content": "① 총회는 재적대의원 과반수의 출석으로 개회하고, 출석 대의원 과반수의 찬성으로 의결한다. ② 의장은 표결권이 있으며, 가부동수인 경우 결정권을 가진다. ③ 총회에 대리참석은 인정되지 아니하며, 의장에 의결을 위임하는 경우 위임장을 총회 개최 전까지 제출하여야 한다. ④ 사안이 경미하거나 긴급을 요하는 사항은 서면으로 의결할 수 있다. <신설 ’26. 3. 5.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제30조", "article_title": "의사록", "content": "① 총회를 개최한 경우 의장은 의사록을 작성하여 의장과 참석 강 대의원 2인 이상의 서명을 받아 보존하여야 한다. ② 총회를 개최한 경우 총회개최 후 2주 이내에 총회 개최결과와 의사록 사본을 주무관청에 제출하여야 한다. Ⅱ-1-14 한국여성경제인협회 규정집 제8장 이사회"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제31조", "article_title": "구성", "content": "① 협회의 주요 업무를 심의․의결하기 위하여 이사회를 둔다. ② 이사회는 회장, 수석부회장, 특별부회장, 부회장, 이사, 상근부회장, 사외이사로 구성한다. <개정 ’21. 12. 7.> ③ 이사회의 의장은 회장이 된다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제32조", "article_title": "개최시기", "content": "① 이사회는 정기이사회와 임시이사회로 구분한다. ② 정기이사회는 격월로 개최한다. <개정 ’03. 6. 19.> ③ 임시이사회는 다음 각호에 해당하는 경우 의장이 이를 소집한다. 1. 재적 이사 3분의 1 이상이 회의소집을 요구하는 경우 2. 의장이 필요하다고 인정하는 경우 3. 감사가 제18조제4호의 규정에 관한 사항을 통보하기 위하여 회의 소집을 요구 하는 경우 <개정 ’21. 12. 7.> ④ 제3항제1호 및 제3호에 의하여 이사회 소집을 요구받은 의장은 특별한 사유가 없는 한 2주 이내에 회의를 소집하여야 한다. <개정 ’14. 5. 27.> ⑤ 이사회 소집은 회의일의 7일전에 회의의 목적사항과 회의일시 및 장소를 기재한 서면을 각 이사에게 통지하여야 한다. 다만, 긴급을 요하는 경우는 3일전에 통지 할 수 있다. <개정 ’18. 3. 22.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제33조", "article_title": "의결사항", "content": "이사회는 다음 각호의 사항을 의결한다. 1. 협회 정관의 개정안 2. 협회 제규정의 제정, 개정 및 폐지 <개정 ’01. 3. 2.> 3. 사업계획안 및 예산안 승인 4. 기채와 상환에 대한 동의 5. 삭제 <’21. 12. 7.> 6. 회원에 대한 징계 7. 정부에 대한 중요한 건의 8. 지회 및 지부의 설립과 폐지 9. 여성기업종합지원센터의 운영에 대한 주요사항 10. 총회의 소집 및 부의할 사항 11. 상근임원의 임면 및 정관 제14조 제1항에 의한 수석부회장 선출 <개정 ’18.3.22.> 12. 사무처의 구성 및 운영에 관한 사항 <개정 ’01. 3. 2.> 정 관 Ⅱ-1-15 13. 위원회의 설치와 운영에 관한 사항 14. 기타 회장이 필요하다고 이사회에 부의하는 사항 15. 총회에서 위임된 사항 <신설 ’06. 4. 11.> 16. 기타 정관에서 이사회의 의결을 거치도록 한 사항"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제34조", "article_title": "의결과 운영", "content": "① 이사회는 재적이사 과반수의 출석으로 개회하고, 출석이사 과반수의 찬성으로 의결한다. 정 ② 의장은 표결권을 가지며, 가부동수인 경우 결정권을 가진다. ③ 감사는 이사회에 출석하여 발언할 수 있다. ④ 주무관청의 담당공무원은 필요한 경우 이사회에 출석하여 발언할 수 있다. ⑤ 사안이 경미하거나 긴급을 요하는 사항은 서면으로 의결할 수 있다. ⑥ 이사회를 개최한 경우 의장은 의사록을 작성하여 의장과 참석 이사 2인 이상의 서명을 받아 보존하여야 한다. 제9장 위원회"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제35조", "article_title": "위원회", "content": "① 협회의 효율적인 운영과 회원의 의견을 다양하게 수렴하기 위하여 협회에 다음 각호의 위원회를 설치․운영할 수 있다. 1. 분과위원회<개정 ’14. 5. 27> 2. 특별위원회<개정 ’14. 5. 27> ② 제1항 이외의 필요한 위원회는 회장이 이사회의 동의를 얻어 설치할 수 있다. ③ 위원회의 구성 및 운영, 분과위원회의 설치․운영 등 필요한 사항은 규정으로 정한다. 지 제10장 지회 및 지부"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제36조", "article_title": "지회", "content": "① 협회는 특별시, 광역시, 특별자치시(이하 ‘시’), 특별자치도 및 도 (이하 ‘도’)의 행정구역을 관할구역으로 하여 지회를 설립할 수 있다. <개정 ’26. 3. 5..> ② 지회는 관할구역내에 본사 또는 공장, 사업장 소재지 또는 거주지를 둔 회원 으로 구성한다. <개정 ’26. 3. 5.> 강 ③ 지회의 설립, 관할구역, 지회총회, 지회임원의 선출 및 운영요령 등 필요한 사항은 규정으로 정한다. <개정 ’26. 3. 5.> ④ 지회는 타지회 회원에 대하여 불리한 차별대우를 하여서는 아니된다. Ⅱ-1-16 한국여성경제인협회 규정집"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제37조", "article_title": "지회설립", "content": "① 지회는 정회원이 될 자격이 있는 자 5인 이상이 발기하여, 정회원이 될 자 50인 이상(특별시는 100인 이상)의 동의를 얻어 창립총회를 개최한 후 협회에 지회설립승인을 요청하여야 한다. ② 협회가 제1항의 지회설립승인을 요청 받은 경우 이사회는 그 설립승인여부를 심사하여, 출석이사 3분의 2이상의 찬성으로 지회설립승인을 의결한다. ③ 삭제 <’26. 3. 5.> ④ 지회의 분할과 통합은 이사회의 사전승인을 받아야 하며, 그 절차와 요건 등 필요한 사항은 규정으로 정한다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제38조", "article_title": "지회임원", "content": "① 지회에는 다음 각호에 해당하는 지회임원을 둘 수 있으며, 그 수는 규정으로 정한다. 1. 지회회장 2. 지회수석부회장 <개정 ’01. 3. 2., ’26. 3. 5.> 3. 지회부회장 <신설 ’26. 3. 5.> 4. 지회이사 <개정 ’26. 3. 5.> 5. 지회감사 <개정 ’26. 3. 5.> ② 지회의 임원은 지회총회 또는 지회창립총회에서 선출한다. 다만, 차기 지회 회장 후보로 현 수석부회장을 단수로 총회에 추천한다. <개정 ’25. 4. 23.> ③ 지회 수석부회장은 지회회장 임기 2년차에 지회 이사회에서 전·현직 지회 임원중에서 선출하고 임기 3년차 정기총회에서 승인한 후 지회 신임대의원을 선출하기 위한 임시총회에서 차기 지회회장으로 추대한다. <신설 ’25. 4. 23.> ④ 지회 임시총회에서 차기 지회회장 추대가 부결될 경우 지회이사회에서 재추 천 여부 또는 선거개최를 논의토록 한다. <신설 ’25. 4. 23.> ⑤ 지회임원의 임기는 3년으로 한다. <개정 ’18. 3. 22.> ⑥ 지회이사는 지회 총회에서 회원 중에서 선출한다. <개정 ’21. 12. 7.> ⑦ 지회감사는 지회 총회에서 선출하며, 지회 감사 중 1인은 회원이 아닌 협회 외부인사 중에서 선출할 수 있다. <신설 ’21. 12. 7..> ⑧ 지회회장은 지회를 대표하고 지회사무를 처리하며, 지회수석부회장과 지회 부회장은 지회회장을 보좌하고 지회회장의 유고시에 그 직무를 대리한다. 지회 이사와 지회감사의 임무는 협회의 이사와 감사의 임무 규정을 준용한다. <신설 ’21. 12. 7..> ⑨ 지회회장을 제외한 임원은 연임 또는 중임할 수 있다. <신설 ’21. 12. 7.. 개정 ’25. 4. 23.> 정 관 Ⅱ-1-17 ⑩ 지회회장은 단임으로 하되, 전임 회장의 사임 등 기타 사유로 인하여 궐위가 생긴 경우에 그 잔여임기 중 새로 선출된 회장 또는 신설 지회회장의 경우에는 1회에 한하여 연임할 수 있다. <신설 ’21. 12. 7..> [종전 본조 제3항 내지 제8항을 본조 제5항 내지 제10항으로 함 <2025.4.23.>]"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제39조", "article_title": "지회의 운영", "content": "① 지회에는 회원으로 구성하는 지회총회와 지회임원으로 구성하는 지회이사회를 두며, 필요한 사항은 규정으로 정한다. <개정 ’21. 12. 7..> 정 ② 지회는 협회의 정관과 규정의 범위 내에서 자율적으로 운영할 수 있다. ③ 지회는 필요한 경우 정관과 제규정에 위배되지 아니하는 범위 내에서 지회운영 세칙을 정하여 지회이사회의 승인을 받아 운영할 수 있다. <개정 ’21. 12. 7..> ④ 지회는 협회의 설립목적과 정관 및 제규정에 위배되지 아니하는 범위 내에서 제5조에서 규정하는 사업을 위하여 재산을 자율적으로 운용하되, 기본재산의 취득과 처분은 이사회의 사전 승인을 받아야 한다. <개정 ’21. 12. 7..> ⑤ 지회가 제4항의 규정에 따른 재산을 운용하는 과정에서 협회, 회원 또는 제3자 에게 재산상 손실을 초래한 경우 해당 지회임원은 연대하여 배상할 책임이 있다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제40조", "article_title": "지회의 협조의무", "content": "① 지회는 협회의 운영에 성실히 협조하여야한다. ② 지회는 협회의 정관과 제규정을 준수하여야 한다. 칙 ③ 지회는 협회에 납부해야 할 협회비를 분기별로 납부하며, 다음 분기의 최초 월 말일까지 납부하여야 한다. <개정 ’01. 3. 2.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제41조", "article_title": "지회의 감독", "content": "① 협회는 지회의 업무에 관하여 지도․감독할 수 있고, 지회로 하여금 업무에 관한 보고를 하게 하거나 감사를 받도록 명할 수 있다. ② 지회는 정당한 사유 없이 협회의 지도ㆍ감독ㆍ감사를 거부하여서는 아니 된다. ③ 지회의 운영이나 활동이 정관이나 협회의 설립목적을 위배하거나 제40조의 협조 의무를 준수하지 않는 경우 협회는 해당 지회에 이의 시정을 요구할 수 있다. ④ 제3항의 시정을 요청 받은 지회는 지체 없이 지회이사회를 소집하여 이를 통 지하고 그 시정을 위한 방안을 수립하여 협회에 보고하여야 한다. ⑤ 제1항의 협회의 지도ㆍ감독과 제3항에 의한 시정요구를 정당한 이유 없이 거부하여 지회 및 협회의 활동에 지장을 초래하게 되는 경우 및 다음 각 호의 사유로 지회의 정상적인 활동이 불가능하다고 판단하는 경우에 협회는 이사회의 강 의결을 거쳐 해당 지회의 활동정지, 지회설립의 승인 취소 또는 지회해산을 명 할 수 있다. <개정 ’21. 12. 7.> 1. 지회의 활동이 협회 설립목적이나 정관에 위배되는 경우 Ⅱ-1-18 한국여성경제인협회 규정집 2. 지회가 제40조의 협조의무를 위반하는 경우 3. 지회의 회원이 제37조제1항의 지회설립요건 중 회원수가 설립기준 이하가 되어 지회의 정상적인 활동이 어렵다고 판단되는 경우 4. 기타 이사회에서 지회의 정상적인 활동이 불가능하다고 판단한 경우 ⑥ 제5항의 지회활동정지 결정을 받은 지회의 임원은 이사회에서 지회활동 정상화 결정을 받을 때까지 해당 지회 임원 자격이 정지되며, 협회의 수석부회장 또는 협회 이사회의 의결을 거쳐 회장이 위임한 자가 해당 지회 회장의 직무를 대행 하여 지회사무를 총괄한다. <신설 ’14. 5. 27., 개정 ’21. 12. 7..> <전부 개정 ’26. 3. 5.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제42조", "article_title": "지회의 해산", "content": "① 지회의 해산은 지회총회에서 회원 4분의 3 이 상의 찬성 으로 그 해산을 결의하고 이사회의 승인을 받아야 한다. 다만, 지회통합을 위하여 해산하는 경우는 재적회원 과반수의 찬성을 얻어야 한다. <개정 ’01. 3. 2.> ② 삭제 <’26. 3. 5.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제43조", "article_title": "지부", "content": "① 지회에 소속하는 회원 중 일정 시․군․구에 소재하는 회원이 모여 지부를 구성하여 활동할 수 있다. ② 지부는 지회가 관할한다. ③ 지부의 운영에 관하여 필요한 사항은 규정으로 정한다. 제11장 사무처 및 사무국"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제44조", "article_title": "사무처", "content": "① 협회의 사무를 처리하기 위하여 사무처를 두며, 지회에는 지 회사무국을 둔다. <개정 ’01. 3. 2.> ② 사무처에는 상근임원을 둘 수 있다. <개정 ’01. 3. 2.> ③ 사무처와 지회사무국의 조직과 운영, 업무분장, 사무처와 지회사무국 직원의 임명과 복무, 보수 등 필요한 사항은 규정으로 정한다. <개정 ’01. 3. 2.> 정 관 Ⅱ-1-19 제12장 여성기업종합지원센터"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제45조", "article_title": "여성기업종합지원센터", "content": "① 협회는 여성기업지원에관한법률에서 규정하는 령 여성기업종합지원센터(이하 “지원센터”라 한다.)를 재단법인으로 설립할 수 있다. ② 삭제 <’14. 5. 27.> 규 ③ 지원센터가 주무관청으로부터 설립승인을 받기 전 지원센터의 설립을 위한 업무는 회장, 회장이 지명하는 임원 또는 사무국에서 수행한다. ④ 협회는 지원센터의 설립과 운영에 필요한 자금을 출연 또는 보조할 수 있다. ⑤ 지원센터의 대표는 지원센터 정관이 정하는 바에 따라 중소벤처기업부장관의 승인을 받아야 한다. <개정 ’14. 5. 27., ’21. 12. 7..> ⑥ 지원센터의 사업계획과 예산 및 결산은 회장의 승인을 받아야 한다. ⑦ 협회는 지원센터의 운영에 협조하여야 한다. 제13장 재산 및 회계"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제46조", "article_title": "재정", "content": "협회의 재산은 다음 각호의 수입으로 한다. 1. 재산목록에 기재된 재산 2. 입회비, 월회비, 특별회비 <개정 ’01. 3. 2.> 칙 3. 사업에 따른 수입금 4. 자산에서 발생하는 수입 5. 정부나 지방자치단체에서 출연․보조하는 재산 6. 정부나 지방자치단체의 업무위탁에 따른 수임비 7. 기부금 <개정 ’01. 3. 2.> 8. 기타 수입"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제46조의2", "article_title": "기부금", "content": "① 협회는 기부금을 모금할 수 있으며, 기부금은 공익목적을 위한 고유목적에 사용하여야 한다. <신설 ’20. 4. 16.> ② 당해연도 기부금 모금액 및 활용실적은 다음 연도 3월 31일까지 협회 홈 페이지에 공개하여야 한다. <신설 ’20. 4. 16.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제47조", "article_title": "회계", "content": "협회의 회계는 일반회계와 특별회계로 구분하여 운영하며, 특별회계는 사업운영을 위하여 필요할 때 이사회의 의결로 설치한다. 령 Ⅱ-1-20 한국여성경제인협회 규정집"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제48조", "article_title": "예산 및 결산 등", "content": "① 협회는 매 사업연도마다 당해 연도 예산과 전년도 결산, 당해 연도 사업계획과 전년도 사업실적에 대하여 총회의 승인을 받아 사업연도 개시 후 2개월 이내에 주무관청에 제출하여야 한다. <개정 ’21. 12. 7.> ② 지회의 예산과 결산은 지회총회의 승인을 거쳐 협회에 보고하여야 한다. ③ 예산ㆍ결산 및 회계에 관하여 필요한 사항은 규정으로 정한다. <개정 ’21. 12. 7.> ④ 협회의 사업연도는 정부회계연도를 따른다. ⑤ 회장은 정기총회 회의일인 7일 전에 사업보고서, 재무제표 등을 작성하여 감사 에게 제출한다. <신설 ’14. 5. 27> ⑥ 회장은 제5항의 서류에 감사의 의견서를 첨부하여 정기총회에 제출하여 승인을 받아야 한다. <신설 ’14. 5. 27>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제49조", "article_title": "회비의 납부", "content": "① 협회에 가입하는 회원은 회비를 납부하여야 한다. ② 회비는 입회비, 월회비, 특별회비로 구분한다. ③ 회비는 지회가 회원으로부터 징수하며, 징수한 회비 중 일정비율은 협회에 납부하여야 한다. ④ 협회에 가입한 회원이 탈퇴 또는 제명되는 경우 이미 납부한 회비는 반납하 지 아니하며, 미납회비는 징수하여야 한다. ⑤ 회비의 부과와 징수절차, 회비 중 협회비와 지회비의 구분 등 필요한 사항은 규정으로 정한다. 제14장 포상 및 징계"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제50조", "article_title": "포상", "content": "회장은 여성기업과 여성경제인의 육성과 발전 및 협회의 발전에 크 게 기여하여 공로가 있는 자에 대하여 이사회의 의결을 거쳐 포상할 수 있다. <개정 ’21. 12. 7.>"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제51조", "article_title": "징계", "content": "① 회장은 회원이 다음 각 호의 1에 해당하는 경우에 이사회의 의결을 거쳐 공개사과, 회원자격정지, 회원제명 등의 징계를 할 수 있다. 1. 고의 또는 중대한 과실로 협회에 손실을 끼치거나 형법 제307조에 의거 공연히 사실이나 허위사실을 적시하여 사람의 명예 및 회원의 품위를 훼손한 경우 <개정 ’14. 5. 27., ’17. 3. 20., ’21. 12. 7..> 2. 회비를 3개월 이상 미납한 경우 정 관 Ⅱ-1-21 3. 제4조의 정치활동금지 의무를 위반한 경우 4. 경비 및 사용료와 수수료의 부담 그 밖에 협회에 대한 의무를 이행하지 아니한 경우 <신설 ’14. 5. 27.> 5. 협회의 사업을 방해하거나 방해할 목적의 행위를 한 경우 <신설 ’14. 5. 27> 6. 법령․정관․제규정․규칙․요령을 위반하거나 협회의 감사처분을 받고도 이를 이행 하지 아니한 경우 <신설 ’14. 5. 27> ② 회원의 자격이 정지된 회원은 그 기간동안 회원으로서 권리를 행사할 수 없으며, 정 임원인 경우에는 임원의 자격도 정지된다. <개정 ’14. 5. 27.> 제15장 해산과 청산"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제52조", "article_title": "해산", "content": "① 협회는 다음의 사유가 발생한 경우 해산한다. 1. 총회에서 재적 대의원 4분의 3 이상의 찬성으로 협회의 해산을 의결한 경우 2. 주무관청의 해산 명령이 있는 경우 ② 협회가 해산하는 경우에 잔여재산은 국고에 귀속되며, 지회가 해산하는 경우 규 잔여재산은 협회에 귀속된다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제53조", "article_title": "청산", "content": "① 협회를 청산하는 경우 청산인은 총회에서 이사 중 청산인으로 선임한 자가 된다. <개정 ’21. 12. 7.> ② 협회가 청산되는 경우 잔여재산에 대한 처분은 제52조제2항을 준용한다. <신설 ’21. 12. 7..> 제16장 보칙"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제54조", "article_title": "정관변경", "content": "① 회장은 다음 각호의 경우에 정관의 변경을 제의할 수 있다. 1. 이사회의 의결로 요구하는 경우 2. 재적대의원의 3분의 1 이상이 연서하여 요구하는 경우 ② 정관변경은 이사회에서 재적이사 과반수의 출석과 출석이사 과반수의 찬성 얻어 총회의 의결을 거쳐 주무관청의 허가를 받아야 한다. <개정 ’11. 4. 4.> 강"}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제55조", "article_title": "공고", "content": "① 협회의 공고는 서울특별시에서 발간하는 일간신문에 게재한다. 령 다만, 회장이 필요하다고 인정하는 경우에는 공고내용을 서면으로 회원에게 통보 Ⅱ-1-22 한국여성경제인협회 규정집 하거나 협회 및 지회에 게시공고 할 수 있다. ② 공고기간은 신문공고를 제외하고는 7일 이상으로 한다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제56조", "article_title": "이해당사자", "content": "협회의 각급 회의에서 의결하고자 하는 사항이 회장, 대의원, 임원 및 회원 본인과 직접 관계되는 경우와 협회와 당사자간에 이해가 상반되는 경우, 협회와 당사자 간에 법률상의 소송, 당사자 간의 이해관계가 협회에 영향을 미치는 경우 당사자가 되는 회장, 대의원, 임원 및 회원은 각각 총회, 이사회 및 해당 회의의 의결에 참여하지 못한다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제57조", "article_title": "규정", "content": "① 이 정관을 시행하기 위하여 필요한 사항과 정관에서 규정으로 위임한 사항은 규정으로 따로 정한다. ② 제1항의 규정 제정과 개정은 이사회의 의결을 거쳐야 한다. ③ 협회의 정관과 규정은 지회가 정한 지회운영세칙에 우선하여 적용된다. ④ 협회의 운영에 관하여 필요한 사항 중 이 정관과 규정으로 정하지 아니한 사항은 이사회의 의결로 정한다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제58조", "article_title": "권한의 위임", "content": "이 정관에 규정한 회장 또는 이사회의 권한은 그 일부를 규정이 정하는 바에 따라 지회회장 또는 지회이사회에 위임할 수 있다."}, {"category": "법령", "regulation": "여성기업지원에 관한 법률", "article_num": "제59조", "article_title": "준용", "content": "이 정관이나 규정으로 정하지 아니한 사항은 민법 중 사단법인에 관한 규정과 주무관청의 비영리법인 설립 및 감독에 관한 규칙을 준용한다. 부칙 <1999. 6. 14.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행", "content": "이 정관은 주무관청의 허가를 받은 날부터 시행한다."}, {"category": "규정", "regulation": "정관", "article_num": "제2조", "article_title": "설립준비위원회구성", "content": "① 협회의 최초임원이 선출될 때까지 협회설립에 필요한 업무를 처리하기 위하여 여성기업지원에관한법률시행령 제9조제4항에 따라 협회 설립 발기인으로 구성되는 “한국여성경제인협회 설립준비위원회”(이하 “준비 위원회”라 한다.)를 구성하여 운영할 수 있다. ② 준비위원회는 협회최초임원선거일까지 활동한다. ③ 준비위원회는 협회 설립에 필요한 사항을 규약으로 정하여 운영한다."}, {"category": "규정", "regulation": "정관", "article_num": "제3조", "article_title": "최초총회", "content": "① 주무관청의 협회설립허가 후 최초로 개최하는 총회는(이하 정 관 Ⅱ-1-23 “최초총회”라 한다.)그 설립허가일부터 30일이내에 개최하여야 하며, 총회 개최 공고는 개최일 5일전까지 하여야 한다. ② 최초의 대의원은 제19조제2항의 규정에 불구하고 지회회원 5인마다 1인을 선출하여 이를 대의원 정수로 한다. ③ 최초총회에서는 다음 각호의 사항을 포함하여 의결할 수 있다. 1. 회원의 입회 승인 2. 지회의 설립승인 정 3. 협회설립비용에 관한 사항 ④ 제3항에 따라 입회한 회원과 설립한 지회는 각각 이 정관에 따른 회원과 지회로 본다."}, {"category": "규정", "regulation": "정관", "article_num": "제4조", "article_title": "규정경과조치", "content": "① 이 정관의 시행에 필요한 규정 중 회원과 회비규정, 지회의 설립과 운영규정, 선거관리규정은 준비위원회의 의결을 거친날부터 시행한다. ② 제1항 각각의 규정은 협회 설립허가 후 최초로 개최하는 이사회에서 사후승인을 받는 경우 이 정관에 따라 제정한 규정으로 본다."}, {"category": "규정", "regulation": "정관", "article_num": "제5조", "article_title": "최초임원임기", "content": "협회설립허가 후 최초로 선출한 협회․지회의 임원과 대의원의 임기는 각각 2002년 정기총회 또는 지회정기총회에서 후 임자를 선출하는 날 그 임기가 종료하며, 최초로 선출하는 협회․지회의 감사의 임기는 2001년 총회와 지회총회에서 후임자를 선출하는 날 그 임기가 종료한다. 칙"}, {"category": "규정", "regulation": "정관", "article_num": "제6조", "article_title": "창립비용", "content": "협회를 창립하기 위하여 소요된 비용은 최초총회에서 승인을 받아 협회 예산에 계상하여 지출한다."}, {"category": "규정", "regulation": "정관", "article_num": "제7조", "article_title": "귀속재산", "content": "사단법인 한국여성경제인연합회가 협회에 귀속시키는 재산은 그 청산절차가 완료되는 즉시 당해 재산을 협회에 귀속시키고 그 내용을 주무 관청에 보고하여야 한다."}, {"category": "규정", "regulation": "정관", "article_num": "제8조", "article_title": "업무승계", "content": "① 협회 설립발기인과 준비위원회에서 행한 협회 설립을 위한 업무는 회장이 선출되면 이를 회장에게 인계하여야 한다. ② 협회 설립발기인과 준비위원회가 행한 업무중 협회와 계속 관련되는 업무는 협회가 승계한 것으로 본다. ③ 준비위원회가 정한 바에 따라 행한 사항이 이 정관에 위배되지 아니한 경우에는 강 각각 이 정관에 따라 행한 것으로 본다. ④ 지회설립발기인에 대하여도 제1항 및 제2항의 규정을 준용한다. Ⅱ-1-24 한국여성경제인협회 규정집 부칙 <2001. 3. 2.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행", "content": "이 정관은 주무관청의 허가를 받은 날부터 시행한다. 부칙 <2002. 1. 29.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행", "content": "이 정관은 주무관청의 허가를 받은 날부터 시행한다."}, {"category": "규정", "regulation": "정관", "article_num": "제2조", "article_title": "임기의 특례", "content": "제12조제1항의 규정에도 불구하고 제2기 협회․지회 임원의 임기는 2003년 12월 31일에 그 임기가 종료된다. 부칙 <2003. 6. 19.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행", "content": "이 정관은 주무관청의 허가를 받은 날부터 시행한다."}, {"category": "규정", "regulation": "정관", "article_num": "제2조", "article_title": "임기", "content": "제12조 제1항과 제2항, 제19조 제3항 및 제38조 제3항과 제5항의 개 정규정은 차기에 선출되는 협회․지회의 임원, 대의원부터 시행한다. 부칙 <2006. 4. 11.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행", "content": "이 정관은 주무관청의 허가를 받은 날부터 시행한다. 부칙 <2011. 4. 4.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행", "content": "이 정관은 주무관청의 허가를 받은 날부터 시행한다. 부칙 <2014. 5. 27.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행", "content": "이 정관은 주무관청의 허가를 받은 날부터 시행한다. 부칙 <2017. 3. 20.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행", "content": "이 정관은 주무관청의 허가를 받은 날부터 시행한다."}, {"category": "규정", "regulation": "정관", "article_num": "제2조", "article_title": "현임기 지회수석부회장에 대한 특례", "content": "제38조 제2항과 관련, 이미 지회총회의 승인을 받은 현 임기(2016~2018) 수석부회장의 경우 3년차에 대의원선거를 위한 지회 임시총회에서 차기 지회회장으로 추대하는 것으로 한다. 정 관 Ⅱ-1-25 부칙 <2018. 3. 22.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행", "content": "이 정관은 주무관청의 허가를 받은 날부터 시행한다."}, {"category": "규정", "regulation": "정관", "article_num": "제2조", "article_title": "현 임기 지회감사 임기의 특례", "content": "이 정관 시행 당시 지회감사의 임기는 현 협회회장의 임기만료일에 종료한다. 보궐로 선임된 지회감사 또는 현 협회회장 임기 종료 전에 구 정관 제38조 제3항 단서에 의한 2년 임기가 종료되는 지회감사의 정 경우에도 같다. 부칙 <2020. 4. 16.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행", "content": "이 정관은 주무관청의 허가를 받은 날부터 시행한다. 부칙 <2021. 12. 7.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행", "content": "이 정관은 중소벤처기업부의 허가를 받은 날부터 시행한다. 단, 제12조 제2항 및 제38조제7항은 2025.1.1.부터의 임기를 최초 임기로 의제하여 적용한다. 부칙 <2025. 4. 23.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행", "content": "이 정관은 중소벤처기업부의 허가를 받은 날부터 시행한다. 부칙 <2026. 3. 5.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행", "content": "이 정관은 중소벤처기업부의 허가를 받은 날부터 시행한다. 회원 및 회비규정 Ⅱ-2-1 회원 및 회비규정 회원 및 회비규정 Ⅱ-2-3 회원 및 회비규정 법 제정 1999. 11. 5. 개정 2001. 9. 7. 규 개정 2003. 5. 13. 개정 2005. 12. 8. 정 개정 2013. 8. 29. 개정 2013. 12. 3. 개정 2014. 10. 7. 개정 2015. 6. 4. 개정 2016. 9. 21. 개정 2017. 7. 26. 개정 2018. 3. 29. 개정 2020. 1. 30. 개정 2020. 5. 20. 개정 2021. 4. 29. 개정 2021. 6. 29. 개정 2023. 10. 16. 개정 2026. 2. 23. 제1장 회원"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "목적", "content": "이 규정은 정관 제6조, 제7조, 제7조의2 및 제7조의3의 규정에 의하 여 본회의 회원으로 가입하고자 하는 자의 자격과 입회절차 및 회비의 부과와 징수에 관한 사항을 정함을 목적으로 한다. <개정 ’21. 4. 29.>"}, {"category": "규정", "regulation": "정관", "article_num": "제2조", "article_title": "회원자격", "content": "① 정회원은 다음 각 호에 해당하는 여성이 실질적으로 당해 기업을 경영하거나 경영활동에 참여하는 자로 한다. <개정 ’13. 8. 29., ’13. 12. 3.> 1. 회사의 대표권이 있는 임원으로 등기된 여성 <개정 ’17. 7. 26.> 2. 사업자등록을 한 개인사업체의 대표인 여성 3. 기업의 임원으로 등기된 여성 <개정 ’03. 5. 13., ’05. 12. 8., ’17. 7. 26.> 4. 삭제 <’01. 9. 7.> Ⅱ-2-4 한국여성경제인협회 규정집 5. 다음 각 목의 요건을 모두 갖춘 협동조합 중 여성기업 확인을 받은 조합의 이사장인 여성(「협동조합 기본법」에 따른 협동조합 또는 「소비자생활협 동조합법」에 따른 조합을 말한다. 이하 같다) 가. 총 조합원 수의 과반수가 여성일 것 나. 총 출자좌수의 과반수를 여성인 조합원이 출자하였을 것 다. 이사장이 여성인 조합원일 것 라. 이사장을 포함한 총 이사의 과반수가 여성인 조합원일 것 <본호 신설 ’23.10.16.> ② 정회원은 연1회 또는 협회의 요구시 아래의 서류를 협회에 제출하여 자격확 인을 받아야 한다. <신설 ’18. 3. 29., 개정 ’20. 1. 30.> 1. 사업자등록증명원 1부 2. 삭제 <’20. 1. 30.> 3. 삭제 <’20. 1. 30.> 4. 법인 등기사항전부증명서 1부. <신설 ’23. 10. 16.> ③ 특별회원은 다음 각 호의 자로 한다. <개정 ’17. 7. 26., ’18. 3. 29.> 1. 여성경제단체, 경제단체, 여성단체 <개정 ’01. 9. 7.> 2. 여성 및 경제관련 연구기관 <개정 ’01. 9. 7.> 3. 해외교포 여성경제인 및 여성경제단체 <개정 ’01. 9. 7., ’13. 8. 29. ’13. 12. 3, ’17. 7. 26.> 4. 외국여성경제인 및 외국여성경제단체 <신설 ’17. 7. 26.>"}, {"category": "규정", "regulation": "정관", "article_num": "제3조", "article_title": "입회제한", "content": "다음 각호에 해당하는 자는 입회를 제한할 수 있다. 1. 금고 이상의 형을 선고받았거나 파산선고를 받은 자 2. 협회로부터 제명처분을 받은 자. 단, 윤리규정 14조에 의하여 입회자격이 부 여된 자는 제외한다. <개정 ’01. 9. 7.> 3. 기타 이사회에서 가입을 제한할 필요가 있다고 인정하는 업종을 영위하는 자"}, {"category": "규정", "regulation": "정관", "article_num": "제4조", "article_title": "입회신청", "content": "제2조의 규정에 따른 입회자격을 갖춘 자는 다음 각 호의 서류를 갖추어 본사 또는 공장, 사업장 소재지 또는 거주지를 관할하는 지회 중 한 곳에만 입회신청을 하여야 한다. <개정 ’16. 9. 21., ’20. 1. 30., ’26. 2. 23.> 1. 입회신청서(사진포함) <개정 ’20. 1. 30.> 2. 사업자등록증명원 <개정 ’20. 1. 30.> 회원 및 회비규정 Ⅱ-2-5 3. 삭제 <’20. 1. 30.> 4. 삭제 <’20. 1. 30.> 5. 법인등기부등본(법인에 한함. 제출시 2호 서류 생략 가능) <개정 ’01. 9. 7., ’20. 1. 30> 6. 삭제 <’20. 1. 30.> 7. 삭제 <’20. 1. 30.> 8. 삭제 <’20. 1. 30.> 정 9. 삭제 <’20. 1. 30.> 10. 여성기업확인서 (제출시 2호, 5호 서류 생략 가능, 단, 협동조합 입회신청시 에는 제출 필수) <신설 ’20. 1. 30.>"}, {"category": "규정", "regulation": "회원 및 회비규정", "article_num": "제5조", "article_title": "입회절차", "content": "① 회원이 되고자 하는 자의 입회신청서류를 접수한 지회는 제2조 와 제3조의 규정에 의한 회원자격여부를 확인하고 지회장 보고 후 입회여부를 결정 한다. 지회는 이사회에 회원 변동현황을 보고한다. <개정 ’01. 9. 7., ’20. 1. 30.> ② 입회를 승인한 지회는 당해 회원명부를 매월 말일까지 협회에 제출하고, 회 원이 신청할 경우 회원증을 발행하여 당해 회원에게 교부할 수 있다. <개정 ’0 규 1. 9. 7., ’13. 8. 29., ’16. 9. 21., ’18. 3. 29., ’23.10.16.> ③ 삭제 <’18. 3. 29.> ④ 회원의 자격을 상실한 회원이 재입회할 경우(소속지회변경 포함) 제9조의 입 회비 및 회원 자격상실 시기의 미납된 회비를 납부하고 지회장 보고 후 재입회 여부를 결정한다. 다만, 회원 자격을 상실한 회원의 재입회는 1회(지회변경포 함)에 한한다. <신설 ’13. 8. 29., 개정 ’13. 12. 3., ’14. 10. 7., ’16. 9. 21., ’20. 1. 30.> ⑤ 삭제 <’20. 1. 30.> 지 ⑥ 협회는 회원의 입회에 관련된 사항은 정관 제58조에 의거 지회회장에게 위 임한다. <개정 ’01. 9. 7., ’13. 8. 29.>"}, {"category": "규정", "regulation": "회원 및 회비규정", "article_num": "제6조", "article_title": "지회가입", "content": "회원은 본사나 공장 사업장 소재지 또는 거주지를 관할하는 지회 중 한곳에만 자유로이 가입할 수 있으며, 이 경우 특정지회의 입회와 탈퇴를 이유로 여타 지회에서 당해 회원을 차별대우하여서는 아니된다. <개정 ’01. 9. 7., ’16. 9. 21., ’20. 1. 30., ’26. 2. 23.> 강"}, {"category": "규정", "regulation": "회원 및 회비규정", "article_num": "제7조", "article_title": "회원의 탈퇴", "content": "① 회원이 탈퇴하고자 하는 경우 소속하는 지회에 서면으로 탈퇴서를 제출하여야한다. <개정 ’01. 9. 7.> Ⅱ-2-6 한국여성경제인협회 규정집 ② 회원의 탈퇴서를 접수한 지회는 매월 이사회에 보고하고 이를 매월 협회에 통보하여야 한다. <개정 ’01. 9. 7., ’05. 12. 8.> ③ 회원의 탈퇴에 관련된 사항은 정관 제58조에 의거 지회회장에게 위임한다. <개정 ’01. 9. 7.> 제2장 회비"}, {"category": "규정", "regulation": "회원 및 회비규정", "article_num": "제8조", "article_title": "회비", "content": "① 협회는 협회의 운영에 필요한 경비를 충당하기 위하여 회원에게 회비를 부과․징수한다. ② 협회 회원은 반드시 회비를 납부할 의무를 진다."}, {"category": "규정", "regulation": "회원 및 회비규정", "article_num": "제9조", "article_title": "회비의 구분", "content": "① 회비는 다음과 같이 구분한다. 1. 회비는 입회비와 월회비 및 특별회비로 구분한다. 2. 제1호의 입회비와 월회비는 다시 협회비와 지회비로 구분하고, 부과금액은 【별표1】과 같다. <개정 ’13. 8. 29., ’13. 12. 3.> 3. 특별회비는 임원회비, 운영회비, 기타 회원기부금으로 구분하고, 부과금액은 【별표1】같다. <개정 ’13. 12. 3., ’20. 5. 20., `21.6.29.> ② 특별회원의 회비는【별표2】와 같다. [전문개정 ’01. 9. 7.]"}, {"category": "규정", "regulation": "회원 및 회비규정", "article_num": "제10조", "article_title": "회비의 부과", "content": "① 회비는 다음과 같이 부과하여 징수한다. 1. 삭제 <’18. 3. 29.> 2. 정회원 회비는 다음과 같이 부과한다. 가. 정회원 회비는 연납을 원칙으로 한다. 나. 최초로 입회하고자 하는 신입 정회원은 제5조제1항의 회원자격유무 심 사를 받은 후에 입회비와 함께 12개월분의 월회비를 미리 납부하여야 한다. 다. 정회원 회비는 연납을 원칙을 하나, 각 지회의 이사회 의결을 통해 납부 방식을 정할 수 있다. <개정 ’01. 9. 7., ’13. 8. 29., ’18. 3. 29., ’23.10.16.> 3. 특별회비는 다음과 같이 부과한다. 가. 임원회비는 임기 개시일로부터 1개월 이내에 납부하여야 하며, 다만 신설지회 또는 중도에 선출된 임원의 경우 1개월 이내에 납부하여야 한다. 임기 중 해당 회원 및 회비규정 Ⅱ-2-7 임원회비를 감액할 수 없다. 나. 운영회비는 회원이 협회 사업 및 운영을 위하여 납부할 수 있다. 다. 기타 회원기부금은 협회·지회의 운영 또는 특별한 사업에 필요한 경비를 충 당하기 위하여 이사회의 의결을 거쳐 부과·징수할 수 있다. <개정 ’01. 9. 7., '03. 5. 13., ’09. 8. 11., ’15. 6. 4., ’16. 9. 21., ’21. 4. 29., `21.6.29.> ② 특별회원에 대해서는 이사회의 의결을 거쳐 회비를 면제할 수 있다. ③ 회원이 소속 지회를 변경(탈퇴 또는 제명 후 재입회 포함)하고자 하는 경우 정 새로이 가입하는 지회에 입회비를 납부하여야 하나, 기존 소속지회에 미납된 회비(협회 및 지회, 임원회비)를 완납하지 않으면 소속지회를 변경할 수 없다. 다만, 회원이 소속지회를 변경했을 때 지회 이사회에서는 입회비의 감면 등 금 액조정을 할 수 있고, 지회 신설 등의 사유로 지회를 변경할 경우에는 회비를 납부 할 의무가 없다. <신설 ’03. 5. 13., 개정 ’13. 8. 29., ’13. 12. 3., ’14. 10. 7., ’18. 3. 29.> ④ 탈퇴한 회원의 미납회비에 대하여는 탈퇴일자로 미납 회비 징수대상에서 제 외하고 결손처리한다. <신설 ’03. 5. 13., 개정 ’05. 12. 8., ’13. 8. 29., ’23. 10. 16.> ⑤ 임원이 임기 중 궐위된 경우에는 후임자가 충원되는 경우에 한하여 해당임 규 원에 대해 잔여임기분의 임원회비를 반환할 수 있으며, 해당 기수 중도에 신설 된 지회의 임원은 선출된 이후의 잔여 임기분 회비를 납부하여야 한다. <신설 ’09. 8. 11., 개정 ’13. 8. 29., ’13. 12. 3.> ⑥ 총회의 승인을 득하지 아니
