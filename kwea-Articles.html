0호 서식] 공직자의 이해충돌 방지법 관련 상담기록부 [ ] 전자우편 [ ] 전화 [ ] 방문 상담일시 상담방법 [ ] 기타( ) 성명 연락처 상담신청인 직위(직급) 소속 [ ] 사적이해관계자의 신고 및 회피 신청 [ ] 직무관련 외부활동의 제한 [ ] 공공기관 직무 관련 부동산 보유·매수 신고 [ ] 가족 채용 제한 [ ] 고위공직자 민간부분 업무활동 내역 제출 [ ] 수의계약 체결 제한 상담유형 [ ] 직무관련자와의 거래 신고 [ ] 공공기관 물품 등의 사적 사용·수익 금지 [ ] 퇴직자 사적 접촉 신고 [ ] 직무상 비밀 등 이용 금지 [ ] 기타( 상담내용 상담결과 월 일 이해충돌방지담당관 (서명 또는 인) 210mm×297mm[일반용지 60g/㎡(재활용품)] Ⅵ. 강 령 윤리경영 행동강령 Ⅵ-1-1 윤리경영 행동강령 윤리경영 행동강령 Ⅵ-1-3 윤리경영행동강령 제정 2019. 9. 17. 제1장 총칙"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제1조", "article_title": "목적", "content": "이 행동강령(이하 “강령”이라 한다)은 공정한 직무수행과 부패방지 및 깨끗한 조직문화 조성을 위하여 한국여성경제인협회(이하 “협회”라 한다) 의 임직원이 준수하여야 할 윤리적 가치판단과 행동의 기준을 규정하는 것을 목적으로 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제2조", "article_title": "용어의 정의", "content": "이 강령에서 사용하는 용어의 정의는 다음과 같다. 1. “직무관련자”란 임직원의 소관 업무와 관련되는 자로서 다음 각 목의 어느 하나에 해당하는 개인(임직원이 사인의 지위에 있는 경우에는 이를 개인으 로 본다) 또는 단체를 말한다. 가. 협회에 대하여 민원사무를 신청하는 중이거나 신청하려는 것이 명백한 강 개인 또는 단체 나. 협회와 계약을 체결하거나 체결하려는 것이 명백한 개인 또는 단체 다. 협회에 대하여 특정한 행위를 요구하거나, 임직원의 직무상 권한의 행사 또는 불행사로 금전적 이해관계에 영향을 받는 개인 또는 단체 라. 정책·사업 등의 결정 또는 집행으로 직접 이익 또는 불이익을 받는 개인 또는 단체 마. 그 밖에 회장이 부패방지를 위하여 정하는 업무와 관련된 개인 또는 단체 2. “직무관련임직원”이란 임직원의 직무수행과 관련하여 이익 또는 불이익을 직접적으로 받는 다른 임직원 중 다음 각 목의 어느 하나에 해당하는 임직 원을 말한다. 가. 임직원의 소관 업무와 관련된 상급자와 직무상 명령을 받는 하급자 령 나. 인사⋅예산⋅감사⋅상훈 또는 평가 등의 직무를 수행하는 임직원과 이 Ⅵ-1-4 한국여성경제인협회 규정집 와 직접 관련된 해당 임직원 다. 사무를 위임⋅위탁하는 경우 그 사무의 위임⋅위탁을 받는 임직원 라. 그 밖에 회장이 정하는 임직원 3. “금품”이란 다음 각 목의 어느 하나에 해당하는 것을 말한다. 가. 금전, 유가증권, 부동산, 물품, 숙박권, 회원권, 입장권, 할인권, 초대권, 관 람권, 부동산 등의 사용권 등 일체의 재산적 이익 나. 음식물·주류·골프 등의 접대·향응 또는 교통·숙박 등의 편의제공 다. 채무 면제, 취업 제공, 이권(利權) 부여 등 그 밖의 유형·무형의 경제적 이익"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제3조", "article_title": "적용범위", "content": "본 강령은 협회의 모든 임직원(비정규직 및 파견근로자 포함) 에게 적용한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제4조", "article_title": "윤리헌장", "content": "윤리헌장(별표1)을 제정하여 임직원의 공정한 업무수행을 위한 가치판단과 행동지침의 기준으로 삼는다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제5조", "article_title": "직무청렴서약", "content": "회장은 부패방지 및 깨끗한 직장풍토 조성과 규정의 준수 를 담보하기 위하여 전 임직원에게 서약서를 제출하게 할 수 있다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제6조", "article_title": "준수의무와 책임", "content": "모든 임직원은 강령을 숙지하고 준수하여야 하며 위반 사항에 대해서는 그에 따른 책임을 진다. 제2장 임직원의 기본자세"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제7조", "article_title": "청렴의무", "content": "임직원은 어떠한 경우라도 공정하게 직무를 수행하겠다는 철 저한 직업윤리로 청렴하고 깨끗한 협회인 상을 확립하여야 한다. 8조(성실의무) 임직원은 긍지와 자부심을 가지고 고객에게 항상 친절하고 성실 한 근무 자세를 견지하여야 한다. 윤리경영 행동강령 Ⅵ-1-5"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제9조", "article_title": "품위유지", "content": "임직원은 평소에 행하는 언행과 의사결정이 협회의 윤리적인 명성과 대외 신뢰도에 영향을 끼칠 수 있음을 명심하고 올바른 가치판단과 건 전한 언행으로 개인의 품위와 협회의 명예를 유지·발전시킬 수 있도록 노력하 여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제10조", "article_title": "법규준수", "content": "임직원은 직무를 수행함에 있어 제반 법령과 규정을 준수하 고 양심에 따라 공정하게 직무를 수행하여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제11조", "article_title": "책임완수", "content": "임직원은 협회의 경영이념과 비전을 공유하고, 경영방침에 따라 창의와 성실로써 맡은바 책임을 완수하여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제12조", "article_title": "자기계발", "content": "임직원은 바람직한 협회 인재상이 되기 위해 끊임없이 자기 계발 노력을 하여야 한다. 제3장 고객에 대한 윤리"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제13조", "article_title": "고객존중", "content": "임직원은 고객이 우리의 존립 이유이자 목표라는 인식하에 항상 고객을 존중하고 고객의 입장에서 생각하며 고객을 모든 행동의 최우선 기준으로 삼는다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제14조", "article_title": "고객만족", "content": "①임직원은 고객의 요구와 기대를 정확하게 파악하여 이에 부응하는 최고의 상품과 서비스를 제공하기 위해 항상 노력하여야 한다. ②임직원은 고객의 의견과 제안사항을 항상 경청하고 겸허하게 수용하며 고 객 불만사항에 대하여 신속하고 공정하게 처리하여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제15조", "article_title": "고객의 이익보호", "content": "①임직원은 고객의 자산, 지적재산권, 영업비밀, 고객 정보 등을 소중하게 보호하며 비도덕적 행위로 인하여 고객의 이익을 침해하 지 아니한다. 령 ②임직원은 고객이 알아야 하거나 고객에게 마땅히 알려야 하는 사실을 정확 Ⅵ-1-6 한국여성경제인협회 규정집 하고 신속하게 제공한다. 제4장 국가 및 사회에 대한 윤리"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제16조", "article_title": "국가와 사회발전에 기여", "content": "임직원은 합리적이고 책임 있는 경영을 통해 건실한 조직으로 지속성장 발전시켜 국가와 사회발전에 이바지하여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제17조", "article_title": "환경보호", "content": "임직원은 환경문제의 중요성을 깊이 인식하여 환경관련 법규 를 준수하고 환경보호 및 오염방지를 위하여 노력하여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제18조", "article_title": "노사화합", "content": "임직원은 노사 모두가 주인임을 명심하고 신뢰와 화합을 바 탕으로 노사의 공존과 번영을 위해 노력하여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제19조", "article_title": "안전 및 위험예방", "content": "①임직원은 안전에 관한 제반 법규와 기준을 준수하 여 재해 및 위험예방 관리에 최선을 다해야 한다. ②모든 업무 및 관리에 있어서 안전제일을 원칙으로 하며 산업재해 예방을 위 해 우선적으로 조치하여야 한다. 제5장 공정한 직무수행"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제20조", "article_title": "차별대우 금지", "content": "임직원은 직무를 수행함에 있어 지연⋅혈연⋅학연 등 을 이유로 특정개인이나 단체를 우대하거나 차별하여서는 아니 된다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제21조", "article_title": "알선･청탁 등 금지", "content": "①임직원은 자기 또는 타인의 부당한 이익을 위 하여 다른 임직원의 공정한 직무수행을 저해하는 알선․청탁 등을 하여서는 아니된다. ②임직원은 직무수행과 관련하여 자기 또는 타인의 부당한 이익을 위하여 직무관련자를 다른 직무관련자에게 소개하여서는 아니된다. 윤리경영 행동강령 Ⅵ-1-7"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제22조", "article_title": "인사 청탁 등 금지", "content": "①임직원은 자신의 임용․승진․전보 등 인사에 관하 여 부당한 영향을 미치기 위하여 타인으로 하여금 인사업무를 담당하는 자 에게 청탁을 하게 하여서는 아니된다. ②임직원은 직위를 이용하여 다른 임직원의 임용․승진․전보 등 인사에 부당 하게 개입하여서는 아니된다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제23조", "article_title": "이해관계 직무의 회피", "content": "①임직원은 자신이 수행하는 직무가 다음 각 호 1에 해당하는 자의 이해와 관련되는 경우에는 당해 업무에 대한 참여 규 및 의사결정을 회피하여야 한다. 1. 본인⋅배우자⋅직계존비속 및 4촌 이내의 친족 2. 기타 임직원과 학연⋅지연⋅혈연 등의 관계가 있어 공정한 직무수행이 어렵다고 판단되는 자 ②임직원이 제1항의 규정에 의하여 그 직무를 회피하고자 하는 경우에는 이를 상급자나 행동강령책임관에게 통보하여야 하며 회피하여야 할지 여부 가 불분명한 경우에는 상급자나 행동강령책임관에게 상담을 요청하여야 한다. ③제2항의 규정에 의한 상담요청을 받은 상급자 또는 행동강령책임관은 다 음 각호의 1을 고려하여 당해 임직원이 그 직무를 계속 수행하는 것이 적 절하지 아니하다고 판단되는 경우에는 회장에게 보고하여야 한다. 다만, 상 급자가 그 권한의 범위 안에서 당해 임직원의 직무를 일시적으로 재배정할 령 수 있는 경우에는 당해 직무를 재배정하고 회장에게 보고하지 아니할 수 있다. 1. 이해관계의 정도 침 2. 당해 임직원이 해당 업무처리에 있어서의 재량권행사 정도 등 그 업무수 행에 있어서의 역할 및 중요성 3. 당해 업무의 대내외적 민감성 4. 다른 임직원에게 그 업무를 맡겼을 경우의 난이도 5. 기타 직무의 공정성을 해하는 정도 등 ④제2항의 규정에 의한 보고를 받은 회장은 직무가 공정하게 처리될 수 있 도록 인력을 재배치하는 등 필요한 조치를 하여야 한다. Ⅵ-1-8 한국여성경제인협회 규정집"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제24조", "article_title": "예산의 목적 외 사용 금지", "content": "임직원은 출장비⋅업무추진비 등 업무수행 을 위한 예산을 목적 외의 용도로 사용함으로써 협회에 대하여 재산상 손 해를 가하여서는 아니 된다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제25조", "article_title": "법인카드의 부적절한 사용금지", "content": "①임직원은 법인카드를 협회의 업무와 관련하여 규정에 맞게 사용해야 하며, 개인의 사익 등을 위하여 사용하여서는 아니 된다. ②임직원은 협회의 “법인카드 사용기준”에 명시된 세부 운영기준을 철저히 준수하여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제26조", "article_title": "투명한 회계처리", "content": "임직원은 관련 법령 또는 규정과 일반적으로 인정된 회계원칙 등에 따라 사실에 근거하여 정확하고 투명하게 회계를 관리하여야 한 다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제27조", "article_title": "부당한 정치개입 금지", "content": "①임직원은 법령에 위반하여 특정 정당이나 정치인의 후원회에 가입하는 등 부당하게 정치에 개입하여서는 아니 된다. ②임직원은 법령에 의한 적법한 정치활동을 함에 있어서도 협회의 정치적 활동으로 오해받지 않도록 주의하여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제28조", "article_title": "공정한 직무수행을 저해하는 지시 등에 대한 처리", "content": "①임직원은 하급자 에게 법령이나 규정에 위반하여 자기 또는 제3자의 이익을 도모하기 위하 여 공정한 직무수행을 현저히 저해하는 지시를 하여서는 아니된다. ②제1항의 경우 공정한 직무수행을 현저히 저해하는 지시를 받은 하급자는 그 사유를 당해 상급자에게 소명하고 지시에 따르지 아니할 수 있다. ③제2항의 규정에 의한 지시의 불이행에도 불구하고 같은 지시가 계속될 경우에는 즉시 행동강령책임관과 상담하거나 회장에게 보고하여야 한다. ④제3항의 규정에 의한 상담을 받은 행동강령책임관은 지시의 내용을 확인 하여 지시의 취소나 변경이 필요하다고 인정되는 경우에는 이를 회장에게 윤리경영 행동강령 Ⅵ-1-9 보고하여야 한다. ⑤제3항 또는 제4항의 규정에 의한 보고를 받은 회장은 필요하다고 인정되 는 경우에는 지시의 취소, 변경 등 적절한 조치를 하여야 한다. ⑥임직원은 제1항 및 제2항에 따른 지시불이행을 이유로 어떠한 차별이나 불이익을 받지 아니한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제29조", "article_title": "청렴한 계약의 체결 및 이행", "content": "①임직원은 협회에서 시행하는 입찰, 계약 및 계약이행 등에 있어서 관계 법령 및 관련 규정에서 정한 절차에 따라 공정 규 하고 투명하게 업무를 수행해야 한다. ②임직원은 제1항의 입찰, 계약 및 계약이행 과정에서 거래상의 우월적인 지 위를 이용하여 금지된 금품 등을 요구하거나 불공정한 거래 조건의 강요, 경 영간섭 등 부당한 요구를 해서는 아니 된다. 제6장 부당이득의 수수 금지 등"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제30조", "article_title": "이권개입 등의 금지", "content": "임직원은 자신의 직위를 직접 이용하여 부당한 이 익을 얻거나 타인이 부당한 이익을 얻도록 해서는 아니 된다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제31조", "article_title": "직위의 사적 이용 금지", "content": "임직원은 직무의 범위를 벗어나 사적 이익을 위 하여 협회의 명칭이나 직위를 공표·게시하는 등의 방법으로 이용하거나 이용 하게 해서는 아니 된다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제32조", "article_title": "직무관련 정보를 이용한 거래 등의 제한", "content": "①임직원은 직무수행 중 알게 된 정보를 이용하여 유가증권·부동산 등과 관련된 재산상 거래 또는 투자를 하거나 타인에게 그러한 정보를 제공하여 재산상 거래 또는 투자를 돕는 행위 를 해서는 아니 된다. ②제1항에 따른 직무수행 중 알게 된 정보라 함은 임직원이 그 직무를 수행하 는 기간 중에 알게 된 특정 업체의 투자동향·기술개발·자금상황 등에 관한 중 령 요정보로서 경제적 이익을 얻을 수 있는 일반에 공개되기 이전의 정보를 말한다. Ⅵ-1-10 한국여성경제인협회 규정집 ③임직원은 직무수행과 관련하여 취득한 다음 각 호의 1에 해당되는 정보를 사전 허가나 승인 없이 제3자에게 누설하여서는 안 된다. 1. 임직원의 신상정보 2. 업무 수행 과정에서 취득한 고객의 영업상 비밀 또는 개인 신상정보 3. 공사, 용역, 구매 등 각종 계약관련 정보 4. 기타 취득 목적에 위배되어 악용될 가능성이 있는 정보"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제33조", "article_title": "공용물의 사적 사용·수익의 금지", "content": "임직원은 업무용 차량, 각종 사업용 또는 사무용으로 제공되는 물품 기타 동산, 부동산 등 협회 소유 재산을 정 당한 사유 없이 사적인 용도로 사용․수익하여서는 아니 된다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제34조", "article_title": "사적 노무 요구 금지", "content": "임직원은 자신의 직무권한을 행사하거나 지위․직 책 등에서 유래되는 사실상 영향력을 행사하여 직무관련자 또는 직무관련임 직원으로부터 사적 노무를 제공받거나 요구 또는 약속해서는 아니 된다. 다 만, 다른 규정 또는 사회상규에 따라 허용되는 경우에는 그러하지 아니하다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제35조", "article_title": "금품 등의 수수 금지", "content": "①임직원은 직무관련자로부터 금전⋅부동산⋅선 물 또는 향응(이하 “금품등”이라 한다)을 받아서는 아니된다. 다만, 다음 각 호의 1에 해당하는 경우에는 그러하지 아니하다. 1. 채무의 이행 등 정당한 권원에 의하여 제공되는 금품 등 2. 3만원의 범위 안에서 제공되는 음식물 또는 편의 3. 직무와 관련된 공식적인 행사에서 주최자가 참석자에게 일률적으로 제공 하는 교통⋅숙박 또는 음식물 4. 불특정 다수인에게 배포하기 위한 기념품 또는 홍보용 물품 5. 질병, 재난 등으로 인하여 어려운 처지에 있는 임직원을 돕기 위하여 공개 적으로 제공되는 금품 등 6. 그밖에 원활한 직무수행 등을 위하여 회장이 허용하는 범위 안에서 제공되 는 금품 등 ②임직원은 직무관련임직원으로부터 금품 등을 받아서는 아니 된다. 다만, 다 윤리경영 행동강령 Ⅵ-1-11 음 각호의 1에 해당하는 경우에는 그러하지 아니하다. 1. 제1항 각호의 1에 해당하는 경우 2. 3만원의 범위 안에서 제공되는 소액의 선물 령 3. 직원상조회 등에서 공개적으로 제공되는 금품 등 4. 상급자가 하급자에게 위로․격려․포상 등 사기앙양을 목적으로 제공하는 금품 등"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제36조", "article_title": "금품 등을 주는 행위의 제한", "content": "임직원은 금품 등을 받는 것이 금지된 직 무관련임직원등에게 금품 등을 제공해서는 아니 된다. 또한 협회의 이익을 규 목적으로 직무와 관련이 있는 공무원 또는 정치인 등에게 금품 등을 제공해 서는 아니 된다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제37조", "article_title": "미래보장의 제한", "content": "임직원은 재직 중에 직무관련자로부터 퇴직 후의 고 용이나 취업의 알선, 거래계약의 체결 등과 같은 특별한 혜택을 보장하는 내 용의 제의를 받아들여서는 아니 된다. 제7장 건전한 조직풍토 조성"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제38조", "article_title": "금전의 차용금지 등", "content": "①임직원은 직무관련자 또는 직무관련임직원(직무 관련자 또는 직무관련임직원이 「민법」제777조에 따라 8촌 이내의 혈족, 4촌 이내의 인척, 배우자인 경우는 제외한다. 이하 조에서 같다)에게 금전을 빌리 거나 빌려주어서는 아니 되며 부동산을 무상(대여의 대가가 시장가격 또는 거 래관행과 비교하여 현저히 낮은 경우를 포함한다. 이하 조에서 같다)으로 대 여를 받아서는 아니 된다. 다만, 『금융실명거래 및 비밀보장에 관한 법률』 제2조에 따른 금융회사 등으로부터 통상적인 조건으로 금전을 빌리는 경우 는 제외한다. ②제1항 본문에도 불구하고 부득이한 사정으로 직무관련자 또는 직무관련임 직원에게 금전을 빌리려고 하거나 빌려주는 임직원과 부동산을 무상으로 대 여 받으려는 임직원은 행동강령책임관을 거쳐 회장에게 신고하여야 한다. 령 Ⅵ-1-12 한국여성경제인협회 규정집"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제39조", "article_title": "건전한 경조사 문화의 정착", "content": "①임직원은 건전한 경조사 문화의 정착을 위하여 솔선수범하여야 한다. ②임직원은 직무관련자에게 경조사를 알려서는 아니 된다. 다만, 다음 각 호 의 어느 하나에 해당하는 경우에는 경조사를 알릴 수 있다. 1. 친족(｢민법｣ 제767조에 따른 친족을 말한다)에게 알리는 경우 2. 현재 근무하고 있거나 과거에 근무하였던 단체의 소속 직원에게 알리는 경우 3. 신문, 방송 또는 제2호에 따른 직원에게만 열람이 허용되는 내부통신망 등 을 통하여 알리는 경우 4. 임직원 자신이 소속된 종교단체·친목단체 등의 회원에게 알리는 경우"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제40조", "article_title": "외부강의등의 신고", "content": "①임직원은 대가를 받고 세미나․공청회․토론회․발표 회․심포지엄․교육과정 등에 참석하여 강의․강연․발표․토론 등(이하 “외부강의 등”이라 한다)을 월 3회 또는 월6시간을 초과하여 하는 경우에는 외부강의 등 의 요청자․요청사유․장소․일시 및 대가를 회장에게 신고하여야 한다. 다만, 다 른 규정에 의하여 허가를 받은 외부 강의 등은 그러하지 아니하다. ② 임직원이 제1항의 규정에 의한 외부 강의 등을 행하는 경우에 받을 수 있 는 대가는 외부 강의 등의 요청자가 통상적으로 적용하는 기준을 초과하여서 는 아니된다. ③ 임직원은 제1항의 규정에 의한 신고대상이 아닌 외부강의등의 경우에도 1 회당 50만원을 초과하여 외부 강의 등의 대가를 받은 경우에는 제1항 본문의 규정에 의한 신고사항을 회장에게 신고하여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제41조", "article_title": "임직원의 상호존중", "content": "①임직원은 동료 또는 상하 간에 직장생활에 필요 한 기본예의를 지키고 불손한 언행이나 다른 임직원을 비방하는 행위를 하여 서는 아니 된다. ②임직원은 상호 인격적으로 대우함으로써 상호 신뢰할 수 있는 직장분위기 를 만든다. ③임직원은 동료를 대함에 있어서 자신의 이해에 따라 달리 해서는 아니 되며 따뜻한 관심으로 돈독한 동료애를 가꾸어 나간다. 윤리경영 행동강령 Ⅵ-1-13 ④임직원은 다른 임직원의 장점과 업적을 인정하고 칭찬하며 단점과 잘못에 대해서는 충고하고 격려함으로써 밝고 화목한 직장을 만든다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제42조", "article_title": "근무시간 내 사적인 업무의 금지", "content": "임직원은 근무시간 내 업무와 무관한 취미‧종교‧자선 활동 등 사적인 일에 시간을 할애하여 업무수행에 지장을 주어 서는 아니된다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제43조", "article_title": "정보통신 시스템의 부적절한 사용의 금지", "content": "임직원은 사내의 정보통신 시 규 스템을 이용하여 다음 각 호의 1에 해당하는 행위를 하여서는 아니 된다. 1. 음란 사이트 접속‧불건전한 채팅‧도박‧게임 등에 사용하는 행위 2. 사진이나 개인정보 등 사생활 침해나 허위사실 유포 등으로 명예를 훼손하 는 행위 3. 기타 업무 이외의 부적절한 용도로 사용하는 행위"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제44조", "article_title": "골프 및 사행성 오락 금지", "content": "①임직원은 직무관련자(임직원의 소관업무와 관련하여 직접적이고 사적인 이해관계가 있는 민간인 또는 단체)와 마작, 화 투, 카드, 도박 등 사행성 행위를 같이 하여서는 아니 된다. ②임직원은 직무관련자와 골프를 같이 해서는 아니 된다. 다만, 부득이한 사정 에 따라 골프를 같이 하는 경우에는 행동강령책임관에게 사전에 보고하여야 령 한다. 다만, 사전에 신고할 수 없는 경우에는 종료 후 첫 근무일 이내에 신고 하여야 한다. ③제1항에서 “사행성 오락”이란 우연의 결과나 불확실한 승패에 따라 금품 등 침 경제적 이익을 취할 목적으로 하는 행위를 말한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제45조", "article_title": "사조직 결성 등의 금지", "content": "임직원은 직장 내에서 혈연ㆍ지연ㆍ학연 등과 관련하여 파벌을 조성하거나 사조직 등을 결성하여서는 아니 된다. 단 동우회 활동 등 회사에서 인정하는 모임은 제외된다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제46조", "article_title": "협찬 요구 금지", "content": "①임직원은 체육대회, 불우이웃돕기를 위한 행사, 동호 Ⅵ-1-14 한국여성경제인협회 규정집 인 활동 등의 행사를 진행하면서 직무관련자에게 직위를 이용하여 협찬을 요 구하거나 받아서는 아니된다. ②제1항에 따른 협찬이란 행사의 진행에 직ㆍ간접적으로 필요한 경비‧물품‧용 역‧인력 또는 장소 등을 제공받는 것을 말한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제47조", "article_title": "성범죄 및 성희롱 등의 금지", "content": "①임직원은 그 지위를 이용하거나 직무 등 과 관련하여 성적 언동 등으로 상대방에게 성적 굴욕감 또는 혐오감을 느끼게 하거나 성적 언동 그 밖의 요구 등에 대한 불응을 이유로 불이익을 주어서는 아니 된다. ②임직원은 임직원 상호간에 성적 유혹 및 성적 수치심을 유발시키는 다음 각 호의 어느 하나에 해당하는 행위를 하여서는 아니 된다. 1. 특정 신체부위를 만지거나 접촉하는 행위 2. 상대방의 외모에 대하여 성적인 비유나 평가를 하는 행위 3. 회식자리 등에서 술시중이나 춤을 강요하는 행위 4. 성적 수치심을 유발하는 언어, 동영상, 그림 등을 게시하거나 보여주는 행위 5. 그 밖에 사회통념상 성적 수치심을 유발하는 행위 제8장 위반 시의 조치"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제48조", "article_title": "위반여부에 대한 상담", "content": "임직원은 알선‧청탁, 금품 등의 수수, 외부강의등 의 사례금 수수, 경조사의 통지 등에 대하여 이 강령을 위반하는 지가 분명하 지 아니할 때에는 행동강령책임관과 상담한 후 처리하여야 하며, 행동강령책 임관은 상담내용을 관리하여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제49조", "article_title": "위반행위의 신고와 확인", "content": "①누구든지 임직원이 이 강령을 위반한 사실을 알게 되었을 때에는 [별지 제8호 서식]에 따라 회장, 행동강령책임관 또는 국 민권익위원회에 신고할 수 있다. ②제1항에 따라 신고하는 자는 본인과 위반자의 인적 사항과 위반 내용을 구 체적으로 제시해야 한다. 다만, 부득이한 경우에는 무기명으로 할 수 있다. 윤리경영 행동강령 Ⅵ-1-15 ③행동강령책임관은 제1항에 따라 신고 된 위반행위를 확인한 후, 해당 임직 원으로부터 받은 소명자료를 첨부하여 회장에게 보고하여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제50조", "article_title": "신고인의 신분보장", "content": "①회장과 행동강령책임관은 제53조에 따른 신고인 과 신고내용에 대하여 비밀을 보장하여야 하며, 신고인이 신고에 따른 불이익 을 받지 아니하도록 하여야 한다. ②전항에도 불구하고 불이익을 받은 신고인은 회장·행동강령책임관 또는 국 민권익위원회에 보호조치 및 불이익의 구제 등을 요청할 수 있으며, 이 경우 규 회장과 행동강령책임관은 그에 필요한 적절한 조치를 취하여야 한다. ③제53조에 따른 신고로 자신의 위반행위가 발견된 경우 그 신고인에 대한 징계 처분 등을 함에 있어서는 이를 감경 또는 면제할 수 있다. ④제1항부터 제3항까지는 이 규정에 의한 상담․보고 등의 경우에도 준용한다. ⑤ 제1항에도 불구하고 신고를 한 자가 다음 각 호의 어느 하나에 해당하는 경우에는 이 규정에 따른 보호 및 보상을 받지 못한다. 1. 신고의 내용이 거짓이라는 사실을 알았거나 알 수 있었음에도 신고한 경우 2. 신고와 관련하여 금품 등이나 근무관계상의 특혜를 요구한 경우 3. 그 밖에 부정한 목적으로 신고한 경우 ⑥ 회장은 제5항에 해당하는 신고자에 대해서는 제41조(임직원의 상호존중) 의 위반 등으로 징계 등 필요한 조치를 할 수 있다. 령"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제51조", "article_title": "행동강령 위반행위 조사위원회", "content": "①회장은 소속 임직원의 행동강령 위반 행위에 대한 공정한 조사를 위하여 필요한 경우에는 행동강령책임관을 장으 침 로 하는 조사위원회를 구성하여 운영할 수 있다. ②제1항에 따른 조사위원회는 3인 이상으로 구성하여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제52조", "article_title": "징계", "content": "①회장은 이 강령에 위반된 행위를 한 임직원에 대하여는 징계 등 필요한 조치를 하여야 한다. ②제1항에 따른 징계의 종류, 절차, 효력 등은 협회의 징계관련 규정에 따른 다. 또한, 제50조를 위반하여 신고자에게 불이익 등을 가한 경우에는 가중하 Ⅵ-1-16 한국여성경제인협회 규정집 여 징계할 수 있다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제53조", "article_title": "부당이득의 환수", "content": "회장은 본 규정을 위반하여 수행한 임직원등의 직무 가 위법한 것으로 확정된 경우에는 그 직무의 상대방에게 이미 지출·교부된 금액 또는 물건이나 그 밖에 재산상 이익을 환수하여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제54조", "article_title": "직무관련 범죄의 고발", "content": "①회장은 임직원이 본 행동강령을 위반한 행위 가 중한 경우에는 국민권익위원회 또는 수사기관 등에 고발할 수 있다. ②회장은 불법행위의 고발여부를 결정함에 있어 그 범죄행위 경중과 고의 또 는 과실여부를 고려하여 판단하되, 특히 다음 각호의 어느 하나에 해당하는 경우에는 더욱 엄정히 처리하여야 한다. 1. 본 행동강령 제35조 제1항을 위반한 경우 2. 공금횡령 등 직무에 관한 부당한 이득 또는 재물취득과 관련된 범죄행위 에 해당되는 경우 3. 횡령금액 전액을 원상회복하지 않은 경우 4. 부당한 행정행위를 수반한 범죄를 저질러 본인 또는 제3자에게 이익을 가 져다 준 경우 5. 범죄내용이 파급개연성이 크고 수사 시 비위 규모가 더 밝혀질 수 있다고 판단되는 경우 6. 업무특성상 비위 발생빈도가 높거나 높을 우려가 있는 분야와 관련한 범 죄에 해당하는 경우 7. 징계처분을 받고 징계기록 말소기간 이내에 다시 범죄에 해당하는 비위 를 행한 경우 8. 그 밖에 계약 등 범죄의 횟수, 수법 등을 고려할 때 고발하는 것이 필요하 다고 판단되는 경우 ③회장은 고발에 대한 결정을 협회「인사관리규정」에 따른 인사위원회의 심 의를 거쳐 정하게 할 수 있다. ④고발이 결정된 경우, 행동강령책임관은 회장명의로 고발장을 작성하여 국 민권익위원회 또는 수사기관의 장에게 제출하되, 부당행위 혐의자가 도주 또 윤리경영 행동강령 Ⅵ-1-17 는 증거인멸의 우려가 있는 경우에는 구두로 고발한 후 고발장을 제출할 수 있다. 제9장 보칙"}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제55조", "article_title": "행동강령책임관의 지정", "content": "①회장은 이 규정의 원활한 운영을 위하여 행 동강령책임관을 지정한다. ②행동강령책임관은 ｢부정청탁 및 금품 등 수수의 금지에 관한 법률｣ 제20조 에 따른 부정청탁 금지 등을 담당하는 담당관을 겸한다. ③행동강령책임관은 다음 각 호의 업무를 수행한다. 1. 행동강령의 교육⋅상담에 관한 사항 2. 행동강령의 준수 여부에 대한 점검 및 평가에 관한 사항 3. 행동강령 위반행위의 신고접수⋅조사 처리 및 신고인 보호에 관한 사항 4. 그 밖에 행동강령의 운영을 위하여 필요한 사항 ④행동강령책임관 및 관련 직원은 제3항에 따른 업무를 수행하면서 알게 된 내용을 누설해서는 아니 된다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제56조", "article_title": "준수 여부 점검", "content": "①행동강령책임관은 임직원의 강령 이행실태 및 준수 여부 등을 매년 1회 이상 정기적으로 점검하여야 한다. ②행동강령책임관은 제1항에 따른 정기점검 이외에도 휴가철, 명절 전후 등 부패 취약 시기에 수시점검을 실시할 수 있다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제57조", "article_title": "교육 및 홍보 등", "content": "①인사담당부서장은 행동강령책임관과 합의 후 임직 원에 대해 부패방지와 행동강령의 준수를 위한 교육계획을 매년 수립 ‧ 시행 하여야 하며 그 결과를 기록 ‧ 관리하여야 한다. ②회장은 제1항에 따른 교육을 매년 1회 이상 실시하여야 하며, 신입사원에 대해서는 신규 임용 시 교육을 하여야 한다."}, {"category": "강령", "regulation": "윤리경영 행동강령", "article_num": "제58조", "article_title": "포상 및 징계", "content": "①회장은 강령을 준수하고 윤리경영 정립에 기여한 임직 령 원에 대하여는 인사평가에 반영하는 등 그에 상응한 포상을 실시할 수 있다. Ⅵ-1-18 한국여성경제인협회 규정집 ②회장은 강령에 저촉된 행위를 한 임직원에 대하여는 징계 등 필요한 조 치를 취할 수 있다. ③제2항의 규정에 의한 징계의 종류, 절차, 효력 등은 협회의 징계관련 규 정이 정하는 바에 따른다. 다만, 제50조의 규정에 위반하여 신고인에게 불 이익 등을 가한 경우에는 이를 가중할 수 있다. 행동강령의 이행 및 발전에 기여한 임직원에 대하여는 인사우대 및 포상 등을 실시할 수 있다. 부칙 <2019. 9. 17.> 이 강령은 회장으로부터 승인된 날로부터 시행한다. 윤리경영 행동강령 Ⅵ-1-19 【별표 1】 청렴행동수칙 령 한국여성경제인협회 임․직원은 윤리경영이 조직의 지속가능한 생존과 직결된다는 인식하에, 자율적인 윤리경영 행동강령 확립 을 통해 고객의 신뢰를 구축하기 위하여 아래 사항을 준수한다. 1. 직무관련자와 금품이나 향응을 주고받지 않으며, 본의 아니게 금품을 받은 경우 즉시 반환한다. 2. 각종 행사시 직무관련자에게 부담을 주지 않으며, 거래업체로 부터 선물이나 생산품 등을 받지 않는다. 3. 인사평가, 승진, 전보인사 기타 직무수행과 관련하여 직원으로 부터 금품이나 향응을 제공하거나 제공받지 않는다. 4. 회사경비를 집행함에 있어 일체의 부당한 행위를 근절하여 규 침 정에따라 투명하게 집행한다. 5. 직무수행으로 인한 고객정보 및 일체의 사내ㆍ외 비밀을 외부 에 유출하지 않는다. Ⅵ-1-20 한국여성경제인협회 규정집 【별표 2】 윤리경영행동강령 준수 서약서 나는 한국여성경제인협회 소속 임·직원으로서 윤리경영행동강령의 내용을 숙지하고 이를 성실히 준수하여 우리 협회가 국민으로부터 신 뢰받을 수 있는 단체가 될 수 있도록 다음과 같이 서약합니다. ◈ 하나, 나는 어떠한 부정청탁도 받지 않으며 타인을 위하여 부정청 탁을 하지 않으며, 공정한 업무수행에 장애가 되는 청탁을 근절하 여 국민으로부터 신뢰받는 단체를 조성하는데 앞장선다. ◈ 하나, 나는 직무수행의 공정성과 청렴성을 의심을 받을 수 있는 어떠한 금품 등도 받지 않는다. ◈ 하나, 나는 사적 이해관계에 영향을 받지 아니하고 직무를 공정하 고 청렴하게 수행한다. ◈ 하나, 나는 직무수행과 관련하여 공평무사하게 처신하고 직무관련 자를 우대하거나 차별하지 않는다. ◈ 하나, 나는 회사경비를 집행함에 있어 일체의 부당한 행위를 근절 하여 규정에 따라 투명하게 집행한다. ◈ 하나, 나는 직무수행으로 인한 고객정보 및 일체의 사내ㆍ외 비밀 을 외부에 유출하지 않는다. ◈ 하나, 나는 올바른 가치판단과 건전한 언행으로 개인의 품위와 협 회의 명예를 유지・발전시킬수 있도록 노력한다. ｢윤리경영행동강령｣ 및 ｢부정청탁 및 금품 등 수수의 금지에 관한 법률｣의 내용을 철저히 숙지하고 준수하겠으며 위반사항에 대해서는 관련 규정(법규)에 따라 어떠한 처벌도 감수할 것을 서약합니다.   "카드": ["법인카드", "카드사용"],
  "자산": ["고정자산", "비품", "물품"],
  "복무": ["근무", "출근", "퇴근", "근태", "시간외근무"],
  "지회": ["지부", "지역", "운영"],
  "위원회": ["위원", "특별위원회", "소위원회"],
  "윤리": ["윤리경영", "행동강령", "이해충돌"],
};

function getRelatedTerms(query) {
  const terms = new Set();
  const words = query.trim().split(/\s+/);
  words.forEach(w => {
    terms.add(w);
    for (const [key, vals] of Object.entries(synonyms)) {
      if (w.includes(key) || key.includes(w)) {
        vals.forEach(v => terms.add(v));
        terms.add(key);
      }
    }
  });
  return [...terms];
}

function searchArticles(query) {
  if (!query.trim()) return [];
  
  const terms = getRelatedTerms(query);
  const queryWords = query.trim().split(/\s+/);
  
  const scored = articles.map((article, idx) => {
    let score = 0;
    const searchText = (article.article_num + ' ' + article.article_title + ' ' + article.content + ' ' + article.regulation + ' ' + article.category).toLowerCase();
    
    // Exact phrase match (highest priority)
    if (searchText.includes(query.toLowerCase())) {
      score += 100;
    }
    
    // Title match (very high priority)
    const titleText = (article.article_title + ' ' + article.regulation).toLowerCase();
    queryWords.forEach(w => {
      if (titleText.includes(w.toLowerCase())) score += 50;
    });
    
    // Direct keyword matches
    queryWords.forEach(w => {
      const wl = w.toLowerCase();
      const matches = (searchText.match(new RegExp(wl.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi')) || []).length;
      score += matches * 10;
    });
    
    // Related term matches (lower weight)
    terms.forEach(t => {
      if (!queryWords.includes(t)) {
        const tl = t.toLowerCase();
        if (searchText.includes(tl)) score += 3;
      }
    });
    
    // Article number match
    const numMatch = query.match(/제\s*(\d+)\s*조/);
    if (numMatch && article.article_num.includes('제' + numMatch[1] + '조')) {
      score += 80;
    }
    
    // Regulation name match
    const regNames = ["정관", "회원", "회비", "지회", "회의", "선거", "대의원", "위원회", "특별위원회", "윤리", "감사", "기부금", "직제", "인사", "위임전결", "복무", "보수", "규정관리", "문서", "여비", "회계", "취업", "경조금", "전출", "근속", "공로패", "고정자산", "법인카드", "예산", "이해충돌", "행동강령"];
    regNames.forEach(rn => {
      if (query.includes(rn) && article.regulation.includes(rn)) score += 40;
    });
    
    return { article, score, idx };
  });
  
  return scored
    .filter(s => s.score > 0)
    .sort((a, b) => b.score - a.score)
    .slice(0, 10);
}

function highlightText(text, query) {
  if (!query) return text;
  const words = query.split(/\s+/).filter(w => w.length > 0);
  let result = text;
  words.forEach(w => {
    const escaped = w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    result = result.replace(new RegExp(escaped, 'gi'), '<mark>$&</mark>');
  });
  return result;
}

// === UI ===
const chatContainer = document.getElementById('chatContainer');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
let messageCount = 0;

function addMessage(content, type, extra) {
  const msg = document.createElement('div');
  msg.className = 'message ' + type;
  msg.innerHTML = '<div class="message-bubble">' + content + (extra || '') + '</div>';
  chatContainer.appendChild(msg);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  messageCount++;
}

function addBotMessage(content) {
  addMessage(content, 'bot');
}

function addUserMessage(content) {
  addMessage(content, 'user');
}

function createResultCards(results, query) {
  if (results.length === 0) return '';
  
  let html = '<div class="stats-bar"><div class="stat-item">&#128270; ' + results.length + '개 관련 조항 발견</div></div>';
  
  results.forEach((r, i) => {
    const a = r.article;
    const preview = a.content.substring(0, 200) + (a.content.length > 200 ? '...' : '');
    html += '<div class="result-card" onclick="showDetail(' + r.idx + ')">';
    html += '<div class="result-card-header">';
    html += '<span class="result-badge badge-' + a.category + '">' + a.category + '</span>';
    html += '<span class="result-reg-name">' + a.regulation + '</span>';
    html += '</div>';
    html += '<div class="result-article">' + a.article_num + '(' + a.article_title + ')</div>';
    html += '<div class="result-content">' + highlightText(preview, query) + '</div>';
    html += '</div>';
  });
  
  return html;
}

function showDetail(idx) {
  const a = articles[idx];
  document.getElementById('modalTitle').textContent = a.article_num + '(' + a.article_title + ')';
  document.getElementById('modalSubtitle').textContent = '[' + a.category + '] ' + a.regulation;
  document.getElementById('modalContent').textContent = a.content;
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('active');
  }
}

function sendMessage() {
  const query = userInput.value.trim();
  if (!query) return;
  
  addUserMessage(query);
  userInput.value = '';
  
  // Show typing indicator
  const typingMsg = document.createElement('div');
  typingMsg.className = 'message bot';
  typingMsg.id = 'typing';
  typingMsg.innerHTML = '<div class="message-bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
  chatContainer.appendChild(typingMsg);
  chatContainer.scrollTop = chatContainer.scrollHeight;
  
  setTimeout(() => {
    document.getElementById('typing')?.remove();
    
    const results = searchArticles(query);
    
    if (results.length > 0) {
      const topResult = results[0].article;
      let responseText = '<strong>' + topResult.regulation + '</strong>에서 관련 내용을 찾았습니다.';
      
      if (results.length > 1) {
        responseText += ' 총 <strong>' + results.length + '개</strong>의 관련 조항이 있으며, 가장 관련도가 높은 순서로 표시합니다.';
      }
      
      responseText += ' 각 항목을 클릭하면 전체 내용을 확인할 수 있습니다.';
      
      const cards = createResultCards(results, query);
      addMessage(responseText + cards, 'bot');
      
      // Add related suggestions
      const relatedSuggestions = generateSuggestions(query, results);
      if (relatedSuggestions.length > 0) {
        let sugHtml = '<div class="suggestions">';
        relatedSuggestions.forEach(s => {
          sugHtml += '<span class="suggestion-chip" onclick="askQuestion(this.textContent)">' + s + '</span>';
        });
        sugHtml += '</div>';
        const lastMsg = chatContainer.lastElementChild;
        lastMsg.querySelector('.message-bubble').innerHTML += sugHtml;
      }
    } else {
      let noResult = '입력하신 <strong>"' + query + '"</strong>에 대한 검색 결과가 없습니다.';
      noResult += '<br><br>다음과 같이 검색해 보세요:';
      noResult += '<div class="suggestions" style="margin-top:10px;">';
      noResult += '<span class="suggestion-chip" onclick="askQuestion(this.textContent)">연차휴가</span>';
      noResult += '<span class="suggestion-chip" onclick="askQuestion(this.textContent)">급여 수당</span>';
      noResult += '<span class="suggestion-chip" onclick="askQuestion(this.textContent)">출장 여비</span>';
      noResult += '<span class="suggestion-chip" onclick="askQuestion(this.textContent)">징계</span>';
      noResult += '</div>';
      addMessage(noResult, 'bot');
    }
  }, 400);
}

function generateSuggestions(query, results) {
  const suggestions = [];
  const regs = [...new Set(results.map(r => r.article.regulation))];
  
  // Suggest searching by regulation name
  if (regs.length > 1) {
    suggestions.push(regs[0] + ' 전체 보기');
  }
  
  // Context-based suggestions
  const contextMap = {
    "휴가": ["병가 규정", "출산 휴가", "경조 휴가"],
    "연차": ["휴가 일수", "연차 수당", "복무 규정"],
    "급여": ["성과급", "수당 종류", "퇴직금"],
    "보수": ["호봉 승급", "수당", "성과급"],
    "출장": ["여비 지급 기준", "출장 승인", "숙박비"],
    "채용": ["시보 기간", "임용 절차", "자격 요건"],
    "징계": ["징계 사유", "징계 절차", "소청"],
    "회비": ["회비 금액", "회원 자격", "입회비"],
    "회계": ["예산 편성", "결산", "지출 결의"],
    "인사": ["승진", "전보", "파견"],
  };
  
  for (const [key, vals] of Object.entries(contextMap)) {
    if (query.includes(key)) {
      vals.forEach(v => {
        if (!query.includes(v) && suggestions.length < 3) suggestions.push(v);
      });
    }
  }
  
  return suggestions.slice(0, 3);
}

function askQuestion(text) {
  userInput.value = text;
  sendMessage();
}

function showAllRegulations() {
  const catOrder = ["법령", "규정", "경영", "규칙", "지침", "강령"];
  const catIcons = {"법령":"&#9878;", "규정":"&#128220;", "경영":"&#128188;", "규칙":"&#128203;", "지침":"&#128204;", "강령":"&#128171;"};
  
  let regMap = {};
  articles.forEach(a => {
    const key = a.category + '|' + a.regulation;
    if (!regMap[key]) regMap[key] = { category: a.category, regulation: a.regulation, count: 0 };
    regMap[key].count++;
  });
  
  let html = '<strong>&#128218; 규정집 전체 목록</strong><br>카테고리별 규정을 확인하고 클릭하여 검색할 수 있습니다.';
  
  catOrder.forEach(cat => {
    const regs = Object.values(regMap).filter(r => r.category === cat);
    if (regs.length === 0) return;
    
    html += '<div style="margin-top:14px;font-weight:700;font-size:14px;">' + (catIcons[cat]||'') + ' ' + cat + '</div>';
    html += '<div class="reg-list">';
    regs.forEach(r => {
      html += '<div class="reg-item" onclick="askQuestion(\'' + r.regulation.replace(/'/g, "\\'") + '\')">';
      html += '<span>' + r.regulation + '</span>';
      html += '<span class="count">' + r.count + '개 조항</span>';
      html += '</div>';
    });
    html += '</div>';
  });
  
  addMessage(html, 'bot');
}

function resetChat() {
  chatContainer.innerHTML = '';
  messageCount = 0;
  showWelcome();
}

function showWelcome() {
  let welcome = '<strong>안녕하세요!</strong> &#128075;<br>';
  welcome += '한국여성경제인협회 규정집 챗봇입니다.<br>';
  welcome += '규정, 규칙, 지침 등에 대해 궁금하신 점을 자유롭게 질문해 주세요.';
  
  welcome += '<div class="category-browser">';
  const cats = [
    {icon: "&#9878;", name: "법령", desc: "법률/시행령"},
    {icon: "&#128220;", name: "규정", desc: "정관/회원/선거 등"},
    {icon: "&#128188;", name: "경영", desc: "인사/보수/회계 등"},
    {icon: "&#128203;", name: "규칙", desc: "취업/경조/자산 등"},
    {icon: "&#128204;", name: "지침", desc: "예산/이해충돌"},
    {icon: "&#128171;", name: "강령", desc: "윤리경영"},
  ];
  cats.forEach(c => {
    const count = articles.filter(a => a.category === c.name).length;
    welcome += '<div class="category-tile" onclick="askQuestion(\'' + c.name + ' 규정\')">';
    welcome += '<div class="icon">' + c.icon + '</div>';
    welcome += '<div class="name">' + c.name + '</div>';
    welcome += '<div class="count">' + count + '개 조항</div>';
    welcome += '</div>';
  });
  welcome += '</div>';
  
  welcome += '<div style="margin-top:14px;font-size:13px;color:var(--text-light);">자주 묻는 질문:</div>';
  welcome += '<div class="suggestions">';
  const faqs = ["연차휴가 일수", "회비 납부 기준", "출장 여비 지급", "징계 절차", "경조금 지급", "법인카드 사용"];
  faqs.forEach(q => {
    welcome += '<span class="suggestion-chip" onclick="askQuestion(this.textContent)">' + q + '</span>';
  });
  welcome += '</div>';
  
  addMessage(welcome, 'bot');
}

// === INIT ===
userInput.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.isComposing) {
    e.preventDefault();
    sendMessage();
  }
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

showWelcome();
</script>
