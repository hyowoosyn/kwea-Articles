정", "regulation": "정관", "article_num": "제2조", "article_title": "적용", "content": "지회의 설립과 운영에 관한 사항은 일차적으로 정관과 이 규정에 지 서 정한 바에 따르며, 정관과 규정에서 정하지 아니한 사항은 이사회, 당해 지 회이사회에서 정한 순서에 따라 적용한다. 침"}, {"category": "규정", "regulation": "정관", "article_num": "제3조", "article_title": "지회명칭", "content": "① 지회의 명칭은 “한국여성경제인협회 00지회” (예 : 한국여 성경제인협회 서울지회)라 칭하며, 00에는 지역명칭을 쓴다. ② 지회의 명칭 표기순서는 특별시, 광역시 및 도의 순서로 정하며, 그 표기 순서는 다음 각 호와 같다. 다만, 추후 신생지회는 설립순서에 따라 표기한다. <개정 ’13. 12. 3.> 1. 서울지회 령 2. 부산지회 Ⅱ-3-4 한국여성경제인협회 규정집 3. 대구지회 <개정 ’23. 10. 16.> 4. 광주지회 <개정 ’13. 12. 3.> 5. 대전지회 <개정 ’13. 12. 3.> 6. 인천지회 7. 울산지회 8. 강원지회 9. 경기지회 10. 충북지회 11. 전북지회 12. 경남지회 13. 제주지회 <신설 ’03. 5. 13.> 14. 충남지회 <신설 ’13. 12. 3., 개정 ’16. 3. 25., ’24.12.16.> 15. 전남지회 <신설 ’13. 12. 3.> 16. 경기북부지회 <신설 ’14. 4. 9.> 17. 경북지회 <신설 ’20. 5. 20.> 18. 남서울지회 <신설 ’23. 10. 16.> 19. 세종지회 <신설 ’24. 12. 16.> 20. 경기동부지회 <신설 ’26. 2. 23..> 21. 경북동부지회 <신설 ’26. 2. 23..>"}, {"category": "규정", "regulation": "정관", "article_num": "제4조", "article_title": "관할구역", "content": "① 지회의 관할구역은 특별시, 광역시, 특별자치시(이하, 시) 또는 특별자치도, 도(이하, ‘도’)를 기준으로 한다. <개정 ’13. 12. 3., ’26.2.23.> ② 2개 이상의 시․도를 관할구역으로 하거나 1개 시․도에서 그 일부를 관할구역 으로 하고자 하는 경우에는 지회설립 승인 신청 시 그 사유를 제출하여야 한다. ③ 1개 시.도에서 그 일부를 관할구역으로 하여 새로 지회를 설립할 경우, 새로 설립하는 지회의 관할구역은 기존 지회의 관할구역의 50% 미만{하부 행정구역 (시, 군, 구) 개수 기준}이어야 한다. 단, 행정구역의 특성상 위 기준 적용이 현저히 곤란하다고 이사회가 인정하는 경우에는 예외로 한다. <신설, ’26. 2. 23.>"}, {"category": "규정", "regulation": "정관", "article_num": "제5조", "article_title": "지회설립", "content": "① 지회를 설립하고자 하는 발기인 대표는 정관 제37조에서 규정하는 요건과 절차에 따라 지회설립승인신청서에 다음 각 호의 서류를 갖 추어 협회에 그 승인을 요청하여야 한다. 1. 지회명칭, 관할구역 지회설립 및 운영규정 Ⅱ-3-5 2. 발기인 및 동의인 명부 3. 지회사업계획서 및 수지예산서 4. 지회재산목록 및 내역과 그를 증명하는 서류 5. 창립총회 의사록 사본 6. 임원과 대의원을 선출한 경우 임원․대의원 명부와 취임승낙서 7. 회원가입신청서(지회설립 신청일 기준 2년 이내에 협회 정회원으로 활동 하지 않은 신규회원 50인 이상 필수 포함) <개정 ’26. 2. 23.> 정 ② 협회가 제1항의 승인요청을 받은 경우 이사회에서는 다음 요건을 검토하 여 신청일로부터 60일 이내에 승인여부를 결정하여야 한다. <개정 ’01. 9. 7., ’13. 12. 3., ’18. 3. 29.> 1. 회원이 될 자의 자격 2. 관할구역의 타당성 3. 임원선출시 정관 및 규정 준수 4. 지회임원의 피선거권 유무 5. 사업계획서 및 수지예산서의 타당성 6. 타 지회와의 중복 및 경합 규 ③ 지회설립을 승인한 경우 협회는 해당 지회회장에게 지회설립승인서를 교 부하여야 한다. 칙"}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제6조", "article_title": "지회설립경합", "content": "① 이미 설립된 지회가 없는 시․도에서 2개 이상의 지회설 립승인신청서가 협회에 제출된 경우, 협회는 각 지회 발기인의 의견을 청취한 후, 제5조제2항에서 규정한 요건을 검토하여 이의 승인여부를 결정하여야 한다. ② 제1항의 경우 이사회는 지회의 각각 설립 또는 복수지회의 통합 또는 그 중 1개 지회만의 설립 또는 전체의 설립 승인불허에 대한 결정을 하여야 한다."}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제7조", "article_title": "지회분할", "content": "① 이미 설립된 1개의 지회가 시․도의 구역을 분할하여 지회를 설립하고자 하는 경우, 이미 설립된 지회의 지회총회를 개최하여 재적회원 과반수의 찬성을 얻어 분할설립을 결의하고 협회에 지회분할설립승인을 신청 하여야 한다.<개정 ’13. 12. 3., ’26. 2. 23.> ② 제1항에 따라 지회를 분할하여 설립하고자 하는 발기인 대표는 정관 제37 조제1항의 요건을 갖추어 지회 창립총회 전에 다음 각 호의 서류를 갖추어 이 사회에 지회분할설립에 대한 사전 동의를 구하여야 한다. 1. 제5조제1항제1호 내지 제4호의 각 서류 Ⅱ-3-6 한국여성경제인협회 규정집 2. 분할하여 설립하고자 하는 사유 3. 분할설립을 결의한 총회 의사록 사본 <신설 ’26. 2. 23.> ③ 이사회는 분할설립의 사유와 타당성, 이미 설립된 지회의 의견을 청취하 고 제5조제2항에서 규정하는 요건을 검토하여 이에 대한 승인여부를 결정하 여야 한다. ④ 제3항에 따라 이사회의 사전승인을 얻은 당해지회는 지회창립총회를 마치 고 지회설립승인신청서에 제5조제1항제5호 내지 제7호의 서류를 갖추어 협회 에 지회설립승인신청을 하여야 한다. ⑤ 지회의 분할설립을 승인하는 경우 이사회는 관할구역을 지정하고, 당해 지회회장에게 지회설립승인서를 교부하여야 한다."}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제8조", "article_title": "지회통합", "content": "① 이미 설립된 2개의 지회를 1개로 통합하고자 하는 경우 통 합을 원하는 각각의 지회는 지회총회를 개최하여 재적회원 과반수의 찬성을 얻어 통합을 결의하고 다음 각 호의 서류를 갖추어 협회에 지회통합 사전승 인을 구하여야 한다. 1. 통합 지회의 명칭 2. 통합 지회의 관할구역 3. 통합사유 4. 지회통합을 결의한 각 지회총회 의사록 사본 ② 제1항에 따라 사전승인을 요청 받은 협회는 이사회의 의결을 거쳐 그 통 합여부를 결정하여야 한다. ③ 제2항에 따라 통합승인을 통보 받은 각 지회는 지회총회를 개최하여 해산 을 결의하고, 정관 제37조제1항의 요건과 절차에 따라 통합지회 창립총회를 개최하여 제5조제1항의 규정에 따라 협회에 지회설립 신청을 하여야 한다. ④ 통합지회의 설립승인은 제5조제2항 및 제3항의 규정을 따른다."}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제9조", "article_title": "지회임원", "content": "① 지회 정회원 50인의 기준으로 지회에는 다음 각 호의 지회 임원을 둔다. 1. 지회회장 1인 2. 지회수석부회장 1인 <개정 ’01. 9. 7. ’26. 2. 23.> 3. 지회부회장 3인 <신설 ’26. 2. 23.> 4. 지회이사 6인 이내 <개정 ’26. 2. 23.> 5. 지회 감사 1인 <개정 ’26. 2. 23.> 지회설립 및 운영규정 Ⅱ-3-7 ② 제1항제2호 및 제3호의 경우 지회에 소속하는 회원이 51인 이상인 경우 회원 30인이 추가될 때마다 이사 1인을 둘 수 있고, 회원 60인이 추가될 때마 다 부회장 1인을 더 둘 수 있으며, 회원이 200인을 초과하는 경우 감사를 2인 으로 할 수 있다. <개정 ’01. 9. 7.>"}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제10조", "article_title": "임원선출", "content": "① 지회임원과 대의원의 선출에 관한 사항은 선거관리규정이 정한 바에 따른다. 정 ② 삭제 <’01. 9. 7> ③ 지회에서 지회임원과 대의원을 선출하거나 협회이사를 추천한 경우에는 다음 각 호의 서류를 구비하여 협회에 통보하여야 한다. <개정 ’01. 9. 7.> 1. 지회임원․대의원 명단 및 취임승낙서 2. 협회추천이사 이력서 <개정 ’01. 9. 7> 3. 총회 또는 이사회 의사록 사본 <개정 ’01. 9. 7.>"}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제11조", "article_title": "지회총회", "content": "① 지회총회는 지회정기총회와 지회임시총회로 구분한다. ② 지회정기총회는 매사업연도 개시 후 1월 이내에 개최하여야 하며, 지회총 규 회 개최결과와 의사록 사본을 개최 후 7일 이내에 협회에 보고하여야 한다. ③ 지회총회는 회원으로 구성하고, 지회총회의 의장은 지회회장이 된다. 칙 ④ 지회총회의 의결은 별도의 규정이 없는 한 재적회원 과반수의 출석으로 개회하고, 출석회원 과반수의 찬성으로 의결한다. <개정 ’01. 9. 7.> ⑤ 지회총회는 다음 사항을 의결한다. 1. 지회 예산 및 결산승인 2. 전년도 사업실적 및 당해 연도 사업계획승인 3. 지회임원 및 대의원 선출 4. 지회임원의 불신임 침 5. 지회 기본재산의 취득 및 처분의 사전결의 6. 지회분할설립 및 통합에 관한 사항 <신설 ’26.2.23.> 7. 지회해산에 관한 사항 <개정 ’26. 2. 23.> 8. 지회 이사회의 의결 또는 지회회장이 부의하는 사항 <개정 ’26. 2. 23.> ⑥ 지회임시총회는 다음 각 호에 해당하는 경우 의장이 소집한다. 1. 지회 이사회의 결의가 있을 때 2. 지회 회원 3분의 1 이상이 총회의 소집을 요구하는 경우 3. 지회회장이 필요하다고 인정하는 경우 Ⅱ-3-8 한국여성경제인협회 규정집 단, 제1호 및 제2호에 해당하는 경우 의장은 소집을 요청 받은 날부터 7일 이내에 이를 소집하여야 한다. ⑦ 지회회장이 임시총회의 소집을 거부하는 경우 지회수석부회장이 소집하 고, 지회수석부회장이 소집하지 아니하는 경우 이사회에서 정한 순서에 따라 부회장이 소집하고, 총회를 소집한 자가 당해 총회의 의장이 된다. <개정 ’01. 9. 7.>"}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제12조", "article_title": "지회이사회", "content": "① 지회이사회는 지회회장, 지회부회장, 지회이사, 지회감 사로 구성한다. 단, 지회감사는 필요한 경우 참석하여 발언할 수 있되 의결권 은 없다. ② 지회이사회 의장은 지회회장이 된다. ③ 지회이사회는 필요에 따라 수시로 개최할 수 있다. ④ 지회이사회는 다음 사항을 의결한다. <신설 ’01. 9. 7.> 1. 사업계획안 및 예산안 승인 2. 기채와 상환에 대한 동의 3. 회원의 가입에 관한 사항 <개정 ’20. 5. 20.> 4. 회원에 대한 징계 5. 정부에 대한 중요한 건의 6. 총회의 소집 및 부의할 사항 7. 사무국의 구성 및 운영에 관한 사항 8 위원회의 설치와 운영에 관한 사항 9. 지회회장이 필요하다고 지회이사회에 부의하는 사항 제12조의 2(지회월례회) ① 지회월례회는 지회 회원으로 구성하며, 지회회장은 의장이 된다. ② 지회월례회는 매월 개최하여야 한다. 단, 개최가 어려울 경우에 는 사전 에 해당 지회이사회의 의결을 얻어야 하며, 연속하여 2월 이상 개최하지 아니 할 수 없다. ③ 지회월례회는 지회운영과 관련한 제반문제, 지회의 다수회원이 제기하는 사항 및 본회의 전달사항 등을 협의할 수 있으며, 지회총회와는 구별되어야 한다. [본조신설 ’01. 9. 7.] 지회설립 및 운영규정 Ⅱ-3-9"}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제13조", "article_title": "지회사무국", "content": "① 지회는 필요한 경우 지회사무국을 설치․운영할 수 있다. <개정 ’01. 9. 7.> ② 지회 상근직원의 임면은 지회이사회의 승인을 받은 후, 협회 회장에게 보고 하여야 한다. <개정 ’05. 10. 25>"}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제14조", "article_title": "지회재산", "content": "① 지회는 다음 각 호의 재산으로 운영한다. 1. 지회재산목록에 기재된 재산 정 2. 회비 중 지회에 귀속하는 회비 3. 특별회비 <개정 ’01. 9. 7.> 4. 기부금 <개정 ’01. 9. 7.> 5. 소속 지방자치단체 또는 기타 단체의 보조금 및 후원금 ② 지회재산은 협회의 설립목적과 사업, 정관과 규정에 반하지 않는 범위 내 에서 자율적으로 운영하되, 기본재산의 취득과 처분은 협회의 승인을 받아야 한다. <개정 ’01. 9. 7.>"}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제15조", "article_title": "지회감독", "content": "삭제 <’18. 3. 29.> 규"}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제16조", "article_title": "지부", "content": "① 지회에 소속하는 특정 시․군․구의 회원이 지부를 결성하여 활 칙 동하고자 하는 경우에는 정회원이 될 자격이 있는 자 5인 이상이 발기하여, 정회원이 될 자 30인 이상(특별시는 100인 이상)의 동의를 얻어 창립총회를 개최한 후 관할 지회 이사회의 승인을 거쳐 협회에 지부설립 승인을 요청하 여야 한다. 다만 해당지회가 정당하지 않은 사유로 지부설립승인을 거부할 경 우 협회 이사회에 설립승인을 신청할 수 있다. 관할 지회 및 협회는 그 설립 승인 여부를 심사하여 출석이사 2분의 1이상의 찬성으로 지부설립승인을 의 결한다. <개정 ’13. 12. 3.> 침 ② 지부를 결성하고자 하는 회원은 지부의 활동구역과 회원의 동의 내역을 첨부하여 지회에 지부설립 승인을 요청하여야 한다. ③ 지회가 지부를 설립하고자 하는 경우 협회의 승인을 받아야 한다. <개정 ’ 01. 9. 7.> ④ 지부의 명칭은 “한국여성경제인협회 00지회 00지부”라고 칭한다. 00에는 구역을 나타내는 명칭을 쓴다. <개정 ’01. 9. 7.> ⑤ 지부는 지부운영에 필요한 경비를 자체 조달 운영하여야 하며, 이를 사유 로 회비를 납부하지 아니할 수 없다. Ⅱ-3-10 한국여성경제인협회 규정집 ⑥ 지부는 지부의 활동 이외에 지회의 활동에 영향을 미치는 사항에 대하여 의결하지 못한다. 제2장 지부 <신설’13. 12. 3.>"}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제17조", "article_title": "지부업무", "content": "지부는 지회에 속하며 지회의 제반업무를 보조한다."}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제18조", "article_title": "지부 임원", "content": "① 지부의 임원은 지회임원 선출 규정을 준용한다. 1. 지부장 1인 2. 지부부회장 2인 3. 지부이사 5인 이내 4. 지부감사 1인 ② 지부장은 지부를 대표하며 지부 임원회는 지회로부터 위임 받은 사항 및 지부 운영에 필요한 사항을 심의한다. ③ 지부회원이 30인 이상인 경우 지부장은 관할지회의 당연직 이사가 되고 회원 30인이 초과될 때마다 지회 이사 1인을 더 둘 수 있다. ④ 지부 임원의 임기는 지회 임원의 임기에 준한다."}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제19조", "article_title": "지부회의", "content": "① 지부회의는 지부이사회, 지부총회로 구성하며, 회의소집 및 운영은 지회설립 및 운영규정 제12조 및 제12조의 2를 준용한다. ② 지부장은 지부 회의의 주요내용을 지체 없이 지회회장에게 보고하고 지회 회장은 본회에 보고하여야 한다. ③ 지부 회원은 해당 소속지회의 회원으로서의 권리를 가지며, 지회총회, 월 례회, 연수 등 각종 회의 및 행사에 참석할 수 있다."}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제20조", "article_title": "지부사무국", "content": "① 지부는 필요한 경우 지부사무국을 설치․운영할 수 있다. ② 지부 상근직원의 임면은 지부이사회의 승인을 받은 후, 지회 회장에게 보 고하여야 한다."}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제21조", "article_title": "지부의 협조의무", "content": "① 지부는 협회 및 지회의 운영에 성실히 협조하여야 한 다. ② 지부는 협회의 정관과 제규정을 준수하여야 한다. ③ 지부는 협회 및 지회에 납부해야 할 협회비를 분기별로 납부하며, 다음 분 지회설립 및 운영규정 Ⅱ-3-11 기의 최초 월 말일까지 납부하여야 한다."}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제22조", "article_title": "지부재산", "content": "① 지부는 다음 각 호의 재산으로 운영한다. 1. 지부재산목록에 기재된 재산 2. 회비 중 지부에 귀속하는 회비 3. 특별회비 4. 기부금 정 5. 소속 지방자치단체 또는 기타 단체의 보조금 및 후원금 ② 지부재산은 협회의 설립목적과 사업, 정관과 규정에 반하지 않는 범위 내 에서 자율적으로 운영하되, 기본재산의 취득과 처분은 협회의 승인을 받아야 한다."}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제23조", "article_title": "지부감독", "content": "협회 및 지회는 지부의 업무와 재산상태, 회원 및 회원관리, 지부운영, 지부사무의 운영 등에 대하여 지도․감독할 수 있고, 지부로 하여금 업무에 관한 보고를 하게 하거나 감사를 받도록 명할 수 있다. <개정 ’26. 2. 23.>"}, {"category": "규정", "regulation": "지회설립 및 운영규정", "article_num": "제24조", "article_title": "보칙", "content": "이 규정에서 정하지 아니한 사항은 이사회에서 정한 바에 따른다. 부칙 <1999. 11. 5.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행일", "content": "이 규정은 주무관청의 협회설립허가 후 정관 부칙 제2조의 규정 에 의한 한국여성경제인협회 설립준비위원회(이하 “준비위원회”라 한다.)에서 의결한 날부터 시행한다."}, {"category": "규정", "regulation": "정관", "article_num": "제2조", "article_title": "이사회의 승인", "content": "이 규정은 협회설립허가 후 최초로 개최하는 이사회에서 침 사후승인을 받아야 하며, 사후승인을 받는 경우 정관에 따라 제정한 규정으로 본다."}, {"category": "규정", "regulation": "정관", "article_num": "제3조", "article_title": "이사회 대행", "content": "정관과 이 규정의 시행 후 이사회가 구성되기 전까지는 지 회의 설립과 운영에 관하여 이사회가 행하여야 하는 기능과 역할은 준비위원 회가 행한다. Ⅱ-3-12 한국여성경제인협회 규정집 부칙 <2001. 9. 7.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2003. 5. 13.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2005. 10. 25.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2013. 12. 3.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2014. 4. 9.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2016. 3. 25.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2018. 3. 29.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2020. 5. 20.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2024. 12. 16.> 이 규정은 이사회에서 의결한 날부터 시행한다. 지회설립 및 운영규정 Ⅱ-3-13 부칙 <2026. 2. 23.> 이 규정은 이사회에서 의결한 날부터 시행한다. 회의규정 Ⅱ-4-1 회의규정 회의규정 Ⅱ-4-3 회의규정 법 제정 1999. 9. 16. 개정 2001. 9. 7. 개정 2003. 5. 13. 개정 2005. 10. 25. 개정 2013. 12. 3. 개정 2014. 10. 7. 개정 2016. 9. 21. 개정 2017. 7. 26. 개정 2018. 3. 29. 개정 2020. 11. 24. 개정 2021. 4. 29. 개정 2023. 10. 16. 개정 2026. 2. 23. 규 제1장 총칙"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "목적", "content": "이 규정은 한국여성경제인협회(이하 “협회”라 한다.)의 정관에 의한 제회의에 관한 사항을 정함으로써 원활한 회의운영을 도모하는데 그 목적이 있다."}, {"category": "규정", "regulation": "정관", "article_num": "제2조", "article_title": "회의의 종류", "content": "정관에 의한 회의는 총회, 이사회로 분류한다."}, {"category": "규정", "regulation": "정관", "article_num": "제3조", "article_title": "적용범위", "content": "이 규정은 모든 회의에 대해 적용하며, 정관 및 다른 규정에 특 별히 정한 바를 제외하고는 이 규정이 정하는 바에 의한다."}, {"category": "규정", "regulation": "정관", "article_num": "제4조", "article_title": "준용", "content": "지회총회 및 지회이사회와 위원회의 등의 회의에 대하여는 별도의 규정이 없으면 이 규정을 준용한다. <개정 ’01. 9. 7.> 제2장 총회 Ⅱ-4-4 한국여성경제인협회 규정집"}, {"category": "규정", "regulation": "정관", "article_num": "제5조", "article_title": "총회", "content": "삭제 <’18. 3. 29.>"}, {"category": "규정", "regulation": "정관", "article_num": "제6조", "article_title": "회의의 구성", "content": "① 총회는 각 지회총회에서 선출된 대의원과 당연직 대의원 으로 구성하며 의장과 대의원만이 표결권을 갖는다. <개정 ’21. 4. 29.> ② 지회총회는 각지회의 정회원으로 구성한다."}, {"category": "규정", "regulation": "정관", "article_num": "제7조", "article_title": "개최시기", "content": "① 정기총회는 매 사업년도 개시 후 2월 이내에 의장이 소집한 다. 지회총회는 매 사업년도 개시 후부터 협회 정기총회 개최일 10일전까지 개최하여야 한다. <개정 ’01. 9. 7., ’13. 12. 3., ’14. 10. 7., ’23. 10. 16.> ② 삭제 <’18. 3. 29.> ③ 삭제 <’18. 3. 29.> ④ 삭제 <’18. 3. 29.> ⑤ 삭제 <’18. 3. 29.> ⑥ 회장의 유고시에 의결된 사항은 다음 회의에 보고하여야 한다. ⑦ 총회의 소집은 회장이 회의일 7일전에 회의의 목적 사항과 회의일시 및 장 소를 기재한 서면을 각 회원에게 통지하여야 한다. 다만, 긴급을 요하는 경우 에는 3일 전에 통지할 수 있다. <신설 ’13. 12. 3.>"}, {"category": "규정", "regulation": "정관", "article_num": "제8조", "article_title": "감사의 회의소집요구", "content": "삭제 <’18. 3. 29.>"}, {"category": "규정", "regulation": "정관", "article_num": "제9조", "article_title": "의결사항", "content": "삭제 <’18. 3. 29.> 제3장 이사회"}, {"category": "규정", "regulation": "정관", "article_num": "제10조", "article_title": "구성 및 의결", "content": "① 이사회는 회장, 수석부회장, 특별부회장, 부회장 및 이사 (상근임원 포함)로 구성한다. 단, 정관 제6조제3항의 특별회원이거나 비회원이 선거관리규정 제15조제3항에 의하여 선출되는 이사일 경우에는 제외한다. <개정 ’01. 9. 7, ’05. 10. 25, ’26. 2. 23.> ② 감사는 이사회에 출석하여 의견을 진술할 수 있다. ③ 이사회의 의장은 회장이, 지회이사회의 의장은 지회회장이 된다. 회의규정 Ⅱ-4-5 ④ 의장은 표결권을 가지며, 가부동수일 경우에는 결정권을 가진다. ⑤ 선거관리규정 제19조(지회임원)의 이사회는 “당선자회의”를 포함하고 이사는 “당선자”를 포함하며, 당선자회의의 의장은 “회장당선자”로 한다. <신설 ’16. 9. 21.> ⑥ 협회 임원이 아닌 자가 정관 제14조1항에 의해 협회이사회에서 수석부회 장으로 선출된 자는 회장 임기 3년차 정기총회에서 승인될 때까지는 반드시 이사회에 출석하여야 하되, 의결권 및 발언권은 가질 수가 없다. <신설 ’17. 7. 26.>"}, {"category": "규정", "regulation": "회의규정", "article_num": "제11조", "article_title": "개최시기", "content": "<삭제 ’18. 3. 29.>"}, {"category": "규정", "regulation": "회의규정", "article_num": "제12조", "article_title": "의결사항", "content": "이사회의 의결사항은 정관 제33조에서 정한 바에 따른다. <개정 ’21. 4. 29.> 제4장 의사"}, {"category": "규정", "regulation": "회의규정", "article_num": "제13조", "article_title": "개회선언", "content": "의장은 출석 구성원 수를 파악하여 성원여부를 보고한 후 개 회를 선언하여야 한다."}, {"category": "규정", "regulation": "회의규정", "article_num": "제14조", "article_title": "의결정족수", "content": "① 회의는 재적구성원 과반수의 출석으로 개회하고 출석구 성원 과반수의 찬성으로 의결한다. 만일 의결정족수에 달하지 못한 때에는 의장이 산회를 선포한다. <개정 ’01. 9. 7.> ② 출석구성원이 재적구성원 3분의 1 이하인 경우 위임장으로 과반수의 정족 수를 채울 수 없다."}, {"category": "규정", "regulation": "회의규정", "article_num": "제15조", "article_title": "특별의결사항", "content": "<삭제 ’03. 5. 13.> 침"}, {"category": "규정", "regulation": "회의규정", "article_num": "제16조", "article_title": "의사일정변경", "content": "① 의장이 긴급하다고 인정하거나 재적구성원의 5분의 1 이상의 요구가 있을 때에는 의사일정을 변경할 수 있다. ② 의사일정에 올린 안건에 대하여 회의를 열지 못하였거나 또는 마치지 못한 때에는 의장이 다시 그 일정을 정해야 한다. 다만, 회의를 마치지 못한 때에는 연회를 선포한다. ③ 휴회의 결의가 있거나 또는 의장이 필요하다고 인정한 때에는 의장이 휴회를 선포한다. Ⅱ-4-6 한국여성경제인협회 규정집"}, {"category": "규정", "regulation": "회의규정", "article_num": "제17조", "article_title": "의결권과 선거권", "content": "구성원 1인은 1개의 의결권과 선거권을 가진다. <개정 ’01. 9. 7.>"}, {"category": "규정", "regulation": "회의규정", "article_num": "제18조", "article_title": "위임 및 참관", "content": "① 회의에 대리참석은 인정되지 아니하며, 의장에게 의결 을 위임하는 경우 위임장을 서면으로 회의개최 전까지 제출하여야 한다. <개 정 ’03. 5. 13.> ② 회의에 참관하고자 하는 자는 회의 개최 사전에 의장의 동의를 얻어 회의 에 참석할 수 있다. 다만, 참관인은 의장의 승인을 받아 발언을 하되 의결권은 없다. <개정 ’03. 5. 13.>"}, {"category": "규정", "regulation": "회의규정", "article_num": "제19조", "article_title": "이해당사자의 의결권", "content": "회의의 의결사항 중에서 구성원 당사자와 관련된 사항에 대하여 의결을 행할 경우에 해당 구성원은 의결에 참가할 수 없다."}, {"category": "규정", "regulation": "회의규정", "article_num": "제20조", "article_title": "의안의 제출", "content": "총회와 이사회의 의안은 상근부회장이 취합하여 회장의 결재를 득한 후, 회의 개최 3일 전까지 회의구성원에게 통보하여야 한다. <개 정 ’01. 9. 7., ’21. 4. 29.>"}, {"category": "규정", "regulation": "회의규정", "article_num": "제21조", "article_title": "의안설명", "content": "부의된 의안은 상근부회장이 제안 설명을 하며 필요한 경우 의장은 발안자가 부가설명을 하게 할 수 있다. <개정 ’01. 9. 7., ’21. 4. 29.>"}, {"category": "규정", "regulation": "회의규정", "article_num": "제22조", "article_title": "추가의안", "content": "삭제 <’20. 11. 24.>"}, {"category": "규정", "regulation": "회의규정", "article_num": "제23조", "article_title": "발언", "content": "① 구성원이 의사도중에 발언하고자 할 때에는 거수하여 의장으 로부터 발언권을 얻어 자기의 소속과 성명을 밝힌 후 발언하여야 한다. ② 2인 이상이 동시에 발언을 청할 때에는 의장이 지명하는 바에 의한다. ③ 발언은 그 도중에 다른 구성원의 발언에 의하여 정지되지 아니하며 산회 또는 회의의 중지로 발언을 마치지 못한 때에는 다시 그 의사가 개시될 때 의 장이 그 발언을 계속하게 한다."}, {"category": "규정", "regulation": "회의규정", "article_num": "제24조", "article_title": "의제외발언의 금지", "content": "구성원은 의제 이외의 발언으로 회의진행에 지장을 초래하게 하여서는 안 된다. <개정 ’01. 9. 7.>"}, {"category": "규정", "regulation": "회의규정", "article_num": "제25조", "article_title": "동의", "content": "① 동의는 1인 이상의 찬성으로 성립한다. 회의규정 Ⅱ-4-7 ② 구성원은 의사진행에 지장을 초래하지 아니하는 한, 의사 도중에 언제든지 의장에게 긴급동의를 제출할 수 있다. ③ 제2항에 의해 긴급동의가 제출되었을 때에는 의장은 그 부의의 가부를 구 성원의 의견을 물어 결정하여야 한다. ④ 구성원은 자기가 발의한 동의를 동의찬성자의 찬성을 얻어 철회할 수 있다. ⑤ 번안동의는 의안을 발의한 자 3분의 2 이상의 동의로 발의하되, 재적구성 원 과반수 출석과 출석구성원 3분의 2 이상의 찬성을 얻어야 한다. <개정 ’05. 정 10. 25.>"}, {"category": "규정", "regulation": "회의규정", "article_num": "제26조", "article_title": "의결순위", "content": "동일의안에 대하여 동의, 개의, 재결의가 있을 때의 의결순위 는 재결의, 개의, 동의의 순으로 의결하여야 한다."}, {"category": "규정", "regulation": "회의규정", "article_num": "제27조", "article_title": "서면결의", "content": "의장은 총회, 이사회, 각 위원회 회의 부의사항의 내용이 긴 급을 요하거나 국가재난사태 등 긴급사항이 발생하는 경우에는 회의를 서면 으로 결의할 수 있다. <개정 ’03. 5. 13., ’05. 10. 25., ’21. 4. 29.>"}, {"category": "규정", "regulation": "회의규정", "article_num": "제28조", "article_title": "수정안의 의결", "content": "① 동일한 의제에 대하여 수개의 수정안이 제출되었을 때에는 의장은 최종 수정안부터 표결에 부쳐야 하며 표결 결과가 전부 부결 또는 미결될 때에는 원안을 표결한다. ② 수정안, 원안이 공히 미결될 때에는 재검토한 후 다시 표결에 부쳐야 하며 그 표결결과도 미결일 때에는 그 의안을 폐기한다."}, {"category": "규정", "regulation": "회의규정", "article_num": "제29조", "article_title": "표결방법", "content": "① 안건을 표결할 때에는 의장이 구성원으로 하여금 안건에 지 대한 이의 유무를 확인하고 이의가 없을 때에는 선포하고, 이의가 있을 때에 는 거수, 기립, 투표의 방법 중에서 의장이 구성원의 의견을 물어 결정한다. ② 의장은 의제에 대한 이의의 유무를 출석한 구성원에게 물어 이의가 없다고 인정될 때에 가결을 선포해야 한다."}, {"category": "규정", "regulation": "회의규정", "article_num": "제30조", "article_title": "의장의 질서유지", "content": "① 구성원이 회의 중 이 규정을 위배하거나 회의장의 질서를 소란케 할 때에는 의장은 이에 대하여 경고 혹은 제지하며 그 발언의 강 취소를 명할 수 있다. <개정 ’01. 9. 7.> ② 제1항의 명에 불복할 때에는 의장은 해당 회의에서 발언함을 금하거나 퇴 장시킬 수 있다. Ⅱ-4-8 한국여성경제인협회 규정집 ③ 의장은 회의장이 소란하여 질서를 유지하기 곤란하다고 인정할 때에는 회 의를 중지하거나 또는 산회를 선포할 수 있다. ④ 의장은 질서의 유지를 위해 필요한 때에 방청인수를 제한하거나 퇴장을 명 할 수 있다."}, {"category": "규정", "regulation": "회의규정", "article_num": "제31조", "article_title": "발언방해 및 모욕발언 등의 금지", "content": "구성원은 회의중 발언권 없이 발언하 거나 소란한 행위를 하여 타인의 발언을 방해할 수 없고, 또한 타인을 모욕하 거나 타인의 사생활에 대한 발언을 할 수 없다. 제5장 의사록"}, {"category": "규정", "regulation": "회의규정", "article_num": "제32조", "article_title": "작성", "content": "① 의장은 회의개회와 동시에 의사록에 서명날인 할 구성원 2인 이상을 지명하여야 한다. ② 의사록은 다음 각 호의 사항을 기재하고 의장 및 지명된 구성원이 서명날 인 하여야 한다. 1. 회의의 명칭 2. 개회일시 및 장소 3. 출석구성원의 수 및 내용(본인 및 위임여부) 4. 보고사항 5. 회의의 경과와 그 결과 6. 폐회시간 7. 기타 의장이 필요하다고 인정하는 사항"}, {"category": "규정", "regulation": "회의규정", "article_num": "제33조", "article_title": "보관", "content": "① 의사록 및 기타 부속서류는 협회 사무처에 보관하며, 회의에 부의한 안건의 원안은 문서주무부서에 보관하여야 한다. <개정 ’01. 9. 7.> ② 제1항에 의한 서류는 영구 보존하여야 한다. 부칙 <1999. 9. 16.> 이 규정은 이사회에서 의결한 날부터 시행한다. 회의규정 Ⅱ-4-9 부칙 <2001. 9. 7.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2003. 5. 13.> 이 규정은 이사회에서 의결한 날부터 시행한다. 다만, 제11조 제2항은 정관 제32 조 제2항의 개정(안)이 주무관청의 허가를 받은 날로부터 시행한다. 부칙 <2005. 10. 25.> 이 규정은 이사회에서 의결한 날부터 시행한다. 다만, 제12조 제15호는 정관 제3 3조 제15호의 개정(안)이 주무관청의 허가를 받은 날로부터 시행한다. 부칙 <2013. 12. 3.> 이 규정은 이사회에서 의결한 날부터 시행한다. 규 부칙 <2018. 3. 29.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2020. 11. 24.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2021. 4. 29.> 이 규정은 2021년 4월 29일부터 시행한다. 단, 제10조제1항·제6항의 개정규정은 「정관」 제11조, 제13조의2, 제14조제1항부터 제3항까지, 제31조제2항의 개정 (안)이 중소벤처기업부의 허가를 받은 날부터 시행한다. 부칙 <2026. 2. 23.> 이 규정은 이사회에서 의결한 날부터 시행한다. 선거관리규정 Ⅱ-5-1 선거관리규정 선거관리규정 Ⅱ-5-3 선거관리규정 법 제정 1999. 11. 5. 개정 2001. 9. 7. 개정 2003. 5. 13. 개정 2005. 12. 8. 개정 2009. 8. 11. 개정 2010. 4. 7. 개정 2013. 8. 29. 개정 2013. 12. 3. 개정 2014. 10. 7. 개정 2015. 6. 4. 개정 2016. 9. 21. 개정 2017. 7. 26. 개정 2018. 3. 29. 규 개정 2020. 5. 20. 개정 2020. 11. 24. 칙 개정 2021. 4. 29. 개정 2023. 10. 16. 개정 2024. 12. 16. 개정 2026. 2. 23. 제1장 총칙"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "목적", "content": "① 이 규정은 정관 제14조, 제19조 및 제38조에 따라 협회의 회장, 부 회장, 이사, 감사(이하 “임원”이라 한다.) 및 지회임원과 대의원의 선출이 회원 의 자유로운 의사와 민주적인 절차에 따라 공정히 행하여지도록 하여, 선거와 관련된 부정을 방지함으로써 협회의 발전에 기여함을 목적으로 한다. <개정 ’2 0. 5. 20.> ② 정관 제14조 1항 및 제38조 2항에 의거하여 이사회에서의 수석부회장 선출 령 을 위한 선거절차는 이 규정을 준용한다. <신설 ’17. 7. 26., 개정 ’20. 5. 20.> Ⅱ-5-4 한국여성경제인협회 규정집 ③ 정관 제14조 1항 및 제38조 2항에 의한 협회회장 및 지회회장의 추대 절차는 본 규정을 적용하지 아니하지만, 구체적 표결 절차는 선거관리규정 제13조제3항 및 제19조제3항을 적용한다. 다만, 추대가 부결되거나 수석부회장이 궐위 또는 추대받을 의사가 없는 경우에는 본 규정을 적용하여 회장을 선거를 통해 선출 한다. <신설 ’20. 5. 20., 개정 ’23. 10. 16.>"}, {"category": "규정", "regulation": "정관", "article_num": "제2조", "article_title": "정의", "content": "이 규정에서 사용하는 용어의 정의는 다음과 같다. 1. “선거인”이라 함은 선거권이 있는 정회원으로서 선거인명부에 등재된 자를 말한다. <개정 ’17. 7. 26.> 2. “후보자”라 함은 정회원 중에서 협회 및 지회의 임원으로 선출되기 위하여 선거관리위원회에 후보등록을 한 자 또는 추천을 받은 자를 말한다. <개정 ’1 7. 7. 26.>"}, {"category": "규정", "regulation": "정관", "article_num": "제3조", "article_title": "선거운동", "content": "① 협회의 각급 선거에 출마하는 후보자와 선거운동원은 정관과 규정이 정하는 바에 따라 자유롭게 선거운동을 하되, 공정하게 경쟁하여야 하 며 다음 각 호의 사항을 하여서는 아니된다. 1. 상대 후보에 대하여 근거 없는 비방, 인신공격, 모함, 흑색선전, 허위사실 유포 2. 공연한 사실을 적시하여 상대 후보의 사생활을 비방하거나 선량한 풍속에 반 하는 선거운동 3. 특정인을 임원으로 당선하게 할 목적으로 회원에게 금품․향응 제공 및 기타 재산상의 이익이나 공사의 직을 제공․청약 또는 약속하는 행위 ② 협회는 이사회에서 후보자 토론회 개최여부에 관한 결의를 하여 그에 따른 일시 및 방법 등을 정할 수 있다. <신설 ’17. 7. 26.>"}, {"category": "규정", "regulation": "정관", "article_num": "제4조", "article_title": "선거일", "content": "① 정관 제12조의 규정에 의한 임기만료 임원에 대한 선거는 임기 만료 60일전부터 임기만료일 이전에 실시하여야 한다. ② 제1항의 규정에 대한 선거일은 회장이 이사회의 의결을 거쳐 정한다. ③ 임기만료일까지 차기임원선출 선거가 실시되지 못한 경우 차기임원을 선출 하는 날까지 임기가 계속되는 것으로 본다. 다만, 지회회장의 임기종료 후 1개 월 내에 차기 지회회장을 선출하지 못한 경우에는 차기 지회회장 선출과 관계 없이 임기가 자동 종료되며, 차기 지회회장이 선출될 때까지 수석부회장이 해당 지회회장 업무를 수행한다. <개정 ’01. 9. 7., ’13. 12. 03., ’14. 10. 7., ’21. 4. 29.> ④ 재선거는 그 사유가 발생한 날 또는 그러한 사실을 발견한 날부터 30일 이내 선거관리규정 Ⅱ-5-5 에 실시하여야 한다. 제2장 선거관리위원회 령"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제5조", "article_title": "선관위 설치", "content": "① 협회의 선거사무를 공정하고 효율적으로 관리하기 위하여 선거관리위원회(이하 “선관위”라 한다.)를 둔다. ② 선관위의 활동기간은 선거일 30일전부터 선거후 10일까지로 한다. 다만 지회 선거관리위원회는 선거일 20일전 선거후 10일까지로 한다. <개정 ’01. 9. 7., ’0 5. 12. 8., ’15. 6. 4., ’20. 11. 24.> ③ 선관위는 이사회가 선관위 활동기간 내에 위촉하는 5인 이상 9인 이하의 위 원(이하 “선관위원”이라 한다.)으로 구성한다. 다만, 그 중 2인 이상 5인 이하는 회원이 아닌 자로서 경제, 여성문제 또는 법률에 관한 학식이나 경험이 풍부한 전문가를 위촉하고, 위원장과 부위원장은 위원 중에서 호선한다. <개정 ’01. 9. 7., ’05. 12. 8., ’17. 7. 26., ’18. 3. 29., ’20. 11. 24.> ④ 위원장은 선관위를 소집하고, 총회에서 임원을 선출하는 회의 진행시 임시의 장이 되며, 선거사무를 총괄한다. ⑤ 부위원장은 위원장을 보좌하고, 위원장 유고시 위원장의 직무를 대행한다. 칙 ⑥ 선관위는 재적위원 과반수의 출석과 출석위원 과반수의 찬성으로 의결하며, 의장은 표결권을 가지며 가부동수인 경우 결정권을 가진다. <개정 ’05. 12. 8.> ⑦ 선관위는 선거사무를 처리하기 위하여 상근 임직원을 선거사무담당자로 위 촉하며, 선거사무담당자는 선거기간 동안 위원장의 지시에 따라 선관위의 사무 를 처리한다. <개정 ’01. 9. 7., ’05. 12. 8., ’18. 3. 29.> ⑧ 선관위 활동기간 내에 선관위원이 사임, 변경될 경우 사임의 경우에는 당사 자, 변경의 경우에는 선관위원장이 그 사유가 발생한 날로부터 7일 내에 사유 침 를 선관위에 통보해야 한다. <개정 ’01. 9. 7., 전문개정 ’18. 3. 29.> ⑨ 외부위원에 대해서는 예산의 범위 내에서 수당 또는 실비를 지급할 수 있다. <신설 ’13. 12. 3.>"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제6조", "article_title": "선관위 기능", "content": "① 선관위는 다음 각 호의 업무를 수행한다. 1. 선거공고 2. 선거인명부 확정 및 공고 령 3. 후보자등록 접수 및 자격심사 Ⅱ-5-6 한국여성경제인협회 규정집 4. 선거인 및 입후보자 자격에 대한 이의신청 심사 5. 선거․투표․개표에 관한 사항 6. 선거관련 분쟁의 조정 7. 당선자 결정 및 공표 <개정 ’01. 9. 7.> 8. 기타 선관위에서 필요하다고 인정하는 사항 ② 위원회는 제1항 각호를 근거로 공정한 선거관리를 위해 별도로 필요한 세부 사항을 정할 수 있다. <신설 ’13. 12. 3.> ③ 위원회는 임원후보자가 자격이 없는 사실이 명백히 입증될 경우에는 위원회 의 의결로 당해 등록을 무효로 할 수 있다. 이 경우 당해 후보자에게 진술할 기 회를 주어야 한다. <신설 ’13. 12. 3., 개정 ’17. 7. 26.> ④ 위원회는 후보자가 제3항의 규정에 의한 위원회의 의결에 불복할 때에는 이 를 선거 실시 전 당해 총회에 보고한다. <신설 ’13. 12. 3.>"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제7조", "article_title": "선관위 의무", "content": "① 선관위와 선관위원․선거사무담당자는 선거사무를 집행함 에 있어 공정․중립을 지켜야 한다. <개정 ’01. 9. 7., ’18. 3. 29.> ② 선관위는 선거의 진행과 결과 등 주요 사항을 기재한 선거관리록을 작성하 여 선관위원의 날인을 받아 선거후 협회에 제출하여야 한다. ③ 선거에 관한 증빙문서는 선거절차 종료 후 선관위원장이 봉인하여 협회에 제출하여 보관토록 하여야 한다. ④ 투표용지는 선거 종료 후 사용분과 미사용분을 구분하여 위원장이 확인하고 봉인하여 협회에 보관하여야 한다."}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제8조", "article_title": "겸직금지", "content": "① 선관위원이 임원으로 출마하고자 하는 경우 후보등록일 전일 까지 선관위원직을 사임하여야 한다. ② 선관위원은 당해 선거에서 선출되는 임원을 추천할 수 없다."}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제9조", "article_title": "선거공고", "content": "① 선관위원장은 선관위의 의결을 거쳐 선거일 15일전에 다음 각 호의 사항이 포함된 선거공고를 하여야 한다. 다만, 감사를 선출할 경우에는 선거공고를 아니할 수 있다. <개정 ’03. 5. 13> 1. 선출을 해야할 임원의 수 2. 선거일 및 투표장소 3. 선거인의 자격 4. 피선거권자의 자격 선거관리규정 Ⅱ-5-7 5. 선거인명부 및 열람기간 6. 후보등록서류 7. 후보등록기간 및 접수장소 8. 선거운동기간 9. 기타 필요한 사항 ② 제1항에서 규정하는 선거와 관련된 각 기간은 다음 각호와 같다. 단, 기간은 일요일 및 법정공휴일을 포함하여 기산한다. <개정 ’03. 5. 13.> 정 1. 선거인명부열람기간 : 선거공고일부터 선거일 전일까지 2. 선거인명부 확정일 : 선거공고일 전일까지 자격을 갖춘 선거인으로 확정 <신 설 ’16. 9. 21.> 3. 후보등록기간 : 선거공고일부터 5일간 <개정 ’01. 9. 7.> 4. 선거운동기간 : 후보등록기간 종료일 다음날부터 선거일 전일까지 제3장 선거권과 피선거권"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제10조", "article_title": "선거권", "content": "선거권은 다음 각호의 요건을 갖춘 회원으로서 선거인명부에 등 재된 자가 갖는다. 칙 1. 정관 제6조제2항에 의한 회원으로서 선거공고일 6개월 이전에 회원으로 입회 한 자. 다만, 회원회비규정 제2조 제1항과 제3호의 경우에는 동일 기업에서 1 인에 한한다. <개정 ’01. 9. 7, ’03. 5. 13., ’21. 4. 29.> 2. 선거공고일전까지 정관 제9조 제3호에 의한 회비납부의무를 다한 자. <개정 ’17. 7. 26.>"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제11조", "article_title": "피선거권", "content": "① 협회의 임원 및 지회의 임원․대의원의 피선거권은 다음 각 호의 침 요건을 갖춘 회원이 갖는다. 단, 제15조 제3항에 의하여 선출되는 임원은 다음 각 호의 요건을 적용하지 아니한다. <개정 ’26. 2. 23.> 1. 정관 제6조제2항에 의한 회원으로서 사업경력이 5년 이상이며, 선거공고일 2 4월 이전에 회원으로 입회한 자. <개정 ’13. 12. 3., ’16. 9. 21., ’17. 7. 26., ’20. 11. 24.> 2. 선거공고일전까지 정관 제9조제3호에 의한 회비납부를 다한 자. <개정 ’09. 8. 11.> 령 3. 정관 제13조의 임원자격기준에 적합하며, 자격정지 이상의 징계를 받고 윤리 Ⅱ-5-8 한국여성경제인협회 규정집 규정 제13조제8항의 기간이 경과한 자 <개정 ’01. 9. 7.> 4. 후보등록일 현재 당해 회원이 금융채무불이행자가 아니며, 회원이 소유하거나 경영하는 기업이 금융기관으로부터 대출금에 대한 기한이익상실 통지를 받거나 기타 채무불이행 상태에 있지 아니할 것 <개정 ’23.10.16.> 5. 선거공고일 현재 당해 회원이 소유하거나 경영하는 기업의 법인등기부등본, 사업자등록증명원, 국세 및 지방세를 완납한 사실을 갖출 수 있는 자 <개정 ’01. 9. 7., ’09. 8. 11., ’17. 7. 26.> 6. 협회 및 지회에서 선거공고일전 최근 2년간 개최한 총회, 이사회, 월례회, 경영연수의 출석률(출석률의 계산에 있어 위임장에 의하여 의결권을 행사한 경우에는 이를 출석한 것으로 보지 아니하며, 참석 인원수에 제한을 두는 행사의 경우 출석률 적용대상에서 제외한다.)이 각각 1/3이상인 자. 다만, 협회회장 및 수석부회장은 적용하지 아니한다. <신설 ’01. 9. 7., 개정 ’03. 5. 13., ’05. 12. 8., ’10. 4. 7., ’13. 12. 3., ’16. 9. 21., ’17. 7. 26., ’17. 8. 11., ’24.12.16.> 7. 역대 협회회장 및 지회회장을 역임하지 않은 자, 다만, 지회회장을 역임한 자는 협회회장 및 수석부회장의 피선거권을 갖는다. <신설 ’05. 12. 8., 개정 ’17. 7. 26.> 8. 협회의 명예를 훼손하거나 협회에 재산상 손해를 끼치는 등의 위법한 행위로 인하여 유죄의 확정판결을 받지 않은 자 <신설 ’05. 12. 8> 9. 협회 수석부회장과 회장은 지회장 경력 3년 이상을 갖춘 자 <신설 ’20. 11. 24., 개정 ’24. 12. 16., ’26. 2. 23.> 10. 지회 수석부회장과 회장은 지회임원 경력 3년 이상을 갖춘 자 중, 현 본회 임원이거나 본회 임원을 역임한 자 <신설 ’26. 2. 23.> 11. 협회회장 및 협회수석부회장, 지회회장 및 지회수석부회장 후보자의 경우, 「소상공인기본법」에 따른 소상공인에 해당하지 아니하는 자 <신설 ’26. 2. 23.> ② 다만, 다음 각 목의 경우에는 지회이사회 결의 및 협회 승인 후 임원 및 대의원의 피선거권 자격을 완화할 수 있다. <개정 ’13. 12. 3., ’16. 9. 21., ’17. 7. 26.> 가. 지회가 신설된 지 5년 이하인 지회 <개정’13. 12. 3> 나. 피선거권을 가진자가 선출예정인원수 보다 적거나 동수인 경우 <개정 ’1 3. 12. 3.> 다. 후보등록기간 마감일까지 임원 또는 대의원 후보자로 등록한 자가 선출 예정 인원에 미달하는 경우 <개정 ’01. 9. 7., ’03. 5. 13., ’05. 12. 8., ’13. 12. 3., ’17. 7. 26.> 라. 기타. <신설 ’13. 12. 3.> 선거관리규정 Ⅱ-5-9 제4장 협회 임원 선출"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제12조", "article_title": "추천과 신청", "content": "① 회장 및 수석부회장으로 출마하고자 하는 자는 후보등록 서류를 구비하여 지회 수 3분의 2이상에 해당하는 지회의 각 지회별 회원 2인 이상의 추천을 받아 선관위에 후보등록을 하여야 한다. 단, 지회의 추천인은 동 일인이 1인 이상의 후보를 추천할 수 없다. <개정 ’01. 9. 7., ’17. 7. 26.> ② 협회회장 및 수석부회장 후보자는 1억원, 지회회장 및 지회수석부회장 후보 자는 1천5백만원을 후보 등록 시 각각 협회 및 지회의 지정된 선거계좌에 기 탁금으로 예치하여야 한다. 기탁금은 당해 후보자가 당선되면 임원 회비로 대체하고, 낙선한 경우 득표율이 10.00% 이상이면 기탁금의 70%를 선거종료 일로부터 10일 이내 반환하고, 득표율이 10.00% 미만이거나 또한 정관 제14 조1항에 의해 협회 이사회에서 선출된 수석부회장이 회장으로 추대되기 전 까지 사퇴하는 경우 기탁금을 일체 반환하지 아니한다. 다만, 수석부회장이 회장으로 추대되기 전 사망 또는 이민 등의 사유가 발생할 경우 납입한 기탁금의 규 100% 전액 반환하고 수석부회장이 회장으로 추대받지 못할 경우 납입한 기탁금의 70%를 반환한다. <신설 ’13. 12. 3., 개정 ’17. 7. 26., ’18. 3. 29, ’23.10.16., ’24.12.16.> ③ 감사는 대의원의 추천으로 총회에서 선출한다. <개정 ’01. 9. 7., ’13. 12. 3.>"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제13조", "article_title": "회장선출", "content": "① 회장 및 수석부회장은 무기명비밀투표로 선출한다. 다만, 단독 출마시에는 참석 이사 과반수의 찬성을 얻은자로 한다. <개정 ’17. 7. 26.> ② 위 1항 임원은 참석 이사 과반수의 찬성을 얻은 자를 당선자로 하며, (단, 지 지 회회장의 경우 당선자가 대의원이 됨) 1차 투표에서 당선자가 없으면 최다득표 를 한 상위 2인에 대한 2차 투표를 실시하여 다득표자를 당선자로 한다. 단, 단 침 수후보의 경우 참석이사 과반수의 찬성을 얻지 못하면 이사회의 의결을 거쳐 재선거(선출) 또는 동일 후보에 대한 재투표 여부를 정해야 한다. <개정 ’01. 9. 7., ’09. 8. 11., ’17. 7. 26., ’18. 3. 29.> ③ 협회회장 임기 3년차에 정기총회에서 수석부회장을 무기명비밀투표를 통해 승인하고, 각 지회 신임대의원이 선출되면 임시총회를 개최하여 무기명비밀투 표를 통해 수석부회장을 차기회장으로 추대한다. 단, 수석부회장 승인이 부결 되거나 차기 협회회장 추대가 부결될 경우 협회이사회에서 재추천 여부 또는 선거개최를 논의토록 한다. <신설 ’23. 10. 16.> Ⅱ-5-10 한국여성경제인협회 규정집"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제14조", "article_title": "부회장선출", "content": "① 삭제 <’18. 3. 29.> ② 부회장의 정수는 이사회에서 정한다. <개정 ’01. 9. 7.> ③ 삭제 <’17. 7. 26.>"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제15조", "article_title": "이사선출", "content": "① 지회회장은 당연직 부회장이 되며 당연직 이사를 제외한 본회 이사는 지회총회에서 추천한 자를 총회에서 선출․승인한다. <개정 ’01. 9. 7., ’26. 2. 23.> ② 전제 1항의 본회이사의 정수는 다음의 각 호와 같다. <개정 ’01. 9. 7.> 1. 지회에 소속하는 정회원 50명 기준으로 당연직 부회장 1인과 본회 추천이사 1인으로 한다. <개정 ’26. 2. 23.> 2. 지회 정회원이 50인 이상인 경우에는 정회원 60인이 추가될 때마다 본회 추 천이사 1인을 더 둘 수 있다. 3. 제3항의 규정에 의한 이사 ③ 1항의 규정 외에 협회의 발전과 산업과 직능간의 균형을 유지하기 위하여 특별부회장의 선출이 필요하다고 인정되는 경우에는 이사회에서 사전에 정수를 정하여 회장의 추천으로 총회에서 선출․승인한다. <개정 ’01. 9. 7., ’26. 2. 23.> ④ 삭제 <’01. 9. 7.> 제5장 지회임원 및 대의원의 선출"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제16조", "article_title": "지회선거관리위원회", "content": "① 지회의 선거사무를 공정하고 효율적으로 관리하 기 위하여 지회선거관리위원회(이하 “지회선관위”라 한다.)를 둔다. ② 지회선관위는 위원장을 포함하여 지회선거관리위원(이하 “지회선관위원”이 라 한다.) 5인 이상으로 구성한다. ③ 지회선관위의 운영과 기능, 의무 등에 관하여는 제5조 내지 제8조의 규정을 준용한다."}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제17조", "article_title": "지회선거", "content": "① 지회임원 및 대의원의 선거일, 선거공고, 선거권과 피선거 권 등은 제9조 내지 제11조의 규정을 준용한다. <개정 ’01. 9. 7.> ② 지회임원선거의 투표와 당선 등 여타 사항은 제21조 내지 제25조의 규정을 준용한다. 선거관리규정 Ⅱ-5-11"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제18조", "article_title": "지회임원 후보추천", "content": "① 지회회장 및 지회수석부회장으로 출마하고자 하 는 자는 후보등록서류를 구비하여 해당 지회 회원 5인 이상의 추천을 받아 지 회선관위에 후보등록을 하여야 한다. 단, 추천인은 동일인이 2인 이상의 후보 를 추천할 수 없다. <개정 ’01. 9. 7., ’17. 7. 26.> ② 지회감사는 해당지회 회원의 추천으로 지회총회에서 선출한다. <개정 ’01. 9. 7.> 규 ③ 삭제 <’01. 9. 7.>"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제19조", "article_title": "지회임원", "content": "① 지회의 임원은 지회창립총회 또는 지회총회에서 회원이 무 기명비밀투표로 선출한다. <개정 ’23. 10. 16.> ② 지회수석부회장은 지회 이사회에서 무기명 비밀투표로 선출하며, 과반수 출석과 출석이사 과반수의 찬성을 얻은 자를 당선자로 하며, 제1차 투표에서 당선자가 없는 경우에는 다득표순에 따라 상위 2인에 대한 2차 투표를 실시 하여 최다 득표자를 당선자로 한다. 다만, 단독 출마 시에는 출석이사 과반수의 찬성을 얻은자로 한다. <개정 ’01. 9. 7., ’17. 7. 26., ’23. 10. 16.> ③ 지회회장 임기 3년차에 지회 신임대의원 선출을 위한 지회 임시총회에서 무기 명비밀투표를 통해 지회 수석부회장 승인 및 차기 지회회장으로 추대한다. 단, 지회 수석부회장 승인 및 차기 지회회장 추대가 부결될 경우 지회이사회에서 칙 재추천 여부 또는 선거개최를 논의토록 한다. <개정 ’01. 9. 7., ’20. 5. 20., ’23. 10. 16.> ④ 지회이사는 지회총회에서 선출한 대의원 중에서 다득표자 순으로 정하여 지 회총회에서 선출․승인한다. <개정 ’01. 9. 7> ⑤ 지회에서 본회에 추천하는 이사는 제15조제2항에 따라 지회임원중에서 지회 이사회의 추천으로 지회총회에서 승인을 받아 추천한다. <개정 ’01. 9. 7., ’17. 7. 26.> 침 ⑥ 삭제 <’26. 2. 23.> ⑦ 임원을 선출하는 총회 개최 후 임원의 임기 시작 전에 개최되는 이사회에 한 하여 전 각 항의 이사회는 “당선자회의”로 하고 이사는 “당선자”로 하며, 당선 자회의의 의장은 “회장당선자”로 한다. <신설 ’16. 9. 21.>"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제20조", "article_title": "대의원", "content": "① 대의원은 지회창립총회 또는 지회총회에서 회원 중에서 선출한다. ② 대의원은 해당지회 정회원 50명 기준으로 5인당 1인을 선출하며, 정회원이 령 50인을 초과하는 경우 정회원 10명이 추가될 때마다 정회원 10인당 1인을 선출 Ⅱ-5-12 한국여성경제인협회 규정집 한다. <개정 ’01. 9. 7., ’26. 2. 23.> ③ 대의원의 정수가 정관 제19조제2항에서 정한 기준에 미달하는 경우에는 이 사회에서 지회별 회원비율에 따라 선출할 대의원수를 정한다. <개정 ’01. 9. 7.> ④ 협회회장과 지회회장은 당연직 대의원이 된다. <개정 ’01. 9. 7., ’26. 2. 23.> 제6장 투표와 당선"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제21조", "article_title": "투표장소", "content": "① 투표용지는 선관위원장이 정하여 선거 당일 투표소에서 교 부한다. ② 선관위는 투표소를 선거 전까지 투표장에 설치하여야 한다. <개정 ’01. 9. 7.> ③ 선관위는 투표소에 기표소, 투표함, 선관위원석, 참관인석 등 투표관리에 필 요한 시설을 설치하여야 한다. ④ 기표소는 그 안을 타인이 엿볼 수 없도록 설비하여야 한다."}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제22조", "article_title": "당선자", "content": "① 선관위원장은 투표가 끝난 후 개표를 실시하고 당선자를 확정 하여 이를 즉시 공표하여야 한다. ② 투표결과 최다득표자가 2인 이상이 되어 그 중 1인 또는 복수인을 당선자로 정하여야 하는 경우에는 회장과 지회회장 선거를 제외하고는 협회 가입순으로 당선자를 정한다. <개정 ’01. 9. 7., ’23. 10. 16.> 제22조의 2(참관인) ① 참관인은 선관위에서 정수를 정하고 후보자는 회원 중에 서 참관인을 선정하여 선거 7일 전까지 선거관리위원회에 서면으로 신고하여 야 한다. 단, 참관인은 후보자 추천인과 동일인이 아니어야 한다. <개정 ’17. 7. 26., ’18. 3. 29., ’21. 4. 29.> ② 선거관리위원회는 참관인으로 하여금 투표용지의 교부상황, 투표상황, 투표 함의 관리상황, 개표상황을 참관하게 하여야 한다. ③ 참관인은 투표에 간섭하거나 투표를 권유하거나 기타 선거에 영향을 미치는 행위를 하여서는 아니된다. ④ 선거관리위원회는 참관인이 부정투표나 부정개표 기타 이 규정에 위반되는 사실을 발견하고 그 시정을 요구하는 경우 그 요구가 정당하다고 인정되는 때 에는 이를 시정하여야 한다. ⑤ 참관인은 선관위의 회의 개최에 앞서 위원장의 동의를 얻은 경우에 한하여 선거관리규정 Ⅱ-5-13 회의에 참석할 수 있다. <전문신설 ’05. 12. 8.>"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제23조", "article_title": "당선무효", "content": "당선자가 다음 각호의 1에 해당하는 사유가 발생한 경우 그 당 선을 무효로 한다. 1. 정관이나 이 규정에 의하여 피선거권이 없는 자로 확인된 경우 2. 당선인이 정관이나 규정에 위반하여 당선된 것으로 확인된 경우 <개정 ’01. 9. 7.> 3. 삭제 <’01. 9. 7> 정 제7장 보칙"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제24조", "article_title": "재선거", "content": "당선자의 임기개시 후 다음 각 호에 해당하는 사유가 발생한 경 우에는 재선거를 실시한다. 1. 선거의 전부 또는 일부 무효 결정이나 판결이 있는 경우 2. 당선자가 임기개시 전 사망하거나 사퇴하는 경우 3. 당선인이 정관이나 규정에서 정한 당선무효에 해당하거나 법원의 결정에 의 하여 당선무효로 된 경우 <개정 ’01. 9. 7>"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제25조", "article_title": "선거연기", "content": "① 다음 각호에 해당하는 경우 당해 선거를 연기할 수 있다. 1. 천재지변 기타 부득이 한 사유로 선거를 실시할 수 없거나 실시하지 못한 경우 2. 후보등록기간 마감일까지 후보자로 등록한 자가 없거나 후보등록을 한 자가 선출하여야 할 수의 3분의 2에 미달하는 경우 <개정 ’01. 9. 7.> ② 1항 제1호와 제2호의 경우는 해당되는 절차부터 다시 진행할 수 있다. <개 정 ’01. 9. 7.> 지"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제26조", "article_title": "후보미달", "content": "삭제 <’01. 9. 7.>"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제27조", "article_title": "보칙", "content": "이 규정에서 정하지 아니한 사항은 이사회에서 정한 바에 따른다. 부칙 <1999. 11. 5.>"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "시행일", "content": "이 규정은 주무관청의 협회설립허가 후 정관 부칙 제2조의 규정에 의한 한국여성경제인협회 설립준비위원회(이하 \"설립준비위원회“라 한다.)에서 의결한 날부터 시행한다. Ⅱ-5-14 한국여성경제인협회 규정집"}, {"category": "규정", "regulation": "정관", "article_num": "제2조", "article_title": "이사회의 승인", "content": "이 규정은 협회 설립허가 후 최초로 개최되는 이사회에서 사후승인을 받아야 하며, 동 이사회에서 승인을 받은 경우 정관에 따라 제정한 규정으로 본다."}, {"category": "규정", "regulation": "정관", "article_num": "제3조", "article_title": "최초선거", "content": "협회 설립허가 후 최초로 구성하는 선거관리위원회와 임원선거 권 및 피선거권은 다음 각 호와 같이 한다. 1. 선관위원은 설립준비위원장이 설립준비위원회의 동의를 받아 가회원 중에서 위촉한다. 2. 최초임원선거권은 지회창립총회에서 대의원으로 선출된 자 중 선거인명부에 등재된 자에 한하여 인정하며, 피선거권은 최초 임원선거공고일 전일까지 입 회한 가회원에 한하여 인정한다."}, {"category": "규정", "regulation": "정관", "article_num": "제4조", "article_title": "이사회 대행", "content": "정관과 이 규정의 시행 후 이사회가 구성되기 전까지는 선거 관리에 관하여 이사회가 행하여야 하는 기능과 역할은 설립준비위원회에서 행한 다. 부칙 <2001. 9. 7.> 이 규정은 이사회에서 의결한 날부터 시행한다. 다만, 제10조 제1호는 2002년 2월 1일부터 시행한다. 부칙 <2003. 5. 13.> 이 규정은 이사회에서 의결한 날부터 시행한다. 다만, 제10조 제1호는 2003년 12 월 31일 이전에 실시하는 선거의 경우 “6월”을 “5월”로 한다. 부칙 <2005. 12. 8.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2009. 8. 11.> 이 규정은 이사회에서 의결한 날부터 시행한다. 선거관리규정 Ⅱ-5-15 부칙 <2010. 4. 7.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2013. 8. 29.> 이 규정은 이사회에서 의결한 날부터 시행한다. 정 부칙 <2013. 12. 3.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2014. 10. 7.> 이 규정은 이사회에서 의결한 날부터 시행한다. 다만, 11조 1항 1호의 ’본회 또는 지회임원으로 5년 이상을 역임한 경력이 있는 자로 한다’는 2016년 1월 1일부터 규 시행하고 2015년 12월 31일까지는 종전의 규정대로 ’5년 이상’을 ’3년 이상’ 으로 시행한다. 부칙 <2015. 6. 4.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2016. 9. 21.> 지 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2017. 7. 26.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2018. 3. 29.> 이 규정은 이사회에서 의결한 날부터 시행한다. Ⅱ-5-16 한국여성경제인협회 규정집 부칙 <2020. 5. 20.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2020. 11. 24.> 이 규정은 이사회에서 의결한 날부터 시행한다. 다만, 11조 1항 9호는 2022년 이후 선출되는 협회 및 지회 수석부회장과 회장부터 적용한다. 부칙 <2021. 4. 29.>"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제1조", "article_title": "시행일", "content": "이 규정은 2021년 4월 29일부터 시행한다. 단, 제1조제2항·제3항, 제11조제1항, 제13조제1항, 제14조제2항, 제18조제1항, 제19조제2항의 개정규정은 「정관」 제11조제3호, 제13조의2, 제14조제1항부터 제3항까지, 제38조제2항부터 제4항까지 및 제9항 개정(안)이 중소벤처기업부의 허가를 받은 날부터 시행한다."}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제2조", "article_title": "현 임기 협회 및 지회 수석부회장에 대한 특례", "content": "이 규정 시행 당시 협회 및 지회 수석부회장은 구 선거관리규정 제13조제1항 및 제19조제2항에 따라 선출하 는 것으로 한다. 부칙 <2023. 10. 16.>"}, {"category": "규정", "regulation": "선거관리규정", "article_num": "제1조", "article_title": "시행일", "content": "이 규정은 2023년 10월 16일부터 시행한다. 단, 제1조제3항, 제11조 제1항제4호, 제12조제2항, 제13조제3항, 제19조제1항·제2항·제3항, 제22조는 20 24년 1월 1일부로 시행한다. 부칙 <2024. 12. 16.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2026. 2. 23.> 이 규정은 이사회에서 의결한 날부터 시행한다. 선거관리규정 Ⅱ-5-17 대의원규정 Ⅱ-6-1 대의원규정 대의원규정 Ⅱ-6-3 대의원규정 법 제정 2001. 9. 7. 개정 2003. 5. 13. 규 개정 2017. 7. 26. 개정 2021. 4. 29. 정 개정 2024. 12. 16. 개정 2026. 2. 23."}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "목적", "content": "이 규정은 정관 제19조 규정에 의하여 대의원 선출비율과 방법 등 에 관하여 필요한 사항을 규정함을 목적으로 한다."}, {"category": "규정", "regulation": "정관", "article_num": "제2조", "article_title": "구성", "content": "① 대의원은 지회창립총회 또는 지회총회에서 회원중에서 선출한다. ② 협회회장과 지회회장은 당연직 대의원이 된다. <개정 ’21. 4. 29.>"}, {"category": "규정", "regulation": "정관", "article_num": "제3조", "article_title": "추천과 신청", "content": "대의원으로 출마하고자 하는 자는 후보 등록서류를 구비하 여 해당지회 회원의 추천을 받아 해당 지회 선관위에 후보 등록을 하여야 한 칙 다. 단, 추천인은 동일인이 2인 이상의 후보를 추천 할 수 없다."}, {"category": "규정", "regulation": "정관", "article_num": "제4조", "article_title": "선출비율", "content": "대의원은 해당지회 정회원 50명 기준으로 5인당 1인을 선출하며, 정회원이 50인을 초과하는 경우 정회원 10명이 추가될 때마다 정회원 10인당 1인을 선출한다. <개정 ’26. 2. 23.>"}, {"category": "규정", "regulation": "정관", "article_num": "제5조", "article_title": "선출방법", "content": "① 당연직 대의원을 제외한 대의원은 대의원 후보자로 등록한 침 자 중에서 총회에서 무기명 비밀투표로 선출한다. ② 당선자는 투표결과 다득표자 순으로 정한다. 단, 득표수가 같은 경우 협회 가입순으로 정한다.<개정 ’24.12.16.>"}, {"category": "규정", "regulation": "정관", "article_num": "제6조", "article_title": "임기", "content": "① 대의원의 임기는 정관 제19조 3항 및 정관 제12조 6항 규정에 의해 협회 및 지회임원의 임기와 같다. <개정 ’03. 5. 13., ’17. 7. 26.> ② 임기종료 전에 선출된 차기 대의원은 정관 제14조 1항의 차기 협회회장을 추대하는 임시총회의 구성원이 된다. <개정 ’03. 5. 13., ’17. 7. 26.> Ⅱ-6-4 한국여성경제인협회 규정집 ③ 임기가 종료되었으나 차기 대의원 선출회의가 소집되지 않은 경우에 차기 대의원을 선임하는 날에 그 임기가 종료한다. ④ 전임자의 퇴임으로 인하여 선출되는 대의원의 임기는 전임자의 잔여 임기로 한다. ⑤ 대의원의 결원이 발생한 때에는 그 사유가 발생한 날부터 2월이내에 지회 이사회의 추천으로 지회총회의 선출․승인을 받는다. 단, 잔여임기가 6개월 미 만인 경우에는 후임 대의원을 선출하지 아니할 수 있다. <개정 ’17. 7. 26.>"}, {"category": "규정", "regulation": "정관", "article_num": "제7조", "article_title": "직무", "content": "대의원은 총회에 출석하여 정관 제28조의 의결사항을 의결한다."}, {"category": "규정", "regulation": "정관", "article_num": "제8조", "article_title": "보칙", "content": "이 규정에서 정하지 아니한 사항은 이사회에서 정한 바에 따른다. 부칙 <2001. 9. 7.> 이 규정은 이사회에서 의결한 날로부터 시행한다. 부칙 <2003. 5. 13.> 이 규정은 이사회에서 의결한 날로부터 시행한다. 다만, 제6조 제1항은 정관 제1 9조 제3항의 개정(안)이 주무관청의 허가를 받은 날로부터 시행한다. 부칙 <2017. 7. 26.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2021. 4. 29..> 이 규정은 2021년 4월 29일부터 시행한다. 부칙 <2024. 12. 16.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2026. 2. 23.> 이 규정은 이사회에서 의결한 날부터 시행한다. 위원회규정 Ⅱ-7-1 위원회규정 위원회규정 Ⅱ-7-3 위원회규정 법 제정 2001. 9. 7. 개정 2003. 5. 13. 규 개정 2005.10. 25. 개정 2013.12. 3. 개정 2016. 5. 12. 개정 2021. 4. 29."}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "목적", "content": "이 규정은 한국여성경제인협회(이하 “협회”라 한다.) 정관 제35조 의 규정에 의하여 협회 및 지회에 설치하는 각종 위원회(이하 “위원회”라 한 다.)의 설치와 운영에 필요한 제반사항을 규정함으로써 원활한 위원회 활동 을 도모하여 협회 발전에 기여함을 목적으로 한다."}, {"category": "규정", "regulation": "정관", "article_num": "제2조", "article_title": "설치", "content": "① 이 규정에 해당하는 모든 위원회는 회장이 이사회의 의결을 거 쳐 이를 설치하고 폐지한다. ② 위원회의 기능을 효율적으로 수행하기 위하여 필요한 경우 위원회의 산하 에 분과위원회(이하 “분과위원회”라 한다.)를 설치할 수 있다. ③ 특별위원회는 필요한 경우 설치하고 그 역할과 기능이 종료하면 폐지한다."}, {"category": "규정", "regulation": "정관", "article_num": "제3조", "article_title": "기능", "content": "① 협회는 업종별 분과위원회로 구성하는 전문위원회 등을 설치할 수 있으며 이사회의 의결로 이를 변경할 수 있다. <개정 ’13. 12. 3.> ② 위원회의 기능은 다음 각호와 같다. 지 1. 삭제 <’13. 12. 3.> 2. 분과위원회는 특정한 업종에 대한 정책이나 건의 및 애로사항을 연구․토의 하거나 정보를 수집․교류하고 대외협력을 추진하며 정책수립을 건의한다. <개정 ’13. 12. 3> 3. 특별위원회는 특정한 사안이나 현안사항을 조사․연구하고 실태 등을 파악한다. 4. 원로위원회는 정관 제21조에 의하여 회장이 이사회의 동의를 얻어 원로회 를 구성할 수 있으며, 그 절차와 요건 등 필요한 사항은 별도의 규정으로 강 정한다. 5. 정관 및 규정축조심의위원회는 규정관리규정 제18조에 따라 입안된 정관· 령 규정의 제정 또는 개폐에 대하여 심의한다. <신설 ’13. 12. 3., 개정 ’21.4.29.> Ⅱ-7-4 한국여성경제인협회 규정집"}, {"category": "규정", "regulation": "정관", "article_num": "제4조", "article_title": "분과위원회", "content": "제3조 각호의 위원회 산하에 다음 각 호의 기능을 수행하는 분과위원회를 둘 수 있다. ① 삭제 <'12. 12. 3.> 1. 삭제 <'12. 12. 3.> 2. 삭제 <'12. 12. 3.> 3. 삭제 <'12. 12. 3.> 4. 삭제 <'03. 5. 13.> 5. 삭제 <'03. 5. 13.> ② 전문위원회 : 해당 업종 내 정보교환, 애로 및 건의사항 수렴, 다른 업종과 의 교류를 목적으로 한다. 1. 제조업 분과위원회 2. 국제통상분과위원회 <개정 ’13. 12. 3.> 3. 벤처기업분과위원회 4. 지식산업분과위원회 5. 서비스업분과위원회 6. 기술디자인분과위원회 <개정 ’13. 12. 3.> 7. 이업종전문 분과위원회 8. 건설분과위원회 9. 환경분과위원회 10. 금융․세제분과위원회 <개정 ’13. 12. 3.> 11. 기타 이사회에서 필요로 하다고 인정하는 위원회 [전문개정 '03. 5. 13., 개정 ’13. 12. 3.]"}, {"category": "규정", "regulation": "정관", "article_num": "제5조", "article_title": "임원", "content": "① 위원회에는 위원장 1인과 부위원장 1인 및 특정한 임무를 담당 하는 위원으로 구성한다. ② 위원 및 위원장은 회장이 위촉하며, 위원장은 필요시 위원 중에서 호선할 수 있다. <개정 ’05. 10. 25., ’13. 12. 3.> ③ 부위원장과 간사는 위원장이 지명한 후 회장이 위촉한다. <신설 ’13. 12. 3.> 제5조의 2(직무) ① 위원장은 위원회의 의장이 된다. <신설 ’13. 12. 3.> ② 부위원장은 위원장을 보좌하며, 위원장이 부득이한 사유로 직무를 수행할 수 없으면 위원장의 직무를 대행한다. ③ 위원장과 부위원장이 부득이한 사유로 직무를 수행할 수 없으면 출석위원 위원회규정 Ⅱ-7-5 의 호선에 따라 임시위원장을 선출하여 의장 직무를 대행 하게 한다. ④ 간사는 위원회의 제반 사무를 관장하며, 회의 자료와 회의록의 작성 및 회 의진행을 위한 제반 서무를 지원한다. 제5조의 3(위원회의 소집) 회장 또는 위원장은 다음 각 호에 의거 위원회를 소 집 할 수 있다. <신설 ’13. 12. 3.> 1. 회장 또는 위원장이 필요하다고 인정할 때 정 2. 소속위원 3분의 1이상의 요구가 있을 때 3. 이사회가 필요하다고 인정할 때 4. 협회가 자문을 요청할 때"}, {"category": "규정", "regulation": "위원회규정", "article_num": "제6조", "article_title": "임기", "content": "임기는 임명일부터 1년(연임가능)으로 하며, 임기 중 사직하거나 궐위된 경우 후임자는 잔여임기를 수행한다. <개정 ’05. 10. 25., ’16. 5. 12.>"}, {"category": "규정", "regulation": "위원회규정", "article_num": "제7조", "article_title": "회원", "content": "① 위원회는 분과위원회를 회원으로 한다. ② 분과위원회는 회원으로 구성한다. 규 ③ 삭제 <’13. 12. 3.>"}, {"category": "규정", "regulation": "위원회규정", "article_num": "제8조", "article_title": "운영", "content": "① 위원회와 분과위원회의 회의와 모임은 필요에 따라 수시로 개최 할 수 있다. ② 위원회와 분과위원회는 위원회 목적의 범위 내에서 다양한 활동을 할 수 있다. ③ 위원회와 분과위원회 위원장은 필요한 경우 자문위원을 위촉하여 활용할 지 수 있다. ④ 분과위원회는 원활하고 활발한 활동을 위하여 회원의 의사에 따라 필요한 경비를 받아 충당할 수 있다. ⑤ 회장은 위원회와 분과위원회의 활동을 지원하기 위하여 필요하다고 인정 되는 경우에는 이사회의 의결을 거쳐 예산을 지원할 수 있다."}, {"category": "규정", "regulation": "위원회규정", "article_num": "제9조", "article_title": "활동정지", "content": "① 위원회나 분과위원회의 활동이 설립 목적을 위배하여 협회 강 의 활동에 지장을 주거나 협회의 명예 및 회원의 품위를 훼손한 경우에는 회 장은 이사회의 의결을 거쳐 해당 위원회나 분과위원회의 활동을 정지시킬 수 있으며, 이 경우 당해 위원을 해임할 수 있다. Ⅱ-7-6 한국여성경제인협회 규정집 ② 분과위원회의 정상적인 활동이 어려운 경우 회원의 의사에 따라 활동을 정 지할 수 있으며, 이 경우 분과위원장은 회장에게 보고하여야한다."}, {"category": "규정", "regulation": "위원회규정", "article_num": "제10조", "article_title": "건의", "content": "① 위원회와 분과위원회는 협회와 정부에 건의를 할 수 있다. ② 협회는 제1항의 건의에 대하여 검토하고 그 결과를 해당위원회에 회신하 여야 한다."}, {"category": "규정", "regulation": "위원회규정", "article_num": "제11조", "article_title": "지회위원회", "content": "① 지회는 이 규정을 준용하여 필요한 지회위원회나 지회 분과위원회를 설치․운영할 수 있다. ② 제1항의 지회분과위원회를 설치․운영할 경우 협회에 통보하여야 한다."}, {"category": "규정", "regulation": "위원회규정", "article_num": "제12조", "article_title": "보칙", "content": "이 규정에서 정하지 아니한 사항은 이사회가 정한 바에 따른다. 부칙 <2001. 9. 7.>"}, {"category": "규정", "regulation": "위원회규정", "article_num": "제1조", "article_title": "시행일", "content": "이 규정은 이사회에서 의결한 날부터 시행한다."}, {"category": "규정", "regulation": "위원회규정", "article_num": "제2조", "article_title": "최초위원의 임기", "content": "최초 임명되는 위원의 임기는 2003년 말월까지로 한다."}, {"category": "규정", "regulation": "위원회규정", "article_num": "제3조", "article_title": "경과조치", "content": "① 이 규정이 제정되기전 설치된 위원회와 분과위원회는 이 규 정에 해당하거나 이 규정이 정한 요건을 갖춘 경우 각각 이 규정에 의해 설치 된 위원회 또는 분과위원회로 본다. ② 이미 설치된 위원회와 분과위원회 중 제1항에 해당하지 아니하는 경우에 는 이 규정 시행 후 위원회를 구성하고 설치한다. 부칙 <2003. 5. 13.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2005. 10. 25.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2016. 5. 12.> 위원회규정 Ⅱ-7-7 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2021. 4. 29.> 이 규정은 2021년 4월 29일부터 시행한다. 특별위원회규정 Ⅱ-8-1 특별위원회규정 특별위원회규정 Ⅱ-8-3 특별위원회규정 법 제정 2008. 1. 23. 개정 2013. 12. 3."}, {"category": "규정", "regulation": "특별위원회규정", "article_num": "제1조", "article_title": "목적", "content": "이 규정은 한국여성경제인협회 (이하 “협회”라 한다.)의 특정한 사 안이나 현안사항을 조사․연구하고 실태 등을 파악하여 협회업무를 효율적으 로 수행하기 위하여 특별위원회(이하 “위원회”라 한다)에 관한 사항을 규정함 을 목적으로 한다."}, {"category": "규정", "regulation": "특별위원회규정", "article_num": "제2조", "article_title": "기능", "content": "① 위원회는 장기적으로 여성기업연구원 설립운영에 대한 각종 정 책관련 업무와 단기적으로는 회장의 공약사항 집행 및 협회 운영상 긴급을 요하거나 중요한 사안 등을 위한 자문기구로써 역할을 담당한다. ② 위원회의 기능은 다음 각 호와 같다. 규 1. 협회 개혁 및 협회 운영 전반에 관한 기본방향 연구에 관한 사항 2. 협회 신규사업 추진, 운영 및 평가에 관한 사항 칙 3. 여성기업연구원 설립을 위한 제반 사항 4. 회장의 공약사항 이행을 위한 세부사항 자문 5. 기타 협회 운영상 필요하다고 인정하는 사항"}, {"category": "규정", "regulation": "특별위원회규정", "article_num": "제3조", "article_title": "구성", "content": "① 위원회는 당연직 위원장 1인을 포함한 7인 이내의 위원으로 구 성한다. ② 회장이 당연직 위원장이 되며, 위원장이 업무처리를 위하여 상근임직원을 침 간사로 위촉하며, 간사는 위원장의 지시에 따라 업무를 처리한다."}, {"category": "규정", "regulation": "특별위원회규정", "article_num": "제4조", "article_title": "임기", "content": "임기는 임명일로부터 3년(연임가능)으로 하며, 결원으로 인한 후임 자의 임기는 결원위원의 잔여임기로 한다."}, {"category": "규정", "regulation": "특별위원회규정", "article_num": "제5조", "article_title": "위원장의 직무", "content": "① 위원장은 위원회를 대표하고, 위원회의 업무를 통활한 다. 령 ② 위원장이 부득이한 사유로 인하여 직무를 수행할 수 없는 경우에는 수석부 Ⅱ-8-4 한국여성경제인협회 규정집 회장이 그 업무를 대행하고 수석부회장이 궐위되거나 사고로 업무를 수행하 지 못하게 되는 경우에는 위원회에서 정하는 순서에 따라 그 업무를 대행한다."}, {"category": "규정", "regulation": "특별위원회규정", "article_num": "제6조", "article_title": "회의", "content": "① 위원장은 위원회를 소집하고, 그 의장이 된다. ② 위원회의 회의는 다음 각 호의 1에 해당하는 경우 의장이 소집한다. 1. 위원회의 사전 의결이 있는 때 2. 재적위원 3분의 1이상이 소집을 요구할 때 3. 기타 위원장이 필요하다고 인정하는 때 ③ 위원회의 회의는 재적구성원 과반수의 출석으로 개회하고 출석구성원과반 수의 찬성으로 의결하되, 가부동수일 경우에는 위원장이 결정권을 갖는다."}, {"category": "규정", "regulation": "특별위원회규정", "article_num": "제7조", "article_title": "추진상황의 보고 등", "content": "① 위원장은 위원회의 회의결과 및 주요사항의 추진 상황 등 활동상황을 이사회에 보고하여야 한다. ② 위원회는 필요한 경우 이사회를 개최하여 보고할 수 있다."}, {"category": "규정", "regulation": "특별위원회규정", "article_num": "제8조", "article_title": "운영", "content": "① 위원회 회의와 모임은 필요에 따라 수시로 개최할 수 있다. ② 위원회는 위원회 목적의 범위 내에서 다양한 활동을 할 수 있다. ③ 위원회는 원활한 활동을 위하여 위원의 의사에 따라 필요한 경비를 받아 충당할 수 있다. ④ 회장은 위원회의 활동을 지원하기 위하여 필요하다고 인정되는 경우에는 이사회의 의결을 거쳐 예산을 지원할 수 있다. <개정 ’13. 12. 3.>"}, {"category": "규정", "regulation": "특별위원회규정", "article_num": "제9조", "article_title": "조사․연구의뢰 등", "content": "위원회는 효율적인 업무수행을 위하여 필요한 경우에 는 관계기관․단체 및 전문가 등에 대하여 조사․연구를 의뢰하거나 위원회의 활동에 참여하도록 할 수 있다."}, {"category": "규정", "regulation": "특별위원회규정", "article_num": "제10조", "article_title": "위원회 의결사항의 협조요청", "content": "① 위원회는 제7조의 규정에 의하여 이사 회에 보고한 사항에 대하여 그 이행에 필요한 조치를 하도록 관계기관, 단체 등에게 협조를 요청할 수 있다. ② 위원회는 제1항의 협조요청에 대하여 검토하고 그 결과를 이사회에 보고 하여야 한다."}, {"category": "규정", "regulation": "특별위원회규정", "article_num": "제11조", "article_title": "운영세칙", "content": "위원회의 구성 및 운영에 관하여 필요한 세부사항은 위원회 특별위원회규정 Ⅱ-8-5 의 의결을 거처 위원장이 정한다."}, {"category": "규정", "regulation": "위원회규정", "article_num": "제12조", "article_title": "보칙", "content": "이 규정에서 정하지 아니한 사항은 이사회가 정한 바에 따른다. 부칙 <2008. 1. 23.> 이 규정은 이사회에서 의결한 날부터 시행한다. 정 부칙 <2013. 12. 3.> 이 규정은 이사회에서 의결한 날부터 시행한다. 윤리규정 Ⅱ-9-1 윤리규정 윤리규정 Ⅱ-9-3 윤리규정 법 제정 2001. 9. 7. 개정 2003. 5. 13. 개정 2005. 10. 25. 개정 2013. 9. 28. 개정 2013. 12. 3. 개정 2015. 6. 4. 개정 2016. 9. 21. 개정 2018. 3. 29. 개정 2021. 4. 29. 개정 2021. 11. 3. 개정 2023. 10. 16."}, {"category": "규정", "regulation": "윤리규정", "article_num": "제1조", "article_title": "목적", "content": "이 규정은 한국여성경제인협회(이하 \"협회\"라 한다.) 회원(임원을 포함한다, 이하 “회원”이라 한다)의 윤리와 징계에 관한 원칙과 주요절차를 규정함으로써 윤리의식을 제고하고, 회원 상호 간의 신뢰를 향상하여 협회의 칙 명예 및 위상을 고양함을 목적으로 한다. <개정 ’13. 9. 28.>"}, {"category": "규정", "regulation": "윤리규정", "article_num": "제2조", "article_title": "회원의 윤리", "content": "① 회원은 신의와 성실로서 다음 각 호의 사항을 준수하여 야 한다. 1. 회원은 정관 및 각종 규정을 준수하여 회원 상호간의 신뢰를 확립하고 질 서를 존중하여야 한다. 2. 협회의 회원과 여성경제인으로서 품위유지를 하여야 한다. 침 3. 회원은 형법 제307조에 의거 공연히 사실이나 허위사실을 적시하여 협회의 명예를 훼손시킨 행위를 하여서는 아니되며, 직무와 관련하여 공․사 구별을 분명히 함으로써 공정과 신뢰의 향상을 위하여 노력하여야 한다. <개정 ’0 5. 10. 25., ’16. 9. 21.> ② 회원은 협회의 업무, 각급 선거, 각종 행사, 회의, 회원활동 등에 있어 다음 각 호에 해당하는 행위를 하여서는 아니된다. <개정 ’13. 9. 28.> 1. 객관적 사실이 아닌 내용으로 협회와 회원에 대하여 근거 없는 비방, 인신 공격, 모함, 허위사실 유포 Ⅱ-9-4 한국여성경제인협회 규정집 2. 협회의 기밀사항 또는 회원의 비밀사항을 정관 및 규정에서 정한 절차를 준 수하지 아니하고 외부에 누설하여 협회업무의 불신을 초래하거나 협회의 위신을 실추시키는 행위 3. 회비의 미납(본회, 지회, 지부 및 임원 회비 포함) <개정 ’13. 9. 28.> 4. 정치활동금지 의무의 위반 <개정 ’13. 9. 28> 5. 경비 및 사용료와 수수료 부담 미이행 <신설 ’13. 9. 28.> 6. 협회의 사업을 방해하거나 방해할 목적의 행위 <신설 ’13. 9. 28.> 7. 법령․정관․제규정․규칙․요령을 위반하거나 본회의 감사 처분을 받고도 이를 미이행 <신설 ’13. 9. 28.> 8. 협회와 회원에 대한 비방, 언론 제보 등으로 구체적 사실을 적시하거나 협 회나 회원에 대한 정보를 협회의 동의 없이 외부에 유포하는 행위 <신설 ’1 3. 9. 28.> 9. 기타 사회통념상 현저히 부당하다고 판단되는 행위 <신설 ’13. 9. 28.> 10. 기타 위 각 호에 준하는 행위로 형법 제307조에 의거 공연히 사실이나 허위 사실을 적시하여 협회의 명예를 훼손시킨 행위를 하거나 경제적 손실을 끼 친 경우 <신설 ’13. 9. 28., ’16. 9. 21.>"}, {"category": "규정", "regulation": "윤리규정", "article_num": "제3조", "article_title": "윤리위원회의 구분", "content": "제2조에서 정한 규정을 위반한 회원 및 임원의 징계 를 담당하기 위하여 다음 각 호의 윤리위원회를 둔다. 1. 각 지회에 “지회윤리위원회”를 두며 동 위원회에서는 지회회원 (지회회장, 지회수석부회장, 협회임원인 회원은 제외)의 징계에 관한 사항을 담당한다. <개정 ’05. 10. 25.> 2. 협회에 “협회윤리위원회를 두며 동 위원회에서는 다음 각 호의 징계에 관한 사항을 담당한다. 가. 지회회장, 지회수석부회장, 협회 임원 나. 지회․협회 임원과 다수의 회원 등이 연관되거나 협회와 지회가 동시에 관 련된 사안 등으로 특정 지회가 담당하기 곤란하거나 협회에서 담당하는 것이 적절하다고 협회 이사회에서 의결한 경우 <개정 ’13. 9. 28.> 다. 다수의 지회임원이 관련되어 해당지회에서 담당하기 곤란한 경우 라. 지회윤리위원회의 결정에 불복하여 협회에 제소한 경우 마. 지회이사회에서 윤리위원회 회부를 2회 이상 거부하여 회원이 협회에 제 소하는 경우 바. 기타 이사회에서 필요하다고 인정하는 경우 윤리규정 Ⅱ-9-5 3. 2호 나의 경우 해당지회 이사회에서는 본회 윤리위원회 회부를 의결하여 요청할 수 있다. <신설 ’13. 9. 28.>"}, {"category": "규정", "regulation": "윤리규정", "article_num": "제4조", "article_title": "윤리위원회의 구성", "content": "① 윤리위원회는 윤리위원회에 회부하여 징계 또는 조사하여야 하는 사유가 발생한 경우에 다음 각 호와 같이 구성한다. 1. 지회윤리위원회는 지회이사회의 의결을 거쳐 지회임원 7인으로 구성(위원 장, 감사1인을 포함하여야 한다.)하며, 위원장은 지회수석부회장으로 하며, 지회수석부회장의 궐위 시에는 지회회장이 지회임원 중에서 정한다. <개 정 '03. 5. 13., ’13. 9. 28., ’18. 3. 29., ’21.4.29.> 2. 협회윤리위원회는 이사회의 의결을 거쳐 협회임원 9인으로 구성(위원장, 감사1인을 포함하여야 한다.)하며, 위원장은 협회수석부회장으로 하며, 협 회수석부회장의 궐위 시에는 협회회장이 임원 중에서 정한다. <개정 '03. 5. 13., ’13. 9. 28., ’18. 3. 29., ’21.4.29.> ② 당해 윤리위원회에 회부되어야 할 당사자 및 관계자는 위원이 될 수 없다."}, {"category": "규정", "regulation": "윤리규정", "article_num": "제5조", "article_title": "조사위원회", "content": "① 윤리위원회에 회부하여야 하는 사안 중 해당 사실 확인 및 조사에 장기간이 소요되거나 전문적인 능력이나 객관적인 자료 등의 확보 가 필요한 경우에는 윤리위원회의 회부에 앞서 이사회의 의결을 거쳐 조사위 원회를 구성하여 운영할 수 있다. ② 조사위원회의 위원장과 위원, 조사위원회의 활동기한 및 임무 등에 관하여 는 해당 이사회에서 정하며, 조사위원회의 위원장은 윤리위원 중에서 위촉한 다. <개정 ’13. 9. 28.> ③ 조사위원회의 위원장은 조사결과를 해당 윤리위원회에 보고하여야 한다. ④ 조사위원회의 조사를 받게 되는 회원과 임원은 조사위원회의 조사에 협조 하여야 하며, 조사위원회가 인정하는 정당한 사유 없이 2회 이상 조사에 불응 하는 경우에는 해당 윤리위원회에 보고 할 수 있다. ⑤ 조사위원회는 조사를 받아야 할 당사자에게 출석 또는 서면으로 소명할 수 침 있는 기회를 부여하여야 한다."}, {"category": "규정", "regulation": "윤리규정", "article_num": "제6조", "article_title": "윤리위원회 회부", "content": "① 지회윤리위원회는 다음 각 호의 지회회원이 서면으 로 회부를 요청하는 경우 지회이사회에서 지회윤리위원회 회부여부를 결정할 수 있다. 또한 필요한 경우 지회이사회에서 지회윤리위원회 회부를 직접 결정 할 수 있다. <개정 ’05. 10. 25., ’13. 9. 28.> 1. 지회 회원이 100인 미만인 경우 20명 이상 <개정 ’13. 9. 28.> 2. 삭제 <’13. 9. 28.> Ⅱ-9-6 한국여성경제인협회 규정집 3. 지회 회원이 100인 이상인 경우 30명 이상 <개정 ’13. 9. 28.> 4. 지회 회원이 200인 이상인 경우 50명 이상 <개정 ’13. 9. 28.> 5. 지회 회원이 300인 이상인 경우 70명 이상 <신설 ’13. 9. 28.> ② 협회 윤리위원회의 회부는 다음 각호의 경우에 이사회의 의결을 거쳐 결정 한다. 1. 제3조 제2호 가목 내지 다목에 해당하는 사항으로 당사자가 지회회장인 경 우 당해 지회 회원 1/3이상이 서면으로 요청하는 경우 <개정 ’13. 9. 28.> 2. 제3조제2호 라목 및 마목에 해당하여 서면으로 제소를 받은 경우 3. 이사회에서 협회윤리위원회 회부를 직접 의결한 경우 4. 제3조제2호 가목 내지 다목에 해당하는 사항으로 지회 이사회에서 요청하 는 경우 <신설 ’13. 9. 28.>"}, {"category": "규정", "regulation": "윤리규정", "article_num": "제7조", "article_title": "징계의 선포 및 윤리위원회의 운영", "content": "① 삭제 <’18. 3. 29.> ② 삭제 <’18. 3. 29.> ③ 윤리위원회는 특별한 사정이 없는 한 이사회에서 의결한 날부터 1개월 이 내에 최초 회의를 개최하여야 하고 5개월 이내에 이사회에 심사 의견을 제시 하여야 하며, 회의의 운영은 위원장이 결정한다. <개정 '03. 5. 13., ’15. 6. 4.> ④ 윤리위원회는 재적위원 과반수의 출석으로 개최하고 출석위원 1/2이상의 찬성으로 의결한다. 위원장은 표결권이 있으며 가부동수인 경우 결정권을 가 진다. <개정 '03. 5. 13., ’13. 9. 28., ’21.4.29.> ⑤ 윤리위원회는 회부를 요청한 당사자와 윤리위원회에 회부된 회원과 임원 의 의견, 참고인의 의견을 토대로 사실을 조사하여 진실을 바탕으로 심사하여 야 한다. <개정 ’15. 6. 4.> ⑥ 윤리위원장은 심사의견을 이사회에 보고하여야 하며 의장은 이를 이사회 에 부의하여 의결하되 윤리위원회의 심사 의견에 구속되지 아니한다. <개정 ’13. 9. 28., ’15. 6. 4.> ⑦ 징계대상자는 자기의 징계안에 관한 이사회에 출석하여 소명할 수 있다. 이 경우 징계대상자는 소명이 끝난 후 이사회 회의장에서 퇴장하여야 한다. <신설 ’15. 6. 4.>"}, {"category": "규정", "regulation": "윤리규정", "article_num": "제8조", "article_title": "소명기회의 부여", "content": "① 윤리위원회는 윤리위원회에 회부된 당사자(또는 양 측 당사자)에게 직접 출석 또는 서면으로 소명할 수 있는 기회를 부여하여야 한다. 다만, 2회까지 소명을 요청하여도 불응하는 경우에는 당사자의 소명 없 이 회의를 진행한다. <개정 ’13. 9. 28.> 윤리규정 Ⅱ-9-7 ② 윤리위원회에 회부된 당사자는 소명자료의 준비 등을 위하여 필요한 경우 1회에 한하여 위원회 개최연기를 요청할 수 있다. ③ 윤리위원회에 회부된 자 또는 회부를 요청한 자는 객관적인 사실자료를 제 출할 수 있으며, 본인의 의견을 보충할 참고인을 불러 진술하게 할 수도 있다."}, {"category": "규정", "regulation": "윤리규정", "article_num": "제9조", "article_title": "임원의 불신임", "content": "① 정관 제17조의 규정에 의하여 임원을 불신임하고자 하 는 경우에는 이 규정에 의한 지회윤리위원회 또는 협회윤리위원회에 우선 회 정 부되어야 한다. ② 삭제 <’18. 3. 29.> ③ 이사회에서 불신임을 받은 임원은 총회에서 출석대의원 과반수가 찬성하 는 경우 그때부터 임원에서 해임된 것으로 본다. <개정 ’05. 10. 25.> ④ 지회 또는 본회임원(협회회장 또는 지회회장이 아닌자)은 이사회에서 임원 불신임이 의결된 경우 그날로부터 자격이 정지된다. <신설 ’13. 9. 28.> ⑤ 임원 선출 당시의 사업체가 부도 및 파산, 회생 등의 사실이 확인되면 윤리 위원회를 거쳐 이사회에서 불신임할 수 있다. <신설 ’13. 9. 28.>"}, {"category": "규정", "regulation": "윤리규정", "article_num": "제10조", "article_title": "윤리위원회의 심사", "content": "① 윤리위원회는 조사와 의견청취가 종료되면 다음 과 같은 심사의견을 제출 할 수 있다. <개정 ’15. 6. 4.> 칙 1. 윤리위원회에 제기를 한 내용이 사실과 다른 경우에는 제소를 기각 2. 제1호의 경우 사실과 다른 내용을 제기한 당사자의 고의성 여부 등을 참작 하여 윤리위원회 직권으로 제소한 자에게 제10조의 2의 징계를 할 수 있 다. <개정 ’15. 6. 4.> 3. 삭제 <’15. 6. 4.> 4. 삭제 <’15. 6. 4.> ② 삭제 <’15. 6. 4.> 제10조의 2(징계의 종류) ① 징계의 종류는 다음과 같다. <신설 ’15. 6. 4.> 1. 주의 촉구, 공개 주의, 공개 사과 2. 경고 3. 회원 자격정지 : 최장 24월 이내 4. 회원제명 5. 임원 직무정지 또는 임원 자격정지 : 최장 24월 이내 6. 임원 불신임 Ⅱ-9-8 한국여성경제인협회 규정집 7. 명예회장, 고문, 원로 등의 명예직 직위 박탈 <신설 ’15. 6. 4.> ② 징계를 받은 자가 협회에 재산상의 손실을 초래한 경우에는 제1항의 징계 외에 손실에 상당하는 금액의 배상을 요구할 수 있으며, 배상을 거부할 경우 민사소송 등 법원에 제소할 수 있다. <신설 ’15. 6. 4.> ③ 임원에 대해서는 회원과 임원에 관한 징계를 동시 또는 각각 부과할 수 있 다. <신설 ’15. 6. 4.> ④ 윤리규정을 위배하고 협회에 물의를 일으켜 윤리위원회에 회부된 자가 심 사 중도에 탈퇴한 경우, 재입회할 수 없다. <신설 ’15. 6. 4.>"}, {"category": "규정", "regulation": "윤리규정", "article_num": "제11조", "article_title": "윤리위원회 회부 통보", "content": "① 지회이사회에서 윤리위원회 회부를 결정한 지회는 이를 협회에 즉시 통보하여야 한다. ② 협회윤리위원회에 지회의 회원, 임원이 회부되는 경우 협회 이사회는 이를 해당 지회에 즉시 통보하여야 한다. <개정. ’05. 10. 25.> ③ 윤리위원장은 심사의견을 해당 지회이사회 또는 협회이사회에 즉시 보고 하여야 한다. <개정. ’05. 10. 25., ’15. 6. 4.> 제11조의 2(징계의 통지) 지회 또는 협회 이사회에서 징계를 결정한 경우 그 결정 내용을 징계 당사자 및 해당 지회에 즉시 통지하여야 한다. <신설 ’13. 9. 28.>"}, {"category": "규정", "regulation": "윤리규정", "article_num": "제12조", "article_title": "지회 징계에 대한 불복", "content": "① 지회 이사회의 징계결정에 불복하는 경우 각 각의 당사자는 그 결정일로부터 10일 이내에 그 사유를 적시하여 협회 이사 회에 서면으로 제출하여야 한다. <개정 ’23. 10. 16.> ② 지회 징계결정에 불복한 회원의 경우 협회 이사회에서 윤리위원회 회부가 승인의결 되면 그 징계의 효력은 협회 윤리위원회 결정시까지 잠정 정지된 다."}, {"category": "규정", "regulation": "윤리규정", "article_num": "제13조", "article_title": "징계의 효력", "content": "① 회원자격이 정지된 자는 정지 기간에는 정관 제8조 내지 제9조의 회원의 권리가 박탈되며, 당해회원이 임원인 경우에는 임원 자격도 동시에 정지된다. ② 회원 제명이 된 자는 이사회에서 제명이 결정된 날부터 협회와 관련된 모 든 권리 및 자격을 상실하며 제명된 자가 재입회하고자 할 때 제명일로부터 5년(회비미납의 사유로 제명된 경우 제외)이 경과하지 않으면 재입회할 수 없 다. <개정 ’13. 9. 28.> 윤리규정 Ⅱ-9-9 ③ 임원직무정지가 된 자는 회원의 자격은 유지하며 징계기간동안 임원의 직은 유지하지만 당해 직무를 수행할 수 없다. ④ 임원자격정지가 된 자는 회원의 자격은 유지하나 징계기간 동안 임원의 직을 상실한 것으로 보며 임원 명칭을 사용할 수 없고 당해 직무를 수행 할 수도 없다. ⑤ 이사회에서 임원 불신임 발의가 의결된 임원은 총회에서 불신임을 의결하는 날까지 임원의 직무가 정지되며, 총회에서 임원불신임이 의결되면 그때부터 정 임원직을 상실한다. 다만, 지회회장 또는 협회회장이 아닌 경우 이사회 결의일 로부터 임원 자격이 정지된다. <개정. ’05. 10. 25., ’13. 9. 28.> ⑥ 임원불신임안이 총회에서 부결되는 경우에는 윤리위원회에 자동적으로 재 회부되며, 당초 이를 결정한 윤리위원회는 재심을 하여야 한다. ⑦ 이사회에서 임원에 대하여 회원 제명이 결정되면 그 결정일 부터 임원직무도 정지되며, 임원자격과 회원자격을 각각 상실한다. <개정 ’05. 10. 25., ’13. 9. 28.> ⑧ 징계에 의하여 회원제명, 회원자격정지, 임원직무정지 또는 임원자격정지의 처분을 받은 자의 피선거권 제한은 다음 각 호에 따른다. 다만, 임원불신임이 발의 되어 회장이 직무정지를 명한 경우 총회에서 불신임이 부결되면, 이를 징계에 규 의한 직무정지로 보지 아니한다. <개정. ’13. 9. 28.. ’26. 2. 23.> 1. 회원제명의 경우에는 재입회 또는 회원자격을 회복한 날부터 3년간 협회 및 지회의 모든 피선거권을 상실한다. 2. 회원자격정지의 경우에는 회원자격을 회복한 날부터 다음 각 목에 정한 기간 동안 협회 및 지회의 모든 피선거권을 상실한다. 가. 회원자격정지 1월 ~ 12월 : 2년 나. 회원자격정지 13월 ~ 24월 : 3년 지 3. 임원직무정지 또는 임원자격정지의 경우에는 임원자격을 회복한 날부터 해당 임원의 임기가 종료될 때까지의 기간과, 그 종료일 다음 날부터 3년간 협회 및 지회의 모든 피선거권을 상실한다."}, {"category": "규정", "regulation": "윤리규정", "article_num": "제14조", "article_title": "징계의 구제", "content": "① 지회 및 협회 이사회는 징계를 받은 자의 요청이 있는 경우 이사회의 의결을 거쳐 다음 각 호와 같이 징계처분을 단축․완화할 수 있 다. <개정. ’13. 9. 28> 강 1. 회원 자격정지는 자격정지 기간의 단축 2. 회원 제명된 자(회비미납 제명 제외)를 회원 자격정지로 징계 완화 <개정 ’13. 9. 28.> Ⅱ-9-10 한국여성경제인협회 규정집 3. 회원 제명된 자(회비미납 제명 제외)를 제명된 날부터 36월이 경과한 경우 회원 재입회 자격부여. 이 경우 제명된 날로부터 5년이 경과하지 아니한 경 우 지회 및 협회의 모든 피선거권을 제한한다. <개정 ’13. 9. 28.> 4. 제13조 제8항에 의한 회원자격이 정지된 자의 피선거권 상실기간을 18개월로 단축 <신설 ’13. 9. 28., 개정 ’26. 2. 23.> 5. 임원 직무정지 기간의 단축 <개정 ’13. 9. 28.> ② 제1항에 의한 구제요청은 징계를 받은 자가 징계 결정의 통지를 받은 날로 부터 3개월이 경과한 이후에 신청할 수 있다. <신설 ’13. 9. 28., 개정 ’13. 12. 3.> 부칙 <2001. 9. 7.> 1. 이 규정은 이사회의 의결을 거친 날부터 시행한다. 2. 이 규정 시행 전 회원이나 임원에 대한 징계가 집행된 경우 제14조에 의한 징 계의 구제를 적용할 수 있다. 3. 이 규정은 이 규정 시행 전 완료된 행위에 대해서는 그 행위로 인해 이 규정 시행 당시나 그 후에 영향을 미치지 아니하는 경우에는 소급하여 적용하지 아니한다. 부칙 <2003. 5. 13.> 이 규정은 이사회의 의결을 거친 날부터 시행한다. 부칙 <2005. 10. 25.> 이 규정은 이사회의 의결을 거친 날부터 시행한다. 부칙 <2013. 9. 28.> 1. 이 규정은 이사회의 의결을 거친 날부터 시행한다. 2. 이 규정 시행일 이전에 징계 받은 자에 대하여 제14조제2항의 신설 규정은 적 용하지 아니한다. 부칙 <2013. 12. 3.> 이 규정은 이사회의 의결을 거친 날부터 시행한다. 부칙 <2015. 6. 4.> 이 규정은 이사회의 의결을 거친 날부터 시행한다. 부칙 <2018. 3. 29.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2021. 4. 29.> 이 규정은 2021년 4월 29일부터 시행한다. 부칙 <2021. 11. 3.> 이 규정은 2021년 11월 3일부터 시행한다. 부칙 <2026. 2. 23.> 이 규정은 이사회에서 의결한 날부터 시행한다. 감사직무규정 Ⅱ-10-1 감사직무규정 감사직무규정 Ⅱ-10-3 감사직무규정 법 제정 2001. 9. 7. 개정 2003. 5. 13. 개정 2013. 12. 3. 개정 2018. 3. 29. 개정 2023. 10. 16. 개정 2026. 2. 23. 제1장 회원"}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제1조", "article_title": "목적", "content": "이 규정은 한국여성경제인협회(이하협회“라 한다.)의 감사의 직무 및 내부감사에 관한 기준과 절차 등을 정함으로서 협회 운영의 효율성과 합리성을 도모함을 목적으로 한다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제2조", "article_title": "적용대상", "content": "이 규정에 의한 감사는 협회 및 지회, 협회가 설립한 산하기관에 대하여 적용한다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제3조", "article_title": "감사인", "content": "감사를 할 수 있는 자는 다음 각호와 같다(이하감사인”이라 한다.) 1. 협회 또는 지회의 감사 2. 회장으로부터 감사권한을 부여받은 협회 회원 및 사무처 임직원 또는 사무국 직원 3. 협회에서 감사를 의뢰 받은 외부인"}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제4조", "article_title": "감사직무", "content": "협회의 감사는 다음 각호의 업무를 수행한다. 1. 정관과 이 규정에 의하여 부여되는 협회와 지회에 대한 감사 2. 삭제 <’18. 3. 29.> 3. 삭제 <’18. 3. 29.> 4. 감사 업무수행에 필요한 경우 제12조에서 규정한 권한 5. 삭제 <’18. 3. 29.> Ⅱ-10-4 한국여성경제인협회 규정집 6. 삭제 <’18. 3. 29.> 7. 삭제 <’18. 3. 29.> 8. 정기감사 계획의 수립 9. 수시감사 및 특별감사 요구"}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제5조", "article_title": "감사의 구분", "content": "감사는 감사를 실시하는 대상 업무에 따라 회계감사와 업무 감사로 구분하며, 처리시기에 따라 정기감사, 수시감사, 특별감사로 구분한다. <개정 ’13. 12. 3.>"}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제6조", "article_title": "회계감사", "content": "① 회계감사는 회계 처리 및 재산보존 및 운용상태에 대해 실시한다. ② 협회와 지회의 감사는 매년도말 결산서를 감사하여 그 결과를 이사회와 총회에 보고하여야 하며, 지회의 결산서 감사결과는 협회에 보고하여야 한다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제7조", "article_title": "업무감사", "content": "업무감사는 협회와 지회의 운영 및 업무처리상황, 제규정의 이행 여부 등 업무와 운영의 전반에 대해 실시한다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제8조", "article_title": "정기감사", "content": "① 정기감사는 감사계획에 의하여 매년 정기적으로 실시하며, 회계감사와 업무감사를 동시에 실시한다. ② 정기감사계획은 매 회계연도말까지 협회 감사가 협회 사무처와 협의하여 수립하여, 회장의 결재를 받고 이사회에 보고하여야 한다. ③ 정기감사는 협회 및 모든 지회 또는 필요한 경우 일부지회를 대상으로 실 시할 수 있다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제9조", "article_title": "수시감사", "content": "수시감사는 다음 각 호의 경우에 실시한다. 1. 협회의 감사가 필요하다고 인정하는 경우 <개정 ’13. 12. 3.> 2. 회장이 필요하다고 인정하는 경우 3. 이사회에서 필요하다고 의결한 경우 4. 주무관청의 지시에 의한 경우"}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제10조", "article_title": "특별감사", "content": "특별감사는 회장이 필요하다고 인정하거나 협회 감사가 특정 한 사안에 대하여 감사가 필요하다고 인정하여 이사회에 사전 보고한 후 실시 한다. <개정 ’03. 5. 13.> 감사직무규정 Ⅱ-10-5"}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제11조", "article_title": "감사방법", "content": "① 감사는 서면감사와 현장감사로 구분한다. ② 서면감사는 감사 대상업무와 관련된 제반 서류를 제출케하여 처리의 적정성 여부를 감사하는 것을 말한다. ③ 현장감사는 감사인이 감사대상 부서에 출장하여 감사대상업무의 적성과 타당성 여부를 감사하는 것을 말한다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제12조", "article_title": "감사인의 권한", "content": "감사인은 감사를 위하여 필요한 경우 다음 각호 권한을 정 갖는다. 1. 제반 장부, 증빙서류, 물품 및 관련서류의 제출 요구 2. 협회 및 지회의 임원․회원․직원 등 관련인의 출석 및 답변 요구 3. 장부, 물품, 서류의 봉인 및 보존 요구 4. 기타 감사수행에 필요한 자료 및 사항의 요구 5. 감사업무에 해당하지 않은 감사요청에 대해 감사를 거부할 수 있다. <신설 ’23. 10. 16.>"}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제13조", "article_title": "감사의 독립", "content": "감사인은 독립된 위치에서 그 직무를 원활히 수행할 수 있도록 규 그 독립성을 보장하여야 한다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제14조", "article_title": "감사인의 의무", "content": "① 감사는 감사를 행함에 있어 공정하게 실시하여야 한다. ② 감사인은 감사를 통하여 지독한 비밀을 누설하거나 다른 목적으로 사용할 수 없다. ③ 감사인은 피감사자의 창의성 및 업무수행활동이 부당하게 침해받지 않도록 각별히 유의하여야 한다. 지"}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제15조", "article_title": "피감사자 협조 의무", "content": "감사를 받는 협회 및 지회의 임원․회 원․직원 등 피 감사자는 감사인으로 부터 감사상 필요한 자료의 제 출, 출석, 입회 등의 요청이 있을 때에는 적극 협조하여야 하며, 특별한 사유 없이 이를 거부 또는 거절하여 감사활동에 상당한 지장을 초래하게 한 경우 감사인은 이를 이사회에 보고하고 적절한 조치를 요구할 수 있다. Ⅱ-10-6 한국여성경제인협회 규정집 제2장 감사실시와 결과처리"}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제16조", "article_title": "감사통보", "content": "① 정기감사는 감사실시일 5일전에 감사대상부서에 통보하여야 한다. ② 수시감사와 특별감사는 원칙적으로 5일전에 통보하되 필요한 경우 통보없이 실시할 수 있다. ③ 감사계획을 통보할 때에는 감사기간, 감사대상업무 등을 명확히 적시하여 서면으로 통보하여야 한다. <개정 ’03. 5. 13.>"}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제17조", "article_title": "감사기간연장", "content": "감사인은 감사목적을 달성하기 위하여 감사기간의 연장이 필요한 경우 회장과 협회 감사의 승인을 받아 감사기간을 연장할 수 있으며, 감사기간 연장내용을 늦어도 감사 종료 전까지 피감사부서의 장에게 통보하여야 한다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제18조", "article_title": "감사결과보고 및 통보", "content": "① 감사인은 감사를 종료한 경우 20일 이내에 제 19조에 규정한 처분 요구를 포함한 감사결과와 감사의견을 피감사기관에 처분 요구를 하기 전에 협회 감사의견을 들어 회장의 결재를 득한 후 피감사기관에 감사결과 처분요구서를 서면으로 통보한다. ② 협회감사 또는 책임감사인은 제1항의 감사결과처분요구 및 시정결과를 이사회에 보고한다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제19조", "article_title": "감사결과조치", "content": "감사인은 감사결과 위법, 부당하거나 개선이 필요하다고 인정되는 사항이 있는 경우에는 다음 각 호에 해당하는 처분을 요구하여야 하며, 이행의 촉구 및 확인할 책임이 있으며 필요에 따라 확인감사를 실시할 수 있다. <개정 ’13. 12. 3.> 1. 규정 또는 제도의 개선 2. 운영상의 잘못에 대한 시정 또는 개선 3. 위법 또는 부당하다고 인정되는 사항에 대한 시정, 주의 통보 4. 관련자(협회․지회임원 및 회원을 포함한다.)에 대한 경고 또는 변 상 요구 5. 협회 및 지회 사무국 임직원인 경우 징계 요구 6. 협회․지회의 임원 및 회원인 경우 이사회에 처분 요구 감사직무규정 Ⅱ-10-7"}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제20조", "article_title": "시정요구", "content": "① 감사결과 제19조에 의한 처분을 받은 피감사부서의 장은 처분요구서를 받은 날부터 30일 이내에 조치를 취하고 그 결과를 협회에 보고 하여야 한다. ② 제도 및 제규정의 제정․개정․폐지 또는 변경, 특별히 인정되는 사유로 인하여 제1항의 기간 내에 시정조치를 취하지 못할 경우에는 그 사유를 서면으로 제출 하여야 하며, 이 경우 감사책임자는 내용을 검토하여 회장에게 승인을 받은 후 시정기간을 연장할 수 있다. 정 ③ 감사결과처분요구에 따른 조치를 거부하는 경우 협회 감사는 이사회에 이를 보고하고 이에 대한 조치를 요구하여야 한다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제21조", "article_title": "지회의 시정의무", "content": "① 지회는 협회로부터 감사결과를 통보받은 경우 지체 없이 지회이사회를 소집하여 이를 통지하고 그 시정을 위한 방안을 수립하여 협회에 보고하여야 한다. <개정 ’26. 2. 23.> ② 지회가 시정요구를 정당한 이유 없이 거부하여 지회 및 협회의 활동에 지장을 초래하거나 시정의 지연으로 인하여 지회의 활동에 지장을 초래한다고 판단 되는 경우 협회는 이사회의 의결을 거쳐 해당지회의 활동정지, 지회설립의 승인 규 취소, 또는 지회해산을 명할 수 있다. ③ 필요한 경우 회장과 협회 감사는 시정을 거부하는 지회의 관련 임원에 대 하여 윤리위원회에 회부를 요청할 수 있다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제22조", "article_title": "이의신청", "content": "① 제20조의 시정요구에 대하여 이의가 있을 때에는 해당 지회 회장 또는 피감사부서의 장은 시정요구기간 내에 이를 입증할 수 있는 증빙자료를 첨부하여 협회에 이의 신청을 할 수 있다. 지 ② 이의신청을 받은 경우 협회 감사는 이를 심의하여 그 결과를 이의 신청인에게 통보하여야 한다. ③ 제2항의 심사결과통보에도 이의가 있는 경우에는 이를 통보받은 날부터 1월 이내에 재심의를 요청할 수 있다. ④ 재심의를 요청 받은 감사는 의견서를 첨부하여 회장에게 보고하여야 하며, 회장은 이사회에 회부하여 의견을 들어 그 결과를 재심청구인에게 통보하여야 한다. ⑤ 제4항의 재심결과에 대하여는 이의신청을 할 수 없다. 강 Ⅱ-10-8 한국여성경제인협회 규정집 제3장 보칙"}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제23조", "article_title": "외부감사", "content": "회장은 필요한 경우 이사회의 의결을 거쳐 외부인사 또는 기관에 협회 및 지회의 업무에 대한 감사를 의뢰하여 실시할 수 있다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제24조", "article_title": "감사기록", "content": "감사결과와 감사관련 서류는 문서규정에 따라 반드시 협회에 보관하여야 하며 외부에 유출하여서는 아니된다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제25조", "article_title": "타규정과의 관계", "content": "감사와 관련하여서는 정관에서 정한 바가 아니면 이 규정을 우선 적용하며, 이 규정에 없는 사항은 다른 규정을 따르고, 다른 규정에 없을 경우에는 이사회에서 정한 바에 따른다. 다만, 정부 또는 주무부처의 감사와 관련되는 경우에는 정부 또는 주무부처의 관련 규정을 우선 적용하여야 한다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제26조", "article_title": "지회의 감사 준용", "content": "지회는 이 규정을 따라 자체적으로 감사를 실시할 수 있으며, 이 경우 이 규정의 “협회, 회장, 이사회, 감사”는 “지회, 지회회장, 지 회이사회, 지회감사”로 한다."}, {"category": "규정", "regulation": "감사직무규정", "article_num": "제27조", "article_title": "수감 우수지회 등 우대", "content": "감사는 자체감사 과정에서 모범적인 업무수행 사례를 발굴하였을 경우 우수지회, 우수직원으로 포상 추천할 수 있다. <신설 ’13. 12. 3.> 부칙 <2001. 9. 7.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2003. 5. 13.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2013. 12. 3.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2018. 3. 29.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2026. 2. 23.> 이 규정은 이사회에서 의결한 날부터 시행한다. 기부금 관리 및 운영규정 Ⅱ-11-1 기부금 관리 및 운영규정 기부금 관리 및 운영규정 Ⅱ-11-3 기부금 관리 및 운영규정 제정 2020. 5. 20. 제1장 총칙"}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "목적", "content": "이 규정은 정관 제46조(재정)에서 정한 한국여성경제인협회(이하 ‘협회’라 함)에 출연하는 각종 기부금에 관한 사항을 정하여 그 합리적인 관 리 및 운영 절차를 규정함을 목적으로 한다."}, {"category": "규정", "regulation": "정관", "article_num": "제2조", "article_title": "적용범위", "content": "이 규정은 협회의 기부금에 적용한다. 다만, 고유번호증이 다 른 지회는 별도로 관리하는 기부금에 관한 사항을 따로 정한다."}, {"category": "규정", "regulation": "정관", "article_num": "제3조", "article_title": "발전기금의 운용", "content": "기부금은 출연목적의 범위 내에서 운용되고 사용되어 야 한다."}, {"category": "규정", "regulation": "정관", "article_num": "제4조", "article_title": "용어의 정의", "content": "이 규정에서 ‘발전기금’이라 함은 협회의 위상 제고 및 여성 경제인 발전을 위해 무상으로 출연된 각종 기부금을 통칭하며, 현금·부동산· 유가증권 또는 업무용 물품 등을 포함한다."}, {"category": "규정", "regulation": "정관", "article_num": "제5조", "article_title": "기부금의 종류", "content": "기부금은 그 용도와 사용범위 또는 자산의 종류에 따라 다음과 같이 구분한다. 1. 일반기부금 : 기부자가 기금의 사용용도나 그 집행부서를 지정하지 아니하 고 출연한 기부금인 경우 Ⅱ-11-4 한국여성경제인협회 규정집 2. 지정기부금 : 기부자가 장학금·건축비 등 사용용도나 집행부서를 지정하여 출연한 기부금인 경우 3. 수증물품 : 기부자가 도서자료, 골동품·고서화 등의 문화재, 유가증권, 업무 용 물품을 기증한 경우 4. 부동산 : 기부자가 수익용으로 부동산을 기증한 경우"}, {"category": "규정", "regulation": "정관", "article_num": "제6조", "article_title": "모금활동의 통일성 유지", "content": "① 모든 모금활동은 협회의 미션 및 비전, 사업 방향 및 역할에 맞추어 통일성을 유지하면서 추진한다. ② 협회는 모금활동을 수행할 수 있으며 모금활동시 모금아이템 명칭과 목적 및 종류를 명시하고 모금활동계획과 효율적인 사용방안 등 중요사항에 대하 여 협회장의 승인을 얻어야 한다."}, {"category": "규정", "regulation": "정관", "article_num": "제7조", "article_title": "기부금품 수령의 거절", "content": "다음과 같은 경우에는 기부금품 수령을 거절할 수 있다. 1. 협회 발전방향에 부합하지 않는 성격의 기부금 2. 협회의 명예에 부정적인 영향을 줄 수 있는 성격의 기부금 3. 불법적인 행위나 과정을 통해 조성된 기부금 4. 기부금의 운영(예우)경비가 기부금액보다 현저하게 클 경우 5. 기부의 대가로 협회의 발전방향에 반하는 조건을 제시할 경우 6. 가치나 사용목적을 고려할 때 수령이 부적합한 성격의 부동산이나 물품"}, {"category": "규정", "regulation": "정관", "article_num": "제8조", "article_title": "기부용도 설정", "content": "① 협회에 이루어지는 모든 기부는 기부자의 의사에 따라 사용목적 및 사용방법 등의 기부조건을 설정할 수 있다. ② 기부의 수혜자에 대한 기부용도 설정의 경우 협회 내부 기관 및 사업 활동 에 한하여 가능하다. 기부금 관리 및 운영규정 Ⅱ-11-5 제2장 발전기금운영위원회"}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제9조", "article_title": "설치", "content": "발전기금의 전반에 관한 중요사항을 심의하고 협의하기 위하여 「발전기금운영위원회」를 둔다."}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제10조", "article_title": "기능", "content": "① 발전기금운영위원회는 다음 각 호의 사항을 심의한다. 1. 발전기금 설치에 관한 사항 2. 발전기금 모금에 관한 사항 3. 발전기금 사용에 관한 사항 4. 발전기금 기부자의 예우에 관한 사항 5. 발전기금 유치자의 예우에 관한 사항 ② 발전기금운영위원회는 해당 발전기금에 대한 사업계획, 예산의 편성 및 집 행 등을 심의한다."}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제11조", "article_title": "구성", "content": "① 위원회는 단일 건으로 발전기금 1,000만원 이상을 납부한 자 중 10인 이내의 위원으로 구성한다. ② 위원 및 위원장은 회장이 위촉하며, 위원장은 위원 중에서 호선할 수 있다. ③ 위원장의 업무처리를 위하여 상근임직원을 간사로 위촉한다."}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제12조", "article_title": "임기", "content": "임기는 임명일로부터 1년(연임가능)으로 하며, 결원으로 인한 후 임자의 임기는 결원위원의 잔여임기로 한다."}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제13조", "article_title": "위원장의 직무", "content": "① 위원장은 위원회를 대표하고, 위원회의 업무를 통활 한다. ② 위원장이 부득이한 사유로 인하여 직무를 수행할 수 없는 경우에는 위원회 에서 정하는 순서에 따라 그 업무를 대행한다. Ⅱ-11-6 한국여성경제인협회 규정집"}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제14조", "article_title": "회의", "content": "① 위원장은 위원회를 소집하고, 그 의장이 된다. ② 위원회의 회의는 다음 각 호의 1에 해당하는 경우 의장이 소집한다. 1. 위원회의 사전 의결이 있는 때 2. 재적위원 3분의 1이상이 소집을 요구할 때 3. 기타 위원장이 필요하다고 인정하는 때 ③ 위원회의 회의는 재적구성원 과반수의 출석으로 개회하고 출석구성원과반 수의 찬성으로 의결하되, 가부동수일 경우에는 위원장이 결정권을 갖는다. ④ 위원회는 회의록을 작성하여야 하며, 위원회에서 심의한 중요사항은 이사 회에 보고하여야 한다."}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제15조", "article_title": "모금 업무의 주관", "content": "① 발전기금 모금 사업은 경영기획팀을 주관으로 하 여 사전에 협의하여야 하며, 다음의 절차에 따라야 한다. 1. 발전기금 모금 활동 계획에 관하여 경영기획팀을 협조부서로 지정하여 사 전에 품의를 통해 결재를 얻어야 한다. 2. 1억원 이상의 발전기금 모금활동 계획은 경영기획팀에서 수합하여 발전기 금운영위원회 심의를 거쳐 협회장의 승인을 얻어야 한다. ② 기부금 출연에 따른 법적인 문제 발생의 가능성을 최소화하기 위하여 모금 활동과 관련된 모든 법률 서류, [별표1]의 약정서, 협약서 및 문서는 경영기획 팀의 검토 이후에 사용하여야 한다. 제3장 발전기금의 설치 및 관리"}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제16조", "article_title": "기부금의 접수와 관리", "content": "①일반기부금과 지정기부금의 접수와 관리는 경 영기획팀에서 관장하며 특별한 경우를 제외하고 기부받은 날로부터 1주일 이 내에 경영기획팀으로 이관시킨다. ② 수증물품은 경영기획팀과 소관부서가 상호 협조하여 인수절차를 감정평가 액으로 산정하고, 관리는 소관부서에서 관장한다. 기부금 관리 및 운영규정 Ⅱ-11-7 ③ 부동산을 수증한 경우 접수는 경영기획팀에서 관장하고, 소유권이전 등의 후속처리는 법인으로 이관한다. 이때, 부동산의 자산평가는 지방세법 시행령 에 의한 과세시가 표준액 또는 전문 감정평가 기관의 감정평가액에 의한다. ④ 기부금의 모금, 관리 등 비용의 부담은 「기부금품의 모집 및 사용에 관한 법률」에 의하며, 세부사항은 따로 정한다. ⑤ 다음의 경우에는 기부금을 기부자에게 환원할 수 있다. 1. 기부약정서에 환원에 대한 조건과 기간이 분명하게 명시되어 있을 경우 2. 법적으로 기부금을 환원해야 하는 특수한 상황에 처했을 경우 3. 행정상의 착오와 오류로 인해 기부금 수령이 잘못되었을 경우"}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제17조", "article_title": "보고", "content": "① 경영기획팀장은 발전기금 현황을 수시로 협회장에게 보고하여 야 한다. ② 고액의 기부금을 기부받은 경우 경영기획팀장은 출연자, 출연목적 및 재산 의 내용에 관하여 지체없이 협회장에게 보고하여야 한다. ③ 사업연도 내 발생한 모든 기부금 및 운영내역은 협회 결산보고에 포함하여 이사회에 보고하여야 한다."}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제18조", "article_title": "영수증의 발급", "content": "발전기금 기부자에게는 협회장 명의의 영수증을 경영기 획팀에서 발급한다."}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제19조", "article_title": "기부자에 대한 예우", "content": "기부자에 대하여는 기부의 내용과 정도에 따라 적 절한 예우를 할 수 있으며, 이의 세부사항은 따로 정한다."}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제20조", "article_title": "기금 유치자에 대한 예우", "content": "발전기금 조성에 직접 관여하여 상당액 이상 의 기금을 유치한 임직원 및 외부인사에게는 별도로 예우를 할 수 있고, 이에 대한 세부사항은 따로 정한다. Ⅱ-11-8 한국여성경제인협회 규정집"}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제21조", "article_title": "회계처리", "content": "경영기획팀으로 이관된 발전기금은 여성경제인 발전기금 전 용통장으로 관리하며, 기금회계에 전입시킨 후에 지출되어야 한다."}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제22조", "article_title": "기금 집행 및 집행결과 보고", "content": "① 경영기획팀으로 이관된 기금은 다음 각 호와 같이 집행한다. 1. 일반기부금으로 이루어진 기금의 경우 발전기금운영위원회에서 사용용도 를 심의한 후 협회장의 승인을 받아 경영기획팀에서 예산을 편성·집행한 다. 2. 지정기부금으로 이루어진 기금의 경우 발전기금운영위원회에서 사용용도 를 심의한 후 협회장의 승인을 받아 해당 부서에서 예산을 편성·집행한다. ② 기금의 집행부서는 당해연도 집행결과를 12월 이내에 경영기획팀에 송부 하고, 경영기획팀은 이를 수합하여 협회장에게 보고한다. 또한, 경영기획팀은 발전기금의 집행결과를 홈페이지를 통해 고지한다."}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제23조", "article_title": "회계감사", "content": "발전기금의 집행부서는 협회 감사규정에 의거하여 회계감사 를 받아야 한다."}, {"category": "규정", "regulation": "기부금 관리 및 운영규정", "article_num": "제24조", "article_title": "시행세칙", "content": "이 규정의 시행에 필요한 세부 세칙은 따로 시행세칙으로 정 할 수 있다. 부칙 <2020. 5. 20.> 이 규정은 이사회에서 의결한 날부터 시행한다. 기부금 관리 및 운영규정 Ⅱ-11-9 【별표 1】 □ 여성경제인 발전기금 기부금 약정서 「여성경제인 발전기금」 기 부 금 약 정 서 소속지회 성 명 기부자 회사명 직책 (회사) (핸드폰) 연락처 (이메일) 일반 / 지정 / 수증물품 / 부동산 기부금 종류 • 일반기부금 : 기금의 사용용도나 집행부서를 지정하지 아니한 기부금 • 지정기부금 : 기금의 사용용도나 집행부서를 지정하여 출연한 기부금 기부금액 만원 사용용도 집행부서 기 부 처 한국여성경제인협회 납부예정일 20○○년 월 일 납 부 우리은행 1005-103-628897 (예금주: 한국여성경제인협회) 계좌번호 상기와 같이 귀 협회에 기부금을 납입하고자 약정(신청)합니다. 20○○년 ○○월 ○○일 기부자(약정자) 성명 (인) Ⅲ. 경 영 직제규정 Ⅲ-1-1 경 영 직제규정 직제규정 Ⅲ-1-3 직제규정 제정 1999. 9. 6. 개정 2001. 9. 7. 개정 2005. 10. 25. 개정 2006. 4. 11. 개정 2013. 8. 29. 개정 2015. 6. 4. 경 전부개정 2019. 4. 29. 개정 2021. 4. 29. 개정 2024. 12. 16. 영 개정 2025. 8. 18. 제1장 총칙"}, {"category": "경영", "regulation": "직제규정", "article_num": "제1조", "article_title": "목적", "content": "본 규정은 한국여성경제인협회(이하 “협회”라 한다.)의 조직 및 업 무분장, 정원에 관한 사항을 규정하여 효율적인 업무수행을 기하고자 함을 목 적으로 한다."}, {"category": "경영", "regulation": "직제규정", "article_num": "제2조", "article_title": "용어의 정의", "content": "① “직위”라 함은 직무를 담당할 1인의 직원에게 부여할 수 있는 업무조직상의 위치를 말한다. ② “직무”라 함은 개인이 수행하기에 적합하도록 배분한 업무와 이에 따른 책 임과 권한을 말한다. ③ “직급”이라 함은 직무, 직위 부여의 기준이 되는 조직상의 자격등급의 명 칭을 말한다. ④ “책임자”라 함은 소관업무에 대한 전결 권한이 있고 동 업무에 대한 책임 이 있는 자를 말한다."}, {"category": "경영", "regulation": "직제규정", "article_num": "제3조", "article_title": "적용범위", "content": "협회의 조직, 직급 및 업무분장에 관하여 다른 법령 또는 정관 에 다른 규정이 있는 경우를 제외하고는 이 규정에 의한다. 제2장 사무처 조직 령 Ⅲ-1-4 한국여성경제인협회 규정집"}, {"category": "경영", "regulation": "직제규정", "article_num": "제4조", "article_title": "조직", "content": "협회의 사무처리를 위한 조직으로서 사무처를 두고 산하에 지회 사 무국을 둔다."}, {"category": "경영", "regulation": "직제규정", "article_num": "제5조", "article_title": "하부조직", "content": "① 사무처의 구성은 별도 규칙으로 정한다. ② 삭제 <’25. 8. 18.> ③ 각 부서의 장은 지휘계통상의 상급자의 명을 받아 담당업무를 통할하며 소 속직원을 지휘·감독한다."}, {"category": "경영", "regulation": "직제규정", "article_num": "제6조", "article_title": "임원", "content": "임원은 회장, 부회장, 이사 및 감사를 말한다."}, {"category": "경영", "regulation": "직제규정", "article_num": "제7조", "article_title": "직급 및 보직", "content": "① 직원은 일반직(연구직) 및 전문직, 기능직으로 구분하 며, 직급별 직위표는 【별표2】와 같다. ② 직원은 부장, 부부장, 차장, 과장, 대리, 주임, 사원으로 한다. 다만, 일정기 간 근무한 직원을 대상으로 차상위 직급에 준하는 우대제도를 운용할 수 있다. ③ 제2항 중 팀장 이상의 전결권한이 있는 직원을 책임자라 한다."}, {"category": "경영", "regulation": "직제규정", "article_num": "제8조", "article_title": "직무대행", "content": "① 상근책임자(이하 ‘상근부회장’이라 한다) 유고시 직제 순에 따라 직무를 대행한다. ② 본부장, 팀장 유고시 차하위자가 서열 순에 따라 직무를 대행한다. 제3장 업무분장"}, {"category": "경영", "regulation": "직제규정", "article_num": "제9조", "article_title": "업무분장의 원칙", "content": "① 모든 직무는 직제규정이 정하는 바에 따라 조직계통 의 통일성을 유지하여 수행하여야 한다. ② 서로 관련이 있는 직무는 관련 부서와 충분히 협의 조정하여 다른 분장직 무와 중복 또는 차질이 없도록 수행하여야 한다. ③ 직무를 수행함에 있어서 다른 직위자의 직무권한이나 분장직무를 침해하 여서는 아니된다. ④ 각 직위자의 직무는 소속 상위 직위자가 지정하며, 필요한 경우 소속 하위 직위자에게 재지정할 수 있다."}, {"category": "경영", "regulation": "직제규정", "article_num": "제10조", "article_title": "부서별 업무분장", "content": "각 부서의 사무분장은 별도 규칙으로 정한다. <개정 ’25. 8. 18.> 직제규정 Ⅲ-1-5 ① 삭제 <’25. 8. 18.> ② 삭제 <’25. 8. 18.> ③ 삭제 <’25. 8. 18.> 제4장 정원 등"}, {"category": "경영", "regulation": "직제규정", "article_num": "제11조", "article_title": "정원", "content": "① 사무처내 정원은 【별표3】와 같다. ② 협회 업무처리상 필요하다고 인정할 경우 계약직원을 별도로 둘 수 있다. 경 ④ 각 팀별 정원은 정원 내에서 상근부회장의 승인을 받아 정한다. ⑤ 지회 사무국의 정원 및 업무분장은 정관과 규정의 범위 내에서 자율적으로 영 운영할 수 있다."}, {"category": "경영", "regulation": "직제규정", "article_num": "제12조", "article_title": "협조", "content": "각 본부장은 소관업무 범위 내에서 그 분장한계를 유지하되 상호 관련된 업무에 대하여는 유기적인 협조를 하여야 한다. 제5장 보칙"}, {"category": "경영", "regulation": "직제규정", "article_num": "제13조", "article_title": "시행세칙", "content": "이 규정 시행에 필요한 사항은 회장이 세칙으로 정한다. 부칙 <1999. 9. 6.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2001. 9. 7.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2005. 10. 25.> 강 이 규정은 이사회에서 의결한 날부터 시행한다. Ⅲ-1-6 한국여성경제인협회 규정집 부칙 <2006. 4. 11.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2013. 8. 29.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2015. 6. 4.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2019. 4. 29.>"}, {"category": "경영", "regulation": "직제규정", "article_num": "제1조", "article_title": "시행일", "content": "이 규정은 2019년 4월 29일부터 시행한다."}, {"category": "경영", "regulation": "직제규정", "article_num": "제2조", "article_title": "경과조치", "content": "이 규정 전 발생한 사안은 이 규정에 의한
