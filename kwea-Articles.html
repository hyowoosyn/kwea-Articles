마다가스카르, 말라위, 말리, 모로코, 모리타니, 세네갈, 소말리아, 스와질란드, 알제리, 예멘, 에티오피아, 이라크, 잠비아, 짐바브웨, 튀니지 2. 제1호의 국가 및 도시별 등급 구분에 없는 국가는 여행 또는 근무 예정지에서 제1호의 국가의 수도까지의 거리가 가장 가까운 국가의 등급을 적용한다. 【별표 3】 준 비 금 (단위 : US $) 구분 회장 부회장 이ㆍ감사 1급 2급 3급 4급 5급 부임 또는 600 550 500 450 400 350 300 300 국외출장시 상근 국 연수기간 1급 2급 3급 4급 5급 임원 외 연 6개월 이상 700 650 600 550 500 450 수 시 6개월 미만 350 325 300 275 250 225 회계규정 Ⅲ-9-1 경 영 회계규정 회계규정 Ⅲ-9-3 회계규정 제정 1999. 9. 6. 개정 2001. 9. 7. 개정 2003. 5. 13. 개정 2013. 8. 29. 개정 2015. 6. 4. 개정 2019. 4. 29. 경 개정 2021. 4. 29. 영 제1장 총칙"}, {"category": "경영", "regulation": "회계규정", "article_num": "제1조", "article_title": "목적", "content": "본 규정은 한국여성경제인협회(이하 “협회”라 한다.)의 회계처리에 관한 원칙과 주요 절차를 규정함으로서 재정집행 상태를 계수적으로 신속ㆍ 정확ㆍ명료하게 표시하여 운영의 합리화와 효율화에 이바지함을 목적으로 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제2조", "article_title": "적용범위", "content": "협회의 모든 회계처리에 관한 사항은 관계법령 등에서 특별히 정한 경우를 제외하고는 이 규정이 정하는 바에 의한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제3조", "article_title": "회계년도", "content": "협회의 회계연도는 정부의 회계연도와 같이 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제4조", "article_title": "회계단위", "content": "① 협회의 회계단위는 일반회계와 특별회계로 구분한다. ② 일반회계는 협회의 일반적 업무활동에 관한 사항을 계리하는 것을 말한다. ③ 특별회계는 협회의 특정한 사업을 운영할 때나 일반회계와 구분하여 계리 할 필요가 있는 경우 이사회의 의결로써 설정 또는 폐지한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제5조", "article_title": "회계업무의 범위", "content": "각 회계단위가 다룰 회계업무의 범위는 다음과 같다. 1. 현금, 예금의 출납, 보관 및 어음, 유가증권에 관한 사항 2. 채권, 채무에 관한 사항 3. 재무장부와 동 부속서류의 기장ㆍ작성 및 보관에 관한 사항 강 4. 자금의 조달 및 운영에 관한 사항 5. 고정자산의 경리에 관한 사항 6. 예산, 결산에 관한 사항 Ⅲ-9-4 한국여성경제인협회 규정집 7. 기타 일반경리에 관한 사항. 다만, 특별회계업무의 일부 또는 전부를 회계 책임자에게 위임할 수 있다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제6조", "article_title": "회계의 통제", "content": "상근부회장은 매월 말 협회의 재무 상태를 회장에게 보고하 여야 한다. <개정 '01. 9. 7., '21. 4. 29.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제7조", "article_title": "회계책임자", "content": "① 각 회계단위의 회계책임자는 직제규정에서 정한 팀장 또는 사무책임자로 할 수 있다. ② 회계책임자는 소관 회계단위의 모든 회계업무에 대하여 관리책임을 진다. 제2장 계정과목과 장표"}, {"category": "경영", "regulation": "회계규정", "article_num": "제8조", "article_title": "계정과목", "content": "① 계정과목은 손익계산서계정과 대차대조표계정으로 구분한다. ② 계정과목은 중요성의 원칙에 따라 설정하고 명료성ㆍ계속성ㆍ비교성이 유 지되어야 한다. ③ 계정과목의 배열 및 해소는 회계요령으로 정하며 필요에 따라 신설 또는 통․폐합 할 수 있다. <개정 '01. 9. 7.> ④ 계정과목은 회계연도 중에는 회장의 승인 없이 변경할 수 없다. <개정 '01. 9. 7.> ⑤ 삭제 <'01. 9. 7.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제9조", "article_title": "회계장표 및 계정정리", "content": "① 각 회계단위는 다음의 회계장부 및 회계전표를 비치하여 계정의 정리를 행하여야 한다. 1. 총계정원장 2. 전표 <개정 '01. 9. 7.> 3. 재무제표(손익계산서, 대차대조표 등) <개정 '01. 9. 7.> 4. 보조장부(명세장, 대장, 기록부 등). 다만, 특별회계의 회계단위는 총계정 원장과 보조장부에 관한 사무를 협회의 회계책임자에게 위임할 수 있다. <개정 '01. 9. 7.> ② 계정정리요령은 회장이 별도로 정한다. <개정 '01. 9. 7.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제10조", "article_title": "기장요령", "content": "① 전표, 일계표, 보조원장, 총계정원장은 전산입력에 의하여 기장한다. ② 모든 기장은 회계담당자와 회계책임자의 날인을 받아 행한다. 회계규정 Ⅲ-9-5 ③ 보조부의 대․차변 각 회계금액 및 잔액은 원장 해당 계정의 금액과 일치하 여야 한다. <개정 '01. 9. 7.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제11조", "article_title": "장부의 마감", "content": "① 현금출납부는 원칙적으로 매일 마감하며 총계정원장 및 각 계정의 보조원장은 매월 말에 마감한다. ② 모든 장부는 회계연도 말에 폐쇄하고 차기에 사용할 수 없다. 다만, 유형고 정자산대장은 그러하지 아니하다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제12조", "article_title": "전표의 종류", "content": "전표는 입금, 출금, 대체전표로 구분한다. 경 영"}, {"category": "경영", "regulation": "회계규정", "article_num": "제13조", "article_title": "전표의 작성", "content": "① 전표는 회계담당부서에서 원칙적으로 증빙서에 의하여 작성한다. ② 전표는 계정과목별로 작성하여야 하며 계정과목, 작성일자, 금액, 거래상대 및 거래내용을 명기하여야 한다. ③ 전표에는 기표자, 회계담당자, 회계책임자가 날인하여야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제14조", "article_title": "전표의 마감", "content": "① 회계담당자는 매일 거래가 끝난 전표를 일과종료 1시간 전에 수집ㆍ마감하는 것을 원칙으로 한다. 칙 ② 전표에 의하여 계정별로 당일 거래총액을 집계하여 일정표를 작성한다. ③ 마감 이후에 발생된 거래에 대하여는 익일의 전표로 작성하여 익일 마감에 산입하여야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제15조", "article_title": "전표의 보관", "content": "제14조에 의하여 처리된 전표는 매일 일련번호순으로 편철 하여 보관할 수 있다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제16조", "article_title": "증빙서의 구분", "content": "① 기장의 증거가 되는 증빙서류는 다음과 같이 구분하고 그 서식은 따로 정한다. 1. 수입결의서 2. 지출결의서 3. 반납결의서 4. 여입결의서 <신설 '21. 4. 29.> ② 지출결의서에는 지급의 성질에 따라 다음 각 호의 증빙서류를 각각 첨부하 여야 한다. Ⅲ-9-6 한국여성경제인협회 규정집 1. 물품구입 및 용역의 지급: 계약서, 견적서, 청구(세금계산서), 영수증, 내부 결재문서(사본) 2. 도급공사 대금지급: 기성고조서 또는 준공검사 조서, 청구서(세금계산서), 영수증, 내부결재문서(사본) 3. 사업비 및 기타 경비의 지급: 지급명세서, 영수증 및 내부 결재 문서(사본) 등 기타 구비서류 ③ 위 ②항의 영수증은 계좌입금확인서, 신용카드 영수증으로 대체할 수 있으 며, 5백만원 이하의 계약사항은 검사조서 작성을 생략할 수 있다. [전문개정 ’01. 9. 7., ’13. 8. 29.]"}, {"category": "경영", "regulation": "회계규정", "article_num": "제17조", "article_title": "수납증빙", "content": "금액을 수납할 때에는 거래 상대방에게 발급한 영수증의 사 본을 증빙서류로 한다. <개정 '01. 9. 7.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제18조", "article_title": "지급증", "content": "상관습 기타 부득이한 사유로 인하여 영수증을 받을 수 없을 때 에는 지급자가 그 지급의 경위를 작성한 입금표 또는 지급증으로서 영수증에 갈음할 수 있다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제19조", "article_title": "증빙서의 정리 및 보관", "content": "금액을 지급 또는 수납할 때에는 지출품의서 또는 수입품의서에 관계 증빙서류를 첨부하여 회계전표에 편철한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제20조", "article_title": "마감전ㆍ후의 오진정정", "content": "① 마감 전 또는 마감 후 오진을 발견한 때에는 즉시 정정전표를 작성하여 이를 정정한다. ② 전항의 정정전표에는 정정의 요지를 기재하여야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제21조", "article_title": "기록의 보존", "content": "① 회계장표 및 증빙서류의 보존기간은 다음과 같다. 1. 예산 및 결산서류: 영구 2. 회계장표 및 증빙서류: 10년 3. 기타 부속서류: 5년 ② 전항의 보존기간이 경과한 부속서류를 폐기 처분할 때에는 회장의 승인을 얻어야 한다. 제3장 금전회계 회계규정 Ⅲ-9-7"}, {"category": "경영", "regulation": "회계규정", "article_num": "제22조", "article_title": "금전의 범위", "content": "① 이 규정에서 금전이라 함은 현금 및 예금을 말한다. ② 어음 및 유가증권도 금전에 준하여 취급한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제23조", "article_title": "금전의 출납 및 보관책임", "content": "① 금전의 출납 및 보관에 관하여는 회계담당 자가 직접 그 책임을 지며 관리책임은 회계책임자가 진다. ② 회계담당자는 금전의 출납 및 보관에 있어 영수금 및 지급금을 엄밀히 구 분하여 다른 목적에 의하여 유용하거나 상계하지 못한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제24조", "article_title": "금융기관과의 거래", "content": "① 은행 기타 금융기관과 거래를 개시 또는 폐지하 경 여야 할 때에는 회장의 승인을 얻어야 한다. 영 ② 전항의 거래는 회장 또는 회장이 임명한 자의 명의로 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제25조", "article_title": "어음행위", "content": "어음행위는 이사회의 의결을 얻은 후 회장 명의로 한다. <개 정 '01. 9. 7.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제26조", "article_title": "금전출납 직원", "content": "금전출납 및 보관업무의 집행에 있어 회계담당자를 보 조하기 위하여 금전출납 직원을 둘 수 있다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제27조", "article_title": "금전출납 직원의 교체", "content": "① 금전출납 직원이 교체되었을 때에는 전임자는 현금출납부를 마감하여 장부 잔액과 현금 시재를 대조ㆍ인계하고 장부에 일 자를 기입하여 후임자와 함께 기명날인하여야 한다. ② 전항의 경우 회계담당자는 장부와 금고를 검사하여 그 결과를 확인하고 날 인하여야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제28조", "article_title": "잔액대조", "content": "① 회계담당자는 매일의 거래 마감 후 현금잔액을 관계장부 와 대조하고 상위 없음을 확인하여야 한다. ② 예금은 매 15일과 말일에 구두 혹은 문서에 의하여 은행잔액과 대조하여 예금원장의 잔액과 상위 없음을 확인하여야 하며 잔액이 상위할 때에는 은행 계정조정표를 작성하여야 한다. ③ 제2항의 잔액대조 결과 현금 또는 예금의 과부족이 발견되었을 때에는 지 체없이 회계책임자에게 그 사유를 보고하여야 한다. 강"}, {"category": "경영", "regulation": "회계규정", "article_num": "제29조", "article_title": "사고보고", "content": "과오 지급 또는 도난 등에 의하여 금전의 망손실이 확인되었 Ⅲ-9-8 한국여성경제인협회 규정집 을 때에는 회계담당자는 상근부회장에게 다음 사항을 지체없이 보고하여야 한다. 1. 사고의 일시 및 장소 2. 사고금액 3. 사고원인 4. 사고발견 경위 5. 평소의 보관방법 6. 사고자에 대한 조치의견 7. 기타 사고현장과 책임에 관한 구체적 사실"}, {"category": "경영", "regulation": "회계규정", "article_num": "제30조", "article_title": "현금의 보유한도", "content": "회계부서의 현금보유한도는 원칙적으로 100만원을 초 과할 수 없으며 이를 초과하는 금액은 지체없이 은행에 예입하여야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제31조", "article_title": "현금의 지급한도", "content": "모든 지급은 수표에 의함을 원칙으로 하되 협회가 수 표를 발행하기 전까지는 은행송금으로 지급함을 원칙으로 한다. 다만, 30만원 이하의 소액지급, 급여 및 기타 부득이한 사유가 있을 때에는 예외로 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제32조", "article_title": "영수증", "content": "① 금전을 수납한 경우에는 소정의 영수증을 교부하여야 한다. 다만, 은행예금계좌로 수납시에는 생략할 수 있다. ② 영수증은 복사식으로 할 수 있다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제33조", "article_title": "지급절차", "content": "① 금전을 지급할 때에는 원인행위품의서의 결재를 얻은 후 상대방의 청구서와 회계전표를 대조하여 상위 없음을 확인한 후 수령인의 영 수증과 교환으로 지급하여야 한다. 다만, 필요에 따라 원인행위 품의서를 생 략할 수 있다. <개정 '01. 9. 7> ② 영수증을 대조할 때에는 반드시 다음 사항을 면밀히 검토하여야 한다. 1. 영수금액, 일자, 수령인의 주소, 상호, 성명, 인감, 사업자등록번호 또는 주 민등록번호 2. 은행계좌이체 신청이 되어 있는 경우에는 신고된 각 은행계좌번호 ③ 제1항의 영수증에는 은행계좌이체 신청업체의 은행계좌 및 기타 확인된 수령인의 은행계좌에 예입된 은행입금표를 포함한다. 회계규정 Ⅲ-9-9 제4장 자금관리"}, {"category": "경영", "regulation": "회계규정", "article_num": "제34조", "article_title": "월차자금예산", "content": "각 회계단위는 매분기의 자금예산에 의하여 자금계획을 매월 편성하고 이에 따라 월차총합자금예산을 작성한다. <개정 '01. 9. 7.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제35조", "article_title": "차입 및 반환", "content": "외부자금을 차입 또는 반환할 경우에는 자금사정을 감안 하여 이사회의 의결을 받은 후 시행한다. <개정 '01. 9. 7.> 경"}, {"category": "경영", "regulation": "회계규정", "article_num": "제36조", "article_title": "여유자금의 운용방법", "content": "① 여유자금을 운용함에 있어서는 각종 자금계획 의 원활한 수행을 저해하지 아니하는 범위안에서 행하여야 한다. 영 ② 여유자금의 운용은 가장 유리한 방법에 의하여야 한다. ③ 여유자금의 운용방법은 회장의 승인을 얻어야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제37조", "article_title": "수입원칙", "content": "금전의 수입은 현금 또는 자기앞수표에 의함을 원칙으로 하 고 회장이 인정하는 경우에 한하여 어음 기타 유가증권 등에 의할 수 있다. 제37조의 2(현금의 보유한도)현금의 보유한도액은 회계별로 50만원을 원칙으로 하되 회장이 부득이하다고 인정하는 경우에는 한도액을 초과 보유할 수 있 다. <신설 ’13. 8. 29.> 제5장 고정자산"}, {"category": "경영", "regulation": "회계규정", "article_num": "제38조", "article_title": "고정자산의 범위", "content": "이 규정에서 “고정자산”이라 함은 다음 각 호에서 제 기하는 자산과 그 취득가격이 거래단위별로 100만원을 초과하는 자산으로서 법인세법에서 규정한 즉시상각의 의제에 포함되지 않는 자산을 말한다. <개 정 ’01. 9. 7.> 1. 그 고유 업무의 성질상 대량으로 보유하는 자산 2. 사업의 개시 또는 확장을 위하여 취득한 자산"}, {"category": "경영", "regulation": "회계규정", "article_num": "제39조", "article_title": "고정자산 처리요령", "content": "고정자산의 처리요령은 별도로 회장이 정한다. 강 제6장 예산 령 Ⅲ-9-10 한국여성경제인협회 규정집"}, {"category": "경영", "regulation": "회계규정", "article_num": "제40조", "article_title": "예산편성 및 통제의 실시", "content": "협회는 장래의 사업계획에 입각하여 일정기간 에 있어서의 계수적 목표를 명확히 표시하고 사업 각 부문의 활동을 지도하 며 사업능률을 증진시키기 위하여 예산을 편성하고 예산통제를 실시한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제41조", "article_title": "예산의 구분", "content": "예산은 다음과 같이 구분한다. 1. 수익예산 2. 비용예산 3. 재무예산(자금예산, 투자예산 포함) <개정 '01. 9. 7.> 4. 총합예산"}, {"category": "경영", "regulation": "회계규정", "article_num": "제42조", "article_title": "예산과목", "content": "① 예산과목은 원칙적으로 계정과목과 일치하여야 한다. 다 만, 통제목적을 위하여 필요한 때에는 이를 조정하여 설정할 수 있다. ② 세입예산과 세출예산의 관․항․목의 구분과 설정의 사항구분은 회장이 정 하는 바에 의한다. <개정 '03. 5. 13.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제43조", "article_title": "회계단위에 있어서의 예산통제사무", "content": "① 부문예산 책임자는 소관예산에 대한 자체통제를 행한다. ② 전항의 사무는 필요에 따라 이를 관계 각과에 분장시킬 수 있다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제44조", "article_title": "예산편성지침", "content": "회계담당자는 사업계획에 의거 차기의 예산편성지침을 입안하여 회장의 결재를 얻어 예산을 편성한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제45조", "article_title": "예산안의 작성 및 제출", "content": "예산책임자는 예산편성지침 및 과거 실적을 참 조하여 각 소관부서의 예산안을 작성한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제46조", "article_title": "예산의 확정", "content": "다음연도의 예산은 차년도 이사회 개최 전까지 회장의 결 재를 받아 이사회에서 의결한다. <개정 '01. 9. 7., ’15. 6. 4.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제47조", "article_title": "예산의 적용", "content": "① 확정된 년간 예산에 대한 예산 효율의 증대를 위하여 이를 각 반기별로 구분하여 실행예산을 편성하여 운용한다. ② 책임자는 반기별로 실행예산안을 작성하여 반기 개시 15일전에 상근부회 장에게 제출하여야 한다.<개정 '19. 4. 29.> ③ 상근부회장은 이를 조정하여 반기별 실행예산을 편성한 후 회장의 결재를 회계규정 Ⅲ-9-11 얻어 반기 개시 7일전에 시달한다.<개정 '19. 4. 29.> ④ 예산책임자는 시달 예산의 집행 도중 시달 예산의 변경이 필요한 때에는 수정사유와 그 내용을 명백히 하는데 필요한 서류를 첨부하여 사무처장에게 신청하여야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제48조", "article_title": "예산의 집행", "content": "① 예산책임자는 결정된 예산을 책임지고 집행하여야 한 다. 다만, 상근부회장은 재정형편에 따라 예산집행을 제한할 수 있다. ② 예산책임자가 예산지출을 품의할 때에는 회계책임의 해당 지출과목에 관 경 한 예산 대조를 거쳐 소정의 결재를 받아야 한다. ③ 예산통제상의 필요에 따라 제2항의 예산지출 품의는 원행위품의(원품의)로 영 갈음할 수 있다. 다만, 이 경우에 기밀비, 홍보비, 잡비, 업무추진비, 접대비는 예외로 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제49조", "article_title": "자금예산의 관행", "content": "자금예산의 실행방법에 관하여는 별도로 회장이 정하 는 자금사무요령에 따른다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제50조", "article_title": "예산의 변경", "content": "예산의 실행 도중에 계획의 변경 및 사업외적인 요인에 의 하여 예산 관․항의 경정이 요구될 때에는 이사회의 의결로써 경정하여 그 내 용을 차기총회에 보고하여야 한다. <개정 '01. 9. 7., ’03. 5. 13.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제51조", "article_title": "예산의 전용", "content": "예산의 목간의 전용 및 예비비를 사용할 필요가 있을 때에 는 회장의 승인을 얻어야 한다. 제51조의 2(예산의 이월 및 계속) 예산은 당해연도 종료 후에는 사용할 수 없으 나, 경비의 성질 상 불가피하게 집행할 수 없는 경우에는 최소한의 범위에서 인정할 수 있다. <신설 ’13. 8. 29.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제52조", "article_title": "예산의 초과", "content": "사업계획의 변경에 의하여 직접 영향을 받는 예산경정의 경우를 제외한 단위사업 예산의 초과지출에 관하여는 회장의 승인을 얻어야 한 다. 강"}, {"category": "경영", "regulation": "회계규정", "article_num": "제53조", "article_title": "실적의 파악", "content": "예산책임자는 예산의 집행실적을 파악하고 예산의 실시상 황을 감독ㆍ관리하여야 한다. Ⅲ-9-12 한국여성경제인협회 규정집 제7장 결산"}, {"category": "경영", "regulation": "회계규정", "article_num": "제54조", "article_title": "결산의 실시", "content": "협회는 회계기간 중 운영활동의 성과를 정확히 파악하고 기말의 재정상태를 명료히 표시하여 운영의 효율화에 이바지하기 위하여 결 산을 실시한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제55조", "article_title": "결산의 시기", "content": "결산은 매회계년도말에 기말결산을 실시하며 매반기에는 반기별로 손익계산을 실시한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제56조", "article_title": "결산의 총괄", "content": "상근부회장은 결산에 관한 사무를 총괄한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제57조", "article_title": "장부의 마감", "content": "각 회계단위는 결산일자를 기준으로 결산정리를 완료하고 장부의 각 계정을 마감하여야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제58조", "article_title": "결산정리사항", "content": "결산정리사항은 다음과 같다. 1. 당해연도에 속하는 모든 거래의 기장정리 2. 발생비용의 정리 3. 불량채권의 정리 및 조정 4. 선수 및 미수이익의 정리 5. 감가상각 6. 기타 결산정리사항 제58조의 2(대손충당금) ① 회수가 불확실한 채권은 합리적이고 객관적인 기준 에 따라 산출한 대손추산액을 대손충당금으로 설정할 수 있다. <신설 ’13. 8. 2 9.> 제58조의 3(충당부채) ① 과거 사건이나 거래의 결과에 따른 현재의무로써, 지 출의 시기 또는 금액이 불확실하지만 그 의무를 이행하기 위하여 자원이 유 출될 가능성이 매우 높고 또한 해당 금액을 신뢰성 있게 추정할 수 있는 의 무에 대하여는 그 금액을 추산하여 충당부채로 계상하여야 한다. <신설 ’13. 8. 2 9.> ② 충당부채는 퇴직급여충당부채, 판매보증충당부채 등을 포함하는 것으로 회계규정 Ⅲ-9-13 한다. <신설 ’13. 8. 29.> 제58조의 4(사업외 특별손익등의 처리) ① 예산에 책정되지 아니한 사업외 손익 과 특별손익이 발생할 때에는 회장의 결재를 받아 처리한다. <신설 ’13. 8. 2 9.> ② 특별손익은 자산수증이익(기타자본잉여금에 속하지 아니하는 것에 한다), 채무면제이익(기타자본잉여금에 속하지 아니하는 것에 한다), 보험차익․전기 오류 수정 이익 등 경상이익잉여금 이외의 이익을 포함한다. <신설 ’13. 8. 29.> 경 ③ 특별손실은 재해손실․전기오류수정 손실 등 경상손실 이외의 손실을 포함 한다. <신설 ’13. 8. 29.> 영 제58조의 5(법인세 비용) 예산에 계상하여야 할 법인세 비용은 기업회계기준에 불구하고『법인세법』등에 따라 당기에 부담하여야 할 금액으로 한다. <신설 ’13. 8. 29.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제59조", "article_title": "결산서류의 보고", "content": "① 회계책임자는 회계 연도 말에 다음의 서류를 작성 규 하여 회장에게 보고하여야 한다. <개정 '01. 9. 7.> 1. 운영성과표 <개정 '21. 4. 29.> 2. 재무상태표 <개정 '21. 4. 29.> 3. 재무상태표와 운영성과표에 대한 주석 <개정 '21. 4. 29.> 4. 예금잔액명세서 5. 감가상각비내역서 6. 고정자산관계제표 지 7. 기타 부속서류 ② 결산은 다음사업년도 개시 후 30일 이내에 감사에게 보고하고 총회의 승인 을 받아야 한다. <개정 '01. 9. 7.> ③ 삭제 <'01. 9. 7.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제59조의1", "article_title": "결산서의 비치, 공시 및 공고", "content": "결산 서류의 비치, 공시 및 공고에 관한 사항은 관련법 등에 따른다. <신설 '21. 4. 29.> 강 Ⅲ-9-14 한국여성경제인협회 규정집 제8장 계약"}, {"category": "경영", "regulation": "회계규정", "article_num": "제60조", "article_title": "계약", "content": "① 매매, 대차, 도급, 기타의 계약을 할 경우에는 이를 공고하여 경쟁에 부쳐야 한다. 다만, 경쟁에 부함이 불리하다고 인정될 때에는 지명 경쟁계약 또는 수의계약에 의할 수 있다. <개정 '13. 8. 29.> ② 계약을 체결할 때에는 계약의 목적, 금액, 이행기간, 계약보증금, 지체상금, 하자담보의 책임, 기타 필요한 사항을 상세히 기재한 계약서를 작성하여야 한 다. 다만 다음 각 1호의 1에 해당하는 경우에는 계약서의 작성을 생략 할 수 있다. <개정 '13. 8. 29.> 1. 계약금액이 5백만원을 초과하지 아니하는 계약을 체결할 때 2. 기타 계약서 작성이 불필요한 경우 ③ 계약을 체결하고자 하는 자는 일정 금액의 계약 보증금을 납입 하여야 하 며, 납입조건은 국가를 당사자로 하는 계약에 관한 법률을 준용한다. <신설 '1 3. 8. 29.> ④ 일반경쟁과 지명 경쟁계약, 수의계약 등에 관한 사항은 국가를 당사자로 하는 계약에 관한 법률 중 필요한 사항을 준용한다. <신설 '13. 8. 29.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제61조", "article_title": "계약서 작성", "content": "① 삭제 <’13. 8. 29.> ② 삭제 <’13. 8. 29.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제62조", "article_title": "계약보증금", "content": "전문삭제 <’13. 8. 29.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제63조", "article_title": "일반경쟁계약", "content": "전문삭제 <’13. 8. 29.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제64조", "article_title": "지명경쟁", "content": "전문삭제 <’13. 8. 29.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제65조", "article_title": "수의계약", "content": "전문삭제 <’13. 8. 29.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제66조", "article_title": "예정가격 등", "content": "전문삭제 <’13. 8. 29.> 회계규정 Ⅲ-9-15 제9장 물품관리"}, {"category": "경영", "regulation": "회계규정", "article_num": "제67조", "article_title": "범위", "content": "물품관리의 대상은 다음과 같다. 1. 고정자산의 차량운반구, 공기구비품 2. 해외자산(비용성)의 비품 3. 저장품, 소비품(비용성)"}, {"category": "경영", "regulation": "회계규정", "article_num": "제68조", "article_title": "기능", "content": "물품관리의 소관 책임부서에서는 다음의 업무를 수행하여야 한다. 경 1. 소요량의 산정과 판단 2. 취득 영 3. 기록의 유지 4. 보관 5. 출납 6. 유지(정비) 7. 처분"}, {"category": "경영", "regulation": "회계규정", "article_num": "제69조", "article_title": "물품관리요령", "content": "물품관리요령은 회장이 별도로 정한다. <개정 '01. 9. 7.> 부칙 <1999. 9. 6.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2001. 9. 7.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2003. 5. 13.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2013. 8. 29.> Ⅲ-9-16 한국여성경제인협회 규정집 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2015. 6. 4.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2019. 4. 29.>"}, {"category": "경영", "regulation": "회계규정", "article_num": "제1조", "article_title": "시행일", "content": "이 규정은 2019년 4월 29일부터 시행한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제2조", "article_title": "경과조치", "content": "이 규정 전 발생한 사안은 이 규정에 의한 것으로 간주한다. 부칙 <2021. 4. 29.> 이 규정은 2021년 4월 29일부터 시행한다. Ⅳ. 규칙 취업규칙 Ⅳ-1-1 취업규칙 취업규칙 Ⅳ-1-3 취업규칙 법 제정 2019. 9. 5. 제1장 총칙"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제1조", "article_title": "목적", "content": "①이 규정은 직원의 근로조건에 관한 사항을 규정함으로써 협회의 발전과 근로자의 생활 보장, 향상을 목적으로 한다. ②이 규정에 명시되지 아니한 근로조건에 관하여는 근로기준법, 정관 및 이 취 업규칙에 의하여 제정된 모든 규정이 정하는 바에 의한다.(협회발전, 근로자 생 활보장, 향상 등) 규"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제2조", "article_title": "적용범위", "content": "이 규정은 협회에 근무하는 직원(이하 “임직원”이라 한다)에 대 하여 적용한다. 제2장 복무 제1절 일반적 준수사항"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제3조", "article_title": "성실의무", "content": "①직원은 업무관리운영의 기본이 되는 법령, 정관, 제규정 및 상 급자의 정당한 직무상 명령을 충실히 준수하여야 한다. ②직원은 성실히 근무하며 맡은 바 직책을 신속․정확하게 수행하여야 한다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제4조", "article_title": "자기계발", "content": "직원은 자기계발에 노력하고 상호 융화하여 업무발전에 기여하 여야 한다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제5조", "article_title": "근무태도", "content": "①직원은 본 협회의 신용과 명예가 손상되지 않도록 언행에 유 의하여야 한다. ②직원은 복장 및 용모를 단정히 함은 물론 예절과 규율을 존중하고 고객에게 친절한 근무태도를 유지하여야 한다. 령 Ⅳ-1-4 한국여성경제인협회 규정집"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제6조", "article_title": "비밀누설금지", "content": "직원은 업무상 알게 된 비밀을 누설하여서는 아니 된다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제7조", "article_title": "겸업금지", "content": "직원은 타 영리사업에 종사할 수 없다. 다만, 비영리사업에 대하 여는 상근부회장(이하 ‘부회장’라 한다)의 허가를 받아 종사할 수 있다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제8조", "article_title": "청렴의무", "content": "직원은 업무와 관련하여 직접 또는 간접을 불문하고 어떠한 명 목으로든지 사례․증여 또는 향연을 받거나 금전을 차용하여서는 아니 된다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제9조", "article_title": "보증행위의 금지", "content": "직원은 협회와 관련하여 타인의 신원보증 또는 기타 일 체의 보증행위를 하지 못한다. 다만, 타규정 또는 부회장이 따로 인정하는 경우 에는 예외로 할 수 있다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제10조", "article_title": "업무상 과오의 보고", "content": "직원 본인이 업무상 과오를 일으켰거나 타 직원의 과오를 발견하였을 시에는 즉시 상급자에게 보고하고 지시를 받아야 한다. 제2절 업무시간․휴식시간과 유급휴일"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제11조", "article_title": "업무시간과 휴식시간", "content": "①직원의 업무시간과 휴식시간은 다음과 같다. 구 분 업무개시 휴식시간 업무종료 평 일 오전 9시 정오부터 1시간 오후 6시 ②휴식시간은 업무수행에 지장이 없도록 교대로 이용해야 한다. ③제1항의 업무시간은 필요에 따라 1일 8시간, 1주 40시간 범위 내에서 변경할 수 있다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제12조", "article_title": "유급휴일", "content": "협회의 유급휴일은 따로 정하는 「복무규정」에 의한다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제13조", "article_title": "특수업무종사자의 집무시간", "content": "직원 중 경비, 자동차운전, 청소 및 기타 특 수업무에 종사하는 자에 대하여는 1일 8시간, 1주 40시간 범위 내에서 시업시 각 및 종업시각을 변경할 수 있다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제14조", "article_title": "시간외 근로", "content": "①업무수행을 위해 필요한 때에는 「근로기준법」에서 정 하는 바에 따라 소정 근무시간외에 따로 시간외근무 및 휴일근무를 명할 수 있 취업규칙 Ⅳ-1-5 으며, 따로 정하는 「복무규정」에 의한다. ②제1항의 경우 별도 보수규정에 의한 시간외근무수당을 지급한다. 제3절 휴가 및 휴직"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제15조", "article_title": "휴가 및 휴직", "content": "①직원의 휴가는 따로 정하는 「복무규정」에 의한다. ②직원의 휴직에 관하여는 따로 정하는 「복무규정」에 의한다. 제3장 채용 및 신원보증"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제16조", "article_title": "채용", "content": "직원의 채용은 따로 정하는 「인사관리규정」에 의한다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제17조", "article_title": "신원보증", "content": "직원의 신원보증에 관하여는 따로 정하는 「인사관리규정」에 의한다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제18조", "article_title": "손해배상의 의무", "content": "직원이 고의 또는 과실로 협회에 손해를 끼쳤을 경우에 는 따로 정하는 「복무규정」에 의한다. 제4장 보수 및 복리후생"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제19조", "article_title": "보수", "content": "보수의 결정, 계산과 지급방법, 지급시기 등에 관한 사항은 따로 정 하는 「보수규정」에 의한다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제20조", "article_title": "복리후생", "content": "복리후생에 관한 사항은 따로 정하는 「보수규정」에 의한다. 제5장 퇴직 및 정년"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제21조", "article_title": "퇴직 및 정년", "content": "①직원의 퇴직과 정년에 관한 사항은 따로 정하는 「복무 규정」에 의한다. ②퇴직할 경우엔 따로 정하는「보수규정」에 의하여 퇴직금을 지급한다. 제6장 교육 Ⅳ-1-6 한국여성경제인협회 규정집"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제22조", "article_title": "교육", "content": "직원의 교육에 관한 사항은 따로 정하는 「복무규정」에 의한다. 제7장 안전과 보건"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제23조", "article_title": "안전보건관리규정", "content": "① 협회는 사업장의 안전·보건을 유지하기 위하여 다음 각 호의 사항이 포함된 안전보건관리규정을 작성하여 각 사업장에 게 시하거나 갖춰 두고, 이를 근로자에게 알려야 한다. 1. 안전·보건 관리조직과 그 직무에 관한 사항 2. 안전·보건교육에 관한 사항 3. 작업장 안전관리에 관한 사항 4. 작업장 보건관리에 관한 사항 5. 사고 조사 및 대책 수립에 관한 사항 6. 그 밖에 안전·보건에 관한 사항 ② 각 부서는 협회의 안전보건관리규정에 따라 각 작업장의 안전보건관리를 실시하여야 한다. ③ 직원은 안전보건관리계획의 효과적인 운용을 위하여 적극적으로 협력하 여야 한다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제24조", "article_title": "안전보건 교육", "content": "협회는 직원의 산업재해예방을 위하여 안전 및 보건에 관한 정기교육, 채용 시의 교육, 작업내용 변경 시의 교육, 유해위험 작업에 사용 시 특별안전 교육 등 산업안전보건법령에 따른 제반 교육을 실시하며 직원은 이 교육에 성실하게 참여하여야 한다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제25조", "article_title": "건강진단", "content": "① 협회는 직원의 건강보호․유지를 위하여 산업안전보건법 이 정하는 바에 따라 매년 1회 일반건강진단을 실시한다. ② 협회는 산업안전보건법이 정하는 바에 따라 필요한 경우 특수․배치전․수 시․임시건강진단 등을 실시한다. ③ 직원은 협회가 실시하는 건강진단을 성실히 받아야 한다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제26조", "article_title": "산업안전보건법 준수", "content": "① 협회는 이 규칙에서 정하지 아니한 사항에 대하여는 산업안전보건법에 따라 산업재해 예방을 위한 기준을 지켜 직원의 취업규칙 Ⅳ-1-7 신체적 피로와 정신적 스트레스 등에 의한 건강장해를 예방하고 안전 및 보 건을 유지․증진시켜야 한다. ② 직원은 산업안전보건법에서 정하는 사항과 그 외 업무에 관련되는 안전보 건에 관하여 상사로부터 지시받은 사항을 정확하게 이행하여야 한다. 제8장 요양과 재해보상"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제27조", "article_title": "재해보상", "content": "직원의 재해보상에 관하여는 따로 정하는 「복무규정」에 의한 다. 제9장 포상과 징계"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제28조", "article_title": "포상", "content": "직원의 포상에 관하여는 따로 정하는 「복무규정」에 의한다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제29조", "article_title": "징계", "content": "직원의 징계에 관하여는 따로 정하는 「복무규정」에 의한다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제30조", "article_title": "상벌의 기준과 절차", "content": "상벌의 기준과 절차에 관한 사항은 따로 정하는 「복무규정」에 의한다. 제10장 직장 내 괴롭힘의 예방"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제31조", "article_title": "직장 내 괴롭힘 행위의 금지", "content": "① 직장 내 괴롭힘이란 임․직원이 직장에 서의 지위 또는 관계 등의 우위를 이용하여 업무상 적정범위를 넘어 다른 직원 에게 신체적․정신적 고통을 주거나 근무환경을 악화시키는 행위를 말한다. 침 ② 직원은 다른 직원 뿐 아니라 협력사 직원에 대하여도 직장 내 괴롭힘 행 위를 하여서는 아니 된다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제32조", "article_title": "금지되는 직장 내 괴롭힘 행위", "content": "협회에서 금지되는 구체적인 직장 내 괴 롭힘 행위는 다음 각 호와 같다. 1. 신체에 대하여 폭행하거나 협박하는 행위 2. 지속‧반복적인 욕설이나 폭언 령 3. 다른 직원들 앞에서 또는 온라인상에서 모욕감을 주거나 개인사에 대한 Ⅳ-1-8 한국여성경제인협회 규정집 소문을 퍼뜨리는 등 명예를 훼손하는 행위 4. 합리적 이유 없이 반복적으로 개인 심부름 등 사적인 용무를 지시하는 행위 5. 합리적 이유 없이 업무능력이나 성과를 인정하지 않거나 조롱하는 행위 6. 집단적으로 따돌리거나, 정당한 이유 없이 업무와 관련된 중요한 정보 또 는 의사결정 과정에서 배제하거나 무시하는 행위 7. 정당한 이유 없이 상당기간 동안 근로계약서 등에 명시되어 있는 업무와 무관한 일을 지시하거나 근로계약서 등에 명시되어 있는 업무와 무관한 허드렛일만 시키는 행위 8. 정당한 이유 없이 상당기간 동안 일을 거의 주지 않는 행위 9. 그밖에 업무의 적정범위를 넘어 직원에게 신체적․정신적 고통을 주거나 근 무환경을 악화시키는 행위"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제33조", "article_title": "직장 내 괴롭힘 예방교육", "content": "① 협회는 직장 내 괴롭힘 예방을 위한 교육 (이하 “직장 내 괴롭힘 예방교육”이라 한다)을 1년에 1회 이상 실시한다. ② 직장 내 괴롭힘 예방교육은 1시간으로 한다. ③ 직장 내 괴롭힘 예방교육의 내용은 다음 각 호와 같다. 1. 직장 내 괴롭힘 행위의 정의 2. 금지되는 직장 내 괴롭힘 행위 3. 직장 내 괴롭힘 상담절차 4. 직장 내 괴롭힘 사건처리절차 5. 직장 내 괴롭힘 피해자 보호를 위한 조치 6. 직장 내 괴롭힘 행위자에 대한 조치 7. 그밖에 직장 내 괴롭힘 예방을 위한 내용 ④ 협회는 직장 내 괴롭힘 예방교육의 주요 내용을 직원들이 쉽게 확인할 수 있도록 조치한다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제34조", "article_title": "직장 내 괴롭힘 행위 발생 시 조치", "content": "① 누구든지 직장 내 괴롭힘 발 생 사실을 알게 된 경우 그 사실을 협회에 신고할 수 있다. ② 협회는 전항에 따른 신고를 접수하거나 직장 내 괴롭힘 발생 사실을 인지 한 경우에는 지체 없이 그 사실 확인을 위한 조사를 실시하여야 한다. ③ 협회의 직장 내 괴롭힘 행위에 관한 조사 및 조치에 관한 구체적인 절차 는 별도로 정한다. 취업규칙 Ⅳ-1-9 제11장 직장 내 성희롱의 금지 및 예방"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제35조", "article_title": "직장 내 성희롱의 금지", "content": "협회 임직원은 직장 내 성희롱을 하여서는 아니 된다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제36조", "article_title": "직장 내 성희롱 예방 교육", "content": "① 협회는 직장 내 성희롱을 예방하고 근 로자가 안전한 근로환경에서 일할 수 있는 여건을 조성하기 위하여 직장 내 성희롱의 예방을 위한 교육(이하 \"성희롱 예방 교육\"이라 한다)을 매년 실시 하여야 한다. ② 협회 임직원은 제1항에 따른 성희롱 예방 교육을 받아야 한다. ③ 협회는 직장 내 성희롱 예방교육의 주요 내용을 직원들이 쉽게 확인할 수 있 도록 조치하여야 한다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제37조", "article_title": "직장 내 성희롱 발생 시 조치", "content": "① 누구든지 직장 내 성희롱 발생 사 실을 알게 된 경우 그 사실을 협회에 신고할 수 있다. ② 협회는 전항에 따른 신고를 접수하거나 직장 내 성희롱 발생 사실을 인지 한 경우에는 지체 없이 그 사실 확인을 위한 조사를 실시하여야 한다. ③ 협회의 직장 내 성희롱 행위에 관한 조사 및 조치에 관한 구체적인 절차 는 별도로 정한다. 부칙 <2019. 9. 5.>"}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제1조", "article_title": "제정일", "content": "이 규정은 2019년 9월 5일부터 시행한다."}, {"category": "규칙", "regulation": "취업규칙", "article_num": "제2조", "article_title": "경과조치", "content": "이 규정 전 발생된 사안은 이 규정에 의한 것으로 간주한다. 경조금지급규칙 Ⅳ-2-1 경조금지급규칙 경조금지급규칙 Ⅳ-2-3 경조금지급규칙 법 2013. 12. 3. 제정"}, {"category": "규칙", "regulation": "경조금지급규칙", "article_num": "제1조", "article_title": "목적", "content": "이 규칙은 한국여성경제인협회(이하“협회”라 한다.) 임직원의 경조 사에 대하여 협회에서 지급하는 경조금에 관한 기준과 절차를 규정함을 목적 으로 한다."}, {"category": "규칙", "regulation": "경조금지급규칙", "article_num": "제2조", "article_title": "적용범위", "content": "협회의 경조금 지급에 관하여는 다른 규칙에서 특별히 정한 것 이 있는 경우 외에는 이 규칙에 의한다. 단, 회원 등의 경조사, 각종행사의 경 우에는 회장이 필요하다고 인정한 경우에 별도의 경조금 또는 물품을 지급할 규 수 있다."}, {"category": "규칙", "regulation": "경조금지급규칙", "article_num": "제3조", "article_title": "지급대상", "content": "경조금의 지급대상은 협회 임직원으로 한다."}, {"category": "규칙", "regulation": "경조금지급규칙", "article_num": "제4조", "article_title": "지급종류", "content": "경조금의 종류는 다음 각 호와 같다. 1. 조의금 2. 축의금 3. 화환, 조화 4. 기타경조금"}, {"category": "규칙", "regulation": "경조금지급규칙", "article_num": "제5조", "article_title": "지급기준 및 조건", "content": "경조금의 지급기준은〔별표 1〕경조금지급기준과 같 지 다. 다만, 회장이 필요하다고 인정할 경우에는 경조금을 가감하여 지급할 수 있다. 침"}, {"category": "규칙", "regulation": "경조금지급규칙", "article_num": "제6조", "article_title": "지급방법 및 순위", "content": "① 이 규칙에 의한 경조금의 지급은 본인에게 직접 전 달 함을 원칙으로 한다. 다만, 본인의 직접 수령이 불가능할 경우 대리인에게 지급할 수 있다. ② 유족에게 지급되는 경우 유족의 범위 및 순위는 근로기준법이 정하는바에 따른다."}, {"category": "규칙", "regulation": "경조금지급규칙", "article_num": "제7조", "article_title": "지급조건 및 기준변경", "content": "이 규칙에 의한 경조금의 지급은〔별표 1〕의 지 Ⅳ-2-4 한국여성경제인협회 규정집 급기준에 의하여야 한다. 다만, 협회의 대내외적 사정으로 인하여 정상지급이 불가능 또는 부당하다고 인정될 때에는 그러하지 아니하다."}, {"category": "규칙", "regulation": "경조금지급규칙", "article_num": "제8조", "article_title": "청구기간", "content": "이 규칙에 의하여 발생한 청구권은 권리발생일로부터 3개월간 이행하지 않으면 소멸한다."}, {"category": "규칙", "regulation": "경조금지급규칙", "article_num": "제9조", "article_title": "청구절차", "content": "① 이 규칙의 경조금 지급청구는 본인이 경조금지급청구서의 작성, 사실 확인 서류를 첨부하여, 운영관리팀에 제출한다. 다만, 본인의 직접 청구가 불가능한 경우에는 대리인이 청구할 수 있다. ② 운영관리팀은 신청서 접수일로부터 3일 이내에 수령 해당자에게 경조금을 지급하여야 한다. 부칙 <2013. 12. 3.> 이 규칙은 회장으로부터 승인된 날로부터 시행한다. 경조금지급규칙 Ⅳ-2-5 【별표 1】 경 조 금 지 급 기 준 구 분 내 용 경조비 비 고 본인 결혼 300,000원 화환 축의금 자녀 결혼 200,000원 화환 자녀 출산 200,000원 부모 및 배우자부모, 배우자 사망 300,000원 조화 본인 사망 300,000원 조화 조의금 규 자녀 사망 200,000원 조화 본인 및 배우자 조부모의 사망 100,000원 기타경조금 회장이 필요하다고 인정한 경우 별도 산정 인사 교류를 위한 전출 규칙 Ⅳ-3-1 인사 교류를 위한 전출 규칙 인사 교류를 위한 전출 규칙 Ⅳ-3-3 인사 교류를 위한 전출 규칙 법 제정 2013. 8. 29."}, {"category": "규칙", "regulation": "인사 교류를 위한 전출 규칙", "article_num": "제1조", "article_title": "목적", "content": "이 기준은 인사규정 17조의 1에 따라 인사교류를 위해 시행하는 전 출에 관한 세부사항을 정함을 목적으로 한다."}, {"category": "규칙", "regulation": "인사 교류를 위한 전출 규칙", "article_num": "제2조", "article_title": "적용범위", "content": "인사교류를 위해 전출로 이동하는 직원에 대한 인사에 관하여 는 이 기준을 우선적으로 적용하며, 이 기준에서 정하지 아니한 사항은 다른 규 정 등에서 정하는 바에 의한다."}, {"category": "규칙", "regulation": "인사 교류를 위한 전출 규칙", "article_num": "제3조", "article_title": "용어의 정의", "content": "이 기준에서 사용하는 용어의 정의는 다음과 같다. 1. ‘전출’이라 함은 직원이 본회와 근로계약을 종료하고, 인사교류 대상기관(이 칙 하 “교류 기관”이라 한다)으로 이적해 가는 것을 말한다. 2. ‘전입’이라 함은 전출한 직원이 교류기관과 근로계약을 종료하고, 협회로이적 규 해 오는 것을 말한다."}, {"category": "규칙", "regulation": "인사 교류를 위한 전출 규칙", "article_num": "제4조", "article_title": "인사", "content": "①직원이 전출할 때에는 퇴직으로 처리하고, 전입할 때에는 채용으 로 처리한다. ②직원이 전출하는 경우에는 전출대상 직원의 사전 동의를 구하여야 하며, 전 출 동의는 전출 동의서에 의한다. ③전출시에는 전입 허용기간 등 전입의 조건을 정할 수 있다. 이 경우 전출자 가 전입하고자 하는 경우에는 전입 허용기간 종료 10일전에 전입신청서를 제 출하여야 한다. ④전입하는 직원의 직책은 교류기관에서의 최종 직급 등을 고려하여 부여한다."}, {"category": "규칙", "regulation": "인사 교류를 위한 전출 규칙", "article_num": "제5조", "article_title": "근속년수 등의 계산", "content": "전출기간은 근속년수 및 의무 근무기간에 산입한다. 다 만, 전출기간에 대해서는 퇴직금을 이중으로 지급하지 아니한다. 부칙 <2013. 8. 29.> 강 이 규칙은 회장으로부터 승인된 날로부터 시행한다. 령 Ⅳ-3-4 한국여성경제인협회 규정집 【별표 1】 직급별 호봉 직 급 호 봉 1급 1-15 2급 1-15 3급 1-15 4급 1-15 5급 1-15 인사 교류를 위한 전출 규칙 Ⅳ-3-5 【별표 2】 경력 소요년수표 령 직위 직급 경력채용 기준 1. 중소기업분야에서 5급 이상 공무원으로 3년 이상 경력소지자 2. 기업체에서 동일직급으로 9년 이상 경력소지자 부장 1급 4. 정부투자기관 및 경제단체 동일직급에서 7년 이상 경력소지자 5. 이상과 동등한 자격이 있다고 인정되는 자 1. 6급 이상 공무원으로 3년 이상 경력소지자 2. 기업체에서 동일직급으로 5년 이상 경력소지자 차장 2급 4. 정부투자기관 및 경제단체의 동일직급에서 7년 이상 경력소지자 5. 이상과 동등한 자격이 있다고 인정되는 자 1. 7급 이상 공무원으로 1년 이상 경력소지자 2. 기업체에서 동일직급으로 3년 이상 경력소지자 과장 3급 3. 대위급 이상으로 2년 이상 경력소지자 4. 정부투자기관 및 경제단체의 동일직급에서 5년 이상 경력소지자 5. 이상과 동등한 자격이 있다고 인정된 자 1. 8급 이상 공무원으로 3년 이상 경력소지자 2. 기업체에서 동일직급으로 1년 이상 경력소지자 지 3. 정부투자기관 및 경제단체의 동일직급에서 2년 이상 경력소지자 대리 4급 침 4. 4년제 대학졸업자 또는 전공석사학위 소지자 5. 초대졸 졸업자중 3년 이상 경력소지자 6. 이상과 동등한 자격이 있다고 인정된 자 1. 9급 이상 공무원으로 1년 이상 경력소지자 2. 정부투자기관 및 경제단체의 동일직급에서 1년 이상 경력소지자 사원 5급 3. 2년대 대학졸업자 또는 고등학교 졸업자중 2년 이상 경력소지자 4. 이상과 동등한 자격이 있다고 인정된 자 령 Ⅳ-3-6 한국여성경제인협회 규정집 경력환산 기준표 적용대상 인정비율 국가기관 및 지방자치단체, 경제단체, 70% ～ 100% 협동조합, 군의무 복무기간 정부투자기관, 전문연구기관, 금융기관, 대학교수 60% ～ 90% 교육기관, 종업원 100인 이상의 기업체 50% ～ 70% 기타 본회가 인정하는 단체 및 기업체 30% ～ 50% 근속 및 공로패 증정기준 규칙 Ⅳ-4-1 근속 및 공로패 증정기준 규칙 칙 근속 및 공로패 증정기준 규칙 Ⅳ-4-3 근속 및 공로패 증정기준 규칙 법 제정 2013. 8. 29."}, {"category": "규칙", "regulation": "근속 및 공로패 증정기준 규칙", "article_num": "제1조", "article_title": "목적", "content": "이 기준은 장기근속 상근임원 및 직원에 대한 근속 및 공로패 증정 에 관한 사항을 정함을 목적으로 한다."}, {"category": "규칙", "regulation": "근속 및 공로패 증정기준 규칙", "article_num": "제2조", "article_title": "증정대상", "content": "①장기근속자의 대상 및 휴가지급 기준은 다음 각호와 같다. 다만 근속패 등 격려금은 회장이 별도로 정하여 지급하며, 장기근속 기간별 휴가 지급일수는 다음과 같다. 1. 10년 근속직원 2일 칙 2. 15년 근속직원 2일 3. 20년 근속직원 3일 규 4. 25년 근속직원 3일 5. 30년 근속직원 3일 ②공로패 증정대상 및 기준은 다음 각호와 같다. 직원으로 10년이상 재직 후 정년퇴직하였을 때에는 공로패 및 금 5돈을 증정 한다."}, {"category": "규칙", "regulation": "근속 및 공로패 증정기준 규칙", "article_num": "제3조", "article_title": "증정 제한", "content": "처벌 또는 징계에 의하여 퇴임 또는 퇴직하는 경우에는 증정 침 하지 아니한다. 부칙 <2013. 8. 29.> 이 규칙은 회장으로부터 승인된 날로부터 시행한다. 강 고정자산관리규칙 Ⅳ-5-1 고정자산관리규칙 고정자산관리규칙 Ⅳ-5-3 고정자산관리규칙 법 제정 2013. 8. 29. 제1장 총칙"}, {"category": "규칙", "regulation": "고정자산관리규칙", "article_num": "제1조", "article_title": "목적", "content": "이 규정은 한국여성경제인협회(이하 “협회”라 한다) 고정자산의 취 득, 관리, 처분 등에 관한 사항을 규정함으로써 고정자산의 효율적인 관리운 용을 꾀함을 목적으로 한다."}, {"category": "규칙", "regulation": "고정자산관리규칙", "article_num": "제2조", "article_title": "정의", "content": "이 규정에서 사용하는 용어의 정의는 다음 각호와 같다. 1. “고정자산”이란 토지, 건물, 구축물, 기계장치, 공기구, 비품, 차량운반구,기 칙 타 등을 말한다. 2. “자산취득”이란 구입, 건설, 교환, 증여 등으로 인하여 소유권이나 관리권이 획득됨을 말한다. 3. “자산관리”란 자산에 대한 소유권 또는 관리권의 보존, 자산의 실태파악, 변동, 전용에 관한 사항을 기록 취급함을 말한다. 4. “고정자산의 처분”이란 매각, 멸실, 훼손, 폐기 등으로 인하여 고정자산이 감소됨을 말한다."}, {"category": "규칙", "regulation": "고정자산관리규칙", "article_num": "제3조", "article_title": "자산의 범위", "content": "고정자산에 편입․반영할 수 있는 것은 내용연수가 1년 이상 인 것으로서 다음 각호의 자산과 그 취득가액이 거래단위별로 300,000원 이상 의 것으로 한다. 1. 그 고유업무의 성질상 대량으로 보유하는 자산 2. 사업의 개시 또는 확장을 위하여 취득한 자산 제2장 취득"}, {"category": "규칙", "regulation": "고정자산관리규칙", "article_num": "제4조", "article_title": "자산취득 절차", "content": "①자산의 취득은 사업계획과 수지예산서 및 분기별 구매 Ⅳ-5-4 한국여성경제인협회 규정집 계획에 따른다. ②관리부서의 장은 매 분기별로 운용담당자가 제출한 구매요청서와 재고량 등을 종합 검토, 구매계획서를 작성하여 회장의 결재를 받아 구입한다. ③교환 및 증여에 따른 자산의 취득은 관리부서의 장이 담당한다. ④무형고정자산을 취득하거나 관리부서장의 요청이 있으면 주무부서의 장이 자산을 취득 또는 폐기한 후 관리부서로 이송한다. 제3장 관리"}, {"category": "규칙", "regulation": "고정자산관리규칙", "article_num": "제5조", "article_title": "자산관리담당부서", "content": "자산관리담당부서는 다음 각호와 같이 정한다. 1. 운영관리팀장은 자산전반의 관리 및 처분의 업무를 담당한다. 2. 각 부서의 장은 자산을 보존하기 위하여 직접 취급, 사용, 보관하는 운용자 를 임명한다."}, {"category": "규칙", "regulation": "고정자산관리규칙", "article_num": "제6조", "article_title": "유지보존", "content": "관리부서의 장은 관리자산의 효율적인 운용제도를 확립하고 취급상태를 감독하며 유지보존에 만전을 기하여야 한다."}, {"category": "규칙", "regulation": "고정자산관리규칙", "article_num": "제7조", "article_title": "자산대장", "content": "①관리부서의 장은 모든 자산에 대한 대장을 비치하고 그 보존 상태, 이동, 변형, 취급, 처분 등 실태를 파악하여야 한다. ②관리부서의 장은 자산에 대한 대장을 다음과 같이 분류 비치한다. 1. 연도별 취득대장(별표 1) 2. 용도별 분류대장(별표 2) 가. 사무용 비품대장 나. 훈련용 비품대장(각 훈련교장 공통비품) 다. 기계, 공구대장 라. 도서대장(별표3)"}, {"category": "규칙", "regulation": "고정자산관리규칙", "article_num": "제8조", "article_title": "자산의 실사", "content": "관리부서의 장은 매 회계연도 말에 자산을 실사하여 장부상 의 자산과 시재(時在)자산을 대조․점검하여야 한다. 고정자산관리규칙 Ⅳ-5-5"}, {"category": "규칙", "regulation": "고정자산관리규칙", "article_num": "제9조", "article_title": "자산의 임차", "content": "고정자산을 임차하고자 할 때에는 자산관리담당 부서의 장 은 상근부회장의 결재를 받아 임차계약을 체결하여야 한다."}, {"category": "규칙", "regulation": "고정자산관리규칙", "article_num": "제10조", "article_title": "자산의 임대", "content": "고정자산을 임대하고자 할 때에는 다음 각호의 기준에 따 라 임대하여야 한다. 1. 연간 임대료는 그 재산 가액의 10/100 이상으로 하되 주변의 시가(時價)를 고려하여 적정수준으로 결정한다. 2. 제1호의 연간임대료는 보증금과 임대료로 구분할 수 있으며 이 경우 보증 금에 대한 연간 수익은 은행정기예금(1년만기) 이자율로 계산한다. 3. 제1호의 재산가액은 『지방세법』에 따른 시가표준액을 기준으로 하되 건 물전체의 임대에 있어서는 건물평가액과 부지 평가액(해당건물의 바닥 면 적 외에 건물 사용자가 전용하는 토지를 포함한다)을 합산한 금액을 그 재 규 산의 평가액으로 하고 건물을 층별로 임대하는 경우에는 건물평가액과 다 음 각 목에 따라 계산한 부지평가액을 합산한 금액을 그 재산의 평가액으 로 한다. 가. 1층은 부지평가액의 1/2 나. 2층은 부지평가액의 1/2 칙 다. 3층은 부지평가액의 1/4 라. 4층 이상은 부지평가액의 1/5 마. 지하는 부지평가액의 1/3 제4장 처분 지"}, {"category": "규칙", "regulation": "고정자산관리규칙", "article_num": "제11조", "article_title": "자산의 처분", "content": "①관리부서의 장은 자산처분계획서를 작성하여 회장의 결 재를 받은 후 처분한다. ②부동산의 처분은 총회의 의결을 거쳐야 한다. ③국고보조금으로 취득한 자산의 처분은 『보조금의 예산 및 관리에 관한 법 률』에 따른다."}, {"category": "규칙", "regulation": "고정자산관리규칙", "article_num": "제12조", "article_title": "손․망실책임", "content": "물자 손․망실에 대한 직접 책임은 그 물자운용 책임자에게 있다. 다만, 실제로 손망실을 초래한 직원이 있으면 그가 책임을 진다. “물자운 Ⅳ-5-6 한국여성경제인협회 규정집 용책임자”란 물자를 직접 보관 또는 운용을 담당하는 자를 말한다."}, {"category": "규칙", "regulation": "고정자산관리규칙", "article_num": "제13조", "article_title": "감독책임", "content": "물자관리책임자는 직접 자기가 물자 손․망실의 원인 행위를 하지 않은 한 직접책임을 지지 않으나 간접적 원인이 될 수 있는 모든 사전조 치에 대한 책임을 진다.다만, 직접책임 소재가 불명할 때는 관리책임자에게 직 접책임이 있다."}, {"category": "규칙", "regulation": "고정자산관리규칙", "article_num": "제14조", "article_title": "변상", "content": "①관리부서의 장은 물자 손․망실에 대하여 직접 책임자를 규명하 여 변상판정의뢰서(별표5)를 주무부서에 제출한다. ②주무부서의 장은 변상판정의뢰서를 검토한 후 회장의 결재를 받아 변상책 임자에게 통고한다. ③변상판정이 있은 후 변상책임자가 이를 수락할 수 없을 때에는 통고일로부 터 10일 이내에 이의서를 첨부 재심을 청구할 수 있다. ④주무부서의 장은 이의서를 접수하여 관리부서의 장과 협의하고 7일이내에 그 타당성 여부를 재심 결정하여야 한다. ⑤변상은 현품으로 함을 원칙으로 하나 현품변상이 불가능할 때에는 금전으 로 변상할 수 있다. 부칙 <2013. 8. 29.> 이 규칙은 회장으로부터 승인된 날로부터 시행한다. 법인카드 운용규칙 Ⅳ-6-1 법인카드 운용규칙 법인카드 운용규칙 Ⅳ-6-3 법인카드 운용규칙 제정 2021. 5. 25."}, {"category": "규정", "regulation": "정관", "article_num": "제1조", "article_title": "목적", "content": "이 규칙은 한국여성경제인협회(이하 “협회”)의 정관 및 회계규정에 따라 협회의 법인카드(이하 “카드”) 관리 및 사용에 관한 기준 등을 정함으로써 카드의 적정사용으로 예산집행의 투명성 제고와 도덕적 해이를 방지함을 목적 으로 한다."}, {"category": "규정", "regulation": "정관", "article_num": "제2조", "article_title": "카드의 관리", "content": "① 카드는 임직원이 개별적으로 사용하는 개별 카드(이하 “개별카드”)와 각 부서에서 공용으로 사용하는 공용 카드(이하 “공용카드”)로 구분하며, 카드의 관리부서는 총괄부서와 사용부서로 구분한다. ② 총괄부서는 회계업무를 담당하는 부서로 하며, 사용부서는 총괄부서로부터 카드를 배부 받아 사용하는 부서를 말한다. ③ 총괄부서는 카드의 발급신청, 카드의 배부기준의 설정 및 사용부서에의 배부, 기관 카드의 총괄관리, 기타 카드관리 및 사용에 필요한 사항 등을 담당한다. ④ 사용부서는 총괄부서에서 규정한 카드 보관, 관리, 사용에 필요한 사항을 준 수하여야 한다. ⑤ 총괄부서로부터 카드를 배부받은 사용부서에서 실제로 카드를 사용하는 임· 직원(개별 카드의 경우) 또는 사용부서의 장(각 실장 및 팀장, 부서 공용카드의 경우)은 “카드사용자”로서 본 규칙에 따라 카드를 사용하여야 한다. 다만, 공용 카드는 사용부서의 장이 별도로 카드관리책임자를 지정하여 카드를 사용하게 할 수 있다. ⑥ 총괄부서는 일정한 기간을 정하여 협회 임직원에 대하여 카드 사용에 대한 교육을 실시한다."}, {"category": "규정", "regulation": "정관", "article_num": "제3조", "article_title": "카드의 발급·교부 및 관리", "content": "① 총괄부서의 장은 다음 각 호의 기준에 따라 카드를 카드사용자에게 배부하여야 하며, 사용부서의 장이 추가배부를 요청하 는 경우 그 타당성을 검토하여 부서 공용카드를 추가로 배부할 수 있다. Ⅳ-6-4 한국여성경제인협회 규정집 1. 카드발급: 협회(본회 및 지회) 임원, 팀장, 과제책임자 이상 각 1매 2. 카드사용: 승인된 예산항목의 각종 회의비 및 이와 유사한 경비, 각종 행사 비, 항공료, 각종 물품구입 및 도서구입 3. 카드교부 대상자는 카드 수령 후 카드인수증(별지 제1호 서식)을 총괄부서 에 제출하여야 한다. ② 카드사용자는 카드의 보유목적이 소멸되는 즉시 카드 총괄부서에 이를 반납 하여야 한다. ③ 카드를 분실한 경우에 카드사용자는 카드회사에 지체 없이 이를 신고하고 총괄부서 관리책임자에게 이를 보고 또는 통보하여야 한다. ④ 카드의 재발급 또는 추가발급을 받고자 하는 자는 (별지 제2호 서식)을 작 성하여 총괄부서로 신청하면 총괄부서는 카드회사에 발급 신청한다."}, {"category": "규정", "regulation": "정관", "article_num": "제4조", "article_title": "카드사용자의 의무", "content": "① 카드사용자는 선량한 관리자로서의 주의 의무를 다 하여야 한다. ② 카드사용자는 장기간의 교육, 파견, 휴가 등으로 업무수행에 따른 카드사용 이 불가능한 경우에는 카드 총괄부서에 반납하여야 한다. ③ 예산집행의 투명성을 제고할 수 있거나 간편하게 처리할 수 있는 경우에는 원칙적으로 다른 규정이나 지침에 위배되지 않는 범위 내에서 카드를 사용하여 야 한다. ④ 카드를 사용하고자하는 자는 위임전결규정에 따라 용도, 금액 등에 대한 사 전결재를 받아 사용함을 원칙으로 한다. 다만, 불가피한 사유로 사전결재가 불 가능 할 경우에는 최단기간 내 사후결재를 득하여야 한다. ⑤ 동일 업소에서 동일시간 대에 사용한 카드 대금을 분할하여 결제하여서는 아니 된다. 다만, 여러 건의 회의가 동일업소 및 시간 내에 있은 것이 명확할 경 우에는 그러하지 아니하다. ⑥ 카드사용자는 담당업무 특성상 카드를 빈번하게 사용하여야 하거나, 사용기 간이 일정하지 않은 경우에는 카드 총괄부서장의 승인을 받아 카드를 일정기간 소지할 수 있다. ⑦ 카드의 사용시 카드매출전표에는 해당 부서명이나 기관명 등 사용자를 알 수 없는 서명 대신 카드사용자가 직접 자신의 이름으로 서명하여야 한다. ⑧ 법인카드 영수증은 총금액이 아닌 상품명 및 수량이 표시되어 있어야 하며, 영수증으로 그 내역을 확인할 수 없는 경우에는 별도의 내역을 첨부하여야 한다. 법인카드 운용규칙 Ⅳ-6-5"}, {"category": "규칙", "regulation": "법인카드 운용규칙", "article_num": "제5조", "article_title": "카드사용 제한", "content": "① 카드사용자는 아래 각호의 업소에서 카드를 사용하여서 는 아니 된다. 1. 유흥업종: 단란주점, 룸싸롱, 요정, 나이트클럽, 주점, 주류판매점 등 2. 위생업종: 이·미용실, 안마시술소, 사우나, 목욕탕, 발마사지, 스포츠마사지, 네일아트, 지압원 등 대인서비스 3. 레저/사행업종: 카지노, 도박장, 복권방, 오락실, 당구장, 실내·외 골프장, 스크 린골프, 헬스클럽, 노래방, 사교춤, 전화방, 오디오방, PC방, 스키장(숙박시설, 회의장 사용 제외) 등, 단 골프장 등 일부 레저업종에 한해 협회 고유목적의 사업이나 업무와 관련하여 사용하는 경우에는 업무추진 예산의 30%를 초과 하지 않는 한도내에서 사전에 부서장의 승인을 받은 후 사용 할 수 있다. 4. 기타 부정당하다고 인정되는 업종: 성인용품점, 총포류판매점 등 5. 개인적인 용도 사용 ② 카드사용자가 회의장소와 상이한 권역에서 식비 등을 지출하는 경우에는 사 유를 별도로 명기하여야 한다. ③ 카드사용자가 업무상 필요에 의해 비근무일에 사용하는 경우에는 카드사용 자의 소속·성명 및 사유를 증빙서류에 명기하여야 한다. ④ 총괄부서에서는 제5조 1항의 실효성 확보를 위해 카드회사와 협의하여 사용 차단 등 필요한 조치를 취해야 한다."}, {"category": "규칙", "regulation": "법인카드 운용규칙", "article_num": "제6조", "article_title": "대금의 결제", "content": "① 카드사용자는 매월 1일부터 31일까지 카드사용 후 익월 5일까지 지출결의서를 작성하고 기본결재문서, 카드매출전표 등 관련서류를 첨 부하여 총괄부서에 대금 결제를 위한 조치를 취하여야 한다. 다만, 장기출장 및 행사, 기타 불가피한 경우에는 해당일수를 포함하여 7일을 초과할 수 있다. ② 총괄부서에서는 카드사용자가 제출한 관련서류의 검토, 사용기준 및 용도, 사용제한 위반유무 확인 등 필요한 검토·확인을 거쳐 대금결제를 위한 절차를 이행한다. ③ 총괄부서의 장은 제2항에 의한 검토 결과 대금결제 절차를 진행하지 못할 사유가 있을 경우 즉시 보완을 요청하여야 한다. ④ 증빙서류 중 회의운영 등을 위해 물품구매 시 영수증은 구매한 물품의 세부 내역이 표시되어야 한다."}, {"category": "규칙", "regulation": "법인카드 운용규칙", "article_num": "제7조", "article_title": "업무추진비 집행대금 결제의 특례", "content": "카드사용자가 업무추진비를 카드로 결 제하는 경우 집행목적, 일시, 장소, 집행대상(회의참석자의 소속 및 회의인원 등)을 증빙서류에 기재하여 사용용도를 명확히 하여야 한다. Ⅳ-6-6 한국여성경제인협회 규정집"}, {"category": "규칙", "regulation": "법인카드 운용규칙", "article_num": "제8조", "article_title": "미정산 시 조치사항", "content": "카드사용 후 카드사용자가 제6조제1항 내지 제2항에 의한 정산절차이행을 지연할 경우 총괄부서는 일정기간 당해카드의 사용정지를 위한 조치를 취할 수 있다."}, {"category": "규칙", "regulation": "법인카드 운용규칙", "article_num": "제9조", "article_title": "부정사용에 따른 제재조치", "content": "① 카드사용자가 본 지침 또는 기타 관련규정 을 위반하여 카드를 부당(정)하게 사용한 경우 총괄부서에서는 회장에게 관련 사실을 보고해야 하며, 다음 기준에 따라 필요한 제재조치 절차를 취할 수 있다. 처분기준 처분(조치사항) ◦과실이 크며 고의성이 짙고, 비위정도가 매우 1 ◦사용금액 회수 및 징계 심한 경우 ◦동일 날자, 동일업소 사용금액 분할결재 ◦개인용도 사용, 공휴일 및 휴무일 사용, 심야시 ◦사용금액 회수 및 경고 2 간 사용, 교통요금 사용, 제한업소 사용 등 위 (사용자 소명) 반 건수가 년 3회 이상 이거나 위반(사용)금액 총액이 100만원 이상인 경우 ◦동일 날자, 동일업소 사용금액 분할결재 제외 개인용도 사용, 공휴일 및 휴무일 사용, 심야시 ◦사용금액 회수 및 주의 3 간 사용, 교통요금 사용, 제한업소 사용 등 위 (사용자 소명) 반 건수가 년 3회 미만 이거나 위반(사용)금액 총액이 100만원 미만인 경우 ◦사용금액 회수 및 사용 4 ◦1, 2, 3에 해당되지 않는 경우 자 주의교육 ② 카드사용대금을 환수할 경우 카드사용자 및 관련 결재권자가 연대하여 책임을 진다."}, {"category": "규칙", "regulation": "법인카드 운용규칙", "article_num": "제10조", "article_title": "개인카드의 사용금지", "content": "모든 예산의 집행은 카드에 의하며, 개인카드의 집 행은 금지한다. 다만, 부득이한 경우 예외로 할 수 있다."}, {"category": "규칙", "regulation": "법인카드 운용규칙", "article_num": "제11조", "article_title": "기타", "content": "본 지침이 정하지 아니한 사항은 회장이 정하는 바에 의한다. 부 칙 <2021. 5. 25.> 이 규칙은 2021년 5월 25일부터 시행한다. 법인카드 운용규칙 Ⅳ-6-7 [별지 제1호 서식] 법인카드 인수증 □ 소 속 : □ 직 급 : □ 관리자성명 : □ 카드번호 : 위와 같이 법인카드를 인수하며, 본 법인카드는 본인의 책임 하에 업무수행 과 관련하여 사용하고, 분실 및 기타의 사유로 본원에 재산상 손해를 입힌 경우 변상조치할 것이며, 장기간 업무수행이 불가능한 경우에는 경영기획팀에 반납 조치 할 것을 서약합니다. 20 년 월 일 인수자 성명 : (인) 한국여성경제인협회 협회장 귀하 Ⅳ-6-8 한국여성경제인협회 규정집 [별지 제2호 서식] 법인카드 분실신고 및 재발급 의뢰서 카드관리자 : 분실자 : 분실카드 번호 : 카드분실 일자 : 카드분실 장소 : 상기와 같이 법인카드를 분실하였기에 카드 재발급을 의뢰합니다. 20 년 월 일 관리책임자 : (서명) 직제규칙 Ⅳ-7-1 직제규칙 직제규칙 Ⅳ-7-3 직제규칙 제정 2025. 9. 1. 제1장 총칙"}, {"category": "경영", "regulation": "직제규정", "article_num": "제1조", "article_title": "목적", "content": "본 규칙은 한국여성경제인협회(이하 “협회”라 한다.) 「직제규정」제5조와 제10조에서 위임한 사항과 그 시행에 필요한 사항을 규정하는 것을 목적으로 한다."}, {"category": "경영", "regulation": "직제규정", "article_num": "제2조", "article_title": "적용범위", "content": "협회의 하부조직 구성과 사무분장에 관하여는 다른 규정이 있는 경우를 제외하고는 이 규칙이 정하는 바에 따른다. 제2장 조직 및 업무분장"}, {"category": "경영", "regulation": "직제규정", "article_num": "제3조", "article_title": "하부조직", "content": "① 사무처는 4팀으로 구성하고, 조직도는 별표1과 같다. ② ①항의 조직 이외에 신규사업이나 전문적인 업무 수행 등을 위하여 별도의 한시 조직이나 인력을 둘 수 있다."}, {"category": "경영", "regulation": "직제규정", "article_num": "제4조", "article_title": "부서별 업무분장", "content": "부서별 업무분장은 다음 각항의 호에 따른다. ① 경영기획팀 1. 사업계획 및 예산수립, 집행조정에 관한 사항 2. 이사회 및 총회, 각종 위원회의 운영에 관한 사항 3. 협회 정관 등 각종 규정의 제정․개정에 관한 사항 4. 조직관리 및 내부감사에 관한 사항 단으로 전결권자를 정하여 처리할 수 있다. 다만, 전결권자를 판단하기 어려운 사 항에 대해서는 상급자의 지시에 따라 처리한다."}, {"category": "경영", "regulation": "위임전결규정", "article_num": "제5조", "article_title": "처리사항 보고", "content": "이 규칙에 의하여 전결처리 된 사항 중 상급자가 알아야 한다고 인정 되는 사항은 그 처리 내용을 보고하여야 한다."}, {"category": "경영", "regulation": "위임전결규정", "article_num": "제7조", "article_title": "부재 시 결재", "content": "전결권자가 휴가ㆍ출장 또는 기타의 사유로 상당기간 부재중이거나, 긴 급한 사항으로서 전결권자의 사정에 의하여 결재를 받을 수 없을 때에는 그 직무를 대행 하는 자가 대결할 수 있으며, 내용이 중요한 문서에 대하여는 전결권자에게 사후에 보고 하여야 한다. 위임전결규칙 Ⅳ-8-3 부 칙 <2026. 3. 11.> 이 규칙은 회장이 승인한 날로부터 시행한다. 위임전결규칙 Ⅳ-8-4 직위별 전결사항 공통부문 전결권자(△: 보고) No 업무내용 상근 회장 본부장 팀장 담당 부회장 1 협회 운영의 기본방침 수립 ○ 2 사업계획 및 예산수립 △ ○ 3 협회 업무감사 관리(계획, 결과, 시정지시 등) ○ 규칙, 지침, 요령 제‧개정, 폐지 4 ○ * 지침, 요령 - 경영기획팀장 협조 5 각종 위원 추천 및 위촉 ○ 6 고정자산(토지, 건물 등) 취득 및 처분 ○ 7 유동자산 취득 및 처분 ○ 대정부 건의 및 민원업무 처리 8 주요사항 ○ 일반사항 ○ 사업계획 실행 품의 1억원 이상 △ ○ 9 3,000만원 이상 ～ 1억원 미만 ○ 3,000만원 미만 ○ 소관예산 지출 품의 5,000만원 이상 ○ 10 3,000만원 이상 ～ 5,000만원 미만 ○ 100만원 이상 ～ 3,000만원 미만 ○ 100만원 미만 ○ 확정된 경상지출, 신고·납부 관리 급여, 수당, 퇴직금 지급 ○ 11 관리비, 세금, 공과금, 보험료 ○ 경상운영비(업무추진비 등) 진행 품의 및 청구(현금 및 카드사용) 100만원 이상 ○ 12 50만원 이상 ～ 100만원 미만 ○ 50만원 미만 ○ 복무관리 상근부회장 ○ 13 국내 출장, 본부장 ○ 직무연수 및 팀장 ○ 휴가 직원 ○ 위임전결규칙 Ⅳ-8-5 공통부문 전결권자(△: 보고) No 업무내용 상근 회장 본부장 팀장 담당 부회장 상근부회장 ○ 국외 출장 및 본부장/팀장 ○ 직무연수 직원 △ ○ 본부장 ○ 시간외근무 팀장 ○ 직원 ○ 업무 인수인계 본부장 ○ 14 팀장 ○ 직원 ○ 인사/복리후생 전결권자(△: 보고) No 업무내용 상근 회장 본부장 팀장 담당 부회장 1 인사제도 기본계획 ○ 2 직원 국내외 파견, 인사교류 ○ 3 직원 승진, 근무성적평가, 연봉결정 ○ 4 포상 및 징계 ○ 5 상여급 지급 기준 ○ 6 직원 채용(정규직, 계약직), 수습평가, 휴‧복직, 퇴직 ○ 7 단기계약직, 파견근로자 채용 ○ 8 교육 및 훈련 ○ 9 복리후생 ○ 10 경조금 지급 ○ 11 인사기록 관리 ○ 12 재직, 경력증명서 발급 ○ 위임전결규칙 Ⅳ-8-6 회원관리 및 홍보 전결권자(△: 보고) No 업무내용 상근 회장 본부장 팀장 담당 부회장 회원관리 임원사 선임 및 탈퇴 ○ 회원에 대한 각종 확인 및 추천 △ ○ 1 회비 징수 업무 △ ○ 회원 자격 확인 △ ○ 지회 운영지원 및 관리 △ ○ 회원서비스 2 기본계획 수립 ○ 세부계획 추진 ○ 언론관리 3 대외 홍보계획 수립 및 조정 ○ 언론사 협찬 및 광고 △ ○ 홍보물 제작 4 기본계획 수립 ○ 발간 진행 ○ 회의 및 행사 전결권자(△: 보고) No 업무내용 상근 회장 본부장 팀장 담당 부회장 1 총회, 이사회 개최 ○ 2 각종 위원회(인사위원회 등) 개최 ○ 주요행사 개최(계획수립 및 결과보고) 여성기업주간 개막식 ○ 3 임원, 대의원 및 회원 연수 등 ○ 각종 간담회 △ ○ 4 기타 회의 ○ 위임전결규칙 Ⅳ-8-7 총무 전결권자(△: 보고) No 업무내용 상근부 회장 본부장 팀장 담당 회장 1 문서관리(문서수발 및 보관) ○ 2 직인, 법인인감, 등기관리(제작 및 사용) ○ 3 사무실 임차 ○ 고정자산 구매, 조달, 계약 5,000만원 이상 ○ 4 3,000만원 이상 ～ 5,000만원 미만 ○ 100만원 이상 ～ 3,000만원 미만 ○ 100만원 미만 ○ 고정자산 매각, 폐기, 불용결정 (잔존가액기준) 2,000만원 이상 ○ 5 500만원 이상 ～ 2,000만원 미만 ○ 500만원 미만 ○ 6 비품관리 ○ 7 법무관리(법률자문, 소송자문처리 등) △ ○ 8 차량관리 ○ 9 도서 및 자료 관리 ○ 10 창고 관리 ○ 11 소모품 공급 및 관리 ○ 12 화재 및 보안 관리 ○ V. 지 침 예산편성 운영지침 Ⅴ-1-1 예산편성 운영지침 예산편성 운영지침 Ⅴ-1-3 예산편성 운영지침 법 제정 2019. 1. 26 제1장 총칙"}, {"category": "경영", "regulation": "회계규정", "article_num": "제1조", "article_title": "목적", "content": "이 지침은 회계규정 제40조 기준에 의거 한국여성경제인협회(이하 “협회”) 재정의 건전한 운용과 면밀한 통제 관리를 위한 회계연도별 협회 예 산편성기준에 관한 사항을 규정함을 목적으로 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제2조", "article_title": "일반원칙", "content": "협회는 재원을 확보하여 회원의 권익을 증진할 수 있도록 노력 하여야 하며, 경비지출의 효율성과 건전성을 높여 나갈 수 있도록 다음 각 호 의 사항을 종합적으로 고려하여 예산을 편성하여야 한다. 1. 회원사의 지속적인 발전과 성장잠재력 배양 2. 협회 재정의 자립기반 조성 3. 합리적인 수입을 고려한 재정지출과 건전재정 운영"}, {"category": "경영", "regulation": "회계규정", "article_num": "제3조", "article_title": "예산편성단위", "content": "수입·지출예산서와 산출내역 칸의 금액단위는 “천원”으로 한 다. 제2장 수입예산"}, {"category": "경영", "regulation": "회계규정", "article_num": "제4조", "article_title": "자체수입", "content": "협회는 대내외적 환경을 고려하고 전년도 수입실적 및 해당 연 도의 특수요인 등을 종합 분석하여 회비수입과 일반사업수입 등의 수입원별 로 수입을 전망하여 이를 예산에 반영하고, 수입을 줄이거나 누락하지 아니 하도록 하여야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제5조", "article_title": "특별재원", "content": "국고보조금, 기금 등을 수입예산에 계상할 때에는 관련 법률과 해당기관의 세부 운영지침에 따라야 한다. Ⅴ-1-4 한국여성경제인협회 규정집 제3장 지출예산"}, {"category": "경영", "regulation": "회계규정", "article_num": "제6조", "article_title": "경상적 경비", "content": "제5조에 따라 법령에 따른 경비와 제7조와 제8조, 제9조, 제 10조, 제11조에 따른 기준경비를 제외한 경비에 대하여는 협회의 여건과 특 성을 고려하여 합리적·객관적으로 지출예산을 편성하여야 한다. 단 업무추진 비는 수입예산대비 5% 이내로 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제7조", "article_title": "인건비", "content": "① 대내외적 환경을 고려하고 협회 운영의 내실화와 회원 지원의 효율성 확보를 위해 사무국 운영에 적정한 인력을 배치하고 이에 따른 연봉 급여, 성과급, 퇴직급여, 법정부담금, 제수당 등을 지출예산에 편성하여야 한다. ② 인건비 인상은 회장의 승인을 받아 지출예산에 계상할 수 있다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제8조", "article_title": "회원사업비", "content": "총회 및 이사회 운영, 여성경제인의 날, 여성CEO 경영연수, 대의원연수, 임원 워크숍, 송년행사, 회원수첩 제작 등을 포함한 회원 행사와 회원 지원을 위한 직․간접적 프로모션 경비를 지출예산에 편성하여야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제9조", "article_title": "홍보사업비", "content": "언론사 홍보 및 소셜미디어 홍보, 출입기자 관리, 협회 기념 품 제작 등 협회 홍보를 위한 직․간접적 경비를 지출예산에 편성하여야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제10조", "article_title": "사업활동비", "content": "교육사업, 판로지원사업 등 일반사업 수행에 필요한 경비를 협회 규정과 사업여건, 특성을 고려하여 지출예산에 편성하여야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제11조", "article_title": "예비비", "content": "협회는 예측할 수 없는 예산 외의 지출 또는 예산 초과 지출을 충당하기 위하여 일반회계의 100분의 2이내의 금액을 지출예산에 계상할 수 있 다. 부칙 <2019. 1. 26.> 이 규칙은 2019년도 협회 수입·지출예산의 편성 시부터 적용한다. 한국여성경제인협회 공직자의 이해충돌 방지제도 운영지침 Ⅴ-2-1 한국여성경제인협회 공직자의 이해충돌 방지제도 운영지침 한국여성경제인협회 공직자의 이해충돌 방지제도 운영지침 Ⅴ-2-3 한국여성경제인협회 공직자의 이해충돌 방지제도 운영지침 제정 2024. 09. 20"}, {"category": "경영", "regulation": "회계규정", "article_num": "제1조", "article_title": "목적", "content": "이 한국여성경제인협회 공직자의 이해충돌 방지제도 운영지침은 「공직자의 이해충돌 방지법」(이하 “법”이라 한다) 및 같은 법 시행령(이하 “영”이라 한다)에서 규정하고 있는 이해충돌 방지 제도를 한국여성경제인협 회에서 원활하게 운영하기 위해 필요한 사항을 규정하는 것을 목적으로 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제2조", "article_title": "정의", "content": "이해충돌방지담당관이란 법 제25조 및 영 제31조에 따라 지정되어 한국여성경제인협회의 이해충돌 방지 제도의 운영을 담당하는 자로서 한국여 성경제인협회의 경영기획팀장을 말한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제3조", "article_title": "사적이해관계자의 범위", "content": "법 제2조제6호아목 및 영 제3조제3항제3호에 따라 한국여성경제인협회의 장이 업무 특성을 반영하여 공정한 직무수행에 영향을 미칠 수 있다고 인정하는 자는 다음 각 호와 같다. 1. 2년 이내 퇴직 예정인 공직자의 퇴직 후 고용주가 될 가능성이 있는 사람 2. 한국여성경제인협회 및 그 소속기관의 퇴직공직자(임직원)로서 퇴직 전 5년 이내에 영 제3조제2항에서 정하는 범위의 부서에서 같이 근무하였던 사람"}, {"category": "경영", "regulation": "회계규정", "article_num": "제4조", "article_title": "사적이해관계자의 신고와 회피·기피 신청", "content": "① 한국여성경제인협회 소속 공직자가 법 제5조제1항에 따라 직무관련자가 사적이해관계자라는 사실을 신고하고 회피를 신청하려는 경우에는 별지 제1호 서식을 작성하여 이해충 돌방지담당관에게 서면(전자문서 및 청렴포털의 이해충돌방지법 표준신고시 스템을 통한 신고를 포함한다. 이하 같다)으로 제출해야 한다. ② 이해충돌방지담당관은 법 제5조제2항에 따라 기피 신청을 하려는 신청인 에게 별지 제2호 서식을 작성하여 서면으로 제출하도록 안내해야 한다. Ⅴ-2-4 한국여성경제인협회 규정집 ③ 이해충돌방지담당관은 법 제5조제2항에 따라 기피 신청의 대상이 된 공직 자에게 그에 대한 의견을 들을 수 있다. 해당 공직자는 이해충돌방지담당관 이 요구하는 경우 지체 없이 그 사유를 소명한 문서를 별지 제3호 서식에 따 라 작성하여 제출해야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제5조", "article_title": "사적이해관계자의 신고 등에 대한 조치", "content": "① 이해충돌방지담당관은 법 제5 조제1항에 따른 신고 및 회피 신청, 같은 조 제2항에 따른 기피 신청을 받은 날로부터 7일 이내에 법 제7조제1항 및 제2항에 따른 조치가 이행될 수 있도 록 신고 내용을 확인하고 필요시 한국여성경제인협회의 장에게 신속히 보고 해야 한다. ② 제1항에 따른 업무를 수행하는 이해충돌방지담당관은 신고·회피 신청을 한 공직자 및 기피 신청의 대상이 된 공직자를 지휘·감독하는 상급자 또는 한국 여성경제인협회의 장의 의견을 들을 수 있다. ③ 소속기관장이 공직자에게 법 제7조제1항 또는 제2항에 따른 조치를 한 경 우 이해충돌방지담당관은 같은 조 제3항에 따라 해당 공직자와 기피를 신청한 자에게 지체 없이 그 내용을 별지 제4호 서식에 따른 서면으로 통보해 야 한다. ◯4 이해충돌방지담당관은 신고·회피 신청을 한 공직자 및 기피 신청의 대상이 된 공직자가 소속기관장인 경우, 부기관장(부기관장이 없는 경우 이에 상당 하는 자를 포함한다)의 의견을 들어 법 제7조에 따른 조치의 내용을 별지 제4 호 서식에 따른 서면으로 소속기관장에게 통보해야 한다. ◯5 이해충돌방지담당관이 법 제7조제2항에 따른 조치를 통보한 경우, 이해충 돌방지담당관 또는 다른 공직자는 신고·신청을 한 공직자 및 기피 신청의 대 상이 된 공직자에 대해 해당 직무수행이 완료된 날부터 30일 이내에 공정한 직무수행 여부를 별지 제5호 서식에 따른 서면으로 확인·점검해야 한다. ◯6 한국여성경제인협회 공직자는 직무관련자(직무관련자의 대리인을 포함한 다)가 사적이해관계자가 아닌 경우에도 공정한 직무 수행을 저해할 우려가 있다고 스스로 판단하여 법 제7조제1항 각 호의 조치를 신청하는 경우 별지 제6호 서식을 작성하여 이해충돌방지담당관에게 서면으로 제출해야 한다. 이 경우 신청을 위한 조치와 관련하여서는 제1항부터 제5항까지를 준용한다. ◯7 법 제16조에 따른 공무수행사인의 경우 제4조 및 제5조제1항부터 제6항까 지를 준용한다. 한국여성경제인협회 공직자의 이해충돌 방지제도 운영지침 Ⅴ-2-5"}, {"category": "경영", "regulation": "회계규정", "article_num": "제6조", "article_title": "부동산 보유·매수 신고 대상 업무 지정 등", "content": "① 법 제6조 제1항 및 제2항에 따른 공공기관의 직무 관련 부동산 취급 및 개발 업무 중 한국여성경제인협 회가 사업의 제안자, 지정권자, 승인권자, 사업시행자 등으로서 수행하는 업 무를 별표1와 같이 지정한다. ② 한국여성경제인협회의 장은 제1항에 따라 지정된 업무에 해당하는 사업이 주민 공고ㆍ공람, 지구 지정 등의 절차에 따라 대외 공개된 경우에는 다음 각 호를 포함한 사업 관련 정보를 소속 공직자에게 분기별로 공지해야 한다. 1. 사업명 2. 사업 지구의 지번 (지도 등을 이용해 위치를 표시) 3. 사업 시행 일정 (사업 절차별 일정을 표시)"}, {"category": "경영", "regulation": "회계규정", "article_num": "제7조", "article_title": "부동산 보유·매수 신고 및 조치", "content": "① 공직자가 법 제6조제1항 및 제2항에 따라 부동산 보유·매수 신고를 하려는 경우 보유하였음을 안 날로부터 또는 매수 후 등기를 완료한 날로부터 14일 이내에 별지 제7호 서식을 작성하여 이해충돌방지담당관에게 서면으로 제출해야 한다. ② 제1항에 따른 신고가 있는 경우 신고 사항에 대한 조치에 관하여는 제5조 지 제1항부터 제5항까지를 준용한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제8조", "article_title": "고위공직자 민간부문 업무활동 내역 제출·관리", "content": "① 고위공직자는 법 제8 조제1항에 따라 그 직위에 임용되거나 임기를 개시하기 전 3년 이내에 민간 부문에서 업무활동을 한 경우, 그 활동 내역을 그 직위에 임용되거나 임기를 개시한 날부터 30일 이내에 별지 제8호 서식을 작성하여 이해충돌방지담당 관에게 서면으로 제출하여야 한다. 지 ② 고위공직자는 그 직위에 임용되거나 임기를 개시하기 전 3년 이내에 민간 부문에서 업무활동을 한 내역이 없는 경우, 그 직위에 임용되거나 임기를 개 시한 날부터 30일 이내에 별지 제9호 서식을 작성하여 이해충돌방지담당관 에게 서면으로 제출하여야 한다. ③ 한국여성경제인협회의 장(민간 부문 업무활동 내역을 제출해야 하는 사람 이 한국여성경제인협회의 장인 경우에는 이해충돌방지담당관을 말한다)은 제1항 또는 제2항에 따라 제출받은 내역을 고위공직자의 겸직신고 사항, 선 강 거공보, 기타 고위공직자의 민간부문 업무활동을 알 수 있는 자료와 비교하 여 누락된 사항이 있거나 구체적이지 않은 경우, 해당 고위공직자에게 보완 을 요청할 수 있다. Ⅴ-2-6 한국여성경제인협회 규정집 ◯4 한국여성경제인협회의 장(민간 부문 업무활동 내역을 제출해야 하는 사람 이 한국여성경제인협회의 장인 경우에는 이해충돌방지담당관을 말한다)은 법 제8조제4항에 따라 다른 법령에서 정보공개가 금지되지 아니하는 범위에 서 민간 부문 기관명, 직위 또는 직급, 주요 업무활동 내역과 활동 기간을 공 개할 수 있다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제9조", "article_title": "직무관련자와의 거래 신고 및 조치", "content": "① 한국여성경제인협회 소속 공직자 는 법 제9조제1항에 따른 사실을 신고하려는 경우 별지 제10호 서식을 작성 하여 이해충돌방지담당관에게 서면으로 제출하여야 한다. ② 제1항에 따른 신고가 있는 경우 신고 사항에 대한 조치에 관하여 제5조제1 항부터 제5항까지를 준용한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제10조", "article_title": "직무 관련 외부활동의 제한", "content": "① 한국여성경제인협회 소속 공직자는 법 제10조제2호, 제4호, 제5호 단서에 따라 소속기관장의 허가를 받으려는 경우 해당 활동을 시작하기 전에 별지 제11호 서식을 작성하여 이해충돌방지담당 관에게 서면으로 제출해야 한다. 다만, 다음 각 호의 공공기관 소속 공직자가 학술·연구 활동으로서 법 제10조제2호의 활동을 하는 경우, 해당 기관은 별지 제11호 및 제12호 서식을 참고하여 허가 절차를 정할 수 있다 1. ｢과학기술분야 정부출연연구기관 등의 설립·운영 및 육성에 관한 법률｣에 따른 과학기술분야 정부출연연구기관 2. ｢정부출연연구기관 등의 설립·운영 및 육성에 관한 법률｣에 따른 정부출 연연구기관 3. 「고등교육법」 또는 그 밖의 다른 법령에 따라 설치된 각급 국ㆍ공립대 학 5. 「국립대학교병원 설치법」에 따른 국립대학교병원 6. 「국립대학교치과병원 설치법」에 따른 국립대학교치과병원 7. 「서울대학교병원 설치법」에 따른 서울대학교병원 8. 「서울대학교치과병원 설치법」에 따른 서울대학교치과병원 9. 「광주과학기술원법」에 따른 광주과학기술원, 「대구경북과학기술원 법」에 따른 대구경북과학기술원, 「울산과학기술원법」에 따른 울산과학기 술원,「한국과학기술원법」에 따른 한국과학기술원 ② 제1항의 허가 신청을 받은 이해충돌방지담당관은 허가 신청을 한 공직자 를 지휘·감독하는 상급자 또는 소속기관장의 의견을 들어 공직자의 직무수행 한국여성경제인협회 공직자의 이해충돌 방지제도 운영지침 Ⅴ-2-7 에 지장이 있는지를 판단하고 별지 제12호 서식에 따라 통보한다. ③ 이해충돌방지담당관은 허가 신청을 한 공직자가 소속기관장인 경우, 부기 관장(부기관장이 없는 경우 이에 상당하는 자를 포함한다)의 의견을 들어 공 직자의 직무수행에 지장이 있는지를 판단하고 별지 제12호 서식에 따라 소속 기관장에게 통보한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제11조", "article_title": "가족 채용 제한 대상 확인", "content": "한국여성경제인협회의 채용 업무를 담당하는 공직자는 법 제11조제1항 각 호에 해당하는 가족 채용 제한 대상인지를 확인 하기 위해 채용대상자(법 제11조제2항 각 호에 해당하는 사람은 제외한다)로 부터 별지 제13호 서식에 따른 확인서를 제출받아야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제12조", "article_title": "수의계약 체결 제한 대상 확인", "content": "① 한국여성경제인협회의 계약 업무를 담당하는 공직자는 물품ㆍ용역ㆍ공사 등의 수의계약을 체결하려는 경우 법 제12조제1항 각 호에 해당하는 수의계약 체결 제한 대상인지를 확인하기 위 해 계약의 상대방으로부터 별지 제14호 서식에 따른 확인서를 제출받아야 한 다. 지 ② 한국여성경제인협회의 장은 고위공직자의 재산공개사항, 겸직신고 사항, 기타 법 제12조제1항 각 호에 해당하는 자인지를 확인할 수 있는 자료를 참 고하여 법 제12조제1항에 따른 수의계약의 상대방이 같은 항 각 호의 어느 하나에 해당하는 자인지를 확인할 수 있다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제13조", "article_title": "공공기관 물품 등의 사적 사용·수익 금지", "content": "① 한국여성경제인협회 소속 공직자는 법 제13조에 따라 소속기관이 소유하거나 임차한 물품·차량·선박· 지 항공기·건물·토지·시설 등을 사적인 용도로 사용·수익하거나 제3자로 하여금 사용·수익하게 하여서는 아니 된다. 다만, 다른 법령·기준 또는 사회상규에 따라 허용되는 경우에는 그러하지 아니하다. ② 한국여성경제인협회은 기관이 소유하거나 임차한 물품·차량·선박·항공기· 건물·토지·시설 등의 사용에 대해 법령·기준으로 정하여 관리한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제14조", "article_title": "직무상 비밀 등 이용 금지", "content": "① 한국여성경제인협회 소속 공직자(공직자 강 가 아니게 된 날부터 3년이 경과하지 아니한 사람을 포함하되, 다른 법률에 서 이와 달리 규정하고 있는 경우에는 그 법률에서 규정한 바에 따른다. 이하 이 조에서 같다)는 법 제14조제1항에 따라 직무수행 중 알게 된 비밀 또는 소 Ⅴ-2-8 한국여성경제인협회 규정집 속 공공기관의 미공개정보(재물 또는 재산상 이익의 취득 여부의 판단에 중 대한 영향을 미칠 수 있는 정보로서 불특정 다수인이 알 수 있도록 공개되기 전의 것을 말한다. 이하 이 조에서 같다)를 이용하여 재물 또는 재산상의 이 익을 취득하거나 제3자로 하여금 재물 또는 재산상의 이익을 취득하게 하여 서는 아니 된다. ② 법 제14조제2항에 따라 공직자로부터 직무상 비밀 또는 소속 공공기관의 미 공개정보임을 알면서도 제공받거나 부정한 방법으로 취득한 자는 이를 이용 하여 재물 또는 재산상의 이익을 취득하여서는 아니 된다. ③ 법 제14조제3항에 따라 한국여성경제인협회 소속 공직자는 직무수행 중 알 게 된 비밀 또는 소속 공공기관의 미공개정보를 사적 이익을 위하여 이용하 거나 제3자로 하여금 이용하게 하여서는 아니 된다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제15조", "article_title": "퇴직자 사적 접촉 신고 방법", "content": "한국여성경제인협회 소속 공직자는 법 제15조제1항에 따라 직무관련자인 소속기관의 퇴직자와 사적 접촉을 신고 하려는 경우 별지 제15호 서식을 작성하여 이해충돌방지담당관에게 서면으로 제출해 야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제16조", "article_title": "신고·신청의 기록·관리", "content": "이해충돌방지담당관은 법 제5조부터 제9조까지 및 제15조에 따른 신고ㆍ회피ㆍ기피ㆍ조치ㆍ점검ㆍ통보ㆍ고발ㆍ업무활동 내역 등에 관한 사항을 전자적 처리가 불가능한 특별한 사유가 없으면 청렴 포털의 이해충돌방지법 표준신고시스템을 통해 전자적 처리가 가능한 방법 으로 기록ㆍ관리해야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제17조", "article_title": "위법한 직무처리에 대한 조치", "content": "한국여성경제인협회의 장은 법 제21조에 따라 소속 공직자가 법 제5조제1항, 제6조, 제8조제1항ㆍ제2항, 제9조제1항ㆍ 제2항, 제10조, 제11조제3항, 제12조제2항, 제13조, 제14조 또는 제15조를 위 반한 사실을 발견한 경우에는 해당 공직자에게 위반사실을 즉시 시정할 것을 명하고 계속 불이행할 경우 해당 공직자의 직무를 중지하거나 취소하는 등 필요한 조치를 하여야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제18조", "article_title": "부당이득의 환수 등", "content": "① 한국여성경제인협회의 장은 법 제22조제1항에 따라 소속 공직자가 법 제5조의 신고 및 회피 의무 또는 법 제6조의 신고 의 한국여성경제인협회 공직자의 이해충돌 방지제도 운영지침 Ⅴ-2-9 무를 위반하여 수행한 직무가 위법한 것으로 확정된 경우에는 그 직무를 통 하여 공직자 또는 제3자가 얻은 재산상 이익을 환수하여야 한다. ② 한국여성경제인협회의 장은 법 제22조제2항에 따라 소속 공직자가 법 제13 조의 공공기관 물품 등의 사적 사용ㆍ수익 금지 의무를 위반한 경우에는 공 직자 또는 제3자가 얻은 재산상 이익을 환수하여야 한다. ③ 법 제22조제3항에 따라 제1항 또는 제2항에도 불구하고 다른 법률에서 공직 자 또는 제3자가 얻은 부당이득의 몰수, 환수 등에 대하여 규정하고 있는 경 우에는 그 법률에 따른다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제19조", "article_title": "위반행위 신고", "content": "① 한국여성경제인협회 소속 공직자가 법 제18조제1항에 따라 이 법의 위반행위가 발생하였거나 발생하고 있다는 사실을 신고하려는 경우 국민권익위원회, 법 위반행위가 발생한 공공기관, 그 감독기관, 감사원, 수사기관에 별지 제16호 서식을 작성하여 서면으로 제출해야 한다. ② 이해충돌방지담당관은 한국여성경제인협회 소속 공직자가 아닌 국민이 제 1항의 신고를 하려는 경우 별지 제16호 서식을 작성하여 서면으로 제출하도 록 안내해야 한다. 지 ◯3 제1항에 따른 신고를 받은 한국여성경제인협회의 장 또는 이해충돌방지담 당관은 신고자의 인적사항이나 신고내용이 외부에 알려지지 않도록 하여야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제20조", "article_title": "위반행위 신고의 처리", "content": "이해충돌방지담당관은 법 제18조제1항에 따른 신 고를 받은 경우 법 제19조제4항에 따라 조사·감사 또는 수사(이하 “조사등”이 라 한다)를 마친 날부터 10일 이내에 그 결과를 신고자에게 별지 제17호 서식 지 에 따른 서면으로 통보해야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제21조", "article_title": "이첩·송부의 처리", "content": "이해충돌방지담당관은 법 제19조제2항에 따라 국민권 익위원회로부터 이첩 또는 송부 받은 경우 법 제19조제4항에 따라 조사등을 마친 날부터 10일 이내에 그 결과를 신고자(신고자가 신분공개에 동의하지 아니하여 신고자의 인적사항을 제외하고 신고를 이첩 또는 송부받은 경우는 제외한다. 이하 같다.) 및 국민권익위원회에 별지 제17호 서식에 따른 서면으 강 로 통보해야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제22조", "article_title": "종결처리", "content": "이해충돌방지담당관은 영 제24조제1항 각 호의 어느 하나에 Ⅴ-2-10 한국여성경제인협회 규정집 해당하여 법 제18조제1항에 따라 접수받은 신고 또는 법 제19조제2항에 따라 이첩ㆍ송부 받은 신고를 종결하는 경우 신고자와 국민권익위원회(국민권익 위원회로부터 이첩·송부받은 경우만 해당한다)에 별지 제18호 서식에 따른 서면으로 통보해야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제23조", "article_title": "위반행위의 신고처리 결과에 대한 이의신청", "content": "이해충돌방지담당관은 신 고자가 법 제19조제6항에 따른 이의신청을 하려는 경우 같은 조 제4항 또는 제5항에 따라 조사 등에 대한 결과를 통보받은 날부터 7일 이내에 별지 제19 호 서식을 작성하여 서면으로 신청할 수 있음을 안내해야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제24조", "article_title": "교육", "content": "◯1 이해충돌방지담당관은 법 제24조제1항에 따라 이해충돌 방지에 관한 교육계획을 수립하고 매년 1회 이상 교육을 실시해야 한다. ② 이해충돌방지담당관은 제1항에 따라 실시한 교육 결과를 기록·관리해야 한 다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제25조", "article_title": "위반여부에 대한 상담", "content": "공직자는 이 법에 따른 의무와 관련하여 상담이 필요한 경우 이해충돌방지담당관과 상담할 수 있고 이해충돌방지담당관은 별지 제20호 서식에 따라 상담 내용을 관리해야 한다."}, {"category": "경영", "regulation": "회계규정", "article_num": "제26조", "article_title": "이해충돌방지 자문기구의 구성·운영", "content": "① 한국여성경제인협회의 장은 영 제32조제1항 각 호의 사항에 관한 자문에 응하기 위해 필요한 경우 이해충돌 방지담당관을 장으로 하는 이해충돌방지 자문기구(이하 “자문기구”라 한다) 를 구성해 운영할 수 있다. ② 자문기구는 이해충돌방지담당관을 포함하여 3인 이상으로 구성하고, 구성 원은 부패방지 업무와 관련하여 학식과 경험이 풍부한 사람 중에서 한국여성 경제인협회의 장이 위촉한다. ◯3 자문기구 구성원의 임기는 위촉된 날부터 1년으로 하되 연임할 수 있다. ◯4 자문기구의 회의는 이해충돌방지담당관이 소집하고, 관계인은 자문기구의 요청에 따라 회의에 참석하여 의견을 진술하거나 자료를 제출할 수 있다. ◯5 자문기구의 구성원에게는 예산의 범위에서 수당, 여비 및 그 밖에 필요한 경비를 지급할 수 있다. ◯6 자문기구의 구성원은 법 제16조에 따른 공무수행사인으로서 공무수행과 관련한 행위제한을 준수해야 한다. 한국여성경제인협회 공직자의 이해충돌 방지제도 운영지침 Ⅴ-2-11"}, {"category": "경영", "regulation": 는 단체 바. 공직자 자신 또는 그 가족이 단독으로 또는 합산하여 ◯1 발행주식 총수의 100분의 30 이상, ◯2 출자 지분 총수의 100분의 30 이상, ◯3 자본금 총액의 100분의 50 이상을 소유하고 있는 법인 또는 단체(「공직자의 이해충돌 방지법 시행령」제3조제1항) 사. 최근 2년 이내에 퇴직한 공직자로서 퇴직일 전 2년 이내에 법 제5조제1항 각 호의 어느 하나에 해당하는 직무를 수행하는 공직자 와 퇴직한 공직자가 법령(조례ㆍ규칙을 포함)ㆍ기준(법 제2조제1호라목부터 바목까지에서 정한 공공기관의 규정ㆍ사규 및 기준 등을 포함)에 따라 지휘ㆍ감독하였던 실ㆍ국ㆍ과(이에 준하는 부서를 포함)에서 같이 근무하였던 사람(「공직자의 이해충돌 방 지법 시행령」제3조제2항) 아. 그 밖에 공직자의 사적 이해관계와 관련되는 자로서 ◯1 법령ㆍ기준에 따라 공직자를 지휘ㆍ감독하는 상급자, ◯2 최근 2년간 1회에 100만 원, 매 회계연도에 300만원을 초과하는 금전을 빌리거나 빌려주는 행위(「금융실명거래 및 비밀보장에 관한 법률」에 따른 금융회사등, 「대부업 등의 등록 및 금융이용자 보호에 관한 법률」에 따른 대부업자등이나 그 밖의 금융회사로부터 통상적인 조건으로 금전을 빌리는 행위는 제외)를 한 공직자의 거래 상대방(「민법」제777조에 따른 친족인 경우는 제외), ③ 그 밖에 공공기관의 장이 해당 공공기관의 업 무 특성을 반영하여 공정한 직무수행에 영향을 미칠 수 있다고 인정하여 훈령 등 행정규칙이나 기준으로 정하는 자 (「공직자의 이해충돌 방지법 시행령」 제3조제3항) ③ “관련 직무”는「공직자의 이해충돌 방지법」제5조제1항에 따라 인가, 허가, 지정 및 계약 등 신고·신청인이 수행하고 있는 직무를 구체적으로 적습니다. 1. 인가ㆍ허가ㆍ면허ㆍ특허ㆍ승인ㆍ검사ㆍ검정ㆍ시험ㆍ인증ㆍ확인, 지정ㆍ등록, 등재ㆍ인정ㆍ증명, 신고ㆍ심사, 보호ㆍ감호, 보상 또는 이에 준하는 직무 2. 행정지도ㆍ단속ㆍ감사ㆍ조사ㆍ감독에 관계되는 직무 3. 병역판정검사, 징집ㆍ소집ㆍ동원에 관계되는 직무 4. 개인ㆍ법인ㆍ단체의 영업 등에 관한 작위 또는 부작위의 의무부과 처분에 관계되는 직무 5. 조세ㆍ부담금ㆍ과태료ㆍ과징금ㆍ이행강제금 등의 조사ㆍ부과ㆍ징수 또는 취소ㆍ철회ㆍ시정명령 등 제재적 처분에 관계되는 직무 6. 보조금ㆍ장려금ㆍ출연금ㆍ출자금ㆍ교부금ㆍ기금의 배정ㆍ지급ㆍ처분ㆍ관리에 관계되는 직무 7. 공사ㆍ용역 또는 물품 등의 조달ㆍ구매의 계약ㆍ검사ㆍ검수에 관계되는 직무 8. 사건의 수사ㆍ재판ㆍ심판ㆍ결정ㆍ조정ㆍ중재ㆍ화해 또는 이에 준하는 직무 9. 공공기관의 재화 또는 용역의 매각ㆍ교환ㆍ사용ㆍ수익ㆍ점유에 관계되는 직무 10. 공직자의 채용ㆍ승진ㆍ전보ㆍ상벌ㆍ평가에 관계되는 직무 11. 공공기관이 실시하는 행정감사에 관계되는 직무 12. 각급 국립ㆍ공립 학교의 입학ㆍ성적ㆍ수행평가에 관계되는 직무 13. 공공기관이 주관하는 각종 수상, 포상, 우수기관 선정, 우수자 선발에 관계되는 직무 14. 공공기관이 실시하는 각종 평가ㆍ판정에 관계되는 직무 15. 국회의원 또는 지방의회의원의 소관 위원회 활동과 관련된 청문, 의안ㆍ청원 심사, 국정감사, 지방자치단체의 행정사무감사, 국정조사, 지방자치단체의 행정사무조사와 관계되는 직무 16. 그 밖에 국회규칙, 대법원규칙, 헌법재판소규칙, 중앙선거관리위원회규칙 또는「공직자의 이해충돌 방지법 시행령」 제4조로 정 하는 ◯1「건축사법」에 따른 공사감리, ◯2「건설기술 진흥법」에 따른 감리, ◯3「감정평가 및 감정평가사에 관한 법률」에 따른 감정평가, ◯4「형의 집행 및 수용자의 처우에 관한 법률」에 따른 형의 집행 및 수용자의 지도ㆍ처우ㆍ계호에 관계되는 직무, ◯5「행정기관 소속 위원회의 설치ㆍ운영에 관한 법률」이나 다른 법령에 따라 설치된 각종 위원회의 위원 위촉에 관한 직무 ④ “직무관련자”는「공직자의 이해충돌 방지법」제2조제5호에 따른 다음 각 목의 어느 하나에 해당하는 개인·법인·단체 및 공직자를 적습니다. 가. 공직자의 직무수행과 관련하여 일정한 행위나 조치를 요구하는 개인이나 법인 또는 단체 나. 공직자의 직무수행과  행위나 조치를 요구하는 개인이나 법인 또는 단체 나. 공직자의 직무수행과 관련하여 이익 또는 불이익을 직접적으로 받는 개인이나 법인 또는 단체 다. 공직자가 소속된 공공기관과 계약을 체결하거나 체결하려는 것이 명백한 개인이나 법인 또는 단체 라. 공직자의 직무수행과 관련하여 이익 또는 불이익을 직접적으로 받는 다른 공직자. 다만, 공공기관이 이익 또는 불이익을 직접적으로 받는 경우에는 그 공공기관에 소속되어 해당 이익 또는 불이익과 관련된 업무를 담당하는 공직자를 말한다. ③ “신고인의 담당 업무와 관련한 거래상대방의 직무관련성”은 신고인이 기관에서 담당하고 있는 업무와 관련하여 거래상대방의 직무 관련성을 “② 직무관련자” 유형을 참고하여 구체적으로 적습니다. 210mm×297mm[일반용지 60g/㎡(재활용품)] ■ 공직자의 이해충돌 방지제도 운영지침 [별지 제11호 서식] 직무 관련 외부활동 허가 신청서 (앞 쪽) 접수번호 접수일 처리일 성명 소속 직위(직급) 신고인 기관명 담당자 연락처 ① 요청인 [ ] 소속 공공기관의 소관 직무와 관련된 지식이나 정보를 타인에게 제공하고 대가를 받는 행위(｢청 탁금지법｣ 제10조에 따른 외부강의 등 대가로서 사례금 수수가 허용된 경우는 제외) ② 외부활동 유형 [ ] 외국의 기관·법인·단체 등을 대리하는 행위 [ ] 직무와 관련된 다른 직위에 취임하는 행위 ◯3 외부활동 주제 ◯4 외부활동 방법 ◯5 외부활동 일시 ◯6 일괄신고 외부활동 내용 20 . . . ∼ 20 . . . 월 평균 횟수 : 회 연간 총 횟수 : 회 ◯7 사례금 총액 천원 (※ 1회 평균 대가 천원) [교통비·숙박비·식비(실비) 천원 별도] (※ 1회 평균 교통비·숙박비·식비 천원) 「공직자의 이해충돌 방지법」제10조에 따라 위와 같이 직무 관련 외부활동을 신청합니다. 년 월 일 신고인 (서명 또는 인) 210mm×297mm[일반용지 60g/㎡(재활용품)] (뒷 쪽) 작성방법 ※ 본 “직무 관련 외부활동 허가 신청서”는 ｢부정청탁 및 금품 등 수수의 금지에 관한 법률｣ 제10조에 따른 외부강의등의 대가로서 사례금 수수가 허용되는 경우에 해당하는 사항은 작성하지 않습니다. ① “요청인”은 1)공직자에게 지식이나 정보 제공을 요청하고 대가를 지급한 주체 2)공직자가 대리하는 외국의 기관·법인·단체 3)공 직자가 취임하려고 하는 직위가 속한 기관을 말합니다. ② “외부활동 유형”은 공직자가 직무 관련 외부활동으로서 소속기관장의 허가를 받으려고 하는 법 제10조제2호, 제4호, 제5호 중 유형에 체크 표시 합니다. ③ “외부활동 주체”는 공직자가 ①에서 선택한 외부활동 유형과 관련한 구체적인 활동 내용을 간략하게 적습니다. (예) 1) ㅇㅇ언론사 요청으로 ㅇㅇㅇ정책 효과에 대한 자문 2) ㅇㅇ법인을 대리해 ㅇㅇ에 관한 소송 수행 3) ㅇㅇ단체의 단체장으로 취임 ◯4 “외부활동 방법”은 공직자가 ③에서 작성한 활동을 수행하는 구체적 방법을 간략하게 적습니다. (예) 1) 서면 자문, 유선 자문 등 2) 관련 자료 제공, 재판 출석 등 3) 단체장으로서의 제반 활동 수행 ◯5 “외부활동 일시”는 공직자가 ③에서 작성한 활동을 수행하는 일시를 적습니다. (예) 1) 자문 기간 2) 대리 기간 3) 취임 기간 ◯6 “일괄신고”는 공직자가 ③에서 작성한 활동을 연간 정기적으로 수행하는 경우에만 작성합니다. (예) ㅇㅇ법인에 월 평균 2회씩 1년간 ㅇㅇ기술 관련 자문을 하는 경우, 연간 총 24회, 월 평균 2회로 작성 ◯7 “사례금”은 공직자가 ③에서 작성한 활동을 수행하고 지급받은 대가를 작성합니다. 이 때, 대가 총액은 교통비·숙박비·식비를 제 외한 대가 총액을 기재하고 교통비·숙박비·식비는 [ ] 속에 별도 기재합니다. 210mm×297mm[일반용지 60g/㎡(재활용품)] ■ 공직자의 이해충돌 방지제도 운영지침 [별지 제12호 서식] 직무 관련 외부활동 허가 통보서 • [ ]에는 해당하는 곳에 √ 표시를 합니다. 접수번호 접수일 통보일 성명 소속 직위(직급) 신청인 [ ] 소속 공공기관의 소관 직무와 관련된 지식이
