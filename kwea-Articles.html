29.> 12. 삭제 <'18. 3. 29.> 13. “전직”이라함은 직종을 변경함을 말한다. <신설 ’13. 8. 29.> 14. “전적”이라함은 직원이 협회와 근로 계약을 종료하고, 제17조제2항의 규 정에 의한 인사교류 대상기관(이하 “교류 기관”이라 한다)으로 이적해 가 는 것을 말한다. <신설 ’13. 8. 29., 개정 '18. 3. 29.> 15. “전입”이라함은 전출한 직원이 교류 기관과 근로계약을 종료하고, 협회로 이적해 오는 것을 말한다. <신설 ’13. 8. 29.> 제3조의 2(임용권자) 직원의 임용은 협회회장이 행한다. <신설 ’13. 8. 29., 개정 '18. 3. 29., '21.4.29.> 제3조의 3(임용절차) 직원의 임용은 발령과 임명장 교부로써 행한다. 다만 채용 및 승진 외의 발령은 통지서로 대신할 수 있다. <신설 ’13. 8. 29., 개정 '18. 3. 29.>"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제4조", "article_title": "인사권의 행사", "content": "① 협회 직원의 인사(채용, 전임, 전직, 승진 및 포상, 교육 훈련, 징계에 관한 사항)는 협회회장이 행한다. <개정 '18. 3. 29., '21.4.29.> 인사관리규정 Ⅲ-2-5 1. 삭제< '21. 4. 29.> 2. 삭제< '21. 4. 29.> 3. 삭제< '21. 4. 29.> ② 제1항에도 불구하고 지회 직원의 인사에 관한 사항은 지회인사위원회의 의결에 따라 지회회장이 한다. <개정 '01. 9. 7., ’13. 8. 29., '21.4.29.> ③ 삭제 <'18. 3. 29.>"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제5조", "article_title": "인사명령의 효력", "content": "삭제 <'18. 3. 29.> 경"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제6조", "article_title": "직급 및 호봉", "content": "<삭제> <'19. 4. 29.> 영 제2장 채용"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제7조", "article_title": "채용원칙", "content": "① 직원의 신규채용은 공개모집에 의하여 채용함을 원칙으로 하되, 다만, 다음 각호의 1에 해당하는 경우에는 특별 채용할 수 있다.<개정 '19. 4. 29.> 1. 삭제 <'23. 10. 16.> 2. 삭제 <'23. 10. 16.> 3. 삭제 <'23. 10. 16.> ② 응시자의 공평한 기회 보장을 위해서 성별·신체조건· 용모·학력·연령 등에 대한 불합리한 제한을 두거나 차별을 하여서는 아니 된다. <신설, '23. 10. 16.> ③ 신규직원의 직급산정규칙은【별표2】와 같다. <개정 '01. 9. 7., ’14. 4. 9., ’1 5. 6. 4., '19. 4. 29., '23.10.16. > 침 제7조의 2(인사청탁 등의 금지) ① 임직원은 자신의 임용․승진․전보 등 인사에 관하여 부당한 영향을 미치기 위하여 타인으로 하여금 인사업무를 담당하는 자에게 청탁을 하게 하여서는 아니된다. <신설 ’13. 8. 29.> ② 임직원은 직위를 이용하여 다른 임직원의 임용․승진․전보 및 신규채용 등 강 인사에 부당하게 개입하여서는 아니된다. <신설 ’13. 8. 29.> Ⅲ-2-6 한국여성경제인협회 규정집"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제8조", "article_title": "계약직", "content": "① 한시적이고 전문적인 업무를 수행토록 하기 위하여 필요한 경 우 직원을 계약직(촉탁, 용원 포함)으로 임용할 수 있다. ② 계약직의 임용기간은 회계연도 단위를 원칙으로 하되 필요한 경우에는 임 용기간을 달리 정하여 계약할 수 있다. <개정 '01. 9. 7.> ③ 계약직에 대하여는 제7조제1항, 제10조제8호, 제18조, 제19조 및 제32호를 적용하지 아니한다. ④ 계약직으로 임용된 자는 협회 제규정을 준수하여야 한다."}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제9조", "article_title": "수습직원", "content": "① 제7조의 공개모집에 합격한 자는 3개월간 수습직원으로 임 용하고 그 기간 중 근무성적이 양호한 경우에 협회회장이 정규직원으로 임용 한다. <개정 '01. 9. 7., ’03. 5. 13., ’05. 10. 25., '21.4.29.> ② 수습직원을 정규직원으로 임용시 제1항의 기간은 근무기간에 산입한다. ③ 수습직원은 제32조의 규정을 적용하지 아니하며, 협회 제규정을 준수하여야 한다. ④ 수습 종료 후 근무성적이 불량하거나 업무수행능력이 부족하다고 판단되 는 경우에는 근로를 해지할 수 있다. <신설 ’15. 6. 4.> 제9조의 2(인턴채용) ① 직원 채용과 관련하여 교육과 실무 습득을 위하여 기간 의 정함이 있는 근로계약을 체결한 인턴을 채용할 수 있다. 이 경우 근무성적 이 우수한 인턴에 대하여 인사위원회 의결을 통해 정규직직원으로 임용할 수 있다. <신설 ’13. 8. 29.> ② 인턴을 정규직으로 임용할 경우 수습기간을 단축 또는 면제할 수 있다. <신설 ’13. 8. 29.> ③ 인턴에 대한 평가, 급여 등 세부사항은 회장이 별도로 정한다. <신설 ’13. 8. 29.>"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제10조", "article_title": "결격사유", "content": "다음 각호의 1에 해당하는 자는 신규 임용할 수 없다. 1. 피성년후견인 또는 피한정후견인, 피특정후견인 <개정 '18. 3. 29.> 2. 파산자로서 복권되지 아니한 자 3. 법률에 의하여 자격정지 및 자격상실의 처벌을 받고 그 기간이 종료되지 아니하였거나 복권되지 아니한 자 4. 금고 이상의 형을 받고 집행이 종료되거나 집행을 받지 아니하기로 확정된 후 5년을 경과하지 아니한 자 인사관리규정 Ⅲ-2-7 5. 금고 이상의 형을 받고 그 집행유예의 기간이 완료된 날로부터 2년을 경과 하지 아니한 자 6. 병역의무를 기피한 자 7. 임용 신체검사에서 불합격한 자로 판정된 자 8. 삭제 <'18. 3. 29.>"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제11조", "article_title": "시험 및 전형방법", "content": "시험 및 전형 등에 관한 세부사항은 따로 규칙으로 정한다. 경"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제12조", "article_title": "구비서류", "content": "인사권자는 직원을 임용함에 있어 다음 구비서류를 제출하게 영 하여야 한다. <개정 '18. 3. 29., '19. 4. 29.> 1. 이력서 및 사진 <개정 '19. 4. 29.> 2. 경력 및 자격을 증명하는 서류(필요한 경우에 한함) 3. 주민등록등본 및 초본 <개정 '19. 4. 29> 4. 병․의원에서 발급한 건강진단서 <개정 ’13. 8. 29.> 5. 삭제 <’05. 10. 25.> 규 6. 최종학교 졸업(예정)증명서 1부 <신설 ’05. 10. 25.> 7. 최종학교 성적증명서 1부 <신설 ’05. 10. 25.> 8. 삭제 <'18. 3. 29.> 9. 기타 필요하다고 인정하는 서류 <개정 '19. 4. 29.> 제12조의 2(신원보증) 회계담당직원은 신원보증을 하여야 한다. <신설 ’13. 8. 29, 개정 '18. 3. 29.> 지 제3장 보직"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제13조", "article_title": "보직원칙", "content": "직원의 보직은 학력, 경력, 자격, 기능, 적성 및 업무수행능력 을 고려하여 적재적소에 배치되도록 하여야 한다."}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제14조", "article_title": "겸직 및 파견", "content": "① 협회의 사무형편상 필요하다고 인정하면 겸직을 명할 수 강 있다. <신설 ’13. 8. 29., 개정 '18. 3. 29.> ② 협회회장은 다음 각 호의 하나의 경우에 기간을 정하여 직원을 파견근무하게 Ⅲ-2-8 한국여성경제인협회 규정집 할 수 있다. <신설 ’13. 8. 29., 개정 '18. 3. 29., '21.4.29.> 1. 업무의 일시적인 폭주로 다른 직원의 지원이 필요하다고 인정될 때 2. 특수 업무의 일시적인 수행을 위하여 다른 직원의 지원이 필요하다고 인정 될 때 3. 교육훈련 상 국내외 연수가 필요할 때 4. 기타 업무 수행상 필요성이 인정될 때 ③ 제2항에 의하여 파견된 직원은 파견근무처 부서장의 업무상 지휘감독을 받는다. <개정 ’13. 8. 29., 개정 '18. 3. 29.>"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제15조", "article_title": "직위해제", "content": "① 직원이 다음 각 호의 1에 해당한 때에는 직위를 해제할 수 있다. <개정 '18. 3. 29.> 1. 직무수행능력이 현저히 부족하거나 근무성적이 극히 불량한 자 또는 직원 으로서의 직무태도가 극히 불성실한 자 2. 소속부하에 대한 지휘 및 감독능력이 현저히 부족하다고 인정된 자 3. 형사사건으로 구속 기소된 자 (약식명령이 청구된 자는 제외한다) <개정 '23.10.16.> 4. 징계혐의가 있어 조사 중이거나 징계심의 중인 자 5. 신체정신상의 이상으로 직무를 감당치 못할 만한 지장이 있는 자 6. 직제의 개폐 등으로 정원의 감원, 조정이 불가피한 경우 7. 채용비리에 연루되어 수사의뢰 되거나 징계 의결이 요구된 때 <신설 '23.10.16.> 8. 기타 협회가 직위해제함이 정당하다고 인정하는 경우 <신설 '23.10.16.> ② 직위해제 기간 중에는 직원으로서의 신분은 보유하나 직무에 종사하지 못 한다. <개정 '18. 3. 29.> ③ 제1항 각호에 의하여 직위해제 된 자에 대하여는 그 기간 중 3개월 이내의 대기를 명할 수 있으며, 1회에 한하여 연장할 수 있다. <개정 '18. 3. 29.> ④ 제1항의 규정에 의하여 직위를 해제한 경우에 그 사유가 소멸된 때에는 지 체 없이 직위를 부여하여야 하며, 직위해제 기간이 경과되었음에도 직위를 부 여받지 못하면 당연 면직된 것으로 본다. <개정 '18. 3. 29.>"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제16조", "article_title": "대우", "content": "① 업무 수행상 필요하다고 인정하는 경우 동일직급에서 7년 이상 근속한 자에 한하여 차상위 직급대우로 발령할 수 있다. ② 제1항의 대우제 운영에 관한 세부사항은 인사위원회에서 행한다."}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제17조", "article_title": "순환보직", "content": "① 동일보직에의 장기근무로 인한 침체를 방지하고 직원각자 인사관리규정 Ⅲ-2-9 에게 균등한 기회를 부여하기 위하여 직무의 전문화를 저해하지 않는 범위 내에서 순환보직을 실시할 수 있다. ② 본회와 지회 상호간의 직원의 전보에는 협회회장이 필요하다고 인정하는 경우에 협회회장이 발령한다. <개정 '18. 3. 29., '21.4.29.> 제17조의 2(인사교류) ① 협회회장은 중소기업의 육성․발전을 위하여 필요 하다 고 인정하면 협회 업무와 직접 관련이 있는 기관 및 기업과의 인사교류를 실 시할 수 있다. <신설 ’13. 8. 29., 개정 '18. 3. 29., '21.4.29.> 경 ② 인사교류는 파견 또는 전적의 방법으로 시행할 수 있으며 인사교류의 대 상, 절차, 그 밖의 인사교류에 관하여 필요한 사항은 규칙으로 정한다. <신설 영 ’13. 8. 29., 개정 '18. 3. 29.> 제17조의 3(대기) 삭제 <'18. 3. 29.> 제4장 승진"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제18조", "article_title": "승호", "content": "삭제 <'19. 4. 29.>"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제19조", "article_title": "승진", "content": "① 승진은 다음 사항을 종합평가한 결과에 의하여 인사위원회의 심의를 거쳐 실시하며, 각 직급별 승진 소요연한은 [별표3]과 같다. <개정 '19. 4. 29.> 1. 최근 2년간의 근무성적. 다만, 4급 이상 승진의 경우 최근 3년간의 근무성 적 <개정 '01. 9. 7., '19. 4. 29. > 2. 협회근무경력 3. 상벌 등 기타 참고사항 ② 각 직급별 승진소요 최저근무연한은 2~4년으로 한다. 다만, 경력소지자를 채용한 경우에는 1년으로 한다. <개정 '19. 4. 29.> ③ 승진은 매년 1회 실시함을 원칙으로 하되 필요한 경우 인사권자가 그 회수 및 실시기간을 조정할 수 있다. <개정 '19. 4. 29.> ④ 각 급 승진제한연수를 초과한 경우 승진이 제한된다. <개정 '19. 4. 29.> 강 ⑤ 기타 승진에 필요한 사항은 규칙으로 정한다."}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제20조", "article_title": "특별승진 등", "content": "직원이 다음 각 호의 1에 해당할 때에는 제18조 및 제19조의 Ⅲ-2-10 한국여성경제인협회 규정집 규정에 불구하고 인사위원회의 심의를 거쳐 특별승진시킬 수 있다. <개정 '0 3. 5. 13.> 1. 특수한 사명감으로 맡은 바 직무에 정진하여 다른 직원의 귀감이 되는 자 2. 직무수행능력이 탁월하여 협회발전에 지대한 공헌을 한 자 3. 직무를 수행함에 있어 탁월한 창의력을 발휘하여 예산절감과 회무운영 발 전에 현저한 실적이 있는 자"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제21조", "article_title": "승진의 제한", "content": "① <삭제> <개정 '01. 9. 7., '18. 3. 29., '19. 4. 29.> ② 다음 각호의 1에 해당하는 자는 승진대상에서 제외한다. 1. 징계처분, 휴직 중에 있는 자 2. 징계처분 만료일부터 다음 기간이 경과하지 아니한 자 가. 견책 : 6월 <개정 '18. 3. 29.> 나. 감봉 : 10월 <개정 '18. 3. 29.> 다. 정직 : 12월 <개정 '18. 3. 29.> ③ 제2항제2호의 기간은 제19조의 승진소요 최저 근무년수에 이를 가산한다. <개정 '03. 5. 13.,'19. 4. 29.> ④ 승진의 소요 근무년한을 산정함에 있어서는 휴직기간을 가산한 기간을 승 진기간으로 한다. 다만, 업무상 질병 또는 公傷으로 인한 경우에는 그러하지 아니하다.<개정 '19. 4. 29.> ⑤ 제1항 및 제2항의 규정에 의하여 승진 제한 기간중에 있는 자가 다시 징계 처분을 받은 경우의 승진 제한기간은 前處分에 의한 제한기간이 종료된 날로 부터 기산한다.<개정 '19. 4. 29.> 제5장 근무평정"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제22조", "article_title": "근무평정", "content": "① 인사권자는 직원 개개인의 능력과 근무상황을 평가하여 이를 인사관리에 반영하여야 한다. ② 근무성적평정에 관한 사항은 따로 규칙으로 정한다. 제6장 인사위원회"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제23조", "article_title": "설치", "content": "직원 인사에 관한 사항을 심의하기 위하여 인사위원회(이하 “위원 회”라 한다.)를 둔다. <개정 '01. 9. 7., '19. 4. 29.> 인사관리규정 Ⅲ-2-11"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제24조", "article_title": "구성", "content": "① 위원회는 위원장을 포함하여 3인 이상 7인 이내의 위원과 1인의 간사로 구성한다. <개정 '18. 6. 12.> ② 위원회의 위원장은 상근부회장이 되며, 간사는 인사담당부서장, 위원은 직 책자로 위원장이 지명하고 필요 시 관련 외부전문가를 위원으로 위촉할 수 있다. <개정 '18. 6. 12.>"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제25조", "article_title": "운영", "content": "①위원회의 의결을 요하는 사항은 다음 각호와 같다. 1. 인사관리의 기본방침에 관한 자문 경 2. 직원의 임용에 관한 사항 <개정 '05. 10. 25., ’18. 6. 12.> 3. 직원의 승진 등 제반사항 <개정 '18. 3. 29.> 영 4. 직원의 포상에 관한 사항 5. 직원의 감봉 이상 징계에 관한 사항 <개정 '18. 3. 29.> 6. 기타 인사에 관하여 위원장이 필요하다고 인정하는 사항 7. 직원의 특별승진에 관한 사항 <신설 '01. 9. 7.> 8. 기타 인사에 관하여 위원장이 필요하다고 인정하는 사항 <개정 '01. 9. 7> ②위원회는 연1회 개최를 원칙으로 하되, 긴급을 요하거나 필요하다고 인정할 규 때에는 위원장의 승인을 받아 수시로 개최할 수 있다.<신설 '18. 6. 12.>"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제26조", "article_title": "회의 및 의사", "content": "① 위원회는 다음 각호의 경우에 위원장이 소집하고 위원 장은 회의의 의장이 된다. 1. 회장이 필요하다고 인정할 때 2. 재적위원 과반수의 요청이 있을 때 ② 위원회의 회의는 재적위원 과반수 출석으로 성립하고 출석위원 과반수 찬 지 성으로 의결한다. <신설 ’13. 8. 29.> ③ 위원회에 출석한 관계자는 위원회에서 토의된 내용에 대하여 기밀을 유지 하여야 한다. <신설 '19. 4. 29.>"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제27조", "article_title": "진술 및 증언 등", "content": "삭제 <'18. 3. 29.>"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제28조", "article_title": "재심", "content": "삭제 <'18. 3. 29.> 강"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제29조", "article_title": "의사록", "content": "담당자는 심의사항, 참석자의 발언, 결정사항 등을 의사록에 기록 하여 출석위원의 날인을 받아 보관하여야 한다. <개정 '18. 3. 29., ’25. 8. 18.> Ⅲ-2-12 한국여성경제인협회 규정집"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제30조", "article_title": "심의사항의 보고", "content": "삭제 <'19. 4. 29.> 제7장 인사기록"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제31조", "article_title": "인사기록", "content": "인사담당부서에서는 직원의 인사기록을 작성, 유지 보관하여 야 한다. 제8장 신분보장"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제32조", "article_title": "신분보장", "content": "직원은 형의 확정, 징계처분 또는 이 규정에 정하는 사유에 의하지 아니하고는 불이익한 처분을 받지 아니한다."}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제33조", "article_title": "시행규칙", "content": "이 규정에서 정하지 아니한 세부적인 사항 또는 이 규정의 시 행에 필요한 사항은 회장이 규칙으로 정한다. <신설 '18. 3. 29.> 부칙 <1999. 9. 6.>"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제1조", "article_title": "시행일", "content": "이 규정은 이사회에서 의결한 날부터 시행한다."}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제2조", "article_title": "연관규정", "content": "상벌에 관한 사항은 복무규정에 따른다. 부칙 <2001. 9. 7.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2003. 5. 13.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2005. 10. 25.> 이 규정은 이사회에서 의결한 날부터 시행한다. 인사관리규정 Ⅲ-2-13 부칙 <2013. 8. 29.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2014. 4. 9.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2015. 6. 4.> 경 이 규정은 이사회에서 의결한 날부터 시행한다. 영 부칙 <2018. 3. 29.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2018. 6. 12.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2019. 4. 29.>"}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제1조", "article_title": "시행일", "content": "이 규정은 2019년 4월 29일부터 시행한다."}, {"category": "경영", "regulation": "인사관리규정", "article_num": "제2조", "article_title": "경과조치", "content": "이 규정 전 발생한 사안은 이 규정에 의한 것으로 간주한다. 부칙 <2021. 4. 29.> 이 규정은 2021년 4월 29일부터 시행한다. 부칙 <2023. 10. 16.> 이 규정은 2023년 10월 16일부터 시행한다. 부칙 <2025. 8. 18.> 이 규정은 이사회에서 의결한 날부터 시행한다. Ⅲ-2-14 한국여성경제인협회 규정집 【별표 1】<삭제> 【별표 2】 직급 산정규칙 □ 경력 소요연수표 직위 직급 경력채용 기준 1. 박사 또는 석사학위를 취득한 후 12년 또는 16년 이상의 실 무경력을 가진 자 부장 1급 2. 대학 이상의 과정을 이수한 자로서 채용 대상 분야에 실무 경력 20년 이상인 자 3. 기타 상기요건과 동등한 자격이 있다고 인정되는 자 1. 박사 또는 석사학위를 취득한 후 10년 또는 14년 이상의 실 무경력을 가진 자 부부 2급 2. 대학 이상의 과정을 이수한 자로서 채용 대상 분야에 실무 장 경력 16년 이상인 자 3. 기타 상기요건과 동등한 자격이 있다고 인정되는 자 1. 박사 또는 석사학위를 취득한 후 6년 또는 10년 이상의 실 무경력을 가진 자 차장 3급 2. 대학 이상의 과정을 이수한 자로서 채용 대상 분야에 실무 경력 12년 이상인 자 3. 기타 상기요건과 동등한 자격이 있다고 인정되는 자 1. 박사 또는 석사학위를 취득한 후 3년 또는 6년 도로 정하는 ‘위임전결세부 규칙’에 따른다. <개정 ’13. 8. 29., ’15. 6. 4., ’19. 4. 29., ’26. 2. 23. > ② 규칙에서 정한 내용과 다른 규정의 정함이 다른 경우 또는 규칙에서 정함이 없는 사항으로서 다른 규정에 따로 정하여진 경우에는 그 규정에 의한다. <개정 ’26. 2. 23.> ③ 전결규칙은 협회장의 결재를 통해 제정 및 개정할 수 있으며, 그 변경 이력 은 기록 및 공표한다. <개정 ’26. 2. 23.>"}, {"category": "경영", "regulation": "위임전결규정", "article_num": "제4조", "article_title": "권한의 재위임과 책임", "content": "전결권자는 사안이 경미하다고 인정되는 사항은 과장 이상 하위직 자에게 재위임할 수 있다. 다만, 위임을 받은 자가 그 책임 수행을 다하지 못하였을 경우 위임한 전결권자가 책임을 진다. Ⅲ-3-4 한국여성경제인협회 규정집"}, {"category": "경영", "regulation": "위임전결규정", "article_num": "제5조", "article_title": "협의사항", "content": "전결권자는 업무를 처리함에 있어 타부서와 관련되는 사항은 관련부서의 대등한 직위의 자와 협의를 거쳐야 한다."}, {"category": "경영", "regulation": "위임전결규정", "article_num": "제6조", "article_title": "전결사항의 특례", "content": "① 전결권자가 결원, 출장, 휴가 등으로 전결이 불가능한 경우에는 다음 각 호와 같이 전결 권한을 행사한다. <개정 '19. 4. 29.> 1. 상근부회장 전결사항 : 본부장 2. 본부장 : 팀장 3. <삭제> 4. 팀장 : 차상급자 ② 전결사항 중 다음 각 호의 경우에는 차상급자의 결재를 받아야 한다. 1. 상급자의 지시가 있을 때 2. 업무내용이 특히 중요하거나 극히 이례적인 사항"}, {"category": "경영", "regulation": "위임전결규정", "article_num": "제7조", "article_title": "효력", "content": "이 규정에 의하여 전결된 문서는 회장이 결재한 문서와 동일한 효력을 가진다."}, {"category": "경영", "regulation": "위임전결규정", "article_num": "제8조", "article_title": "보고", "content": "전결권자가 그의 전결권을 행사하였을 경우에 그 전결사항 중 특히 중요하거나 특이한 예에 속하는 사항은 그의 차상급자에게 이를 보고하여야 한다."}, {"category": "경영", "regulation": "위임전결규정", "article_num": "제9조", "article_title": "보칙", "content": "이 규정에서 정하지 아니한 사항은 회장이 정하는 바에 의한다. 부칙 <1999. 9. 16.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2013. 8. 29.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2015. 6. 4.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2019. 4. 29.>"}, {"category": "경영", "regulation": "위임전결규정", "article_num": "제1조", "article_title": "시행일", "content": "이 규정은 2019년 4월 29일부터 시행한다."}, {"category": "경영", "regulation": "위임전결규정", "article_num": "제2조", "article_title": "경과조치", "content": "이 규정 전 발생한 사안은 이 규정에 의한 것으로 간주한다. 부칙 <2021. 4. 29.> 이 규정은 2021년 4월 29일부터 시행한다. 부칙 <2026. 2. 23.>"}, {"category": "경영", "regulation": "위임전결규정", "article_num": "제1조", "article_title": "시행일", "content": "이 규정은 2026년 2월 23일부터 시행한다. 다만, 위임전결세부규칙의 제정이 필요한 사항에 관한 개정규정은 위임전결세부규칙이 제정·시행된 날부터 시행 한다. 【별표 1】삭제 <'26. 2. 23.> 복무규정 Ⅲ-4-1 경 영 복무규정 복무규정 Ⅲ-4-3 복무규정 제정 1999. 9. 6. 개정 2001. 9. 7. 개정 2003. 5. 13. 개정 2005. 10. 25. 개정 2013. 8. 29. 개정 2015. 6. 4. 경 개정 2018. 3. 29. 개정 2021. 4. 29. 영 개정 2023. 10. 16. 개정 2026. 2. 23. 제1장 총칙"}, {"category": "경영", "regulation": "복무규정", "article_num": "제1조", "article_title": "목적", "content": "이 규정은 한국여성경제인협회(이하협회“라 한다.) 직원의 복무 기준에 관한 사항을 규정하여 직장의 기강을 확립하고 업무수행의 원활을 기 함을 목적으로 한다."}, {"category": "경영", "regulation": "복무규정", "article_num": "제2조", "article_title": "적용", "content": "이 규정은 직원의 복무에 대하여 적용하며, 정관 또는 다른 규정에서 특별히 정하는 바를 제외하고는 이 규정에 의한다."}, {"category": "경영", "regulation": "복무규정", "article_num": "제3조", "article_title": "책임완수의 임무", "content": "직원은 협회의 사명을 항상 명심하여 공사를 분별하고, 봉사하는 마음가짐과 겸허한 자세로 친절․공정․신속․정확하게 업무를 처리 침 하여야 하며 상사의 지시에 의하여 성실히 직무를 수행하여야 한다."}, {"category": "경영", "regulation": "복무규정", "article_num": "제4조", "article_title": "품위유지의무", "content": "직원은 협회의 명예를 손상시키는 일이 없도록 항상 언행을 조심하여야 하며, 예절과 품위를 쌓아야 한다."}, {"category": "경영", "regulation": "복무규정", "article_num": "제5조", "article_title": "비밀보지의 의무", "content": "직원은 협회의 기밀이나 직무상 지득한 비밀은 재직 중은 물론 퇴직한 후에도 누설하여서는 아니 된다. 령 Ⅲ-4-4 한국여성경제인협회 규정집"}, {"category": "경영", "regulation": "복무규정", "article_num": "제6조", "article_title": "직장이탈금지", "content": "직원은 소속상관의 허가 또는 정당한 사유 없이 직장을 이탈 하여서는 아니 된다."}, {"category": "경영", "regulation": "복무규정", "article_num": "제7조", "article_title": "손해배상의 의무", "content": "직원이 고의 또는 과실로 인하여 협회에 손해를 끼쳤을 때에는 배상의 책임을 진다. <개정 '18. 3. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제8조", "article_title": "겸직금지", "content": "직원은 회장의 허가 없이 협회 이외의 보수를 목적으로 하는 타업에 종사거나 겸직할 수 없다. 제8조의 2(특혜의 배제) 임직원은 직무를 수행함에 있어 지연․혈연․학연․종교 등을 이유로 특정인에게 특혜를 주거나 특정인을 차별하여서는 아니된다. <신설 ’13. 8. 29.> 제8조의 3(이권개입 등의 금지 및 직위의 사적 이용금지) ① 임직원은 직위를 이용하여 부당한 이익을 얻거나 타인이 부당한 이익을 얻도록 해서는 아니 된다. <신설 ’13. 8. 29., 개정 '18. 3. 29.> ② 임직원은 직위의 범위를 벗어나 사적 이익을 위하여 소속기관의 명칭이 나 직위를 공표․게시하는 등의 방법으로 이용하거나 이용하게 해서는 아니 된다. <신설 ’13. 8. 29.> 제8조의 4(알선․청탁 등의 금지) ① 임직원은 자기 또는 타인의 부당한 이익 을 위하여 다른 임직원의 공정한 직무수행을 해치는 알선․청탁 등을 하여서 는 아니된다. <신설 ’13. 8. 29.> ② 임직원은 직무수행과 관련하여 자기 또는 타인의 부당한 이익을 위하여 직무관련자를 다른 직무관련자 또는 ’부패방지 및 국민권익위원회의 설치 및 운영에 관한 법률’ 제2조 제3호의 규정에 의한 공직자에게 소개하여서 는 아니된다. <신설 ’13. 8. 29.> 제2장 복무"}, {"category": "경영", "regulation": "복무규정", "article_num": "제9조", "article_title": "근무시간", "content": "① 직원의 근무시간은 월요일부터 금요일까지 점심시간을 제외 하고 주간 40시간으로 하며, 토요일은 휴무함을 원칙으로 한다. <개정 ’13. 8. 29.> ② <삭제> <’23.10.16.> 복무규정 Ⅲ-4-5 ③ 회장은 직무 등을 참작하여 필요하다고 인정될 때에는 직원의 동의 또는 신청을 받아 근무시간을 조정할 수 있다. <신설 ’23.10.16.> [전문개정 ’01. 9. 7, 개정 ’13. 8. 29]"}, {"category": "경영", "regulation": "복무규정", "article_num": "제10조", "article_title": "휴식시간", "content": "① 휴식시간은 12시부터 13시까지 1시간으로 한다. 다만, 직 무의 정도에 따라 적절히 조정 할 수 있다. ② 휴식시간은 직무수행에 지장이 없는 한 자유로이 이용할 수 있다."}, {"category": "경영", "regulation": "복무규정", "article_num": "제11조", "article_title": "근무상황관리", "content": "① 직원이 질병 기타 부득이한 사유로 사전허가를 얻지 경 못하고 결근하는 때에는 우선 통신 등의 방법으로 신속히 연락하여 그 사유 영 에 합당한 종류의 휴가조치를 받아야 한다. ② 질병 기타 사유로 조퇴하거나 근무시간 중에 외출할 때에는 사전에 근무상 황기록부에 시간․용무․행선지 등을 기입하고 감독자의 허가를 받아야 한다. <개정 '01. 9. 7.> ③ 상해나 질병 등으로 3일 이상 계속 결근 시에는 의사의 진단서와 결근계를 제출하여야 한다. <신설 ’13. 8. 29.> ④ 결근계를 제출하지 않을 때에는 무단결근으로 처리한다. <신설 ’13. 8. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제12조", "article_title": "시간외근무 및 휴일근무", "content": "① 업무수행을 위해 필요한 때에는 「근로기준법」 에서 정하는 바에 따라 소정 근무시간외에 따로 시간외근무 및 휴일근무를 명 할 수 있다. <개정 ’13. 8. 29, '18. 3. 29.> ② 전항의 시간외근무나 휴일근무는 예산의 범위내에서 사전결재를 받은 자에 한해 실시하며, 시간외 근무나 휴일근무를 한 자에 대하여는 보수규정이 정하는 바에 따라 시간외근무수당 또는 휴일근무수당을 지급한다. 다만 근로자와 합의에 따라 필요한 경우 휴일근무수당을 지급하는 것에 갈음하여 보상휴가(1.5일)를 부여할 수 있다. <개정 '18. 3. 29., '23.10.16.> ③ 임신 중의 직원에게 시간외근무를 하게 하여서는 아니되며, 그 직원의 요 구가 있는 경우에는 쉬운 종류의 근로로 전환하여야 한다. <개정 ’13. 8. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제12조의2", "article_title": "간주근로시간제", "content": "직원이 출장, 파견 등의 이유로 근로시간의 일부 또 는 전부를 사업장 밖에서 근로하여 근로시간을 산정하기 어려운 경우에는 1 일 8시간을 근로한 것으로 본다. <신설 '18. 3. 29.> Ⅲ-4-6 한국여성경제인협회 규정집"}, {"category": "경영", "regulation": "복무규정", "article_num": "제13조", "article_title": "출장직원", "content": "① 직원이 업무로 출장할 때에는 사전에 출장명령을 받아야 한다. <개정 '01. 9. 7., ’13. 8. 29.> ② 출장승인을 받은 직원(이하출장 직원\"이라 한다.)은 당해 업무수행에 충 실하여야한다. <개정 ’13. 8. 29.> ③ 출장 직원은 지정된 출장기일 안에 그 임무를 완수하지 못할 사유가 발생 한 때에는 전화․기타의 방법으로 해당부서의 장에게 보고하고 그 지시를 받아 야 한다. <개정 '01. 9. 7., ’13. 8. 29.> ④ 출장 직원이 그 출장용무를 마치고 귀임한 때에는 해당부서의 장에게 결과 보고서를 제출하여야 한다. 다만, 경미한 사항에 대한 복명은 구술 등의 방법 으로 할 수 있다. <개정 '01. 9. 7., ’13. 8. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제14조", "article_title": "사무인수인계", "content": "① 직원이 인사발령 등에 의하여 그 직무를 떠나게 될 때 에는 미결사항과 서류철 및 비품의 목록 등을 작성하여 후임직원 또는 소속 부서의 장이 지명하는 직원에게 인계하여야 한다. <개정 '01. 9. 7., ’13. 8. 29., '18. 3. 29.> ② 사무 인계 시 입회자는 인수인계자의 차상급자로 한다. ③ 직원이 퇴직하는 경우는 제28조에 따른다. <신설 '18. 3. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제15조", "article_title": "휴가의 종류", "content": "직원의 유급휴가는 연차휴가, 공가 및 특별휴가이며, 무급 휴가는 병가, 여성보건휴가, 가족돌봄휴가로 구분하여 사전에 휴가원을 제출한다. <개정 ’05. 10. 25., ’13. 8. 29., ’23.10.16.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제16조", "article_title": "연차휴가", "content": "① 삭제 <’13. 8. 29.> ② 직원의 근무기간별 연가일수는 근로기준법 제60조(연차유급휴가)에 따르 며 1년간 8할 이상을 출근한 직원의 근속기간별 연가일수는 다음과 같다. <개 정 ’13. 8. 29.> 근속기간 연가일수 근속기간 연가일수 1년이상~3년미만 15일 13년~15년 21일 3년~5년 16일 15년~17년 22일 5년~7년 17일 17년~19년 23일 7년~9년 18일 19년~21년 24일 9년~11년 19일 21년이상 25일 11년~13년 20일 1. 1년간 8할이상 출근한 직원에게는 15일의 연차휴가를 준다. <개정 ’13. 8. 29.> 복무규정 Ⅲ-4-7 2. 3년 이상 계속하여 근로한 직원에게는 제1호에 따른 휴가에 최초 1년을 초 과하는 계속 근로 연수 매 2년에 대하여 1일을 가산한 연차휴가를 준다. 이 경우 가산휴가를 포함한 총 연차휴가일수는 25일을 한도로 한다. <개정 ’1 3. 8. 29.> 3. 계속하여 근로한 기간이 1년 미만인 직원 또는 1년간 80퍼센트 미만 출근 한 직원에게는 1개월 개근 시 1일의 연차휴가를 준다. <신설 ’13. 8. 29.> 4. 삭제 <’21. 4. 29.> ③ 제1항의 휴가계산기간은 다음 각 호와 같다. 경 1. 삭제 <’05. 10. 25.> 2. 연차휴가 : 1월 1일부터 같은 해 12월 31일까지 <개정 ’13. 8. 29.> 영 ④ 협회는「근로기준법」이 정하는 바에 따라 연차휴가의 사용을 촉진하여야 하며 그럼에도 불구하고 제2항에 따른 휴가는 1년간 행사하지 아니하면 소멸 한다. 다만, 협회의 귀책사유로 사용하지 못한 경우에는 그러하지 아니하다. <개정 '03. 5. 13., ’05. 10. 25., ’13. 8. 29.> ⑤ 직원은 자유의사로 누적 또는 분할하여 연차휴가를 사용할 수 있다. 직원 은 오전 또는 오후의 반일단위로 연차휴가를 사용할 수 있으며, 반일연차휴가 규 2회는 연차유급휴가 1일로 계산한다. 단, 직원이 청구한 시기 또는 청구한 기 간 동안 연차휴가를 주는 것이 협회운영에 막대한 지장이 있는 경우에는 그 시기 또는 기간을 변경할 수 있다. <신설 ’13. 8. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제17조", "article_title": "병가", "content": "① 직원이 다음 각호의 어느 하나에 해당 할 경우 연 60일의 범위 내에서 병가를 허가할 수 있다. <개정 ’13. 8. 29., ’21. 4. 29> 1. 질병 또는 부상으로 인하여 직무를 수행할 수 없을 때 <개정 ’13. 8. 29.> 지 2. 감염병에 걸려 그 직원의 출근이 다른 직원의 건강에 영향을 미칠 우려가 있을 때 <개정 ’13. 8. 29.> ② 직원이 협회 업무상 질병 또는 부상으로 직무를 수행할 수 없거나 요양이 필요할 경우에는 연 180일의 범위에서 병가를 허가할 수 있다. <개정 ’21. 4. 29.> ③ 병가일이 7일 이상일 경우에는 의사의 진단서를 제출하여야 한다. <신설 ’1 3. 8. 29., 개정 ’21. 4. 29.> ④ 병가는 연차유급휴가에서 공제한다. 다만, 제3항의 사유로 의사의 진단서가 첨 강 부된 병가일수는 공제하지 아니한다. 이 경우 병가기간은 유급으로 한다. <신설 ’21. 4. 29.> Ⅲ-4-8 한국여성경제인협회 규정집"}, {"category": "경영", "regulation": "복무규정", "article_num": "제18조", "article_title": "공가", "content": "① 직원이 다음 각호의 1에 해당하는 경우에는 필요한 기간 공가 를 허가한다. <개정 '18. 3. 29.> 1. 병역검사, 예비군훈련, 검열점호 또는 민방위훈련이 있는 때 2. 공무에 관하여 정부기관에 소환된 때 3. 관련 법령에 따라 공민권을 행사하려 할 때 <개정 '18. 3. 29.> 4. 천재․지변․교통차단 기타의 사유로 출근이 불가능할 때 ② 전항의 제1호 내지 제3호는 직원이 청구한 경우에 한하며, 협회는 권리행 사나 공의 직무를 수행하는데 지장이 없는 범위 내에서 직원이 청구한 시간 을 변경할 수 있다. <신설 '18. 3. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제19조", "article_title": "특별휴가", "content": "직원은 다음 각호와 같이 특별휴가를 받을 수 있다. 1. 축하휴가 가. 본인결혼 : 5일 <개정 '01. 9. 7., ’13. 8. 29.> 나. 자녀결혼 : 1일 <개정 '01. 9. 7., ’13. 8. 29.> 다. 삭제 <’13. 8. 29.> 라. 삭제 <’13. 8. 29.> 2. 기복휴가 가. 본인 및 배우자의 부모, 배우자상 : 5일 <개정 ’13. 8. 29., ’15. 6. 4.> 나. 본인 및 배우자의 조부모․외조부모상, 자녀와 그 자녀의 배우자상 : 3일 <개정 ’13. 8. 29., ’15. 6. 4., ’23.10.16.> 다. 본인 및 배우자의 형제자매상 : 3일 라. 삭제 <’13. 8. 29.> 3. 특별휴가 가. 풍․수ㆍ화재 기타 중대한 재해를 당하였을 시 : 5일 이내 <개정 ’13. 8. 29.> 나. 배우자 출산시 : 5일 <개정 ’13. 8. 29> 4. 출산휴가 본인의 출산시 : 산전ㆍ후 90일(다태아 120일). 다만, 산후 45일(다태아 60 일) 이상 확보되도록 한다. <개정 '01. 9. 7., '18. 3. 29.> 5. 여성보건휴가 생리기간 중 휴식을 위한 또는 임신한 경우 검진을 위한 매월 1일. 다만, 생 리기간 중 휴식을 위한 여성보건휴가는 무급으로 한다. <신설 ’13. 8. 29.> 6. 유산 또는 사산휴가 직원이 유산(「모자보건법」제14조제1항에 따라 허용 되는 경우 외의 인공 복무규정 Ⅲ-4-9 임신중절에 의한 유산은 제외)하거나 사산한 경우 다음기준에 따른 기간 <신설 ’13. 8. 29.> 가. 임신기간이 11주 이내인 경우 : 유산하거나 사산한 날부터 5일까지 나. 임신기간이 12주이상 15주이내인 경우 : 유산하거나 사산한 날부터 10 일까지 다. 임신기간이 16주이상 21주이내인 경우 : 유산하거나 사산한 날부터 30 일까지 라. 임신기간이 22주이상 27주이내인 경우 : 유산하거나 사산한 날부터 60 경 일까지 마. 임신기간이 28주이상인 경우 : 유산하거나 사산한 날부터 90일까지 영 7. 가족돌봄휴가(무급) <신설 ’23.10.16.> 제19조의 2(출산전후휴가 급여) ① 직원이 제19조 제4호 및 제6호의 휴가를 신 청하고 「남녀고용평등과 일·가정 양립 지원에 관한 법률」에 따라 출산전후 휴가 급여를 신청할 경우 「고용보험법」에 따라 출산전후휴가 급여를 받을 수 있도록 증빙서류를 제공하는 등 적극협조 한다. <신설 ’13. 8. 29.> 규 ② 제19조 제4호 및 제6호에 따른 90일의 보호휴가 기간 중에 직원이 「고용 보험법」에 따라 지급 받은 출산전후휴가 급여액이 그 직원의 통상임금보다 적을 경우 최초 60일분의 급여와 통상임금의 차액에 대하여 지급한다. <신설 ’13. 8. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제20조", "article_title": "연차휴가와의 관계", "content": "제17조 내지 제19조의 휴가는 제16조의 연차휴가로 보지 아니한다. <개정 ’05. 10. 25.> 지"}, {"category": "경영", "regulation": "복무규정", "article_num": "제21조", "article_title": "휴가기간중의 휴일", "content": "휴가기간중의 토요일은 그 휴가일수에 산입하지 아 니한다. <개정 '01. 9. 7., ’13. 8. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제22조", "article_title": "휴가의 신청", "content": "직원이 제16조 내지 제19조의 휴가를 얻고자 할 때에는 사전에 위임전결규칙에 따른 전결권자의 허가를 받아야 한다. <개정 ’26. 2. 23.>"}, {"category": "규칙", "regulation": "위임전결규칙", "article_num": "제23조", "article_title": "휴일", "content": "직원의 유급휴일은 다음 각호와 같다. 1. 주휴일(일요일) 단, 소정근로일을 개근하지 아니한 경우 무급으로 한다. <개정 '03. 5. 13., ’13. 8. 29., '18. 3. 29.> Ⅲ-4-10 한국여성경제인협회 규정집 2. 「관공서의 공휴일에 관한 규정」에서 정한날(일요일 제외) <개정 '01. 9. 7., ’03. 5. 13., ’13. 8. 29., '18. 3. 29.> 3. 근로자의 날(5월 1일) <개정 ’13. 8. 29.> 4. 본회 창립기념일(7월 10일) <개정 ’13. 8. 29.> 5. 그 밖에 본회에서 정하는 날 <개정 ’13. 8. 29, '18. 3. 29.> 제3장 휴․퇴직 및 해임"}, {"category": "규칙", "regulation": "위임전결규칙", "article_num": "제24조", "article_title": "휴직", "content": "① 직원이 다음 각 호의 1에 해당할 때에는 휴직을 명할 수 있다. 1. 전염성의 질병, 정신병 또는 근무로 인하여 병세가 악화될 우려가 있는 질 병에 걸린 때 <개정 '01. 9. 7., ’13. 8. 29.> 2. 형사사건으로 기소되었을 때 3. 천재지변으로 인하여 1개월 이상 행방불명되었을 때 4. 생후 9년 미만의 영아를 가진 직원이 영아의 양육을 위하여 육아휴직을 신 청하였을 때 <개정 '01. 9. 7., ’13. 8. 29.> 5. 업무 외 질병, 부상, 병역, 협회 업무와 관련된 국내외학술 연구, 그 밖의 기 타 일신상의 부득이한 사유로 휴직을 신청하였을 때 <개정 ’13. 8. 29., '18. 3. 29.> ② 휴직기간은 원칙적으로 1년을 초과할 수 없다. 다만, 제1항 제2호는 확정판 결 시까지, 제1항 제5호 병역으로 인한 휴직은 의무복무 시까지, 제1항 제5호 국내외학술연수로 인한 휴직은 3년 이내로 한다. <개정 ’13. 8. 29.> ③ 직원이 육아휴직을 사용할 경우 고용보험법령이 정하는 육아휴직급여를 받을 수 있도록 증빙서류를 제공하는 등 적극 협조한다. <신설 ’13. 8. 29.> ④ 휴직기간에는 무급을 원칙으로 한다. <신설 '18. 3. 29.> ⑤ 휴직자는 휴직기간 중 거주지의 변동 등의 사유가 있을 때에는 회사에 즉 시 그 사실을 알려야 한다. <신설 '18. 3. 29.>"}, {"category": "규칙", "regulation": "위임전결규칙", "article_num": "제25조", "article_title": "신분", "content": "휴직된 자는 직원으로서의 신분을 보유하나 직무에 종사하지 못한 다."}, {"category": "규칙", "regulation": "위임전결규칙", "article_num": "제26조", "article_title": "재직년수 산입", "content": "휴직기간은 근속기간에 산입한다. 다만, 병역법에 의한 군복무기간, 개인적인 사유로 휴직하는 경우는 퇴직금 산정을 위한 계속근로 복무규정 Ⅲ-4-11 년수에서 제외한다. <개정 '18. 3. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제27조", "article_title": "복직", "content": "① 협회는 휴직기간 중 그 사유가 해소되었을 때에는 복직을 명할 수 있다. <개정 ’13. 8. 29., '18. 3. 29.> ② 직원은 휴직기간 중 휴직사유가 소멸되었을 때에는 지체없이, 휴직기간이 만료된 때에는 그 10일전까지 복직원을 제출하여야 한다. <신설 '18. 3. 29.> ③ 직원은 부득이한 사유가 있는 경우 승인을 얻어 휴직기간을 연장할 수 있 경 다. <신설 '18. 3. 29.> ④ 직원이 복직명령을 받고서도 정당한 이유 없이 복직하지 아니한 경우 또는 영 휴직기간이 만료될 때까지 복직원을 제출하지 않은 경우에는 사직한 것으로 본다. <신설 '18. 3. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제28조", "article_title": "퇴직의 사전예고와 업무인수인계 의무", "content": "① 직원이 퇴직하고자 할 때에는 30일 전에 사직서류를 제출하고 소정의 수속을 거쳐 승인을 받아야 하고, 잔 무의 인계시까지 종전의 업무를 계속하여 수행해야 한다. <개정 '18. 3. 29.> 규 ② 전항의 경우 해당 직원은 협회가 지정한 인수자에게 업무를 신속 · 정확하 게 인계하고 다음 각 호의 내용을 기재한 업무인수인계보고서를 작성하여 협 회에 제출하여야 한다. <신설 '18. 3. 29.> 1. 담당업무 목록 · 처리절차 · 미결내용 2. 담당업무 관련서류 및 비품(장비)목록 3. 업무수행 관련 유관기관 및 담당자 목록 4. 기타 중요하다고 인정되는 사항 지 ③ 퇴직사유를 불문하고 퇴직하는 직원은 업무인수인계보고서를 작성하여 인 수인과 함께 서명 날인하고 협회에 제출 후 승인을 받아야 한다. <신설 '18. 3. 29.> ④ 업무인수인계는 협회가 인수인을 지정한 날로부터 7일(업무일 기준) 이내 에 완료하여야 한다. 다만 특별한 사정이 있는 경우 기한을 연장할 수 있다. <신설 '18. 3. 29.> ⑤ 업무인수인계 절차를 이행하지 않고 무단 퇴사할 경우 무단결근으로 간주 강 하여 징계할 수 있고, 그로 인한 손해의 배상을 청구할 수 있다. <신설 '18. 3. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제29조", "article_title": "정년퇴직", "content": "① 직원의 정년은 만60세로 한다. <개정 ’23.10.16.> Ⅲ-4-12 한국여성경제인협회 규정집 ② 정년에 이른 날이 1월부터 6월 사이에 있으면 6월 30일에, 7월부터 12월 사 이에 있으면 12월 31일에 각각 당연히 퇴직된다. <신설 ’23.10.16.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제30조", "article_title": "대기", "content": "삭제 <'18. 3. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제31조", "article_title": "퇴직", "content": "① 다음 각호의 1에 해당할 때에는 당연 퇴직된다. <개정 '18. 3. 2 9.> 1. 본인이 사망한 때 2. 정년 도달 또는 계약기간이 만료한 때 3. 임원으로 선출되었을 때 ② 다음 각 호의 1에 해당하는 경우에는 직권면직할 수 있다. <신설 '18. 3. 29.> 1. 형사상 유죄판결이 확정되었을 경우 2. 법률에 의하여 공민권의 정지 또는 박탈을 당하였을 경우 3. 신체 또는 정신의 장애로 직무를 감당하지 못한다고 인정되는 경우(의사의 소견이 있는 경우에 한함) 4. 제27조 제4항에 해당하는 사유가 발생한 경우 5. 신체 또는 정신상의 장애로 휴직기간이 만료되었음에도 계속 근무가 불가 능한 경우(의사의 소견이 있는 경우에 한함) 6. 부정·허위의 방법으로 채용된 경우 또는 채용 후 임용결격사유가 발생 또는 발견된 경우 7. 기타 정당한 이유가 있다고 인정되는 경우 ③ 다음 각호의 1에 해당할 때에는 직원을 해고시킬 수 있다. <신설 '18. 3. 29.> 1. 인사위원회에서 해고결정이 있을 때 2. 기타 정당한 이유가 있을 때 ④ 본인이 퇴직을 원하는 경우 이를 허가 할 수 있다. <신설 '18. 3. 29.> 제31조의 2(경영상 이유에 의한 고용조정) 협회는 국고보조금의 축소 등 운영상 의 이유에 의한 고용조정이 필요하다고 인정 될 경우 근로기준법의 규정에 따라 경영상 이유에 의한 고용조정을 실시한다. <신설 ’13. 8. 29., 개정 '18. 3. 29.> 복무규정 Ⅲ-4-13"}, {"category": "경영", "regulation": "복무규정", "article_num": "제32조", "article_title": "해고의 예고", "content": "협회 운영상 부득이 직원을 해고하고자 할 때에는 30일전 에 이를 통고하여야 한다. 다만, 30일전에 하지 아니한 때에는 30일분의 통상 임금을 지급한다. <개정 '18. 3. 29.> 제4장 상벌"}, {"category": "경영", "regulation": "복무규정", "article_num": "제33조", "article_title": "포상", "content": "① 직원으로 다음 각 호의 1에 해당할 때에는 포상한다. 1. 품행이 방정하고 사무에 근면하여 일반 직원의 모범이 되는 자 경 2. 유익한 창의에 의하여 업무능률을 현저히 증진시킴으로써 본 협회발전에 기여한 자 영 3. 재해를 미연에 방지하거나 재해 시 특히 공로가 있는 자 4. 기타 협회발전에 특별한 공적이 인정되는 자 ② 직원을 포상한 경우 회장은 포상 받은 직원에게 일정기간의 포상 휴가 또 는 포상금을 줄 수 있다. <개정 '01. 9. 7> 제33조의 2(포상시기) ① 정기포상은 창립기념일과 정기총회일에 실시한다. <신설 ’13. 8. 29.> ② 수시포상은 필요한 때 실시한다. <신설 ’13. 8. 29.> ③ 포상을 받은 자에게는 다른 사람에 우선하여 승진의 특전을 부여 할 수 있 다. <신설 ’13. 8. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제34조", "article_title": "징계", "content": "직원에 대한 징계권한은 회장에게 있다. 다만, 감봉이상의 징계는 인사위원회의 의결을 거쳐야 한다. <개정 '18. 3. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제35조", "article_title": "징계사항", "content": "협회는 다음 각호에 해당하는 직원에 대하여 징계할 수 있다. <개정 '18. 3. 29.> 1. 무단으로 결근, 지각, 조퇴, 외출하거나 업무시간에 사적인 행위를 한 경우 2. 직무상 불충실 또는 근무 태만으로 본 협회 업무수행에 지장을 주었을 경우 3. 직무 수행 성적이 불량한 경우 4. 직무 수행과 관련하여 허위보고를 한 경우 강 5. 고의 또는 과실로 인하여 지시받은 업무를 종결하지 아니한 경우 6. 고의 또는 과실로 인하여 본 협회의 명예, 신용에 손상을 입히거나 기타 손 Ⅲ-4-14 한국여성경제인협회 규정집 해를 입힌 경우 7. 상사의 명령에 불복 또는 동료 간의 불화로 직장의 질서를 문란하게 한 경우 8. 직무와 관련하여 금품을 수수한 경우 9. 직무상 취득한 기밀을 누설한 경우 10. 타 직원의 사생활을 침해한 경우 11. 직장내 성희롱, 성추행을 한 경우 12. 협회의 인사규정, 복무규정 등 협회의 제규정을 위반하거나 직장 질서를 문란하게 한 경우 13. 기타 이에 준하는 사유로써 회장이 필요하다고 인정할 때"}, {"category": "경영", "regulation": "복무규정", "article_num": "제36조", "article_title": "징계의 종류", "content": "① 징계는 주의촉구, 견책, 감봉, 정직, 해임으로 구분하며, 다음 각 호의 효력을 가진다. <개정 '18. 3. 29.> 1. 주의촉구 : 직원의 비위정도가 경미하여 문책조치하기에는 부적절하거나 정상참작의 여지가 있는 경우에는 주의 촉구를 할 수 있다. 2. 견책 : 경위서를 징구하고 문서로 견책한다. 3. 감봉 : 1회에 평균임금 1일분의 2분의 1, 총액은 월 급여금총액의 10분의 1 을 초과하지 않는 범위의 금액을 감액한다. 4. 정직 : 정직의 기간은 3월 이내로 하고, 그 기간 중에 직원의 신분은 보유하 나 직무에 종사하지 못하며 그 기간동안 임금을 지급하지 아니한다. 5. 해고 : 직원과의 근로관계를 해지한다. ② 다음 각호의 1에 해당하는 경우 징계를 가중 할 수 있다. <개정 '18. 3. 29.> 1. 징계처분을 받은 후 1년 이내에 징계사유가 발생 하였을 때에는 상위 징계 로 가중할 수 있다. 2. 서로 관련없는 둘 이상의 비위행위가 경합될 경우 그 중 책임이 무거운 비 위에 해당하는 징계보다 상위 징계로 가중할 수 있다. 제36조의 2(징계대상자의 진술 등) 위원회에서 징계에 관한 사항을 심의할 때에 는 징계대상자에게 동 위원회에 출석하여 진술하거나 서면으로 의견을 제출 할 기회를 주어야 하며 특별한 사유 없이 출석이나 진술 또는 서면으로 의견 을 제시하지 않을 경우에는 그러하지 아니한다. <신설 '18. 3. 29.> 제36조의 3(재심) ① 징계처분을 받은 자는 7일 이내에 불복을 제기할 수 있으 며, 이 경우 인사위원회는 재심하여야 한다. 복무규정 Ⅲ-4-15 ② 재심에 의한 처분에 대하여는 불복할 수 없다. ③ 재심에 의한 처분의 효력은 원처분일로 소급한다. ④ 재심결과 정직이상의 징계가 취소되고 감봉이하의 징계로 확정되었을 때 에는 원처분일로부터 재심처분일까지는 대기발령으로 본다. <신설 '18. 3. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제37조", "article_title": "책임", "content": "제36조에 의한 징계처분은 징계당사자의 손해배상 및 형사상의 책임에 영향을 주지 아니한다. 제5장 교육, 보건 경"}, {"category": "경영", "regulation": "복무규정", "article_num": "제38조", "article_title": "교육", "content": "업무수행 상 새로운 지식과 기술을 수업시키기 위하여 다음 각 호 영 의 교육훈련을 실시할 수 있다. <신설 ’13. 8. 29.> 1. 외국의 연구기관이나 학교에서의 연수 2. 정부의 기술훈련계획에 의한 해외연수 3. 국내의 연구기관이나 학교에서의 연수 4. 본회 주최의 세미나, 강좌, 연수 등의 참가 5. 국내의 연구기관이나 학교 주최의 세미나, 강좌, 연수 등의 참가 6. 그밖에 직원의 능력 향상을 위해 필요하다고 인정하는 경우 칙"}, {"category": "경영", "regulation": "복무규정", "article_num": "제39조", "article_title": "피교육자의 의무", "content": "① 교육명령을 받은 자는 성실히 교육을 이수하여야 하며 교육을 중단하거나 수료하지 못하면 교육경비의 일부 또는 전부를 반환 하여야 한다. <신설 ’13. 8. 29.> ② 협회 비용이나 협회 알선 하에 다른 기관비용으로 파견되거나 연수 기간 중 급료가 지급되는 경우 파견직원은 보고서를 제출하는 것 외에도 다음 각 호의 의무를 진다. <신설 ’13. 8. 29.> 침 1. 다음 각목의 의무복무 <신설 ’13. 8. 29> 가. 연수기간이 6월 미만 : 교육기간. 다만, 지급받은 교육경비가 직전연도 급여총액의 20%를 초과하는 경우 1년 나. 연수기간 6월 이상 2년 미만 : 2년 다. 연수기간 2년 이상 : 연수기간 2. 제1호의 의무기간 중에 본회가 인정하는 특별한 사유없이 퇴직할때에는 연 수기간 중 및 연수를 위하여 지출된 비용과 급여를 전액 반환해야 한다. 령 <신설 ’13. 8. 29.> Ⅲ-4-16 한국여성경제인협회 규정집"}, {"category": "경영", "regulation": "복무규정", "article_num": "제40조", "article_title": "전염성 질병", "content": "전염성 질병, 정신병 또는 근무로 인하여 병세가 악화될 우려가 있는 질병에 전염된 직원에 대하여는 제17조와 제24조의 규정이 정하 는 바에 따른다. <신설 ’13. 8. 29.> 제6장 재해보상"}, {"category": "경영", "regulation": "복무규정", "article_num": "제41조", "article_title": "재해보상", "content": "① 직원이 업무상 부상 또는 질병에 걸린 경우와 사망하였을 때의 보상은 산업재해보상보험법에 의한다. <개정 '18. 3. 29.> ② 산업재해보상보험법의 적용을 받지 않는 업무상 부상 또는 질병에 대하여 는 근로기준법이 정하는 바에 따라 협회가 보상한다. <개정 '18. 3. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제42조", "article_title": "장해보상", "content": "삭제 <'18. 3. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제43조", "article_title": "유족보상", "content": "삭제 <'18. 3. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제44조", "article_title": "장례비", "content": "삭제 <'18. 3. 29.>"}, {"category": "경영", "regulation": "복무규정", "article_num": "제45조", "article_title": "시행규칙", "content": "이 규정에 정하지 아니한 세부적인 사항 또는 이 규정의 시행 에 필요한 사항은 회장이 규칙으로 정한다. <신설 '18. 3. 29.> 부칙 <1999. 9. 6.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2001. 9. 7.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2003. 5. 13.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2005. 10. 25.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2013. 9. 28.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2015. 6. 4.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2018. 3. 29.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2021. 4. 29.> 이 규정은 2021년 4월 29일부터 시행한다. 부칙 <2023. 10. 16.> 이 규정은 2023년 10월 16일부터 시행한다. 부칙 <2026. 2. 23.>"}, {"category": "규칙", "regulation": "위임전결규칙", "article_num": "제1조", "article_title": "시행일", "content": "이 규정은 2026년 2월 23일부터 시행한다. 다만, 위임전결규칙의 제정이 필요한 사항에 관한 개정규정은 위임전결규칙이 제정·시행된 날부터 시행한다. 보수규정 Ⅲ-5-1 경 영 보수규정 보수규정 Ⅲ-5-3 보수규정 제정 1999. 9. 6. 개정 2001. 9. 7. 개정 2003. 5. 13. 개정 2005. 10. 25. 개정 2006. 4. 11. 개정 2013. 12. 3. 경 개정 2014. 10. 7. 개정 2015. 6. 4. 영 개정 2018. 3. 29. 개정 2019. 4. 29. 개정 2021. 4. 29. 개정 2023. 10. 16. 개정 2025. 8. 18. 제1장 총칙"}, {"category": "경영", "regulation": "보수규정", "article_num": "제1조", "article_title": "목적", "content": "이 규정은 한국여성경제인협회(이하 “협회”라 한다) 임․직원의 보수 에 관한 사항을 규정함을 목적으로 한다."}, {"category": "경영", "regulation": "보수규정", "article_num": "제2조", "article_title": "적용범위", "content": "이 규정은 협회의 임․직원에 대하여 적용하되, 비상근임원은 제 외하며, 법령 또는 정관에 다른 규정이 있는 경우를 제외하고는 이 규정이 정 한 바에 의한다."}, {"category": "경영", "regulation": "보수규정", "article_num": "제3조", "article_title": "용어의 정의", "content": "이 규정에서 사용되는 용어의 정의는 다음과 같다. 1. “보수”라 함은 연봉과 상여금, 기타 각종 수당을 합산한 금액을 말한다. 2. “연봉”이라 함은 매년 1월 1일부터 12월 31일까지 1년간 지급되는 다음의 기본연봉과 성과연봉을 합산한 금액을 말한다. 가. “기본연봉”은 계급의 곤란성, 책임의 정도, 경력 등을 반영하여 지급되 는 기본급여의 연액을 말한다. 나. “성과연봉”은 전년도 업무실적의 평가결과를 반영하여 지급되는 급여의 령 연액을 말한다. Ⅲ-5-4 한국여성경제인협회 규정집 3. “연봉월액”이라 함은 연봉에서 매월 지급되는 금액으로서 연봉을 12로 나 눈 금액을 말한다. 4. “일할계산”이라 함은 연봉월액 및 수당을 그달의 일수로 나누어 계산하는 것을 말한다. 5. “수당”이라 함은 직무여건 및 생활 여건 등에 따라 지급되는 부가급여를 말 한다. 6. “평균임금”이란 이를 산정하여야 할 사유가 발생한 날 이전 3개월에 그 근 로자에 대하여 지급된 임금의 총액을 그 기간의 총 일수로 나눈 금액을 말 한다. 다만, 산출된 금액이 통상임금보다 저액일 경우에는 그 통상임금을 평균임금으로 한다. 7. “월보수액”이라 함은 연봉월액에 매월 정기적으로 지급하는 각종 수당을 합산한 금액을 말한다. 제2장 보수의 산정과 지급"}, {"category": "경영", "regulation": "보수규정", "article_num": "제4조", "article_title": "보수의 구성", "content": "임직원의 보수는 연봉(기본연봉+성과연봉), 상여금 및 수당 으로 구성되며, 직급별 연봉은 회장이 별도로 규칙으로 정한다. <개정 ’19. 4. 29.> 제4조의 2(연봉 인상) 한국여성경제인협회 회장은 당해 연도 확보된 임금재원 내에서 직원의 당해 연도 임금 인상 여부 및 인상률을 결정한다. <개정 ’18. 3. 29.>"}, {"category": "경영", "regulation": "보수규정", "article_num": "제5조", "article_title": "성과연봉", "content": "① 회장은 매년 직원에 대한 근무성적평가 결과를 반영하여 개 인별 연봉의 10% 범위 내에서 성과 연봉을 지급할 수 있으며, 성과연봉의 지 급방법 및 시기 등에 대해서는 회장의 승인 또는 주무관청의 승인을 거쳐 예 산의 범위 내에서 지급할 수 있다. <개정 ’18. 3. 29.> ② 상여금은 상여금 지급일 현재 재직하고 있는 직원에 한정하여 지급한다. <개정 ’18. 3. 29.>"}, {"category": "경영", "regulation": "보수규정", "article_num": "제6조", "article_title": "계산방법", "content": "① 월보수액은 채용, 이동, 승급, 승진, 전직, 휴직, 복직, 퇴직, 징계 등에 있어서 모두 발령일을 기준으로 일할 계산하여 지급한다. ② 제1항의 규정에도 불구하고 사망하였을 때에는 당월 월보수액의 전액을 지급한다. 다만, 수습사원은 일할 계산하여 지급한다. ③ 보수 계산에 있어서 10원 미만의 단수는 이를 절사 한다. 보수규정 Ⅲ-5-5"}, {"category": "경영", "regulation": "보수규정", "article_num": "제7조", "article_title": "월보수액의 계산기간", "content": "월보수액의 계산기간은 매월 1일부터 말일까지로 한 다. 다만, 필요한 경우에는 일급으로 할 수 있다."}, {"category": "경영", "regulation": "보수규정", "article_num": "제8조", "article_title": "보수의 지급 등", "content": "① 보수는 매월 25일에 지급한다. 다만, 지급일이 휴일 또는 토요일인 경우에는 그 전일에 지급하며, 협회회장이 필요하다고 인정할 때에는 지급일을 변경할 수 있다. ② 월 급여는 매월 연봉월액을 지급한다. ③ 수당은 매월 또는 필요시 지급한다. 경 ④ 인사담당부서장은 임직원 개인별 임금대장을 기록․유지하여야 한다.<개정 ’19. 4. 29.> 영"}, {"category": "경영", "regulation": "보수규정", "article_num": "제9조", "article_title": "겸직시의 보수", "content": "직원이 본직이외의 다른 직을 겸직할 때에는 겸직에 대한 보수는 지급하지 아니한다. 다만, 회장이 필요하다고 인정하는 경우 겸직에 대한 수당을 지급할 수 있으며, 지급액 및 지급방법에 관하여는 회장이 정한다."}, {"category": "경영", "regulation": "보수규정", "article_num": "제10조", "article_title": "휴직자의 보수", "content": "휴직기간에 대하여는 보수를 지급하지 아니하는 것을 규 원칙으로 한다. <개정 ’18. 3. 29.>"}, {"category": "경영", "regulation": "보수규정", "article_num": "제11조", "article_title": "결근자 등의 보수", "content": "① 삭제 <’18. 3. 29.> ② 결근으로 처리되는 자에 대하여는 결근일수에 해당하는 보수 및 해당 주의 주휴수당을 지급하지 아니한다. <개정 ’18. 3. 29.>"}, {"category": "경영", "regulation": "보수규정", "article_num": "제12조", "article_title": "전문직원 및 계약직원의 보수", "content": "전문직원의 및 계약직원의 보수는 협회회 지 장이 별도로 정한다. 제3장 수당 및 복리후생비"}, {"category": "경영", "regulation": "보수규정", "article_num": "제13조", "article_title": "직책수당", "content": "아래 보직을 부여 받은 자에 대하여는 다음과 같이 직책수당 을 지급할 수 있다. <개정 ’18. 3. 29.,’19. 4. 29. > 가. 본 부 장: 월 정액 40만원<개정 ’19. 4. 29.> 강 나. 팀 장: 월 정액 30만원 Ⅲ-5-6 한국여성경제인협회 규정집"}, {"category": "경영", "regulation": "보수규정", "article_num": "제14조", "article_title": "시간외근무수당", "content": "직원의 업무개시전 또는 업무종료후의 연장근무 및 휴 일근무는 사전결재를 받은 자에 한해 예산의 범위 내에서 실시할 수 있으며 [별표2]에 따라 시간외근무수당 및 휴일근무수당을 지급할 수 있다. <개정 ’1 4. 10. 7., ’15. 6. 4., ’18. 3. 29.>"}, {"category": "경영", "regulation": "보수규정", "article_num": "제15조", "article_title": "복리후생비", "content": "임직원의 복리수행을 위하여 별도의 규정에 의한 복리후생 비를 지급할 수 있다. 이에 관한 세부사항은 필요 할 경우 회장이 따로 정한 다. <개정 ’18. 3. 29.> 1. 식사의 제공 2. 교통비의 지급 3. 의료비의 보조 4. 경조금의 지급 5. 휴게시설의 제공 6. 교육훈련비의 지급 7. 기타 직원의 복리증진 및 편의제공을 위하여 필요하다고 인정하는 시설 제4장 퇴직금"}, {"category": "경영", "regulation": "보수규정", "article_num": "제16조", "article_title": "퇴직금의 지급대상", "content": "임직원이 1년 이상 근속하고 다음 각 호의 1에 해당 하는 경우에는 퇴직금을 지급한다. 1. 퇴직 2. 사망 3. 임기 만료시 4. 협회 해산시"}, {"category": "경영", "regulation": "보수규정", "article_num": "제17조", "article_title": "지급액", "content": "① 퇴직금은 제16조의 규정에 의한 퇴직금 지급사유가 발생 한 때의 평균임금에 상근임원은 매년 1.5의 비율을, 직원은 근속년수 1년당 1개 월의 평균임금으로 한다.<개정 ’19. 4. 29.> ② 업무의 성과 등을 감안하여 이사회가 별도로 정하는 금액이 있는 경우는 이사회의 결정에 의한 금액으로 한다. 다만 이사회에서 별도로 정하는 금액이 제 1항의 금액보다 작은 경우는 제1항의 금액으로 한다. 보수규정 Ⅲ-5-7"}, {"category": "경영", "regulation": "보수규정", "article_num": "제18조", "article_title": "근속기간의 계산", "content": "① 근속기간의 계산은 임용일로부터 기산하여 만 12 월을 1년으로 하고, 만 1년 미만의 단수는 일할 계산한다. <개정 ’18. 3. 29.> ② 임기 또는 고용기간 만료 후 재선임 또는 재고용될 때에는 이를 근속한 것 으로 본다. 다만, 재임용됨으로서 제20조의 퇴직금 지급액이 변경된 경우에는 그러하지 아니한다. ③ 제1항의 근속기간 계산에 있어 수습기간은 근속기간에 포함한다. ④ 휴직 및 정직기간은 근속기간에 산입한다. 다만, 다음 각 호의 경우에는 그 러하지 아니하다. <개정 ’18. 3. 29.> 경 1. 병역법에 의한 군복무기간(퇴직금 산정을 위한 근속기간) 2. 개인적 사정에 의한 휴직기간 영"}, {"category": "경영", "regulation": "보수규정", "article_num": "제19조", "article_title": "퇴직금의 수령자", "content": "① 퇴직금의 수령권은 퇴직자 또는 민법에서 정하는 바에 의한 재산 상속권자가 갖는다. ② 제1항의 규정에 의한 재산 상속권자가 퇴직금을 수령하고자 하는 경우에 는 정당한 수령권자임을 증명하는 서류를 제출하여야 한다. ③ 사망퇴직한 자에 대한 퇴직금은 그 유가족에게 지급하며, 유가족의 범위와 규 수령자의 범위는 근로기준 법시행령이 정하는 바에 의한다."}, {"category": "경영", "regulation": "보수규정", "article_num": "제20조", "article_title": "퇴직금의 특례", "content": "① 임직원이 업무상 부상 또는 질병으로 인하여 퇴직 또는 순직한 때에는 제17조의 규정에도 불구하고 다음 각호의 1에 해당하는 지급율의 범위내에서 가산하여 지급할 수 있다. 1. 업무상 부상 또는 질병으로 퇴직한 자：지급액의 30% 2. 순직한 자：지급액의 100% 지 ② 순직이외의 사망으로 인하여 퇴직한 경우 근속년수가 5년 이상인 자에게 는 3월분의 월평균임금 범위 내에서, 근속년수가 10년 이상인 자에게는 5월분 의 월평균임금을 범위 내에서 각각 가산하여 퇴직금을 지급할 수 있다."}, {"category": "경영", "regulation": "보수규정", "article_num": "제21조", "article_title": "퇴직금의 지급시기", "content": "퇴직금은 퇴직금 지급사유가 발생한 날부터 상당한 사유가 없는 한 14일 이내에 통화로 지급함을 원칙으로 한다. 다만, 특별한 사 정이 있는 경우에는 당사자 사이의 합의에 의하여 기일을 연장할 수 있다. 강 <개정 ’18. 3. 29.> Ⅲ-5-8 한국여성경제인협회 규정집"}, {"category": "경영", "regulation": "보수규정", "article_num": "제22조", "article_title": "권리의 소멸", "content": "퇴직금을 지급 받을 권리는 그 권리의 발생일로부터 3년간 행사하지 아니한 때에는 시효로 인하여 소멸한다. 제5장 보칙"}, {"category": "경영", "regulation": "보수규정", "article_num": "제23조", "article_title": "장해보상금", "content": "삭제 <’18. 3. 29.>"}, {"category": "경영", "regulation": "보수규정", "article_num": "제24조", "article_title": "시행규칙", "content": "이 규정에 정하지 아니한 세부적인 사항 또는 이 규정의 시행 에 필요한 사항은 회장이 별도로 정한다. <개정 ’18. 3. 29.>"}, {"category": "경영", "regulation": "보수규정", "article_num": "제25조", "article_title": "특별공로금", "content": "① 퇴직하는 임직원으로서 재직 중 협회에 특별한 공로가 있는 자에 대하여는 제16조의 규정에 따른 퇴직금 이외의 특별공로금을 지급 할 수 있다. ② 제1항의 규정에 따른 특별공로금은 이사회의 의결을 거쳐야 한다. 부칙 <1999. 9. 6.> 1. 협회가 창립되어 최초 책정되는 임직원의 보수는 이사회의 의결을 받아 시행 하며, 협회 창립후 이사회 의결전까지의 보수에 대하여는 그 의결사항을 소급 하여 적용한다. 2. 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2001. 9. 7.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2003. 5. 13.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2005. 10. 25.> 이 규정은 이사회에서 의결한 날부터 시행한다. 보수규정 Ⅲ-5-9 부칙 <2006. 4. 1.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2013. 12. 3.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2014. 10. 7.> 경 이 규정은 이사회에서 의결한 날부터 시행한다. 다만, 제14조 제1항은 2014년 1 월 1일부터 소급적용한다. 영 부칙 <2015. 6. 4.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2018. 3. 29.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2019. 4. 29.>"}, {"category": "경영", "regulation": "보수규정", "article_num": "제1조", "article_title": "시행일", "content": "이 규정은 2019년 4월 29일부터 시행한다."}, {"category": "경영", "regulation": "보수규정", "article_num": "제2조", "article_title": "경과조치", "content": "이 규정 전 발생한 사안은 이 규정에 의한 것으로 간주한다. 부칙 <2021. 4. 29.> 지 이 규정은 2021년 4월 29일부터 시행한다. 부칙 <2023. 10. 16.> 이 규정은 2023년 10월 16일부터 시행한다. 부칙 <2025. 8. 18.> 이 규정은 이사회에서 의결한 날부터 시행한다. Ⅲ-5-10 한국여성경제인협회 규정집 【별표 1】삭제 <’25. 8. 18.> 【별표 2】 시간외근무수당 및 휴일근무수당 <개정 ’18. 3. 29., ’21. 4. 29.> 구분 금액 (원) 비고 노동부 시간외 근무수당 통상임금 × 1.5/209 × 초과근로 시간 고시기준 노동부 휴일 근무수당 통상임금 × 1.5/209 × 휴일근로시간 고시기준 ㅇ지급기간 및 지급일 - 지급기간: 전월 20일 ~ 당월 19일 - 지 급 일: 보수의 지급일 - 인정시간: (업무개시전) 06:00이후부터 08:00까지 (업무개시후) 19:00이후부터 23:00까지 - 시간외 근무 및 휴일근무 한도: 시간외 근무 및 휴일근무는 일 최대 4시간, 주 최대 12시간을 초과할 수 없다. <개정 ’23.10.16.> 【별표 3】 <삭제> <개정 ’19. 4. 29.> 규정관리규정 Ⅲ-6-1 경 영 규정관리규정 규정관리규정 Ⅲ-6-3 규정관리규정 제정 1999. 9. 6. 개정 2001. 9. 7. 개정 2003. 5. 13. 개정 2013. 8. 29. 개정 2021. 4. 29. 경 제1장 총칙 영"}, {"category": "경영", "regulation": "규정관리규정", "article_num": "제1조", "article_title": "목적", "content": "이 규정은 한국여성경제인협회(이하 “협회”라 한다.) 제규정의 체 제와 그의 제정, 개정, 폐지 및 관리절차를 규정하여 제규정의 관리운영에 적 정을 기함을 목적으로 한다."}, {"category": "경영", "regulation": "규정관리규정", "article_num": "제2조", "article_title": "적용범위", "content": "제규정의 제정, 개정, 폐지 및 관리에 관한 사항은 별도로 정한 규 경우를 제외하고는 이 규정이 정하는 바에 의한다."}, {"category": "경영", "regulation": "규정관리규정", "article_num": "제3조", "article_title": "정의", "content": "이 규정에서 “규정”이라 함은 조직적 또는 계속적ㆍ반복적인 효과 를 가지는 제업무의 수행방침이나 절차 등의 기준이 되는 규범을 말하며, 규 정은 그 내용에 따라 정관, 규정, 규칙, 요령, 지침, 세칙으로 구분한다. ① “정관”이라 함은 본회의 설립, 해산, 목적 및 조직에 관한 주요사항 등 본 회 조직운영의 기본이 되는 규범으로서 총회의 의결로 정하는 것을 말한다. 지 <신설 ’13. 8. 29.> ② “규정”이라 함은 협회의 전반적인 업무, 조직, 기구, 신분, 급여 등에 관한 기본규정을 말하며, 이사회의 의결을 요한다. <개정 ’13. 8. 29.> ③ “규칙”이라 함은 규정에 의거 업무수행상의 주요기준 및 절차를 정한 준칙 을 말하며, 회장의 결재를 요한다. <개정 ’13. 8. 29.> ④ “요령”이라 함은 규정 또는 규칙의 범위내에서 업무수행에 필요한 세부적 인 절차 및 방법 등의 기준을 정한 준칙을 말하며, 회장의 결재를 요한다. <개 강 정 ’13. 8. 29.> ⑤ “지침”이라 함은 관계법령에 따른 세부적인 사항과 본회 내부업무처리의 기본적인 방향을 정한 것으로 회장이 정하는 것을 말한다. <신설 ’13. 8. 29.> Ⅲ-6-4 한국여성경제인협회 규정집 ⑥ “세칙”이라 함은 관계법령 및 규정에 의하여 정하여지는 사항으로 회장이 정하는 것을 말한다. <신설 ’13. 8. 29., 개정 ’21. 4. 29.>"}, {"category": "경영", "regulation": "규정관리규정", "article_num": "제4조", "article_title": "효력", "content": "① 규정은 제3조에서 정한 순위에 따라 상위규정이 하위규정에 우 선한다. ② 동일순위의 규정 중 상호 저촉되는 부분이 있을 때에는 시간적으로 후에 제정된 것이 우선한다. ③ 규정은 제정, 개정 또는 폐지가 확정된 날로부터 효력이 발생함을 원칙으 로 하되 그 시행일을 따로 정한 때에는 그에 따른다."}, {"category": "경영", "regulation": "규정관리규정", "article_num": "제5조", "article_title": "규정의 해석", "content": "① 규정의 효력 또는 해석에 대하여 이의가 있을 때에는 이 사회의 해석에 따른다. 다만, 경미한 사항에 대해서는 규정담당부서의 해석에 따른다. ② 직제규정의 개정으로 인하여 다른 규정의 내용 중 부서 또는 직위의 변경 이 필요한 때에는 당해 규정의 개정시까지는 변경된 부서와 직위로 해석하여 운용한다."}, {"category": "경영", "regulation": "규정관리규정", "article_num": "제6조", "article_title": "주지의무", "content": "① 규정의 제정, 개정 및 폐지의 내용은 각 해당 부서의 장이 지체없이 소속 직원에게 주지시켜야 한다. ② 임직원은 항상 규정의 내용을 숙지할 의무가 있다. 제2장 규정의 형식"}, {"category": "경영", "regulation": "규정관리규정", "article_num": "제7조", "article_title": "편성", "content": "규정은 기본적으로 본칙과 부칙으로 편성한다. 그리고 이의 보충사 안에 대하여는 따로 보칙으로 편성한다."}, {"category": "경영", "regulation": "규정관리규정", "article_num": "제8조", "article_title": "본칙", "content": "① 본칙은 “조”로 구분한다. ② 조문이 많을 경우에 본칙은 “장”으로 분류하고 다시 소분류를 필요로 하는 경우에는 “절”, “관”의 순으로 세분한다. ③ “장”, “절”, “관”에는 제0장(절, 관)과 같이 표기하며 0에는 아라비아 숫자로 된 일련번호를 붙인다. 규정관리규정 Ⅲ-6-5"}, {"category": "규정", "regulation": "정관", "article_num": "제9조", "article_title": "부칙", "content": "부칙에는 본칙과는 별도로 조항을 사용하며, 본칙의 “조”또는 \"호\" 와 같은 형식 중 하나로 표시한다. 다만, 하나의 “조” 또는 “호”인 경우에는 “조” 또는 “호”는 붙이지 않을 수 있다. <개정 ’01. 9. 7.>"}, {"category": "규정", "regulation": "정관", "article_num": "제10조", "article_title": "조문의 배열", "content": "조문은 다음 각호의 항목 순으로 배열한다. ① 총칙적인 조문 : 목적, 적용범위, 용어의 정의, 규정전체에 적용되는 원칙, 기본적인 사항 등 <개정 ’13. 8. 29.> ② 본체가 되는 조문 : 중요도, 적용빈도, 뒤의 조문이 간결하게 되는 정도 등 경 <개정 ’13. 8. 29.> ③ 부속적인 조문 : 잡칙, 보칙 등 <개정 ’13. 8. 29.> 영 ④ 부칙의 조문 : 시행일, 경과규정, 폐지규정 등 <개정 ’13. 8. 29.>"}, {"category": "규정", "regulation": "정관", "article_num": "제11조", "article_title": "조", "content": "① “조”에는 “장”, “절”, “관”의 배열에 상관없이 아라비아 숫자로 시 작하는 일련번호를 붙인다. ②“조”에는 그 내용을 간결하게 요약한 “조명”을 조의 번호 다음에 괄호하여 기입한다. 규"}, {"category": "규정", "regulation": "정관", "article_num": "제12조", "article_title": "항", "content": "하나의 “조”를 그 내용에 따라 “항”으로 구분할 수 있으며, 이 경우 “①, ②, ③ ....... ”의 일련번호를 붙인다."}, {"category": "규정", "regulation": "정관", "article_num": "제13조", "article_title": "호", "content": "① “조” 또는 “항”에서 일정한 사실, 사물 등을 열거할 경우에는 “호”를 사용한다. ②“호”에는 “1., 2., 3., ...... ”의 일련번호를 붙이며 이를 세분하기 위하여는 지 “가., 나., 다., .......”로 표시하는 “목”을 사용한다."}, {"category": "규정", "regulation": "정관", "article_num": "제14조", "article_title": "조, 항, 호 등의 추가, 삭제", "content": "① 규정의 개정으로 조, 항, 호를 추가 또는 삭제할 경우에는 그 이하의 조, 항, 호를 하나씩 끌어올리거나 끌어내린다. 다 만, 조번의 변경을 피하고자 하는 경우에는 “제0조의 2”혹은 “(삭제)” 등으로 표시하여 사용할 수 있다. ② 규정의 개정으로 장, 절, 관을 추가 혹은 삭제할 경우에는 제1항을 준용한다. 강"}, {"category": "규정", "regulation": "정관", "article_num": "제15조", "article_title": "개정일자 등의 표시", "content": "규정이 개정된 경우에는 개정된 조, 항, 호의 끝에 개정일자와 신설, 개정, 삭제 등의 문구를 괄호 속에 표시할 수 있다. Ⅲ-6-6 한국여성경제인협회 규정집"}, {"category": "규정", "regulation": "정관", "article_num": "제16조", "article_title": "주와 예시", "content": "조문 중에 “주” 또는 “예시”를 두어 일정한 사실을 설명 또는 예시할 수 있다."}, {"category": "규정", "regulation": "정관", "article_num": "제17조", "article_title": "표, 서식, 도면", "content": "『별첨』, [별표], <서식>, 「도면」 등은 부칙 다음에 두 며 그 배열은 『별첨』, [별표], <서식>, 「도면」의 순으로 한다. 다만, 간단한 “표”인 경우에는 본칙의 조문 중에 표시할 수 있다. 제3장 규정의 제정, 개정 및 폐지"}, {"category": "규정", "regulation": "정관", "article_num": "제18조", "article_title": "규정의 입안", "content": "① 규정을 제정, 개정 또는 폐지하고자 하는 경우에는 직 제규정에 의한 분장업무의 담당부서의 장이 작성한다. 이때 규정사항이 다른 부서와 관련되는 경우에는 그 관련부서와 협의하여야 한다. ② 규정사항이 수개의 부서에 관련되거나 업무담당부서가 분명하지 아니한 경우에는 규정담당부서의 장이 규정안을 작성할 부서를 정한다. ③ 규정담당부서의 장이 필요하다고 인정하는 때에는 업무담당부서의 장과 협의하여 직접 입안할 수 있다. ④ 제규정의 제정 또는 개폐를 하고자 할 때에는 직제규정 및 업무분장규정에 서 정한 해당업무의 담당부서의 장(이하 ’업무담당부서’라 한다.)이 정관 및 규정축조심의위원회에(이하 ’축조심의위’) 입안한다. 이때 다른 부서와 관련이 있는 경우에는 그 관련부서와 협의를 거쳐야 하며 규정담당부서에서 필요하 다고 인정하는 때에는 업무담당부서와 협의하여 축조심의위에 입안할 수 있 다. <신설 ’13. 8. 29.>"}, {"category": "규정", "regulation": "정관", "article_num": "제19조", "article_title": "규정안의 조정", "content": "① 제18조의 규정에 의거 작성한 규정안은 규정담당부 서의 장의 심의를 거쳐야 한다. ② 규정담당부서의 장은 규정안에 대하여 다음 사항을 심의한다. 1. 법령, 정관 기타 규정과의 저촉 또는 중복 여부 2. 규정의 분류체제, 형식, 내용 등의 적부 3. 기타 규정관리상 필요하다고 인정하는 사항 ③ 규정담당부서의 장은 제2항에 의하여 규정안을 심의한 결과 필요한 경우 업무담당부서의 장과 협의하여 수정한다. 규정관리규정 Ⅲ-6-7"}, {"category": "규정", "regulation": "정관", "article_num": "제20조", "article_title": "규정안의 확정", "content": "제19조제3항에 의한 규정안은 다음 각호와 같이 확정한 다. <개정 ’21. 4. 29.> 1. 정관 규정안은 이사회와 총회의 의결을 거쳐 중소벤처기업부의 허가를 얻 어 확정한다. <신설 ’21. 4. 29.> 2. 규정 규정안은 이사회의 의결로 확정한다. <신설 ’21. 4. 29.> 3. 규칙, 요령, 지침 및 세칙 규정안은 회장의 결재로 확정한다. <신설 ’21. 4. 29.> 경"}, {"category": "규정", "regulation": "정관", "article_num": "제21조", "article_title": "등록 및 시행", "content": "① 규정담당부서의 장은 제20조의 규정에 의거 확정된 규 정을 규정등록대장에 등록한 후, 이를 각 부서 및 지회에 통보 시행한다. 영 ② 규정등록대장에는 등록번호, 규정명, 입안부서, 제정 및 개폐일자 등을 기 재하여야 한다. 제4장 규정의 관리"}, {"category": "규정", "regulation": "정관", "article_num": "제22조", "article_title": "관리", "content": "① 규정담당부서의 장은 규정을 적정하게 운영할 책임을 지며, 업 규 무의 개선과 발전에 필요한 규정정비에 항상 노력하여야 한다. ② 규정담당부서의 장은 규정의 적정운영을 기하기 위하여 정비기간을 설정 하거나 기타 필요한 조치를 취할 수 있다."}, {"category": "규정", "regulation": "정관", "article_num": "제23조", "article_title": "편집 및 간행", "content": "규정담당부서의 장은 확정된 규정을 편집하여 규정집을 발간 배부하여야 하며 제정, 개정되는 규정은 수시로 추록을 발간하여 배부하 여야 한다. 다만, 내용이 경미하고 잠정적인 규정에 대하여는 규정집에 편집 하지 아니할 수 있다."}, {"category": "규정", "regulation": "정관", "article_num": "제24조", "article_title": "규정집의 배부", "content": "① 규정집은 원칙적으로 따로 정하는 기준에 따라 배부한다. ② 직제의 개정에 따라 기구의 통합 또는 폐지 등의 경우에는 그 인수인계를 명확히 하거나 규정담당부서의 장에게 반환하여야 한다. ③ 규정집 배부시에는 규정집관리대장에 규정집번호, 보관책임자, 배부일자 등을 기록하여 관리하여야 한다."}, {"category": "규정", "regulation": "정관", "article_num": "제25조", "article_title": "규정집의 취급", "content": "규정이나 규정집은 회장이 필요하다고 인정하는 경우를 제외하고는 대외에 복사, 대여, 공람, 공표하여서는 아니 된다. <개정 ’03. 5. 13> Ⅲ-6-8 한국여성경제인협회 규정집"}, {"category": "규정", "regulation": "정관", "article_num": "제26조", "article_title": "지침", "content": "① 이 규정에서 정한 범위안에서 업무수행에 필요한 시한적인 사 항을 정하기 위하여 지침을 작성할 수 있다. ② 지침안은 업무담당부서에서 작성하고 상근부회장의 결재로써 확정된다. ③ 규정담당부서의 장은 업무담당부서에서 작성한 지침안에 대하여 검토한 후, 지침의 관리상 수정할 필요가 있는 경우에는 업무담당부서의 장과 협의한 후 수정할 수 있다."}, {"category": "규정", "regulation": "정관", "article_num": "제27조", "article_title": "보칙", "content": "이 규정에서 정하지 아니한 사항과 이 규정의 시행에 필요한 사항 은 별도로 회장이 정하는 바에 따른다. 부칙 <1999. 9. 6.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2001. 9. 7.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2003. 5. 13.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2013. 8. 29.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2021. 4. 29.> 이 규정은 2021년 4월 29일부터 시행한다. 문서규정 Ⅲ-7-1 경 영 문서규정 문서규정 Ⅲ-7-3 문서규정 제정 1999. 9. 6. 개정 2001. 9. 7. 개정 2003. 5. 13. 개정 2005. 10. 25. 개정 2013. 8. 29. 경 개정 2019. 4. 29. 개정 2023. 10. 16. 영 제1장 총칙"}, {"category": "경영", "regulation": "문서규정", "article_num": "제1조", "article_title": "목적", "content": "이 규정은 한국여성경제인협회(이하 “협회”이라 한다.)의 문서의 규 작성, 처리, 보관, 보존, 보고, 통제, 서식관리 및 인장사용(이하 “문서사무”라 한다.)에 관한 사항을 규정함으로써 문서사무의 능률화와 통일을 기함을 목 적으로 한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제2조", "article_title": "정의", "content": "이 규정에서 “문서”라 함은 공무상 작성 또는 시행된 문서(그림을 포함한다. 이하 같다.) 및 공무상 접수한 모든 문서를 말한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제3조", "article_title": "적용범위", "content": "① 문서사무에 관하여는 다른 규정에 특별히 정한 경우를 제외 하고는 이 규정이 정하는 바에 의한다. ② 비밀문서에 관하여는 이 규정의 적용을 받는 외에 관계법령 및 규정이 정 하는 바에 의한다. <개정 '01. 9. 7.>"}, {"category": "경영", "regulation": "문서규정", "article_num": "제4조", "article_title": "문서의 종류", "content": "문서는 다음 각호와 같이 규정문서, 영달문서, 공고문서와 일반문서, 전자문서로 분류한다. <개정 '13. 8. 29.> 강 1. “규정문서”는 정관, 내부규정, 예규 등 주로 규정사항에 관한 문서를 말한다. 2. “영달문서”는 훈령, 지시, 일일명령 등 하부기관 또는 소속 임직원에 대하 령 여 일정한 사항을 지시하는 문서를 말한다. Ⅲ-7-4 한국여성경제인협회 규정집 3. “공고문서”는 공고, 광고 등 일정한 사항을 일반에게 알리기 위한 문서를 말한다. 4. “일반문서”는 전 각호에 속하지 아니하는 모든 문서를 말하며 따로 서식을 정한 경우를 제외하고는 별지 <서식 1>에 의한다. 5. “전자문서”라 함은 컴퓨터 등 정보처리능력을 가진 장치에 의하여 전자적 인 형태로 작성, 송ㆍ수신 또는 저장된 문서를 말한다. <신설 '13. 8. 29.>"}, {"category": "경영", "regulation": "문서규정", "article_num": "제5조", "article_title": "문서의 성립 및 효력발생", "content": "① 문서는 다른 법령 또는 규정에 특별한 규정이 있는 경우를 제외하고는 당해문서에 대한 결재전자서명에 의한 결재를 포함한다. 이하 같다)가 있음으로써 성립한다. <개정 '13. 8. 29.> ② 문서는 다른 법령 또는 규정에 특별한 규정이 있는 경우를 제외하고는 상대자에게 도달(전자문서는 수신자의 컴퓨터 화일로 기록되는 것을 말한다)됨으로써 효력을 발생한다. 다만, 공고문서의 경우에는 다른 법령에 특별한 규정이 없는 한 그 공고가 있은 후 5일이 경과한 날로부터 효력을 발생한다. <개정 '13. 8. 29.> 제2장 문서의 작성"}, {"category": "경영", "regulation": "문서규정", "article_num": "제6조", "article_title": "용지의 규격", "content": "문서의 용지는 도면, 통계표, 증명류 기타 특별한 형식의 문 서를 제외하고는 가로 210mm×세로 297mm 크기의 종이를 세워서 쓰는 것을 원칙으로 한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제7조", "article_title": "용지의 여백", "content": "문서의 용지는 위로부터 30mm, 왼쪽으로부터 20mm, 오른 쪽 및 아래로부터 15mm의 여백을 원칙으로 한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제8조", "article_title": "용지의 색깔", "content": "문서의 용지는 원칙적으로 흰색을 사용한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제9조", "article_title": "문서의 용어", "content": "① 문서는 한글로 띄어서 가로쓰되 표준말로 사용한다. ② 제1항에 의한 한글 표기만으로는 뜻의 전달이 곤란할 경우에는 괄호 안에 그 용어의 한자 또는 외국어를 넣어 쓸 수 있다. ③ 문서에 숫자를 표기할 때에는 아라비아 숫자를 쓴다. ④ 문서에 쓰는 일시는 숫자로 표시하며, 년. 월. 일의 글자는 생략하고 점( . )을 찍어 년. 월. 일을 구분한다. 문서규정 Ⅲ-7-5 ⑤ 문서에 쓰는 시간은 24시간제에 의하며, 시분의 문자는 생략하고 두점( : )을 찍어 시분을 구분한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제10조", "article_title": "수정", "content": "문서의 일부분을 삭제하거나 수정한 때에는 삭제자 또는 수정자 가 삭제 또는 수정한 곳에 서명 또는 날인하여야 한다. <개정 '13. 8. 29.>"}, {"category": "경영", "regulation": "문서규정", "article_num": "제11조", "article_title": "면표시", "content": "① 문서가 두장 이상으로 이루어진 때에는 문서의 하부 중앙에 전면수와 그 면의 일련번호를 기입한다. ② 첨부서류에는 면의 표시를 따로 하며, 전면수는 생략할 수 있다. 경 영"}, {"category": "경영", "regulation": "문서규정", "article_num": "제12조", "article_title": "문서의 구성", "content": "① 일반문서중 발신문서는 다음 각호와 같이 두문, 본문, 미문으로 구성한다. <개정 '01. 9. 7.> 1. 두문은 발신기관명, 수신란 등으로 한다. <개정 ’05. 10. 25.> 2. 본문은 제목, 내용 및 첨부로 한다. 3. 미문은 발신자명의, 수신처란, 문서번호, 시행일자, 주소 및 연락처로 한 다. <개정 ’05. 10. 25.> ② 문서의 두문중 수신기관의 표시는 수신 및 참조로 구분하며 다음 각 호의 요령에 따라 기입한다. <개정 ’05. 10. 25.> 칙 1. 삭제 <’05. 10. 25.> 2. 수신은 수신기관 또는 수신부서의 장의 직명을 쓴다. 수신기관 또는 수신부 서가 2곳 이상일 경우에는 ’수신처 참조’라 쓰고 미문의 수신처란에 수신기 관이나 수신부서의 명 또는 수신처 기호를 표시한다. <개정 ’05. 10. 25.> 3. 참조는 문서를 직접 처리하여야 할 수신기관의 부서의 장의 직명을 쓴다. ③ 문서의 본문 중 제목은 문서의 내용을 쉽게 알 수 있도록 간명하게 표시하 여야 하며, 내용은 그 문서로서 표현하고자 하는 뜻을 쉬운말로 간략하게 작 침 성하야야 한다. ④ 문서의 미문 중 수신처란을 설정하는 경우에는 발신명의 다음 줄 왼쪽에 ’수신처’라 쓰고 수신기관이나 수신부서의 명 또는 수신처 기호를 쓴다. <개 정 ’05. 10. 25.>"}, {"category": "경영", "regulation": "문서규정", "article_num": "제13조", "article_title": "문서번호", "content": "① 문서의 문서번호는 기관기호, 분류번호 및 문서등록번호 로 한다. ② 기관기호는 업무 부서별로 따로 회장이 정한다. Ⅲ-7-6 한국여성경제인협회 규정집 ③ 문서분류번호는 업무기능별로 따로 회장이 정한다. ④ 문서등록번호는 연도별, 일련번호별로 한다. 제13조 2(항목구분) 문서의 내용을 항목으로 세분할 필요가 있을 때에는 다음 과 같이 나누어 표시한다. 1. 첫째항목 : Ⅰ, Ⅱ, Ⅲ, ...... 2. 둘쨰항목 : 1, 2, 3, ........ 3. 셋째항목 : 가, 나, 다, ....... 4. 넷째항목 : (1), (2), (3), .......... 5. 다섯째항목 : (가), (나), (다), ....... 6. 여섯째항목 : 1), 2), 3), ........ 7. 제3호 및 제5호의 경우에 “하”이상 더 계속될 때에는 거, 너, 더, 러,....로 나 누어 표시한다. [전문신설 '03. 5. 13.]"}, {"category": "경영", "regulation": "문서규정", "article_num": "제14조", "article_title": "끝표시와 첨부의 표시", "content": "① 본문이 끝나면 한자 띄우고 “끝”자를 쓰며, 본 문에 밝힐 필요가 있는 물건이 첨부될 때에는 첨부의 표시를 한 다음 “끝”자 를 쓴다. ② 본문이나 첨부의 표시문이 오른쪽 한계선에 닿을 때에는 다음 줄의 왼쪽 한계선에서 한자 띄우고 “끝”자를 쓴다. ③ 일괄기안의 경우의 “끝”표시는 각안마다 전 각항의 요령에 의하여 표시하 여야 한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제15조", "article_title": "발신명의", "content": "대외의 기관 등에 발신되는 문서는 회장의 명의로 발신한다. 다만, 하부기관의 장이 위임전결규정에 의하여 위임받은 업무를 수행할 때에 는 위임의 근거규정을 기안문에 명시하고 그 명의로 발신할 수 있다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제16조", "article_title": "최종결재자의 표시", "content": "제27조 제1항 및 제2항의 규정에 의하여 전결 또는 대결한 문서에 있어서는 그 시행문의 발신명의 밑에 별지 <서식 2>에 의하여 그 전결자 또는 대결자를 표시하여야 한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제17조", "article_title": "직인날인", "content": "① 임용장, 상장 및 각종 증빙서류에 속하는 문서와 대외로 발신하는 문서(전신에 의한 발신문서는 제외한다)에는 직인을 찍으며, 협회내 의 보조기관 상호간에 수발되는 문서는 서명으로 한다. 문서규정 Ⅲ-7-7 ② 동일한 문서는 인쇄 또는 등사하여 여러 기관에 동시에 발신할 경우에 경 미한 문서에는 직인을 찍지 아니하고 시행할 수 있다. 이 경우에는 시행문의 상부 중앙에 별지 <서식 3>에 의한 “직인생략”의 표시를 하여 시행한다. 제3장 문서의 처리 제1절 접수 경"}, {"category": "경영", "regulation": "문서규정", "article_num": "제18조", "article_title": "문서의 접수", "content": "① 문서는 문서에 관한 사무를 주관하는 부서(이하 “문서 주무부서”라 한다.)에서 접수한다. 영 ② 문서주무부서에서 문서를 접수한 때에는 별지 <서식 4>의 문서접수대장에 기록한다. ③ 문서주무부서 이외의 부서에서 문서를 접수한 때에는 지체없이 문서주무 부서에 인계하여 이를 접수하게 하여야 한다. ④ 우편이나 전신, 전화에 의하여 발송되어 접수한 문서는 발송기관이 요구한 때에 한하여 별지 <서식 5>의 영수증을 송부하며, 인편으로 발송되어 접수한 문서는 별지 <서식 6>에 의한 문서 사송부의 수령자인 란에 날인 또는 서명 하여 영수의 표시를 하여야 한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제19조", "article_title": "모사전송, 전화에 의한 접수", "content": "모사전송에 의하여 문서를 접수한 때에는 별지 <서식 7>에 기재하고 수신자가 서명하여야 하며 전화에 의하여 문서를 접수한 때에는 송수화시각 및 송신자의 직위, 성명과 수신자의 직위, 성명을 기재하고 수신자가 서명하여야 한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제20조", "article_title": "문서분류 및 처리", "content": "① 주무부서의 문서분류 책임자는 접수문서를 인수 한 후 그 문서를 처리할 최종권한이 있는 자(이하 “결재권자”라 한다.)의 선결 을 받아야 한다. 다만, 결재권자는 일상업무에 관한 문서로서 그 내용이 경미 할 경우에는 중간보조자로 하여금 처리하게 할 수 있다. ② 제1항의 규정에 의하여 선결하는 결재권자는 필요하다고 인정할 때에는 그 처리담당자를 따로 정한다. 강 ③ 지급문서는 다른 문서에 우선하여 처리하여야 하며 제2항에 의하여 결재 권자로부터 문서처리의 지시를 받은 자는 지시내용에 따라 문서를 처리하여 Ⅲ-7-8 한국여성경제인협회 규정집 야 한다. 제2절 기안 및 시행"}, {"category": "경영", "regulation": "문서규정", "article_num": "제21조", "article_title": "기안", "content": "기안은 업무담당자가 하는 것을 원칙으로 하고 서식이 따로 정하 여져 있는 경우를 제외하고는 별지 <서식 8>의 기안용지를 사용한다. <개정 '0 1. 9. 7.>"}, {"category": "경영", "regulation": "문서규정", "article_num": "제22조", "article_title": "일괄기안", "content": "① 상호 관련성이 있는 문서로 일괄하여 기안하는 것이 필요 하다고 인정될 때에는 제1안, 제2안 등으로 구분하며 동일한 기안용지에 기안 할 수 있으며, 시행문을 작성할 때에는 이를 각각 분리하여 작성한다. ② 전항의 일괄기안 시 두문의 수신기관란에는 “각안참조”라 표시하며, 각안 의 제목이 동일할 경우에는 본문의 제목으로 제1안 이하의 제목의 기록을 생 략할 수 있다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제23조", "article_title": "문서의 시행", "content": "① 전화에 의한 발신문서는 시행문의 작성을 생략하고 기 안문서에 의하며, 기타의 문서는 시행문을 작성하여 문서주무부서에서 발신한 다. ② 삭제 <’13. 8. 29.>"}, {"category": "경영", "regulation": "문서규정", "article_num": "제24조", "article_title": "보고문서의 시행", "content": "정기보고 또는 일회보고로서 제출하는 계산서, 통계 표, 도표 등의 보고문서는 시행문을 생략하고 보고서의 여백에 발신명의란을 설정하여 직인을 날인하여 시행할 수 있다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제25조", "article_title": "장부에 의한 처리", "content": "경미한 사항의 허가, 인가, 증명서 교부 기타 관례적 인 사무에 관한 문서는 따로 기안하는 것을 생략하고 그 내용을 관계장부에 기입하여 처리할 수 있다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제26조", "article_title": "협조", "content": "① 기안문서의 내용이 다른 부서에 관련되는 것일 때에는 기안용 지의 협조자 서명란에 의하여 협조를 얻어야 한다. ② 협조에 있어서 동의할 수 없는 경우에는 지체없이 그 사유를 명시하고 서 명하여야 하며, 동의할 수 없음을 이유로 서명을 거부하여서는 아니된다. ③ 협조가 이루어지지 아니한 사항은 상급결재자의 결정에 따른다. 문서규정 Ⅲ-7-9 제3절 결재"}, {"category": "경영", "regulation": "문서규정", "article_num": "제27조", "article_title": "결재", "content": "① 기안한 문서는 결재권자의 결재를 받아야 한다. ② 결재는 결재란에 서명 또는 날인하며, 필요에 따라 결재일시를 표시한다. ③ 결재권자는 두 장 이상으로 이루어지는 다음 각 호의 1에 해당하는 문서를 결재할 때에는 그 합철되는 부분에 간인하여야 한다. 1. 전후 관계를 명백히 할 필요가 있는 문서 2. 사실 또는 법률관계의 증명에 관계되는 문서 경 3. 허가․인가․등록 기타의 민원사항에 관계되는 문서 영 ④ 결재권자는 문서를 결재할 때에 전신에 의하여 시행할 문서중 비밀 또는 보안유지를 필요로 하는 중요한 사항은 그 발신방법을 지정하여야 한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제28조", "article_title": "전결․대결․후결", "content": "① 위임전결규정에 의하여 전결할 때에는 기안용지의 전결권자의 란에 전결의 표시를 하고 회장의 결재란에 서명 또는 날인한다. <개정 '03. 5. 13.> ② 결재권자가 출장․휴가 기타의 사유로 상당한 기간 부재중일 때에는 그 직 무를 대행하는 자가 기안용지의 결재란에 대결의 표시를 하여 결재권자의 후 칙 결 또는 후열을 받아야 한다. <개정 '01. 9. 7.> ③ 긴급한 문서로서 결재권자의 사정에 의하여 결재를 받을 수 없을 때에는 그 직무를 대행할 수 있는 자의 대결로써 우선 시행하고, 결재권자의 후결을 받아야 한다. 다만, 개인 또는 단체의 권리의무에 관계되는 중요한 문서는 예 외로 한다. ④ 제2항 및 제3항에 의하여 문서를 시행한 후 정규의 결재권자가 후결시에 그 내용을 수정한 때에는 그 수정한 사항을 수신자에게 통보하여야 한다. 침 제4절 문서의 발송"}, {"category": "경영", "regulation": "문서규정", "article_num": "제29조", "article_title": "문서의 발송", "content": "① 문서주무부서에서 문서를 우편 또는 인편에 의하여 발 송할 때에는 문서의 첫 면 하단에 별지 <서식 9>의 발송인을 찍어 발송한다. ② 주무부서에서 문서를 모사전송 또는 전화에 의하여 직접 발신하고자 할 때 ③ 수정기안한 문서를 발송할 때에는 분류기호, 문서번호, 시행일자, 보존년 령 한, 정서, 발송 및 별지 <서식 10>에 의한 통제의 표시를 그 문서의 여백에 한다. Ⅲ-7-10 한국여성경제인협회 규정집 ④ 시행한 문서의 원안은 주무부서에 반송하여 보관하게 한다. ⑤ 전화에 의하여 부서 상호간에 발신되는 문서는 주무부서의 문서발송대장 에 기재하고 그 일련번호를 붙여 직접 발신한다. ⑥ 문서를 발송할 때에는 문서의 보안유지, 분실 또는 도난방지를 위한 적절 한 조치를 취하여야 한다. 제29조의 2 (전자문서의 취급) ① \"전자이미지서명\"이라 함은 기안자ㆍ검토자 ㆍ협조자ㆍ결재권자 또는 발신명의인이 전자문서상에 전자적인 이미지 형태 로 된 자기의 성명을 표시하는 것을 말한다. <신설 '13. 8. 29.> ② \"전자이미지직인\"이라 함은 직인의 인영을 컴퓨터 등 정보처리 능력을 가 진 장치에 전자적인 이미지 형태로 입력하여 사용하는 직인을 말한다. <신설 '13. 8. 29.> ③ 회장의 명의로 발신하는 문서의 시행문, 게시판 등에 고시 또는 공고하는 문서, 임명장ㆍ상장 및 각종 증명서에 속하는 문서에는 직인(전자이미지 직인 을 포함)을 찍거나 회장 서명을 한다. 다만, 전신ㆍ전신타자 또는 전화로 발신 하는 문서나 관보ㆍ신문 등에 게재하는 문서에는 직인을 찍거나 서명하지 아 니하며, 경미한 내용의 문서에는 직인을 찍는 것과 서명하는 것을 생략 할 수 있다. <신설 '13. 8. 29.> ④ 직인을 찍어야 할 문서로서 다수의 수신자에게 동시에 발신 또는 교부하는 문서에는 직인날인에 갈음 하여 직인의 인영을 인쇄 혹은 스캔하여 사용 할 수 있다. <신설 '13. 8. 29.> ⑤ 시행문은 처리팀에서 발송하되, 종이문서인 경우에는 이를 복사하여 발송 하고, 전자문서인 경우에는 전자 문서시스템 상에서 발송하여야 한다. <신설 '13. 8. 29.> ⑥ 문서는 정보통신망을 이용하여 발신함을 원칙으로 한다. 다만, 업무의 성 격 기타 특별한 사정이 있는 경우에는 모사전송ㆍ전신ㆍ전신타자ㆍ전화 등 의 방법으로 발신할 수 있으며, 내용이 중요한 문서는 인편ㆍ등기 우편 기타 발 송사실을 증명할 수 있는 특수한 방법으로 발송하여야 한다. <신설 '13. 8. 29.> ⑦ 전자문서는 협회의 홈페이지 또는 직원의 공식 전자우편주소를 이용하여 협회 외의 자에게 발송할 수 있다. <신설 '13. 8. 29.> ⑧ 전자문서 중 정보통신망을 이용하여 발송할 수 없는 문서는 이를 출력하여 발송할 수 있다. <신설 '13. 8. 29.> 문서규정 Ⅲ-7-11"}, {"category": "경영", "regulation": "문서규정", "article_num": "제30조", "article_title": "문서수발부", "content": "① 문서주무부서에서 문서를 우편 또는 인편에 의하여 접 수한 때에는 문서의 첫 면 하단에 별지 <서식 11>의 접수인을 찍어 접수한다. ② 문서주무부서에는 별지 <서식 4>의 문서접수대장과 별지 <서식 12>의 문 서발송대장을 비치하고, 이에 의하여 문서의 접수와 발송상황을 기록․정리한 다. ③ 문서접수대장과 문서발송대장을 한권의 대장으로써 겸용할 때에는 발송상 황을 빨강색으로 기재한다. ④ 책자 기타 인쇄물을 배부할 때에는 문서발송대장에의 기록을 생략할 수 있 경 으며 필요에 따라 인쇄물 배부처를 따로 비치하여 사용할 수 있다. 영"}, {"category": "경영", "regulation": "문서규정", "article_num": "제31조", "article_title": "문서의 열람", "content": "① 보조기관 상호간에는 사무 수행 상 필요한 때에는 문서 를 열람하게 한다. ② 문서통제권자는 상근부회장으로 한다. <개정 '13. 8. 29.> 제5절 문서의 통제"}, {"category": "경영", "regulation": "문서규정", "article_num": "제32조", "article_title": "통제권자", "content": "삭제 <’13. 8. 29.> 제4장 문서의 보관 및 보존 제1절 통칙"}, {"category": "경영", "regulation": "문서규정", "article_num": "제33조", "article_title": "정의", "content": "이 장에서 사용되는 용어의 정의는 다음 각 호와 같으며 필요한 경우에는 이를 타 장에서 준용할 수 있다. 1. “집중관리”라 함은 처리 완결된 모든 문서를 문서주무부서에서 일괄하여 보관, 보존하는 것을 말한다. 2. “분산관리”라 함은 처리 완결된 모든 문서를 주무부서에서 보관, 보존하는 것을 말한다. 3. “보관”이라 함은 문서의 처리완결 후부터 보존되기까지의 관리를 말한다. 4. “보존”이라 함은 보관이 끝난 문서를 소정의 보존기간에 따라 관리하는 것 강 을 말한다. 5. “이관”이라 함은 보관중의 문서를 보존의 필요가 있어 문서주무부서에 인 Ⅲ-7-12 한국여성경제인협회 규정집 계하는 것을 말한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제34조", "article_title": "보존기간", "content": "① 문서의 보존기간은 다음 4종으로 구분한다. <개정 ’13. 8. 2 9.> 1. 영구보존 : 원본을 영구히 보존할 문서 <개정 ’13. 8. 29., 2023. 10. 16.> (법령, 정관, 규약, 규정, 예규, 연혁문서, 설립관계서류, 회원의 가입 및 탈 퇴서류, 년차보고서, 임원 및 직원명부, 상벌관계서류, 총회, 및 이사회 회 의록, 선거서류 일체, 기타 중요문서) <개정 2023. 10. 16.> 2. 삭제 <’13. 8. 29.> 3. 10년 보존 (임원 및 직원인사 관계서류, 회계결산서, 각종 조사통계서, 사업자금 입보 서, 회계에 관한 장부 및 회계감사서류, 업무인계서, 소유물처분관계서류) 4. 삭제 <’13. 8. 29.> 5. 3년 보존 (수지예산서, 운영계획서, 가결산 또는 미결산관계서류 각종 추천관계서류, 공동사업관계서류, 회원회의록, 지도교육문서, 각종 불하관계서류, 사업관 계서류, 각종행정기록장부 및 문서, 기타 업무관계문서) 6. 삭제 <’13. 8. 29.> 7. 1년 보존 (각종 정기보고서, 단순업무 처리문서, 기타 잡종문서) ② 문서보존기간의 종별 책정기준은 회장이 따로 정한다. ③ 문서의 보존기간은 처리완결의 익년 1월 1일부터 기산한다. ④ 전항의 보존년한에도 불구하고 다음 각호의 경우에는 예외로 할 수 있다. <신설 ’13. 8. 29.> 1. 보존년한이 경과된 후에도 특히 계속 보존할 필요가 있는 문서에 한하여 는 그 기간을 정하여 연장할 수 있다. <신설 ’13. 8. 29.> 2. 영구 및 10년 보존의 문서는 보존년한 개시 후 10년이 경과하면 계속 보 존의 필요여부 등을 검토 후 폐기할 수 있다. <신설 ’13. 8. 29.> 3. 사업이 계속 중이거나 감사가 진행 중인 때, 소송이 계류 중인 때에는 보 존 기간이 경과된 후에도 당해 사업 또는 사건이 종료될 때까지 관계문서 를 보존하여야 한다. <신설 ’13. 8. 29.> 제2절 편철․보관 문서규정 Ⅲ-7-13"}, {"category": "경영", "regulation": "문서규정", "article_num": "제35조", "article_title": "분류", "content": "처리 완결된 문서는 제13조제3항의 규정에 의하여 기능별, 분류방 법에 따라 분류한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제36조", "article_title": "편철방법", "content": "완결된 1건의 문서는 최근 문서가 상부에 오도록 철하고 그 반대편에 별지 <서식 13>에 색인목록을 붙인다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제37조", "article_title": "색인목록", "content": "색인목록에는 최종 1건 문서의 대표적 완결문서 건명을 기재 한다. 다만, 대표적 문서건명으로 1건 철의 내용이 분명하지 아니할 때에는 경 부제목을 기재한다. <개정 '01. 9. 7.> 영"}, {"category": "경영", "regulation": "문서규정", "article_num": "제38조", "article_title": "장수표시", "content": "보관철내의 장수표시는 하부 한계선 좌측에 일련번호를 기입 한다. <개정 '01. 9. 7.>"}, {"category": "경영", "regulation": "문서규정", "article_num": "제39조", "article_title": "특수문서의 보관", "content": "유첨물로 되는 인쇄물 또는 책자로서 보관철에 합철 하기 곤란한 경우에는 표면에 관계문서의 기관기호, 분류기호, 일자, 제목을 기재하여 별도로 보관한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제40조", "article_title": "보고자료의 처리", "content": "보고문서를 접수한 주무부서에서 보고자료를 종합하 여 1건 철로 완결한 때에는 보고자료는 부책으로 편철하여 표면에 관계문서 의 기관기호, 분류기호, 분류번호, 일자 및 제목을 기재하여 보관할 수 있다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제41조", "article_title": "서류함", "content": "완결된 문서는 서류함(화일, 캐비넷 또는 이에 준하는 것을 말 한다. 이하 같다)에 보관한다. 제3절 인계"}, {"category": "경영", "regulation": "문서규정", "article_num": "제42조", "article_title": "인계", "content": "주무부서는 매년도 초에 전년도에 완결된 문서를 보존문서인계이 관서에 의하여 문서주무부서에 인계하여 정리 보존하게 한다. 다만, 수시로 열람할 필요가 있는 보관철은 3년까지 각 주무부서별로 보관할 수 있다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제43조", "article_title": "보존", "content": "모든 보관철은 연도별, 분류번호 및 보존기간별로 보존하여야 한 다. Ⅲ-7-14 한국여성경제인협회 규정집"}, {"category": "경영", "regulation": "문서규정", "article_num": "제44조", "article_title": "보존문서기록대장", "content": "보존되는 보관철의 현황을 파악하기 위하여 별지 <서식 14>에 의한 보존문서기록대장에 보존기간별로 기록하여 비치하여야 한다. 제4절 대여 및 열람"}, {"category": "경영", "regulation": "문서규정", "article_num": "제45조", "article_title": "보관서류의 대출", "content": "① 대출기간은 7일 이내로 하며, 7일을 초과할 때에는 그 기간을 갱신하여야 한다. ② 대출에 관한 사항은 주무부서의 승인을 받아야 한다. <신설 '01. 9. 7.>"}, {"category": "경영", "regulation": "문서규정", "article_num": "제46조", "article_title": "문서의 열람 및 복사", "content": "① 임원 및 직원은 직무수행상 필요할 경우에는 문서주무부서에 보존중인 문서를 열람 또는 복사할 수 있다. ② 임원 및 직원이 아닌 자가 문서주무부서에 보존중인 문서를 열람 또는 복 사하고자 할 때에는 그 이유가 정당한 때에 한하여 허가할 수 있다. 제5절 폐기"}, {"category": "경영", "regulation": "문서규정", "article_num": "제47조", "article_title": "보존기간 경과 문서의 폐기", "content": "보존기간이 끝난 문서는 보존문서기록대장 에 빨강색 글씨로 폐기일자를 기입한 후 폐기하여야 한다. 제5장 보고통제 및 서식관리"}, {"category": "경영", "regulation": "문서규정", "article_num": "제48조", "article_title": "보고통제 및 서식관리", "content": "보고통제 및 서식관리에 관한 사항은 필요할 경 우에는 별도 회장이 요령으로 정한다. 제6장 인장"}, {"category": "경영", "regulation": "문서규정", "article_num": "제49조", "article_title": "인장의 종류 및 비치", "content": "① 인장은 다음 각 호와 같이 기관인, 직인, 인감 및 특수인으로 구분한다. 1. 기관인: 협회의 명칭만을 새긴 인장 2. 직 인: 협회회장의 직위의 명칭을 새긴 인장 3. 인 감: 관할 법원에 등록된 인장 문서규정 Ⅲ-7-15 4. 특수인: 계인 기타 특수한 업무에 사용되는 인장 5. 인장 관리는 회장이 한다. 다만, 업무 편의에 따라 위임할 수 있다. <신설 '13. 8. 29.> ② 인장은 별지 <서식 15>의 인장대장에 등록한 후 사용하여야 한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제50조", "article_title": "인장의 갱신 및 폐기", "content": "① 인장의 분실, 마멸 기타의 사유로 인장을 갱신 할 필요가 발생한 때에는 이를 갱신할 수 있다. ② 제1항의 사유에 의하여 기존인장을 폐기할 경우에는 인장관리부서의 장은 경 이를 인장대장의 “폐지”란에 날인한 다음 소각하여야 한다. 영"}, {"category": "경영", "regulation": "문서규정", "article_num": "제51조", "article_title": "인장날인 방법", "content": "① 기관인은 기관명의 끝자가 가운데 오도록 날인한다. ② 직인은 문서를 발신, 교부 또는 인증하는 자의 직위의 명칭의 끝자 또는 성 명의 끝자가 가운데 오도록 날인한다. ③ 인감 및 특수인은 그 날인이 요구되는 곳, 기타 적정한 곳에 날인한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제52조", "article_title": "문서의 인계인수", "content": "문서를 인계인수하는 직원은 담당업무에 관한 진행 규 상황, 관계문서, 자료, 기타 관련사항을 구체적이고 명확하게 인계, 인수하고 그 결과를 상위 결재권자에게 보고하여야 한다. <신설 '13. 8. 29.>"}, {"category": "경영", "regulation": "문서규정", "article_num": "제53조", "article_title": "문서사무의 전자적 처리", "content": "본 규정에서 정한문서사무는 특별한 사유가 없는 한 전자문서시스템 상에서 전자적으로 처리되도록 하여야 한다. <신설 '1 3. 8. 29.> 부칙 <1999. 9. 6.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2001. 9. 7.> 이 규정은 이사회에서 의결한 날부터 시행한다. 강 부칙 <2003. 5. 13> Ⅲ-7-16 한국여성경제인협회 규정집 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2005. 10. 25> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2013. 8. 29> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2019. 4. 29.>"}, {"category": "경영", "regulation": "문서규정", "article_num": "제1조", "article_title": "시행일", "content": "이 규정은 2019년 4월 29일부터 시행한다."}, {"category": "경영", "regulation": "문서규정", "article_num": "제2조", "article_title": "경과조치", "content": "이 규정 전 발생한 사안은 이 규정에 의한 것으로 간주한다. 문서규정 Ⅲ-7-17 <서식 1> 여성이 기업하기 좋은나라, 행복 대한민국! 수신자: 담 당 과 장 팀 장 본부장 상근부회장 회 장 결 (참 조) 재 경 제 목: 영 1. 2. 3. - 아 래 - 한국여성경제인협회장 ★ 담당 과장 팀장 본부장 상근부회장 회장 시 행 여경협 2013- (2013. . ) 접 수 ( ) 우 135-514 주소 서울시 강남구 역삼로 221 한국여성경제인협회 / http://www. wbiz.or.kr 전 화 (02) 369-0900 / FAX (02) 369-0950 /e-mail: @wbiz.or.kr 공 개 여성기업 관련 정보는 \"여성기업 종합정보포털\"(http://www.wbiz.or.kr) Ⅲ-7-18 한국여성경제인협회 규정집 <서식 2> 협회 문서규정 제16조 규정의 의하여 직 위 성 명 전 결 협회 문서규정 제16조 규정의 의하여 직 위 성 명 대 결 <서식 3> 직 인 생 략 문서규정 Ⅲ-7-19 <서식 4> 문 서 접 수 대 장 일련 접수 문서 인수자 발  "협회 이외의 자가 여비를 부담할 때에는 이를 지 급하지 아니한다. 다만, 다음 각호의 1에 해당하는 경우 여비를 보전할 수 있다. 1. 그 부담액이 이 규정에 의한 금액보다 낮은 경우 그 차액 2. 국외출장의 경우 [별표3]에 의한 준비금을 지급한다."}, {"category": "경영", "regulation": "여비규정", "article_num": "제6조", "article_title": "여비계산의 특례", "content": "① 임원을 수행하여 출장하는 자에 대하여는 교통비와 숙박료에 한하여 전부 또는 택일하여 임원과 동등의 여비를 지급할 수 있다. 이 경우 수행직원은 귀임 후 숙박료에 한하여 지체 없이 정산하여야 한다. ② 고문․자문 또는 협회 이외의 자가 협회의 업무를 위촉받아 여행할 때에는 회장이 정하는 바에 따라 여비를 지급할 수 있다."}, {"category": "경영", "regulation": "여비규정", "article_num": "제7조", "article_title": "여비의 변경", "content": "① 여행 도중에 지급기준의 변경이나 신분의 변경 등으로 인한 여비의 계산을 구분하여야 할 필요가 있을 때에는 그 사유가 발생한 날 로부터 구분하여 계산한다. ② 같은 날에 여비의 정액을 달리하여야 할 경우에는 많은 액으로써 이를 지 급한다."}, {"category": "경영", "regulation": "여비규정", "article_num": "제8조", "article_title": "여비의 개산지급", "content": "① 여행일정이 불분명하거나 기타사유로 인하여 여비 의 정액지급이 곤란한 경우에는 추정액을 우선 개산 지급할 수 있다. ② 제1항의 경우 여행자는 귀임 후 지체없이 정산하여야 한다."}, {"category": "경영", "regulation": "여비규정", "article_num": "제9조", "article_title": "여행중 사망자의 여비", "content": "① 여행 중 사망하였을 때, 출장인 경우에는 출장 지로부터 원근무까지, 부임인 경우에는 구임지에서 신임지까지의 전직에 상당 한 여비의 2배액까지 그 유족에게 지급할 수 있다. ② 제1항의 경우 그 지급된 여비는 반환하지 아니한다."}, {"category": "경영", "regulation": "여비규정", "article_num": "제10조", "article_title": "여행중 사고시의 호송가족 여비", "content": "여행 중 질병 기타 사고로 인하여 호송 이 필요한 때에는 호송을 위하여 여비를 본인과 동일등급을 기준하여 지급할 수 있다."}, {"category": "경영", "regulation": "여비규정", "article_num": "제11조", "article_title": "여행 중 휴직 또는 퇴직자의 여비", "content": "① 여행 중 휴직 또는 퇴직된 자에게 는 출장지로부터 원근무지까지의 본직 또는 전직에 상당한 여비를 지급할 수 있다. ② 제1항의 경우 그 지급된 여비는 정산하여야 한다. 여비규정 Ⅲ-8-5"}, {"category": "경영", "regulation": "여비규정", "article_num": "제12조", "article_title": "휴직 또는 퇴직자의 여비", "content": "사무인계 또는 잔무정리를 위하여 휴직 또는 퇴직된 자에게 출장을 명하였을 때에도 본직 또는 전직에 상당한 여비를 지급 할 수 있다."}, {"category": "경영", "regulation": "여비규정", "article_num": "제13조", "article_title": "세부사항", "content": "이 규정에 정하지 아니한 사항 또는 시행에 필요한 세부사항은 회장이 정한다. 제2장 국내여비 경 제1절 출장여비 영"}, {"category": "경영", "regulation": "여비규정", "article_num": "제14조", "article_title": "운임의 지급", "content": "① 철도여행에는 철도운임, 수로여행에는 선박운임, 항공여행 에는 항공운임, 철도 이외의 육로여행에는 자동차운임을 [별표1]에 의하여 지급한다. ② 제1항에 의한 직원의 항공여행은 일정 등을 고려하여 필요하다고 인정되는 경우에 한하여 이용할 수 있다."}, {"category": "경영", "regulation": "여비규정", "article_num": "제15조", "article_title": "체재비의 지급", "content": "직원의 국내여행 체재비는 [별표 1]에 의하여 정액으로써 이를 지급한다. 다만, 파견시의 체재비는 [별표 1의 2]에 의한다. <개정 ’15. 6. 칙 4., ’18. 3. 29.>"}, {"category": "경영", "regulation": "여비규정", "article_num": "제16조", "article_title": "당일귀임출장여비", "content": "당일 귀임 출장여비는 여비를 실비 정산하는 것으로 한다."}, {"category": "경영", "regulation": "여비규정", "article_num": "제17조", "article_title": "일비 등의 감액", "content": "① 파견이외에 같은 곳에 장기간 체재하는 경우의 일비 및 숙박료, 식비는 그 곳에 도착한 다음부터 계산하여 다음 각 호의 순에 따라 감액 지급한다. <개정 ’12. 2. 9.> 침 정액대비 구분 초과일수(일수) 감액비율 도착일 정액지급 도착한 다음 정액지급 날부터 15일 까지 16일 ~ 30일째(15일) 10분의 1 도착한 다음 날부터 15일을 31일 ~ 60일째(30일) 10분의 1 령 초과한 경우 61일 이상 10분의 3 Ⅲ-8-6 한국여성경제인협회 규정집 ② 제1항의 경우에 장기체재기간중 일시 다른 지역에 출장하였을 경우에는 그 출장기간을 공제하고 체재기간을 계산한다. ③ 출장에서 귀임후 7일 이내에 동일목적으로 동일지역에 출장하는 경우에 당해 출장기간과 그 이전 출장기간을 합산한 총출장기간이 30일을 초과할 때 에는 제1항의 규정을 적용한다."}, {"category": "경영", "regulation": "여비규정", "article_num": "제17조의2", "article_title": "근무지내 국내출장시의 여비", "content": "① 근무지내 국내출장의 경우에는 제1 5조의 규정에 불구하고 출장여행시간이 4시간 이상인 자에 대하여는 2만원을, 4시간 미만인 자에 대하여는 1만원을 지급한다. ② 제1항에서 ‘근무지내 국내출장’이라 함은 동일시(특별시 및 광역시를 포함 한다)ㆍ군 및 도서(제주특별자치도는 제외한다)안에서의 출장이나 여행거리가 편도 12km 미만인 출장을 말한다. <신설 ’12. 2. 9.> 제2절 부임여비"}, {"category": "경영", "regulation": "여비규정", "article_num": "제18조", "article_title": "부임여비의 지급대상", "content": "부임여비는 부임의 명을 받은 자에게 이를 지급한다."}, {"category": "경영", "regulation": "여비규정", "article_num": "제19조", "article_title": "부임여비의 지급", "content": "① 부임여비는 구임지에서 신임지까지의 여행 소요일 수에 대하여 [별표 1]의 여비를 지급한다. <개정 ’15. 6. 4.> ② 제1항의 부임에 소요되는 여행일수는 3일 이내로 한다. 가족의 경우에도 또한 같다."}, {"category": "경영", "regulation": "여비규정", "article_num": "제20조", "article_title": "가족의 범위", "content": "제18조 내지 제19조의 규정에 의한 가족이라 함은 본인이 실제 부양하고 있는 다음 각 호의 동거가족을 말한다. 1. 배우자 2. 미혼인 직계비속 3. 직계존속 제3장 국외여비"}, {"category": "경영", "regulation": "여비규정", "article_num": "제21조", "article_title": "운임 및 체재비의 지급", "content": "국외에 여행하는 경우에 운임과 체재비는 [별표 2]에 의하여 지급한다. 여비규정 Ⅲ-8-7"}, {"category": "경영", "regulation": "여비규정", "article_num": "제22조", "article_title": "체재비의 지급", "content": "① 체재비는 일당체재비․월당체재비로 구분한다. ② 국외업무출장자의 체재비는 [별표 2]에 규정된 일당체재비를 매 여행일마 다 계산하되, 다음 각 호의 순에 따라 지급한다. <개정 ’12. 2. 9., ’18. 3. 29.> 정액대비 구분 초과일수(일수) 감액비율 도착일 정액지급 도착한 다음 정액지급 날부터 15일 까지 16일 ~ 30일째(15일) 10분의 1 도착한 다음 경 날부터 15일을 31일 ~ 60일째(30일) 10분의 1 초과한 경우 61일 이상 10분의 3 영 ③ 제2항의 경우 출장지, 출장목적, 환율 및 물가사정 등을 감안하여 지역별로 체재하는 기간에 대하여 다음 각 호의 지역별 가산율 범위 내에서 체재비를 가산하여 지급할 수 있다. 1. 구주지역 : 15% 범위 내 2. 중동 및 아프리카 지역 : 25% 범위 내 ④ 참가비를 납부하는 국외업무출장의 경우 그 참가비를 지급하며, 일비, 식 비, 숙박료 중 일부 또는 전체가 참가비에 포함되지 않았을 경우 참가비에 포 칙 함되지 않은 부분은 [별표 2]에 규정된 체재비를 지급한다."}, {"category": "경영", "regulation": "여비규정", "article_num": "제23조", "article_title": "부대비용", "content": "여권발급과 입국사증 등 여행수속을 위하여 소요되는 부대비 용은 실비로 이를 지급할 수 있다."}, {"category": "경영", "regulation": "여비규정", "article_num": "제24조", "article_title": "준비금", "content": "① 국외연수 또는 국외출장 명령을 받은 임직원에게는 [별표 3] 에 의한 준비금을 지급한다. 침 ② 제1항의 준비금은 국외 출장이 종료되는 즉시 정산하여야 한다. 부칙 <2001. 9. 7.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2012. 2. 9.> 이 규정은 이사회에서 의결한 날부터 시행 한다 Ⅲ-8-8 한국여성경제인협회 규정집 부칙 <2015. 6. 4.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2018. 3. 29.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2023. 10. 16.> 이 규정은 이사회에서 의결한 날부터 시행한다. 부칙 <2025. 8. 18.> 이 규정은 이사회에서 의결한 날부터 시행한다. 여비규정 Ⅲ-8-9 【별표 1】 운임 및 체재비 <개정 ’23. 10. 16., ’25. 8. 18..> (단위: 원) 운임 체재비 직급 항공 철도 선박 자동차 일비 식비 숙박료 운임 운임 운임 운임 시내 시외 실비 실비 실비 회장 실비 - - - 실비 (비즈니스) (KTX특실) (1등급) 경 상근 “ “ “ “ 20,000 25,000 30,000 실비 임원 영 실비 실비 실비 1급 〃 “ “ 25,000 (이코노믹) (KTX일반) (2등급) (상한액: 서울특별시 2급 〃 〃 〃 〃 “ “ “ 100,000, 3급 〃 “ 〃 〃 “ “ “ 광역시 80,000, 그 밖의 4급 지역 70,000) 〃 〃 〃 〃 “ “ “ 규 이하 <비고> 1. 자동차운임의 정액은 국토해양부장관 또는 특별시장.광역시장 또는 도지사 가 정하는 기준 및 요율의 범위 안에서 정하여진 버스요금을 기준으로 한다. 2. 철도운임란 중 임원은 특실 정액, 직원은 일반실 정액을 말하며, 당해 철도 운임란의 직급을 적용할 수 없는 경우에는 그 노선의 열차 최고등급에 해 당하는 철도운임을 지급한다. 3. 자가용을 이용하여 공무로 여행하는 경우의 운임은 표 1의 철도 또는 버스 침 운임으로 한다. 다만, 공무의 형편상 부득이한 사유로 자가용을 이용한 경 우에는 연료비, 통행료
